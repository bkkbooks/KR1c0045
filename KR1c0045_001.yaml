body:
  text: 國風一朱子曰國者諸侯所封之域風者民俗歌謠之詩也謂之風者以其被上之化以有言而其言又足以感人如物因風之動以有聲而其聲又足以動物也周南一之一周國名在雍州岐山之陽太王始居之傳至文王徙都於豐武王克商徙都於鎬成王嗣立周公相之乃采文王之世風化所及之詩被之管絃以為樂歌謂之周南者言其化自周而南也關關雎鳩在河之洲窈窕淑女君子好逑興也關關雌雄相應之和聲雎鳩鳥之有别者也窈窕幽間之意淑善逑配也凡興必有所取雎鳩雌雄河洲宛在與淑女君子深閨靜好神相似也窈窕狀其德也心斂則致幽性定則神間匡衡曰情欲之感無介乎儀容燕私之意不形於動靜是也好逑勸好德也家齊由於女貞女貞本乎男正男好色則女修容男好德則女敬事故為君子者必真知窈窕淑女乃為好逑斯好惡明取舍定而風化行也參差荇菜左右流之窈窕淑女寤寐求之興也參差不齊之貌荇菜柔潔似女德也流之沿流以求之也男之求女如君之求士其訪之也博其擇之也精其好之也誠其禮之也備故左右流之無定方也寤寐求之無已時也求之不得寤寐思服悠哉悠哉輾轉反側賦也服事悠長也輾轉反側卧不安席之意言君子於淑女求之不得則思其服淑女所服之事所以佐君子理隂教有不得而必不可者故思之甚長而卧不能安也男女之際情欲易生寤寐輾轉而好是懿德不涉於邪所謂哀而不傷也參差荇菜左右采之窈窕淑女琴瑟友之興也采擇而取之也友之取其德也琴瑟房中之樂也言君子既得淑女則取其德而友之有善相勸有過相規如琴瑟之在御剛柔調劑以成聲也參差荇菜左右芼之窈窕淑女鐘鼓樂之興也芼熟而用之也樂之用其德也鐘鼓堂下之樂也言君子既友淑女則用其德而樂之明章婦順以化其下內和家理外和國治如鐘鼓之在庭元音宣暢以逺聞也關雎五章章四句關雎文王之本也天下之本在國國之本在家家之本在身格物致知正心誠意皆所以修身也窈窕好逑惟取其德則貞淫辨而好惡之源清格致之要道也寤寐思服不慕其色則理欲嚴而幽獨之幾謹誠正之實功也琴瑟友之衽席之上德業相資而天命常行此修身以齊其家也鐘鼓樂之化起宫闈逹於朝廟有以奉神靈之統而理萬物之宜此齊家以治其國而天下可平也事不越夫婦之際而天德王道之始終備焉故用之閨門用之鄉黨用之邦國自天子至於庶人不可一日而不為此也葛之覃兮施于中谷維葉萋萋黃鳥于飛集于灌木其鳴喈喈賦也覃長施延萋萋盛也黃鳥鸝也黃鸝夏鳴采葛之候也后妃在宫中聞黃鳥而思采葛言彼谷中之葛葉想萋萋而盛矣此灌木之黃鳥已喈喈而鳴矣蓋勤於其職不敢暇逸故聞聲而警心欲及時以趨事也葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁賦也莫莫密也刈割濩煮也精曰絺粗曰綌斁厭也后妃至谷中見葛已成於是割之煮之治為絺綌而服之不厭焉朱子曰親執其勞而知其為之不易是也凡人躬稼穡則不敢厭疏食身紡績則不敢厭布衣故王親耕后親蠶真知農夫工女之艱難而後深樽節愛養之至意也言告師氏言告言歸薄汚我私薄浣我衣害浣害否歸寧父母賦也師氏女師薄語辭汚浣皆洗也燕服曰私禮服曰衣害何寧安也言告師氏后妃告女師也言告言歸使女師告文王也汚私浣衣潔且儉也衣不皆浣儉得中也歸寧父母者婦功既成為時已久恐父母之思已而心不安故歸而安之也葛覃三章章六句詩序曰葛覃后妃之本也朱子曰己貴而能勤己富而能儉己長而敬不弛於師傅己嫁而孝不衰於父母是也至於事皆稟命無敢自專閨門之內師保通言乃窈窕有别之實録而官禮之明備已肇其端矣此文王太姒所以造周也采采卷耳不盈頃筐嗟我懷人置彼周行比而賦也卷耳苓耳也卷耳可以佐食比賢人可以養民也采而不盈比求而難得也我后妃自謂也懷人謂文王也周行猶言王路左傳云置彼周行能官人也王及公侯伯子男采衛大夫各居其列所謂周行也紂囚文王於羑里后妃思之言賢才甚少求之難得如我所懷之人當置之列位使得馳驅王路不可拘幽之也陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷比而賦也陟升也虺隤馬疲之貌金罍酒器也陟彼崔嵬言路難也我馬虺隤喻民困也世路方艱民力已困天下之憂莫大於是故永懷之雖酌酒而不能解也陟彼高岡我馬元黃我姑酌彼兕觥維以不永傷比而賦也元黃病也元馬病則黃矣疲之甚而至於病故懷之甚而至於傷也陟彼砠矣我馬瘏矣我僕痡矣云何吁矣比而賦也石山戴土曰砠瘏痡皆病也朱子曰吁當作盱張目逺望也僕所以牧馬也馬瘏則民病僕痡則官亦病矣是民力已困而無人寬恤也民生已殘而無人撫綏也時事如此無可如何惟有置懷人於周行庶可轉危為安焉故盱之望之也望紂之求賢審官以用文王也卷耳四章章四句詩序曰卷耳后妃之志也治世在于養民養民在於審官布羣賢於庶位則民可養矣躋大賢於顯秩則官可審矣此古今之通義而當文王與紂之時尤甚蓋紂之毒痡四海非用文王不能救也觀父母孔邇之詩魴魚之頳尾文王能撫循之王室之如燬文王能奠安之然則虺隤元黃之時宜置文王於周行信有徴矣其所盱望不虛也值人倫之變而永懷永傷者社稷生民之至計此所以為后妃之志也南有樛木葛藟纍之樂只君子福履綏之比而賦也木下曲曰樛藟葛屬纍繫也君子謂文王也履祿綏安也樛木下曲而葛藟繫之以比后妃逮下而衆妾附之也后妃有逮下之德而衆妾依附又能率衆妾以樂其君子故衆妾頌祝之願文王與后妃皆受天之福祿也南有樛木葛藟荒之樂只君子福履將之比而賦也草與苖雜曰荒后妃不自有其崇高故衆妾亦自忘其卑下並育而不相害也將助也思若或啓之行若或翼之助其德不止安其身也南有樛木葛藟縈之樂只君子福履成之比而賦也縈繞也衆妾之愛戴后妃纏綿固結而不可解矣成全也諸福之物可致之祥莫不備至凡所將者皆底於成也嘉樂之詩曰保佑命之自天申之綏之保之將之佑之成之則命之而申之矣逮下之德日深故頌祝之詞遞進也樛木三章章四句詩序曰樛木后妃逮下也女德無極婦怨無終故暌次家人以二女同居而志不同行也不同必爭寵爭寵必妬忌妬忌必讒傷故妾之於嫡多怨之也不然則畏之也獨后妃之於衆妾不妬而使其可樂衆妾樂之而歸美君子蓋關雎之化深矣鐘鼓樂之文王樂后妃也樛木逮下后妃推文王之樂以樂衆妾也福履綏成衆妾感后妃之樂而愈以樂文王也成周之世太和洋溢皆本諸此故關雎之後必有樛木而後有螽斯以此為修身齊家之極則也螽斯羽詵詵兮宜爾子孫振振兮比也螽斯蝗屬喜羣飛一生九十九子詵詵和也振振壯也后妃不妬而多男故詩人以螽斯比之言其羣飛詵詵而和宜其子孫振振而壯也蓋妻不妬則妾媵和妾媵和則心神暢而氣血調所生之子必壯矣此理之自然故曰宜也螽斯羽薨薨兮宜爾子孫繩繩兮比也薨薨羣飛聲繩繩不絶貌妻不妬而妾媵和則樂羣處而進御均所生之子必多矣螽斯羽揖揖兮宜爾子孫蟄蟄兮比也揖揖讓也羣飛而相下如人之揖讓也蟄蟄聚也雍睦而聚處如蟲之盤蟄也妻妾欲其和尤欲其讓和而不讓則狎而起爭故必以讓節和之流斯妻妾常保其羣處而子孫皆盤聚而不散矣此亦理之自然故曰宜也螽斯三章章四句螽斯子孫盛也凡家道之成始於夫婦中於父子終於兄弟是故有文王而後有關雎夫刑妻也有關雎而後有樛木妻容妾也有樛木而後有螽斯妾宜子也子患其不壯又患其不多壯且多矣又患其不睦而至於不聚也振振繩繩而終於蟄蟄則是子孫皆能孝於親也且推孝親之心以友於兄弟也一庭之內夫和妻柔父慈子孝兄友弟恭則禮樂成於家而仁讓興於國矣此修齊治平之節次非此不可推而行也故曰人而不為周南召南其猶正牆面而立也與桃之夭夭灼灼其華之子于歸宜其室家興也夭夭少好貌婦人謂嫁曰歸宜者和順之至彼此相得而相安也室謂夫婦所居家謂一門之內文王后妃之化自家而及於國由男而及於女國中之女皆有和順之德故詩人見其于歸而歎美之也宜其室家者宜其室以及於家也善相夫子琴瑟靜好由是而孝於舅姑由是而睦於兄弟一家之內恩明誼美如夭桃之華灼灼而鮮明也桃之夭夭有蕡其實之子于歸宜其家室興也蕡實盛貌宜其室家謂一室所有之家也父母兄弟是也宜其家室謂一家所有之室也弟婦子婦是也淑愼之德一家化之弟婦子婦皆能相夫而各宜其室如夭桃之實蕡然而圓碩也桃之夭夭其葉蓁蓁之子于歸宜其家人興也蓁蓁葉盛貌宜其家人者盡宜一家之人也長幼卑尊各得其所如夭桃之葉蓁蓁而齊茂也桃夭三章章四句桃夭化行於國也所謂治國在齊其家者治國之道無他使國人皆齊其家而已欲一國之人皆能齊家必一國之女皆能宜室此非政令之所致也天子懋肅雍之德后妃昭窈窕之儀積為風俗而通於氣化人秉清淑之姿户成禮讓之習然後少女于歸皆能淑愼也語其功化之盛至於一國之人各齊其家原其起化之由不過一家之內自修其身知逺之近知風之自道豈逺乎哉術豈多乎哉肅肅兔罝椓之丁丁赳赳武夫公侯干城賦也肅肅整飭貌罝罟也結繩為罟易於棼亂而肅肅整飭執事有敬也丁丁椓杙聲用力有節也赳赳武貌干城所以扞衛也化行俗美賢才衆多野人罝皆能整飭故詩人美之以為此雖赳赳之武夫而敬而有節則勇而不亂可以折衝禦侮而為公侯之扞衛矣肅肅兔罝施于中逵赳赳武夫公侯好仇賦也九達之衢曰逵中逵衝會之所也仇匹也肅肅兔罝而施于中逵則是敬以集事握其樞要而物不得遁故可與共圖國政而為公侯之善匹也肅肅兔罝施于中林赳赳武夫公侯腹心賦也中林邃密之所也肅肅兔罝而施于中林則是敬以揆幾智深勇沉而人不能知故可以出謀發慮而為公侯之腹心也昔郤缺耨其妻餉之夫妻相敬如賓胥臣曰敬德之輿也能敬必有德文公舉以為大夫而果稱職然則野人之肅肅可為好仇腹心有徴矣兔罝三章章四句兔罝人材衆多也上之化民也深於命民之效上也捷於令君敬德於上則民敬事於下故后妃窈窕而采蘋之季女能齊文王穆穆而兔罝之野人能肅齊與肅者敬之謂也至於能敬則無所施而不可矣仕與學無二理文與武非兩途敬身而克勤小物即敬官而能辦大事草野之夫皆朝寧之佐也無事而莊以涖衆即臨事而懼以成謀六官之長皆六軍之將也故觀兔罝之肅肅而干城好仇腹心皆可預卜矣三代以上聖道明而人材出以此也思齊之詩曰不顯亦臨無射亦保敬之至也聖道明也肆成人有德小子有造則人材出也古之人所以譽髦斯士者無他焉無斁其敬而已矣采采芣苡薄言采之采采芣苡薄言有之賦也芣苡車前也宜子故婦人采之朱子曰化行俗美家室和平婦人無事相與采此也黃佐曰門庭之內幸無係纍機杼之外尚有餘間是也采之始求之也薄言采者聊試為之無成見也有之始得之也薄言有者偶然遇之無喜心也采采芣苡薄言掇之采采芣苡薄言捋之賦也掇拾其穗也薄言掇者相與拾之而不爭也捋取其子也薄言捋者徐而取之而不競也采采芣苡薄言袺之采采芣苡薄言襭之賦也祮貯於衽也薄言袺者掬不能容姑貯於衽非貪得也襭扱於帶也薄言襭者將欲擕歸故扱於帶非矜持也芣苡三章章四句芣苡室家和平也觀其婦子間而無事比鄰耦而無猜多寡隨其所得作止任其自然所謂皥皥而不知為之者歟是故桃夭之女子能宜猶有和之心也芣苡則忘其和矣無心而相與矣兔罝之野人能肅猶有敬之迹也芣苡則忘其敬矣無事而天遊矣治至於無事化至於無心此曠古所希有而無奇也仍本於人君之敬而已中庸詳言之矣相在爾室尚不愧于屋漏君之敬也奏假無言時靡有爭民之和也篤恭而天下平則君不顯其敬而民亦不顯其和矣是故君德至於無聲無臭則民風極於不識不知此謹幾愼獨之實功𥘉非幸邀天眷而致此也南有喬木不可休息漢有遊女不可求思漢之廣矣不可泳思江之永矣不可方思興而比也竦直無枝曰喬思語辭也涉水曰泳並舟曰方木喬則寡隂而不可休矣女貞則無欲而不可求矣漢廣江永極形之也貞則神遠如漢之廣無徑可緣也貞則守純如江之永無間可乘也朱子曰文王之化及於江漢之間而有以變其淫亂之俗其出遊之女人望見之而知其端莊靜一非復前日之可求矣故以喬木起興江漢為比而反復詠歎之也翹翹錯薪言刈其楚之子于歸言秣其馬漢之廣矣不可泳思江之永矣不可方思興而比也翹翹高也錯節也楚荆屬秣飼也薪錯不可伐言刈其楚而已女貞不可求言秣其馬而已然既不可求則于歸無期矣故重言江漢之廣永歎其馬亦不可秣也朱子曰以錯薪起興而欲秣其馬則悅之至以江漢為比而歎其終不可求則敬之深翹翹錯薪言刈其蔞之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思興而比也蔞蒿也蒿又小於楚矣駒又小於馬矣重言漢廣江永者歎其駒亦不可秣也蓋恱之愈至而敬之愈深也漢廣三章章八句詩序曰漢廣德化所及也后妃修德文王好德其下化之自近及逺故江漢之間民風丕變出遊之女皆能修德觀其致高而神逺非窈窕之狀乎行道之人皆知好德觀其恱至而敬深則與寤寐求之相似矣夫德存於己人不能見而化之所及無逺弗屆者此非有術以致之也人性之善一也性一則情孚情孚則神通故深宫自毖其宥密而草野羣移其性情起化者不言𬒳化者亦不知矣君子是以知明德之果可以新民也遵彼汝墳伐其條枚未見君子惄如調飢賦也遵循也汝水名墳防也枝曰條幹曰枚惄飢意調一作輖重也朱子曰婦人喜其君子行役而歸因記其未歸之時思望之情如此而追賦之也遵彼汝墳伐其條肄既見君子不我遐棄賦也斬而復生曰肄遐逺也朱子曰伐其枚而又伐其肄則踰年矣至是乃見其君子之歸而喜其不逺棄我也魴魚赬尾王室如燬雖則如燬父母孔邇比而賦也魴魚名赬赤也魚勞則尾赤王謂紂燬焚也父母謂文王孔甚邇安也文王之化行於江漢而又及於汝所謂三分有二也漢廣之好德近於關雎汝墳之伐薪葛覃之遺風乎乃心王室則與卷耳同矣朱子曰文王三分天下有其二而率商之叛國以事紂故汝墳之人猶以文王之命供紂之役其家人見其勤苦而勞之曰汝之勞既如此而王室之政方酷烈而未已雖其酷烈未已而文王之德如父母然望之甚近亦可以忘其勞矣此序所謂婦人能憫其君子猶勉之以正者蓋曰雖其離别之久思念之深而所以相告語者猶有尊君親上之心而無狎昵之私則其德澤之深風化之美皆可見矣汝墳三章章四句詩序曰汝墳道化行也道莫大於五倫而君臣父子為尤重父雖不慈子不可以不孝君雖不仁臣不可以不忠故紂至暴虐文王事之不敢叛也不惟不叛而已且使天下之叛者皆服於己而已復率之以事紂故終文王之世天下皆供紂之役而且忘紂之暴是文王以事君之道化天下而天下化之故曰道化行也虞舜克諧瞽瞍遂無頑嚚之愆文王服事商紂並有怙冒之仁必如此而後天下化必如此而後天下之為君臣父子者定麟之趾振振公子于嗟麟兮興也麟瑞獸也王者至仁則麟出趾足也麟之足不踐生草不履生蟲振振仁厚之貌朱子曰麟性仁厚故其趾亦仁厚文王后妃仁厚故其子亦仁厚而又嗟歎之言是乃麟也何必麕身牛尾而馬蹄然後為王者之瑞哉麟之定振振公姓于嗟麟兮興也定額也麟之額不以抵物公姓公孫也公孫皆麟者公子能以仁厚教其子也麟之角振振公族于嗟麟兮興也麟一角其端有肉不以觸也公孫之子以王父字為氏因以為族故曰公族公族皆麟者公孫能以仁厚世其家也趾骨在下一身之本故以興子定皮膚也在趾之巔近於末矣故以興孫角又在皮膚之外矣故以興族譬之於木趾猶根定猶枝角猶葉也麟之趾三章章三句詩序曰麟之趾關雎之應也天地之道元而已矣元者仁也太和也關雎之樂和之至也太和所聚元仁發育故子孫宗族莫不仁厚而瑞應至矣又言子孫宗族之皆麟者固以歎其仁厚之德與麟同符抑以見物瑞不如人瑞欲人君勉為仁厚之實而勿徒侈言符應則頌也而諷規寓焉矣周南之國十一篇三十四章一百五十九句周南修齊治平之譜也天下之道莫先於父子兄弟故大學始教惟孝弟慈行之於身則身修施之於家則家齊以此成教於國以此潔矩於天下而其事皆始於夫婦夫婦和而後能養父母育子孫睦兄弟故父子兄弟足法必先以之子宜家也周南之詩與大學同關雎葛覃造端乎夫婦也螽斯麟趾則及於父子兄弟矣桃夭兔罝教成於國也漢廣汝墳則及於天下矣是故卜世三十卜年七百福祚之長未有如周者也太和翔洽樂備禮明治化之隆未有如周者也而究其致此之由則惟起化於閨門而端本於孝弟大學言其理周南指其事孔子曰我欲託之空言不如見之行事之深切著明也故詩教與春秋同歸學者不可不盡心焉御纂詩義折中卷一
