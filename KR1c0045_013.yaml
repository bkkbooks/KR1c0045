body:
  text: 小旻之什二之五旻天疾威敷于下土謀猶回遹何日斯沮謀臧不從不臧覆用我視謀猶亦孔之卭賦也敷布也猶與猷同回邪遹辟沮止卭病也言旻天之疾威遍布于下土故下土之人謀猶邪辟而無所底止也夫人之謀固多不臧亦有臧者乃臧者不從而不臧者反用焉我從旁而觀之蓋愈謀而國愈病矣潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底賦也潝潝相和也訿訿相詆也具俱底至也言小人羣謀以類相從其潝潝然和者黨同而無公是也其訿訿然詆者伐異而無公非也志卑識鄙亦可哀矣惟其無是非而有同異故謀之是者與己不同則俱違焉謀之非者與己不異則俱依焉我從旁而觀之其謀不知何所至也我龜既厭不我告猶謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道賦也集成也朱子曰卜筮數則煩瀆而龜亦厭之故不復告以吉凶謀夫多則是非相奪而莫適所從故所謀終亦不成蓋發言盈庭各是其是無肯任其責而决之者猶不行不邁而坐謀所適謀之雖審究何得于道路㦲哀哉為猶匪先民是程匪大猶是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成賦也程法經常潰决也言謀之所以回遹者由為謀之人不考古人之成法以為程式不揆天下之大勢計其經常上之人惟淺近之言是聽下之人惟淺近之言是爭是以謀夫愈多而愈不集也朱子曰如將築室而與行道之人謀之人為異論其能有成也㦲李樗曰謀之逺者似迂濶而難行謀之近者似便捷而易用不知近者雖有小利而其害隨至逺者雖無近功而可以終身無害茍非上智之人惡能慎擇而决所從哉國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼泉流無淪胥以敗賦也止定也膴多也艾與乂同肅乂哲謀聖洪範五事之德也言謀猶如此是在位者無可與言矣然國於天地必有與立今雖播遷而有聖者焉不盡否也天生蒸民必有恆性今雖凋敝而有哲謀者焉有肅乂者焉是在下者未嘗無善人也但當此旻天疾威小人盈庭之日將挺身而與爭則必至得禍而其人敗矣將隨聲而附和則喪其所守而其人愈敗矣如彼泉流淪胥而不可止也君子欲保全善類故勸其無淪胥以敗而思所以自處也不敢暴虎不敢馮河人知其一莫知其他戰戰兢兢如臨深淵如履薄氷比而賦也徒搏曰暴徒涉曰馮此言君子自處之道也不敢暴虎不與爭而攖其怒也不敢馮河不附和而蹈其波也既不激而不隨惟有守道以俟時耳事無兩可必有一是既知其一不必更知其他矣然當此天人交病之日雖守道豈易言㦲必戰戰戒懼兢兢慎持茍非道者斷不敢近如臨深淵惟恐陷而溺也即是道者亦必謹而行之如履薄氷惟恐肆而蹶也易曰需于泥災在外也自我致寇敬慎不敗也言涉亂世之末流如需于泥敬而慎之斯不淪胥以敗矣小旻六章三章章八句三章章七句小旻憂世也觀隂陽否泰之數君子小人常並生者也取舍有定則君子在上是非不眀則君子在下君子既在下矣而猶挾其是非以與在位之小人爭必不勝也有淪胥以敗耳故有心斯世者不敢輕為犯患之事而守道以全身其全身也非為身也自全其身共相警戒以全善類之身則否之碩果不食即泰之拔茅彚征全其身正所以全天下也臨深履薄豈徒然㦲然此亦視其時與位焉小旻之詩人一則曰我視謀猶再則曰我視謀猶是乃局外旁觀之人故可守道以俟時若己親與其謀在發言盈庭之列自當身執其咎而猶欲畏慎以免禍則又非君子之道矣世之與人家國而緘默自全者無以小旻為口實可也宛彼鳴鳩翰飛戾天我心憂傷念昔先人明發不寐有懷二人興也宛小貌翰羽戾至也明發將旦也二人謂父母也此孝子戒勉其兄弟也言鳴鳩雖小奮飛可以戾天以興人苟奮勉皆可至於善也是以中心憂傷念我之不及先人又懷父母生我之恩欲奮勉以慰親志也人之齊聖飲酒溫克彼昏不知一醉日富各敬爾儀天命不又賦也齊整肅也聖睿思也克勝也富猶甚也又復也此因懷父母而戒兄弟也言人能整肅於外睿思於內則德性堅定雖飲酒而溫恭以勝之不為酒困也彼昏然而不知者內既不聖又加之以醉而日甚則外益不齊而德喪矣故願兄弟之戒之也各敬爾儀齊乎外以養其中斯聖通性定而命立不然則福去災生天命不可以又邀也左𫝊曰民受天地之中以生所謂命也於是有動作威儀之莭以定命也能者養之以福不能者敗以取禍此之謂也中原有菽庶民采之螟蛉有子蜾螺負之教誨爾子式穀似之興也中原原中也菽大豆也螟蛉桑蟲蜾螺土蜂也土蜂取桑蟲而負之七日而化為其子式用穀善也朱子曰中原有菽則庶民采之矣以興善道人皆可行也螟蛉有子則蜾螺負之矣以興不似者可教而似也教誨爾子則用善道以似之可也戒之以不惟獨善其身又當教其子使為善也何楷曰兄弟者親之枝也子者身之枝也各敬威儀以善其身所以繼先人也教子式穀以繼其身亦所以繼先人也題彼脊令載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生興也題視也脊令飛則鳴行則搖人之黽勉不已者似之邁征皆往也忝辱也言視彼脊令飛鳴勤勞如此我與兄弟豈可自暇逸乎况我之日既邁矣爾之月亦征矣逝者如斯老將至矣而德業不進父母之生我何為乎故願彼此奮勉早作遲寐窮日之力以敬身而教子庶乎可以不辱其所生也東方朔曰日夜孳孳敏行而不怠譬如脊令飛且鳴矣此之謂也交交桑扈率場啄粟哀我填寡宜岸宜獄握粟出卜自何能穀比而賦也桑扈食肉之鳥交交往來之貌填與癲同病也岸與犴通鄉亭之獄也桑扈啄粟非所食而食也喻民貧也病寡岸獄非所繫而繫也言刑繁也民貧易於為非刑繁易於觸禁則所以敬身而不辱其親者宜更加謹矣故握粟出卜問何時而能穀憂之甚也溫溫恭人如集于木惴惴小心如臨于谷戰戰兢兢如履薄氷賦也詳言求穀之道也溫溫和柔以敬人也如集于木恐失禮而隕越也惴惴小心以敬已也如臨于谷恐狥欲而陷溺也戰戰兢兢以敬事也如履薄氷恐履錯而顛躓也此各敬爾儀之實功以此自為則能穀矣以此教子則能似矣必如此而後無忝所生有懷二人不虛也小宛六章章六句小宛孝子繼志也為人子者以父母之心為心父母之心惟望子之保身惟望子之免禍兄弟皆親之子也兄弟之子親子之子也皆親之所懷也人子懷親則必懷親之所懷故自敬其身勸兄弟各敬其身勸兄弟各教其子以敬身一家之人皆為善以免禍而後親心乃慰一有不謹則天命不又而忝所生矣日夜戰兢有以也樂正子春曰一舉足而不敢忘父母是故道而不徑舟而不游不敢以先父母之遺體行殆一出言而不敢忘父母是故惡言不出於口忿言不反於身不虧其體不辱其親可謂孝矣詩人其知之矣辨彼鸒斯歸飛提提民莫不穀我獨于罹何辜于天我罪伊何心之憂矣云如之何興也辨拊翼貌鸒雅烏孝鳥也斯語辭提提羣飛貌此幽王之太子被廢而作此詩也言鸒歸飛而提提者戀其母也民皆有親故莫不穀而我獨得罪於父母是辜於天也我何為而辜于天實不知我罪之所在則雖憂而末如之何矣蓋自怨己之有罪而不知非自以為無罪而怨父母也踧踧周道鞠為茂草我心憂傷惄焉如搗假寐永歎維憂用老心之憂矣疢如疾首比也踧踧平坦貌周道大路也鞠塞也路不行則草塞之矣言父子相親人之大倫猶周道也今遭讒間則是周道不行而茂草塞之矣遭人倫之大變是以心傷如搗假寐永歎未老而用老不病而如病也維桑與􅎚必恭敬止靡瞻匪父靡依匪母不屬于毛不離于裏天之生我我辰安在賦也桑􅎚二木名父母所植也屬連也毛髮也離麗也裏腹也言桑􅎚父母所植猶必恭敬况父母乎所瞻仰者惟父所依戀者惟母而卒不我愛豈我獨非父母之所生乎不然則生我之日辰有未善乎求其說而不得所謂不知我罪之伊何也菀彼栁斯鳴蜩嘒嘒有漼者淵萑葦淠淠譬彼舟流不知所届心之憂矣不遑假寐興也菀茂也嘒嘒聲相續也漼深也淠淠衆也言栁茂而蟬鳴焉已獨失其庇䕃而哀號無所也淵深而葦植焉己獨離其故土而結根無地也譬之舟隨水流不知所至矣蓋是時太子已奔申而王怒未息故前猶假寐而今不遑焉不知流離何所止也鹿斯之奔維足伎伎雉之朝雊尚求其雌譬彼壞木疾用無枝心之憂矣寧莫之知比也伎伎並足而俟也雉鳴曰雊言鹿奔而猶俟戀其麑也以比人皆愛其子也雉朝而即雊求其雌也以比人皆愛其妻也而已獨隻身出奔不敢顧其妻子有如壞木不生枝葉其情實可哀矣寧無有知之者乎蓋猶望王之憐之也相彼投兔尚或先之行有死人尚或墐之君子秉心維其忍之心之憂矣涕既隕之興也相視先縱墐埋既盡也言兔急投人尚有憫其窮迫而縱之者路有死人尚有哀其暴露而埋之者為其心之不忍也乃君子之秉心一於忍而並不哀憫則己之必死而且不葬可知矣然無可如何惟有涕泣而已此則所謂無所逃而待烹者也小雅怨悱而不亂小辨有焉君子信讒如或酬之君子不惠不舒究之伐木掎矣析薪杝矣舍彼有罪豫之他矣賦也酬飲也惠和舒緩究察也掎繩拖之也杝手披之也他加也此承上文言君子之所以心忍者由於信讒言而即行之也君子之所以信讒者由於心不和平不舒緩而徐察之也夫伐木者於其將仆尚不即斷而用繩拖之析薪者於其將開尚不用斧而以手披之蓋少緩須臾則理解可得而王不舒究是以舍有罪而加無罪耳苟平心而徐察之讒言豈得行哉蓋始終有望於王也怨而不忘慕子之於親當如是也莫髙匪山莫浚匪泉君子無易由言耳屬于垣無逝我梁無發我笱我躬不閲遑恤我後比也此推讒言之所由生也言王之左右皆可畏之人也其髙者莫匪山皆能為險阻者也其深者莫匪泉皆能興波瀾者也若輕於漏言則四垣皆耳變故叢生不惟已罹其毒并恐王亦受害故願君子之戒之也逝梁發笱毁已成之功也蓋太子之立久矣彼亦必有所知之人彼亦必有所樹之績此則事關宗社非為一已故望勿隳之也當此之時一身不保而猶望王之慎言猶望王之逺慮此則性情之厚而所見有大焉者矣故聖人有取焉小辨八章章八句小辨怨慕也幽王娶于申生太子宜臼後嬖褒姒生伯服王信褒姒之讒也廢申后太子宜臼奔申王求宜臼於申欲殺之申侯不與故太子作此詩自怨己之有罪而不知且望王之慎言而徐察之也髙子曰小辨小人之詩也孟子曰何以言之曰怨曰固哉髙叟之為詩也有人於此越人關弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也小辨之怨親親也親親仁也固矣夫髙叟之為詩也曰凱風何以不怨曰凱風親之過小者也小辨親之過大者也親之過大而不怨是愈疏也親之過小而怨是不可磯也愈疏不孝也不可磯亦不孝也孔子曰舜其至孝矣五十而慕悠悠昊天曰父母且無罪無辜亂如此憮昊天已威豫慎無罪昊天泰憮豫慎無辜賦也憮大也慎審也大夫傷於讒而作是詩也言昊天者人之父母何為使無罪之人遭此大亂今昊天之暴怒亦已太甚而豫慎審之實無罪辜也蓋詩人受害而不知所由故呼天而訴之也亂之初生僭始既涵亂之又生君子信讒君子如怒亂庶遄沮君子如祉亂庶遄已賦也僭始不信之端也君子指王也遄速沮止祉亦止也此言亂之所生匪降自天也人必先疑也而後讒入之故亂之初生由於不信正人之端已隱含於王心故小人因而讒之王遂信之而亂又生矣如君子聞讒人之言怒而責之聞讒人之言止而拒之則讒止而亂何由生㦲君子屢􅉀亂是用長君子信盜亂是用暴盜言孔甘亂是用餤匪其止共維王之卭賦也要言曰􅉀按春秋之世人君有與其臣下盟者觀周鄭之交質則王之􅉀其臣可類推也餤進也止共盡職也言王不信正人而屢與之􅉀則正人自疑而亂長矣讒賊猶盜也王信盜而愈疑正人則亂暴矣夫盜不可信而王信之者以盜言之孔甘也蓋讒人敢為大言將建大功是以亂幾愈進而其實不能盡職徒為王之病而已矣奕奕寢廟君子作之秩秩大猷聖人莫之他人有心豫忖度之躍躍毚兔遇犬獲之賦而比也奕奕大也秩秩序也猷謀莫定也毚狡也言天下之大功惟君子能建之天下之大謀惟聖人能定之讒人何人而敢為大言彼之居心我揣而知之矣外以甘言欺王實欲於中取利如彼田犬意在獲兔而已非果有社稷生民之至計也荏染柔木君子樹之往來行言心焉數之蛇蛇碩言出自口矣巧言如簧顔之厚矣比而賦也荏染柔貌蛇蛇安舒也碩大也顔厚不知恥也言讒人之不能盡職王亦宜知之焉讒人本無才力皆由王寵用之如荏染之柔木乃君子之所樹也彼其言之而往來行之為功為過君子之心能數之也果其數之則知蛇蛇之大言不過自其口出實未嘗行也未嘗行而敢言者彼有利口又有厚顔故巧言欺人靦不知恥耳王乃信之宜其亂如此憮也豈昊天為之哉彼何人斯居河之麋無拳無勇職為亂階既微且腫爾勇伊何為猶將多爾居徒幾何賦也何人斥讒人也水草之交曰麋拳力階梯也骭瘍為微腫足為腫言此讒人何人哉非有名望也居河之麋非有憑借也無拳無勇非有材武也乃敢為大言以階亂者不過無恥而欲獲利耳其實不能獲也試思爾之言既大矣微而且腫爾勇伊何豈能勝此大任乎且爾之謀將多矣居河之麋爾徒幾何豈能辦此多事乎情見勢絀不惟無利且將獲罪既害人而又害己何為為此哉巧言六章章八句巧言刺讒人也首章疑亂之降自天也次章推亂之由於讒也三章刺讒人之欺罔也四章刺讒人之貪鄙也五章開王心之悟欲其不信讒也所以止亂也六章覺讒人之迷欲其不敢讒也亦所以止亂也蓋小人不明於是非而明於利害忠告而善道之使知工讒之無利而有害則讒人止而亂亦止矣易小畜之初爻曰復自道畏小人而避之也三爻曰夫妻反目忿小人而與爭也五爻曰有孚攣如富以其鄰化小人使為我用也避之者止於潔身忿爭者適以賈禍惟化小人而用之乃可以易亂而為治此聖人轉移天下之大權詩人其知之矣彼何人斯其心孔艱胡逝我梁不入我門伊誰云從維暴之云賦也何人不知其為人也艱險也我蘇公也暴暴公也皆畿內諸侯也暴公譖蘇公蘇公知之而不欲斥言之故但指其從者言彼何人哉其心甚險胡過我梁而不入我門問其所從乃暴公也則暴公之為人可知矣二人從行誰為此禍胡逝我梁不入唁我始者不如今云不我可賦也二人已與暴公也唁弔失位也言二人同行本亦相得誰實先之而為此禍乎今我既被譖而失位又不入而唁我是必以我為不可也但思始者爾與我相好之時未嘗云我不可始可而今不可是何故哉彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天賦也陳堂塗也梁在門外陳則門內矣逝梁猶曰他往逝陳則是來窺伺也乃聞其聲而又不見其身行踪詭祕如此蓋以人為可欺故不愧也而天不可欺寧不畏于天乎蓋猶望其愧畏而知止也彼何人斯其為飄風胡不自北胡不自南胡逝我梁祗攪我心賦也忽然而來曰飄風攪亂也言既不入我門不見其身則從此不復逝梁可也乃忽然而來有如飄風不南不北又逝我梁則是祗亂我心使不得安也胡為乎然哉爾之安行亦不遑舍爾之亟行遑脂爾車一者之來云何其盱賦也安徐遑暇舍息亟疾盱望也言爾逝梁而不入門必謂疾行而不暇入也然我聞爾脂爾車矣爾之徐行尚不暇息爾之疾行豈暇脂車非疾行而不入見我必疑我之怨爾也不知我不惟不怨且實望爾則爾自當一來云何不來而使我日望之也爾還而入我心易也還而不入否難知也一者之來俾我祗也賦也還返易平否隔祗安也言我之望爾有故也爾既譖我又疑我之怨汝勢必又起波瀾故望爾來也往不暇入還猶可入爾還而入彼此一見則知我心平易不汝怨也若還而不入彼此之情隔而不通則爾心之孔艱我不得而知之矣何不一來而使我心安也伯氏吹塤仲氏吹篪及爾如貫諒不我知出此三物以詛爾斯賦也塤篪樂器土曰塤竹曰篪貫繩連之也諒信也三物犬豕雞也詛盟也言爾入而我心安者非為一身乃為國也夫我與爾同為王臣猶兄弟也兄弟和而後家成大臣和而後國定故願與爾同聲相應如伯氏吹塤仲氏吹篪以和之也况我與爾素日共事如繩聯貫我之誠信爾寧不知如果不知則出此三物以與爾盟可也蓋君子之心惟計國家之安危不計一人之恩怨小人如改前非則君子不念舊惡此心天日可表也為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側賦也蜮水蟲能含沙以射人而不見其形也靦面相見也極窮也言人之心不必盟而亦可信也為鬼為蜮不見其形則心不可知矣既有面目相見則是人也以人視人既見其形則知其心豈其無窮而不可測哉故爾雖譖我我不怨也作此好歌以窮爾反側之情使知狐疑詭祕之無用而歸於平坦正直則其心不艱而國家永無事矣何人斯八章章六句詩序曰何人斯蘇公刺暴公也國家之患莫大乎小人疑君子之害己而譖之既譖之矣又疑君子之報復而防之為君子者又不能開誠布公以示其無他於是乎傾軋之患數世不靖此固小人之奸險亦君子有以激成之也若蘇公之於暴公既灼見其詭祕之狀矣而容之以大度孚之以誠心欲其釋疑解怨以共濟國事可謂得大臣之體矣故聖人有取焉萋兮斐兮成是貝錦彼譖人者亦已大甚比也萋小文各見也斐衆文交錯也貝錦錦文似貝也萋斐而成錦者集衆文以成章以比小人雜取衆事而羅織文致之也如是則可以陷人於大罪其所為亦已甚矣哆兮侈兮成是南箕彼譖人者誰適與謀比也哆微張也侈漸大也南箕星也舌廣似箕也哆侈而成箕者開狹踵為廣舌以比小人因其小事而簸揚張大之也如此則其人欲辨而不能其為謀亦已巧矣緝緝翩翩謀欲譖人慎爾言也謂爾不信賦也緝緝口舌聲翩翩往來貌往來𫝊播所由萋斐成錦也然爾雖巧言尚宜慎之聽言者有時而悟則以汝為不信矣言無實者必敗露也捷捷幡幡謀欲譖言豈不爾受既其女遷賦也捷捷便利也幡幡反覆也反覆便利所由哆侈成箕也然爾譖人人亦譖爾則今之受於汝者終且遷於汝矣所謂出爾反爾也驕人好好勞人草草蒼天蒼天視彼驕人矜此勞人賦也譖行而得意則為驕人矣被譖而得罪則為勞人矣驕人罪盈乃好好而無恙勞人可憫乃草草而幽憂惡不得禍而善不得福天道不可知矣故呼蒼天而訴之也輔廣曰視彼驕人庶乎有以抑遏沮止之也矜此勞人庶乎有以扶持慰安之也彼譖人者誰適與謀取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊賦也章首二句重出衍文也投棄畀與也有北寒凉不毛之地也言平日嫉讒人而思所以處之意欲投畀豺虎使食其肉乃豺虎亦惡其肉而不食也又欲投畀有北使寒餓以死乃有北又惡其人而不受也不得已而呼蒼天使投有昊庶天網恢恢無所逃其誅矣皆深惡而痛絶之詞故曰惡惡如巷伯楊園之道猗于畝丘寺人孟子作為此詩凡百君子敬而聽之興也楊園下地猗加也畝丘髙地寺人內臣蓋以讒被宫而為此官也孟子其字也楊園之道而可以加於畝丘以興賤人之言可有補於君子也寺人孟子痛其為寺人也既被讒而受宫刑雖嫉讒人亦無及矣故述其被讒之由而作為此詩使凡百君子敬而聽之知讒人之可畏而預絶其萋菲哆侈之端則讒言不興而禍可免矣豈徒曰投譖人於有昊也哉巷伯七章四章章四句一章五句二章章六句巷伯嫉讒也巷宫內道名伯巷官之長也寺人為之故以名篇班固作司馬遷贊云迹其所以自傷悼小雅巷伯之倫是也讒人可嫉人皆知之而聖人有取於巷伯者為其知止讒之道也天下無無因而起之事萋菲成錦集衆事以為一然究有可集之端也哆侈成箕指小事以成大然究有可指之實也毛𫝊曰斯人自謂避嫌之不審是也避嫌不審皆由於不敬自謂大端己是而不謹於微自恃此心無他而不避其似小人執其微與似者以譖之則無以自解矣故自傷而作此詩欲君子敬而聽之正欲君子聽而敬之也聽而敬之謹小慎微别嫌眀疑則讒言無由生矣故敬者止讒之道也沔水之詩曰我友敬矣讒言其興此之謂也習習谷風維風及雨將恐將懼維豫與女將安將樂女轉棄豫興也習習頻也谷風山風也山風頻來惟雨隨之雨能解風之暴而布其澤故風與雨常相須也以興人與友久相處也乃我與爾不然將恐將懼之時人不汝助惟豫與汝將安將樂之時而汝轉棄豫友朋之義安在乎習習谷風維風及頽將恐將懼置豫于懷將安將樂棄豫如遺興也風自上而下曰頽言谷風無雨則自上而下者惟頽風而已不能澤物也以興人無朋友則不能成德也置于懷者與之久而益親也棄如遺者棄之久而忘之也習習谷風維山崔嵬無草不死無木不萎忘我大德思我小怨興也久不雨則風亢故上而不下惟在山巔而已山髙風烈不能澤物而反􅊣之故草木不生以興人之氣髙性暴則朋友反被其􅊣也故爾於我不止棄之而已且忘我恐懼相與之大德思我安樂以後之小怨勢必至於加􅊣而後已友道至此亦可悲矣吕大臨曰急則相求緩則相棄恩厚不知怨小必記真小人之交也谷風三章章六句谷風友道衰也夫貧賤患難之交至富貴而多易之者非盡人之無良其勢然也當其窮困心卑而無奢望故人小有所施即感激以為大德或直言以責之順受而不敢怨也及乎顯逹則氣傲而視物輕向所謂大德今以為泛常矣彼故人者猶挾其舊恩而倨侮之觸忤之故不能受而怨焉德愈久而愈淡怨日積而日深凶終隙末職是故耳故君子之於友欲其不忘富不忘貧貴不忘賤安不忘危則大德常在而小怨自釋矣蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞比也蓼蓼青貌莪蘩也嚴粲曰始生為莪長大為蒿莪猶可食蒿則無用以比父母生子以為美材至長大而乃無用也劬勤也自傷已非美材不能養親因追念父母之生己勤勞備至而不食其報為可哀之甚也蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁比也蔚牡蒿也蒿猶有子蔚乃無有更不如蒿矣劬勞辛苦而已瘁則勞而至於病也瓶之罄矣維罍之恥鮮民之生不如死之久矣無父何怙無母何恃出則銜恤入則靡至比也瓶罍皆酒器罄盡鮮寡恤憂靡無也朱子曰言瓶罍相資猶父母與子相依為命也瓶罄罍恥猶父母不得其所乃子之責所以窮獨之民生不如死也蓋無父則無所怙無母則無所恃是以出則中心銜憂入則如無所歸也父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極賦也生者本其氣也鞠局也成其形也拊撫摩之也畜止養之也長者調和其身體育者涵養其性情兒入則回顧之兒出則追復之父母出入則必懷抱其子也罔無極窮也朱子曰言父母之恩如此欲報之以德而其恩之大如天無窮不知所以為報也南山烈烈飄風發發民莫不穀我獨何害興也烈烈山峯髙也發發風頻起也穀善也言山者風之所從生也人莫不生於父母我獨何為而遭此害哉南山律律飄風弗弗民莫不穀我獨不卒興也律與嵂同弗與拂同言山者風之所披拂也人莫不養其父母我獨何為而不能終哉蓼莪六章四章章四句二章章八句蓼莪孝子思養親也朱善曰陟岵鴇羽思念於父母尚存之日蓼莪之詩感傷於父母既沒之後父母尚存則曠廢於今日猶幸來日之可繼也若父母既沒則罔極之恩不可得而報矣樹欲靜而風不止子欲養而親不在終天之痛何時可已哉有饛簋飱有救棘匕周道如砥其直如矢君子所履小人所視眷言顧之澘焉出涕賦也饛滿貌飱熟食也鄭康成曰飱者客始至主人所致之禮也救長貌棘匕以棘為匕所以升鼎實也砥言平也矢言直也君子有位者小人下民也澘涕貌言周之盛時諸侯大夫朝貢往來所至之處饔餼豐盛道路修整故君子履之以為安小人視之以為榮今乃眷言顧之而澘焉出涕者以周道猶是而周政之弊非復前時矣小東大東杼柚其空糾糾葛屨可以履霜佻佻公子行彼周行既往既來使我心疚賦也小東大東東方小大之國也杼持緯者也柚受經者也佻佻弱不勝勞之貌公子貴族也言顧周道而出涕者傷履之者也東方小大之國困於重斂杼柚其空矣富室皆貧而葛屨可以履霜貴族失位而公子至於徒行往來者盡如是故心病而涕出也有冽氿泉無浸穫薪契契寤歎哀我憚人薪是穫薪尚可載也哀我憚人亦可息也比也冽寒也泉側出曰氿穫刈也契契憂苦貌憚勞也薪乾而後可烘浸以寒泉則腐而不可爨矣以比民養而後可用困以虐政則勞而不能勝矣故契契寤歎哀東國之勞人而望其息也徐光啓曰凡徴發之煩供億之困皆勞也不竭人力不盡人財皆息也東人之子職勞不來西人之子粲粲衣服舟人之子熊羆是裘私人之子百僚是試賦也東人諸侯之人也職専主也來歸也西人從王者也自西來故曰西人也舟人為西人操舟者也私人為西人服役者也言東人供億専主勞苦不得歸休而西人復出而徴求焉職勞者葛屨履霜徴求者粲粲衣服己觸目而傷心矣至於舟人衣裘是貧者皆富也私人試官是賤者皆貴也蓋征斂之使四出則正供之所入有數官吏之侵漁無窮舟人私人莫不富貴百姓之凋敝可知矣或以其酒不以其漿鞙鞙佩璲不以其長維天有漢監亦有光跂彼織女終日七襄賦也鞙鞙長貌璲瑞玊也漢天河也監視也跂隅貌織女星名三星隅置如跂也襄躔次也天有十二次經星一晝夜左旋一周終日之間自卯至酉七次故曰七襄也言東人或饋之以酒而西人不以為漿或與之以鞙然之佩而西人不以為長則東人之力竭矣惟望天助之而已維天有漢視之有光則挽天河以為酒庶可以供西人之飲也織女敏捷終日七襄則請織女使為佩庶可以滿西人之欲也蓋無聊之極思也雖則七襄不成報章睆彼牽牛不以服箱東有啓眀西有長庚有救天畢載施之行賦也報名也章幅也凡織成幅者皆有名目故曰報章睆圓眀之貌牽牛星名與織女隔河而相望服駕也啓眀長庚皆金星也先日而出故謂啓明後日而入故謂長庚天畢畢星也祭器有畢所以助載鼎實者畢星似之故名畢也言徴求供億之勞天亦不能助也織女有織名而已未嘗成報章也牽牛有牛名而已不可服車箱也東有啓明不助東作西有長庚不助西成有救天畢但布於星之行列而已尚不若有救棘匕可以升肉也則是東人之困天亦無如何也維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之揭賦也箕斗二星名箕見於南斗常在北翕引也箕四星二為踵二為舌斗七星四星方象斗三星長似柄也此言天不惟不能助也亦有徴斂之象焉維南有箕固不可以簸揚糠粃維北有斗固不可以挹取酒漿乃箕反翕引其舌若有所吞噬斗轉西揚其柄若有所挹取於東也則天亦似助西人為虐矣蓋久困於斗量箕斂之苦故見其似者而即神傷焉亦愁怨之至矣大東七章章八句詩序曰大東刺亂也東國困於役而傷於財談大夫作是詩以告困也蓋平王東遷之初西周之府藏皆失東都之百費繁興不得不有所取於諸侯觀春秋初年天王來求車求賻求金者相屬也一國如此四國可知矣既已多所徴求而所遣之使不恤民艱且於中取利故西人皆富而東人皆貧觀詩中所詠無以為生而疾視其上苟非文武之遺澤猶存不能以立國矣夫國以民為本衣食器用其末也政以人為實法制禁令皆文也以衣食器用之故而至於困民又不能用人使借法令以營私所謂本實先撥者也四月維夏六月徂暑先祖匪人胡寧忍豫賦也徂往也此大夫行役而遭禍亂也言四月初夏而我已啓行六月盛暑而我猶徂往煩憂酷熱不勝其苦故呼先祖而訴之言先祖我之自出非他人也寧不憫豫而忍使至此極乎無所歸咎之辭也秋日凄凄百卉具腓亂離瘼矣奚其適歸賦也凄凄凉也卉草腓瘼皆病也言征行不已時物遞變未幾而秋日凄凉可以歸矣乃亂離病民如百卉之俱腓則道路梗塞未知何所適而可以歸也冬日烈烈飄風發發民莫不穀我獨何害賦也言秋日不歸則至於冬矣冬日栗烈又加之以飄風則更甚於秋日之凄凉乃民皆入此室處各善其生而我獨困於道路則不知何為而罹此害也山有嘉卉侯栗侯梅廢為殘賊莫知其尤賦也廢變也言前者百卉具腓今則山有嘉卉蓋自冬而春也山尚有嘉卉則朝宜有正人乃在位者皆變而為殘忍賊害不惟不援我而反讒傷之則不知是誰之過也相彼泉水載清載濁我日構禍曷云能穀興也構合也言視彼泉水時清時濁不常濁也而我則既遇亂離又遇殘賊日日構禍如泉之常濁而不清也夫不歸而構禍構禍則愈不能歸不能歸而見王何由而能穀乎滔滔江漢南國之紀盡瘁以仕寧莫我有興也言不能歸則終於行矣彼滔滔之江漢為南國之紀綱則我亦經營四方為諸侯之紀綱可也乃盡瘁以仕而王不我有則紀綱之功不成矣匪鶉匪鳶翰飛戾天匪鱣匪鮪潛逃于淵賦也言既不能歸又不可仕則惟有去而已顧亂離皆是也殘賊皆是也天壤之大無可託足之所必如鳥之飛天魚之潛淵乃可也而我匪鶉鳶又匪鱣鮪則末如之何矣山有蕨薇隰有把桋君子作歌維以告哀興也把枸檵桋赤梀皆非美材也言仕又不可逃又不能則此身之存亡不可知矣夫山尚有蕨薇隰尚有把桋天地之恩細草微木皆荷生成以興朝廷樹人雖不材者亦當矜全之也不得已而作歌以告哀望王之哀之而我有庶乎猶可以生也四月八章章四句四月告哀也大夫行役經時閲嵗可謂久矣自北而南至於江漢可謂逺矣既遭亂離又遇殘賊可謂窮矣觀其欲歸不得欲仕不可欲逃不能此宜有忿激怨懟之辭乃不惟不怨而已且盡瘁以供職抒誠以告哀雖流離放逐而繫心王室不忘欲返此亦仁人君子之用心也小旻之什十篇六十五章四百十四句御纂詩義折中卷十三
