body:
  text: 祈父之什二之四祈父予王之爪牙胡轉予于恤靡所止居賦也祈與圻通圻父司馬也書曰圻父薄違是也爪牙守衞之軍虎賁之屬也轉移恤憂也朱子曰軍士怨於久役故呼祈父而告之曰予乃王之爪牙汝何轉我於憂恤之地使我無所止居乎祈父予王之爪士胡轉予于恤靡所底止賦也爪士爪牙中之勇士司右之屬也底終也靡所止居逺役而不得息也靡所底止久役而未有期也祈父亶不聰胡轉予于恤有母之尸饔賦也亶誠尸主也熟食曰饔獨子無兄弟則父母饔飱已專主之故曰母之尸饔也言既為爪士又係獨子於法不當逺役此法人皆聞之而祈父不聞則信乎其不聰矣呂祖謙曰句踐伐吳有父母老而無昆弟者皆遣歸魏公子無忌救趙亦令獨子無兄弟者歸養則古者親老而無兄弟其當免征役必有成法也祈父三章章四句詩序曰祈父刺宣王也宣王三十九年王師敗績於姜戎四十年料民於太原意當時戎事紛起征役繁興而司馬非人調度無方故爪士孤子皆逺役也朱善曰先王之制王室有故則徵諸侯之師司馬所掌以衞王宫不逺出也使王而自棄其爪牙則不智司馬而棄王之爪牙則不忠又使孤子不得養親則不仁一事而三失矣皎皎白駒食我場苖縶之維之以永今朝所謂伊人於焉逍遙賦也皎皎潔白貌人潔故馬亦潔也縶絆其足也維繫其靷也留其人故先留其馬也伊人謂賢者也逍遙遊息也蘇轍曰賢人有不得志而去者其友留之故於其去也猶欲其於是逍遙逍遙不事事也雖不仕猶愈於去耳皎皎白駒食我場藿縶之維之以永今夕所謂伊人於焉嘉客賦也藿豆葉也嘉禮也以禮留之使為客也暫客於斯終當去焉然猶愈於即去也皎皎白駒賁然來思爾公爾侯逸豫無期慎爾優游勉爾遁思賦也賁然光采貌謝枋得曰賢人所至山川草木皆有光采是也爾謂賢人也爾公爾侯謂在位者猶言爾之公爾之侯也逸豫無期言日不暇給無逸豫之時也慎戒也勉强止之也遁思去志也言嘉客即去尚望其賁然而復來夫君臣之義無所逃也爾公爾侯勤於王事逸豫無時豈可人皆勞而爾獨逸乎故願爾戒之勿過於優游也抑願爾勉之强止爾遁思也皎皎白駒在彼空谷生芻一束其人如玉毋金玉爾音而有遐心賦也駒在空谷則果去而不可留矣生芻秣駒則一去而不復返矣超然世外自潔其身其人之德美如玉矣雖然懷寳而迷邦其可乎不辱其身不可不公其道故願毋金玉爾音也不降其志不可不憂其民故願無有遐心也可謂纒綿悱惻之至矣白駒四章章六句白駒餞賢也留賢人而不得故贈之以言也夫君子之仕也行其道也行其義也時有可為君子行其道道即不行君子行其義故不仕於朝可耕於野不必去也義不可留亦當緩去不必速也即速去矣亦當復來再出而圖吾君不可過於潔身也即不來矣猶思以道濟天下不可果於忘世也此其意孔子知之矣孔子不得已而去魯栖栖皇皇無所遇合然天下不行孔子之道而孔子未嘗一日不行其義其眷戀宗邦設教洙泗於焉逍遙也周流列國三年不淹於焉嘉客也兩至陳而三至衞非所謂賁然來思乎憂公侯而不忍遁也退而終老矣猶刪詩書以覺世則所謂懷之好音而無遐心也然則詩人先得孔子之心矣黄鳥黄鳥無集于榖無啄我粟此邦之人不我肯穀言旋言歸復我邦族興也榖木名穀善也旋回復返也族氏族也以鳥之無集于木而啄粟興人之無處異邦而旅食也我自有邦我自有族此邦之人莫與我善不如歸而謀於族人或有肯穀者也黄鳥黄鳥無集于桑無啄我粱此邦之人不可與明言旋言歸復我諸兄興也明辨其事也智不足以知其是非而濟其緩急則不可與明矣諸兄族中之長者也黄鳥黄鳥無集于栩無啄我黍此邦之人不可與處言旋言歸復我諸父興也處安其身也不能庇而養之則不可與處矣諸父族中之尊者也黄鳥三章章七句黄鳥刺時也有邦有族此列國之命卿大夫也大夫失位不以其罪而託於異邦思有以明其事或依以處其身而不意其皆不可也蓋周自夷厲以來王命不行於諸侯矣控于大邦莫我肯穀故復我邦族將與大夫圖之也詩録黄鳥憂世也諸侯失職而族大宗强亂端兆矣異日者政逮大夫有以也此實世道升降之大故豈止葛藟旄丘自傷流離已哉我行其野蔽芾其樗昏姻之故言就爾居爾不我畜復我邦家興而比也此申侯歸國之詩也君臣之際有所難言故託為民間昏姻之辭言樗本惡木而枝葉蔽芾尚可休息昏姻至戚而不相庇蔭曾樗之不如也此則興也又言因昏姻之故乃就爾居欲助爾也爾不我畜而使我歸家則失計矣此乃比也我行其野言采其蓫昏姻之故言就爾宿爾不我畜言歸思復興而比也蓫惡菜也宿則暫於居矣言本不欲久處也復我邦家但復而已言歸思復則又有别圖焉故思之也我行其野言采其葍不思舊姻求爾新特成不以富亦祗以異興而比也葍亦惡菜也言所以不我畜者我舊姻也爾又有新特焉求其新故忘其舊也曾不思舊姻之成非以其家之富實以其德之異今其德如故也乃舎舊而求新何哉我行其野三章章六句我行其野申侯怨幽王也周與申世為婚姻宣王后申伯之女也有令德嘗諫王之晏起申侯者申伯之子也其女為幽王后亦有令德觀白華之詩可見矣成不以富亦秪以異其實録也幽王初立申侯以申后之故留京師以翼王室所謂婚姻之故言就爾居也幽王三年見褒姒而嬖之生伯服遂欲廢申后及太子宜臼所謂不思舊姻求爾新特也爾不我畜王令申侯歸也為廢后計也言歸思復申侯自欲歸也為救宜臼計也幽王五年廢申后而立褒姒宜臼奔申十年王求宜臼於申欲殺之申侯不與此則言歸思復之本謀也犬戎因是入冦而西周亡矣溯亂所自起始於舍舊而圖新原亂所從生由於重色而輕德闗雎好德周以之興行野漁色周以之滅衽席之上好惡一辟而禍遂至於不救可不慎哉秩秩斯干幽幽南山如竹苞矣如松茂矣兄及弟矣式相好矣無相猶矣賦也秩秩齊也斯此也干岸也猶尤也此室成而祝之也言此室臨水而面山水岸整齊山勢深逺楹柱之多如竹之苞簷宇之密如松之茂可謂美矣其所以有此美室者由於兄弟之相好而無怨尤也似續妣祖築室百堵西南其戸爰居爰處爰笑爰語賦也似嗣也此承上文言兄弟相好能繼續先人之志是以大築室而多其戸欲兄弟同居聚處得以晤對笑語也約之閣閣椓之橐橐風雨攸除鳥䑕攸去君子攸芋賦也約束板也閣閣上下相承也椓築也橐橐杵聲也君子統言相好之兄弟也芋寛也室廣則人心寛矣凡作室者先築牆大其牆垣以除風雨而去鳥䑕者君子之所託以自寛也如跂斯翼如矢斯棘如鳥斯革如翬斯飛君子攸躋賦也跂竦立也翼敬也棘急也矢行緩則枉急則直也革變翬雉躋升也朱子曰言其大勢嚴正如人之竦立而其恭翼翼也其廉隅整飭如矢之急而直也其棟宇峻起如鳥之警而革也其簷阿華采而軒翔如翬之飛而矯其翼也其堂之美如此君子之所升以聽事也殖殖其庭有覺其楹噲噲其正噦噦其㝠君子攸寧賦也朱子曰殖殖平正也庭寢之前庭也覺高大而直也楹柱也噲噲猶快快也正向明之處也噦噦深廣之貌㝠奥窔之間也其室之美如此君子之所休息以安身也下莞上簟乃安斯寢乃寢乃興乃占我夢吉夢維何維熊維羆維虺維蛇賦也莞蒲席也簟竹席也羆熊屬虺蛇屬言兄弟相好而築室如此則和氣致祥而家道興矣故安寢而得吉夢也大人占之維熊維羆男子之祥維虺維蛇女子之祥賦也大人大卜之屬占夢之官也熊羆陽物在山而强故為男子之祥虺蛇陰物穴處而弱故為女子之祥乃生男子載寢之牀載衣之裳載弄之璋其泣喤喤朱芾斯皇室家君王賦也半圭曰璋喤大聲也朱芾三命以上之服室家君王言為一家之主也此承上文言夢熊羆者果生男子矣寢之於牀尊之也衣之以裳服之盛也弄之以璋尚其德也其泣喤喤秉氣厚也氣之厚者其德與福皆厚他日之壯也必能服其命服為一國之望者也必能承其宗祀為一家之主者也乃生女子載寢之地載衣之裼載弄之瓦無非無儀唯酒食是議無父母貽罹賦也裼褓也瓦紡磚也儀善罹憂也言夢虺蛇者果生女子矣朱子曰寢之於地卑之也衣之以褓即其用而無加也弄之以瓦習其所有事也有非非婦人也有善非婦人也蓋女子以順為正無非足矣有善亦非吉祥可願之事也惟酒食是議而無遺父母之憂則可矣易曰旡攸遂在中饋貞吉而孟子之母亦曰婦人之禮精五飯冪酒漿養舅姑縫衣裳而已矣故有閨門之修而無境外之志此之謂也斯干九章四章章七句五章章五句斯干考室也室成而燕飲且祝之也夫人之築室以興家也家之興由於子孫多且賢此非可禱祀而求也然亦未嘗不可操劵而得也夫子孫身所生也身者父母所生也兄弟者與己同生者也已無忝所生且厚於所同生則身之生理全而生氣盛其所生者必賢矣是故孝弟者萬福之原也斯干之詩美其室而祝其男賢并祝女賢蓋男賢則能興已之家女賢并能興人之家天下之福莫大於此而必託始於相好之兄弟且推原於似續其妣祖似續妣祖孝也兄弟相好弟也以為必先行敦於孝弟而後能慶衍於子孫此實興家之左劵而非頌祝之諛詞聖人之所以錫福於天下後世也誰謂爾無羊三百維羣誰謂爾無牛九十其犉爾羊來思其角濈濈爾牛來思其耳濕濕賦也黄牛黑唇曰犉三百維羣每羣三百也牛之犉者九十其非犉者尚多也濈濈和集也聚而不相觸也濕濕潤也牛廋則耳燥肥則潤也朱子曰言牧事有成而牛羊衆多也或降于阿或飲于池或寢或訛爾牧來思何蓑何笠或負其餱三十維物爾牲則具賦也訛動何荷也物色也降阿飲池水草豐也或寢或訛適其性也蓑笠雨具晴則荷之餱糧有餘故歸猶負之也三十維物齊其色而别之每色三十也凡牲陽祀用騂陰祀用􅉳望祀各以其方之色每色三十牲無不備也爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升賦也粗曰薪細曰蒸雌雄禽也矜矜神健也兢兢行速也騫虧崩羣疾也肱臂既盡升入牢也牧有餘閑故荷蓑負餱之外又得取薪蒸搏禽獸也水草豐潔牢閑修墊故牛羊皆壯健不虧不疾而且馴擾從人不假箠楚但以手麾之使來則畢來使升則既升也可謂盡牧人之能事矣牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱賦也牧人乃夢牧事成而得嘉兆也衆諸物也物或變為魚矣旐忽變為旟矣大人占之物變為魚可食之物多也是則豐年榖熟之兆也旐郊野所建所統人少旟州里所建所統人多今旐變為旟人少成多是則娶妻生子家口衆多之兆也蓋先王之蕃庶物原所以育人民牧事成而人富庶乃實有之理而非徒恍惚夢之也無羊四章章八句無羊考牧也昔先王物土之宜以養萬民故原隰沃衍以藝五穀林麓沮洳以蕃六畜所以盡山澤之利而佐耕稼所不及也匪特此也六畜之糞皆可肥田而牛羊之功更大故畜牧之家瘠土成沃禾苖必茂而且耐旱與潦雖雨𤾉偶愆而不災是牧事成而致豐年非惟天時實人事也一人如此則一家溱溱人人如此則天下富庶矣禮記曰問庶人之富數畜以對周官牧人掌牧六畜而蕃其物以供祭祀之牲牷此實事神養人之大端不可以為細事而忽之也節彼南山維石巖巖赫赫師尹民具爾瞻憂心如惔不敢戯談國既卒斬何用不監興也節峻貌巖巖髙危貌赫赫顯盛貌惔焚卒猝斬絶監戒也此刺平王用尹氏也言山石巖巖高危可畏大師尹氏萬民所視而不稱其職其危更甚於巖石使人憂心如焚又畏其威而不敢言也夫赫赫宗周褒姒烕之國既猝然而斬絶矣前事不逺何為而不監之哉節彼南山有實其猗赫赫師尹不平謂何天方薦瘥喪亂𢎞多民言無嘉憯莫懲嗟興也山之草木曰實猗長也蘇轍曰山生草木其意均平故莫不猗猗其長是也山尚如此而師尹乃不平其心謂之何哉薦荐通重也瘥病也憯曾懲創也言厲幽之後天重降災是以四方不靖喪亂甚多民皆以災害相弔而無一嘉慶之言此當事者創巨痛深憂勤惕厲之時乃晏然而曾莫懲嗟則末如之何矣尹氏大師維周之氐秉國之均四方是維天子是毗俾民不迷不弔昊天不宜空我師賦也氐本也均鈞也朱子曰均當從金所謂如泥之在鈞者是也維持毗輔弔憂空窮師衆也言尹氏者大師也大師上公政之本也國之樞也所以維持四方者也所以輔天子使之不危導萬民使之不迷者也是宜敬天之怒是宜憫人之窮縱不能上憂天變亦不宜覩斯民之窮苦而又困乏之也弗躬弗親庶民弗信弗問弗仕勿罔君子式夷式已無小人殆𤨏𤨏姻亞則無膴仕賦也躬身任之也親自為之也問詢其言也仕試以事也罔欺也君子指王也夷平已止也𤨏𤨏小貌膴厚也朱子曰言尹氏委政於姻亞之小人而以其未嘗問未嘗仕者欺其君也故戒之曰汝之弗躬弗親庶民已不信矣其所弗問弗仕者則豈可以罔君子哉當平其心視所任之人有不當者則已之無以小人之故而至於危殆其國也𤨏𤨏姻亞而必皆膴仕則小人進矣昊天不傭降此鞠訩昊天不惠降此大戾君子如届俾民心闋君子如夷惡怒是違賦也傭均鞠窮訩亂戾乖届至闋息違逺也言尹氏用小人以罔君子則是天意不均而偏降此窮極之亂也天心不順而故生此乖戾之人也然所以靖之者亦在君子而已罔君子者尹氏而受其罔者君子也欲不為所罔則必反其所為朱子曰君子無所茍而用其至則必躬必親而民之亂心息矣君子無所偏而平其心則式夷式已而民之惡怒逺矣傷王之不能也不弔昊天亂靡有定式月斯生俾民不寧憂心如酲誰秉國成不自為政卒勞百姓賦也酒病曰酲成定也嚴粲曰成者紀綱法度一成而不可變人主之所執持天下之所遵守是也言尹氏既不弔昊天矣王用尹氏不當天心亂何由定豈惟不定且將日生而俾民不寧也前憂尹氏故如惔今憂王故如酲也夫國有秉鈞者政之所以轉移也又有秉成者政之所由一定也今之秉均者尹氏也試思秉成者誰乎王秉國成乃不自為政而用尹氏尹氏亦不自為政而用姻亞以致終勞我百姓也則亂所由生王不得辭其責矣駕彼四牡四牡項領我瞻四方蹙蹙靡所騁賦也項大也蹙蹙縮小之貌言王用尹氏而已不能正則宜去矣夫我非不能去也駕彼四牡肥健可騁但顧瞻四方皆蹙蹙然無可騁之所也呂祖謙曰根本病則枝葉皆瘁也方茂爾惡相爾矛矣既夷既懌如相醻矣賦也茂盛惡怒相視懌悦也言既無所騁惟有去尹氏而已夫尹氏之罪己非不正言之也王亦未嘗不怒之也方其盛怒之時亦相爾矛似欲誅戮乃未幾而怒平矣且心悦矣如相酬酢懽然無間矣不怒而不去之猶望其怒也既怒而终不能去則無望矣昊天不平我王不寧不懲其心覆怨其正賦也言王終不去尹氏是以天心終不平也王國終不寧也此皆王之心爲之也今不自懲其心而反怨人之諫正則是王心之惑終不解也家父作誦以究王訩式訛爾心以畜萬邦賦也究推訛化畜養也言不懲其心此所以訩也覆怨其正則王未能究也故作此詩為王誦之望王究致亂之由而懲戒之懲之深而至於化焉則改心易慮而萬邦從此得所矣呂祖謙曰篇終矣故窮其亂本而歸之王心焉致亂者尹氏而用尹氏者則王心之蔽也孟子曰人不足與適也政不足間也惟大人為能格君心之非若家父者可謂有志於大人矣節南山十章六章章八句四章章四句節南山諫平王也國既卒斬何用不監則是西周已滅而欲東周監之也天下治亂由於用人用君子則治用小人則亂人君求治莫不欲用君子乃卒用小人以致亂者則心之不平為之也心不平而有所偏小人迎其偏而合之君子矯其偏而正之人君隨其偏心以為喜怒則必懌小人而怨君子矣是故定治亂必先審取舎審取舎必先端好惡端好惡必先正心術正也者中也中也者平也懲其不平始知小人之可惡矣化其不平始知君子之可好矣是故不平謂何究致亂之本也式訛爾心清致治之原也深識治亂之本原而後知正心誠意之外别無修齊治平之術也正月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京哀我小心癙憂以痒賦也正月正陽之月夏四月也訛偽將大也京京亦大也癙幽痒病也此憂平王之不能興周也輔廣曰正月繁霜災降於天矣訛言孔將亂起於人矣而當時君臣不以為憂故詩人獨憂之又自哀其小心畏懼幽憂而不敢言以至於病也父母生我胡俾我瘉不自我先不自我後好言自口莠言自口憂心愈愈是以有侮賦也瘉病自從也莠言似是而非也愈愈益甚之意人窮則返本故呼父母而訴之也不先不後哀所生之不辰也草野之間既有訛言朝廷之上又有莠言忽好忽莠不由衷而但自口出此其可憂更甚於訛言然愈憂之則與小人愈不合矣是以不諒而反加侮也憂心惸惸念我無禄民之無辜幷其臣僕哀我人斯于何從禄瞻烏爰止于誰之屋賦而比也惸惸憂甚也無禄猶言不幸辜罪并俱也臣僕役於人也言所以憂心愈愈者非但念己實哀人也當是時幽王被弑宗周已滅東都新造國勢未安周之餘民欲居故土則為臣僕於秦戎欲適諸侯又未知從何人而受禄如烏之羣飛不知止於誰人之屋天下之可憂未有甚於此時者矣瞻彼中林侯薪侯蒸民今方殆視天夢夢既克有定靡人弗勝有皇上帝伊誰云憎興也侯維皇大也上帝天之神也言瞻彼中林為薪為蒸分明可見則仰視昊天實有上帝可知也朱子曰民今方危殆疾痛號訴於天而視天反若夢夢然若無意於分别善惡者然此特值其未定之時耳及其既定則未有不為天所勝者也夫天豈有所憎而禍之乎福善禍滛亦自然之理而已申包胥曰人衆勝天天定亦能勝人疑出於此謂山蓋卑為岡為陵民之訛言寧莫之懲召彼故老訊之占夢具曰子聖誰知烏之雌䧺比而賦也山脊曰岡大阜曰陵懲戒也占夢官名具俱也烏之雌䧺相似而難辨者也亦不西歸而即安於東者意謂東方諸侯卑而易制耳不知謂山蓋卑亦有岡陵焉知必不為梗且民之訛言既孔將矣尤宜戒懼乃謀國之人故老誇其知往占夢詡其知來發言盈庭皆曰子聖而究其所言似是而實非如烏之雌䧺未有能辨之者此則所謂莠言自口者也謂天蓋高不敢不局謂地蓋厚不敢不蹐維號斯言有倫有脊哀今之人胡為虺蜴賦也局曲身也蹐累足也號長言之也倫序脊理也虺蜴皆螫蟲也言人皆自聖我獨小心是以人謂天髙我不敢不曲身而處人謂地厚我不敢不累足而行深思熟計而為斯言庶幾人克有定而民免臣僕亦可謂有序而當於理矣乃今之人不我從而反侮之如虺蜴之肆毒則不知其何為也瞻彼阪田有菀其特天之扤我如不我克彼求我則如不我得執我仇仇亦不我力興也阪田山田也菀盛貌特獨生之苖也扤扼也仇仇固執也力用也言與世不同孑然獨立乃阪田猶有特生之苖而天之扼我如恐不克是天心不可知矣彼小人之中亦有不侮我而求之者乃當其求之則如不我得及其得之羈縻甚固而終不用也是人事無可望矣心之憂矣如或結之今兹之正胡然厲矣燎之方揚寧或滅之赫赫宗周褒似滅之賦也正政厲虐也言天不可知人無可望故憂心如結不能解也夫以事勢如此而小人猶然暴虐者將無謂東周新造如燎方揚必無遽滅之理不知赫赫宗周褒似尚能滅之况奄奄之東周而羣小用事其為滅也不難矣何為不憂之也終其永懷又窘陰雨其車既載乃棄爾輔載輸爾載將伯助予比也永懷長想也陰雨泥濘也輔所以防車也輸墮將請也伯或者之字也此總承上文言人謀不定厲政為虐西歸之䇿徒付之長想東都之民又䧟於泥濘王擁虚位佐理無人此如大車既載乃棄爾輔其輸爾載必也既輸而後求他人之助則嗟何及矣無棄爾輔員于爾輻屢顧爾僕不輸爾載終踰絶險曾是不意比也員益也言車載將輸事不可為矣然天下無不可為之事茍能無棄爾輔必有益於爾輻再能屢顧爾僕必不至於輸載雖有險阻終可踰越以喻朝廷之上果能用賢以圖治則滅犬戎而復宗社反覆手之間耳今雖東遷終當西歸而王曾不以是為意可傷也魚在于沼亦匪克樂潛雖伏矣亦孔之炤憂心慘慘念國之為虐比也沼池也炤明而易見也言王無意於西歸者以東周為可樂也試觀大魚舎江湖而在池沼其水淺狹何樂之有雖潛伏而沼然可見終受制於人耳以比東都湫隘無河山之固情見勢屈必受侮於諸侯故憂心慘慘念國之將為人虐也彼有㫖酒又有嘉殽洽比其隣昏姻孔云念我獨兮憂心慇慇賦也洽比和合也云周旋也慇慇痛也言國將為虐故憂心慘痛然獨我憂之而已彼小人者方有㫖酒嘉殽以和合其鄰里而周旋其姻婭如燕雀之處堂曾不知禍之將及也故未號斯言之前念我獨兮既號斯言之後又念我獨兮傷始終無同志之人也佌佌彼有屋蔌蔌方有穀民今之無禄天夭是椓哿矣富人哀此惸獨賦也佌佌小貌蔌蔌陋貌夭禍椓害哿可也言佌佌然小者既有屋可居矣蔌蔌然陋者又有穀可食矣惟此蚩蚩之民在西者并為臣僕在東者困於厲政生既無禄天又降禍而椓害之是可哀也總而計之小人以求富而生亂既亂而仍富是以無所往而不可惟惸獨之民喪亂既受其苦安定不蒙其休此則可為痛哭流涕者也正月十三章八章章八句五章章六句正月憂平王也幽王嬖褒姒而廢申后太子宜臼奔申犬戎入宼弑幽王晉衛來援秦襄力戰乃敗犬戎於是諸侯即申侯而立故太子宜臼由是言之幽王被弑西周無主平王在申諸侯歸心設能痛君父之仇恥哀斯民之臣僕奮然西歸封秦襄為列侯使滅犬戎留晉侯衞侯夾輔王室則庶幾哉與宣王爭烈矣乃當時謀國之臣言翕言翕訿訿憚於用兵而即安於東遂使宗周淪沒王室卑微此正月之詩人所由長號永痛而不嫌其辭之繁也吕祖謙曰平王初立大仇未報王略未復正君臣坐薪嘗胆之時乃茍安於東恬然自以為安其不能中興可知也得詩人之意矣十月之交朔日辛卯日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀賦也交日月之交道也月與日合為朔合於所交則日為月掩故食也亥月純陰辛卯之日干支皆陰而日有食之是陰極而陽傷乃變之大者故曰亦孔之醜也前此月既食矣今兹日又食焉日月迭微則國家危亂而民受其殃矣上悲天而下憫人所以不敢自逸也日月告凶不用其行四國無政不用其良彼月而食則維其常此日而食于何不臧賦也言變不虛生縁政而起陽者君子之象也隂者小人之象也今日月告凶不用其道而陽為陰傷則是四國無政不用其良而小人陵君子也故日月之食皆為天變然彼月而食陽盛陰衰乃理之常此日而食陰盛陽衰則事之變此必有致之者矣於何不臧問之也詩人之意以為王當思其所用之人則知所以不臧之故也􅏎􅏎震電不寧不令百川沸騰山冡崒崩高岸為谷深谷為陵哀今之人胡憯莫懲賦也寧息令時沸騰波湧也山頂曰冢岸崩故為谷谷塞故為陵憯曾也言不臧致變不止日食而已時當十月而雷電不息變見於上也淫雨水溢以致山崩陵谷反覆災降於下也此皆小人道長女寵過盛之所致凡今之人各宜恐懼修改而曾莫之懲則末如之何矣皇父卿士番維司徒家伯冡宰仲允膳夫棸子内史蹶維趣馬楀維師氏豔妻煽方處賦也皇父家伯仲允皆字也番棸蹶楀皆氏也豔美也豔妻謂褒姒也煽惑也處安也言不懲之人可指而數也皇父為卿士是其首矣司徒掌邦教冢宰掌邦治膳夫掌王之飲食内史掌爵禄予奪之法趣馬掌馬政師氏掌司朝之得失朝廷要職皆皇父之黨為之褒姒又煽惑王心而王方安焉羣小布於外嬖妾蠱於内嬖妾借外權以固寵羣小結内援以肆虐如此而國不亡者未之有也抑此皇父豈曰不時胡為我作不即我謀徹我牆屋田卒汙萊曰予不戕禮則然矣賦也時天時也作動即就徹毁卒盡也汙停水萊草穢也戕害也言天變於上人亂於下其時如此皇父豈曰不知乃不懲而又甚焉胡為勤我以徙并不就我以謀遽毁我之牆屋荒蕪我之田畝此其戕我實甚而猶曰不戕下供上役禮則然矣此所謂天變於上而不懲民怨於下而不恤者也皇父孔聖作都于向擇三有事亶侯多藏不憖遺一老俾守我王擇有車馬以居徂向賦也向邑名在東都畿内所謂河陽也三有事三卿也畿内之侯二卿今擇三卿自比於列國也亶信侯維藏蓄也憖者心不欲而自强之詞徂往也言皇父之惡如此而其自為謀則又甚明也擇封邑而作都於向為其可託以庇身也擇三卿而惟取多藏為其可資以足食也又擇國中之有車馬者皆使往居於向不勉留一人以守我王是明知禍亂將作而徹王之衛以自衞也臣之不忠未有甚於此矣黽勉從事不敢告勞無罪無辜讒口囂囂下民之孽匪降自天噂㳫背憎職競由人賦也囂囂衆也孽災也噂聚㳫重複也職主競力也言皇父之不忠如此我不當從徂向也然不從則禍將不測故勉從之而又不敢言蓋欲留其身以為王也然小人知我之勉從之也故無罪無辜而羣起讒之蓋不容我之心知有王也乃知下民之災非天降之皆此讒諂之人聚則面諛雷同附和背則相憎譖愬交搆以致此禍也悠悠我里亦孔之痗四方有羡我獨居憂民莫不逸我獨不敢休天命不徹我不敢傚我友自逸賦也悠悠長思也痗病羡餘徹均也言我既黽勉而徂向因思故里之人亦甚病矣有散而之四方者尚可保其餘生而我獨居可憂之地不敢去也有不仕而為民者皆得優游自逸而我獨在從事之班不敢休也夫我之不敢去而不敢休者非好勞也時事愈艱憂憫愈甚人皆好逸誰當任勞上天賦命原有不均我之勞即我之命也豈敢效我友之自逸哉蘇轍曰此所謂知其不可而為之者也十月之交八章章八句十月之交刺皇父也史稱幽王六年十月辛卯朔日有食之又稱幽王三年三川皆震涇渭洛竭岐山崩而詩稱百川沸騰蓋三年川竭六年又因震電淫雨而水溢山崩也幽王所用之人傳稱虢石父詩稱七人而以皇父為首蓋當時小人甚多亦不可殫述也災異疊見羣小盈朝豔妻煽惑王心不悟周之將亡人皆知之皇父之作都于向亦如鄭伯友逃死之所而盡徙富民以致宿衞單弱則罪不容誅矣當是時有識之士或逺引於四方或高蹈於山林不可謂非保身之哲然膜視斯民而不急君父之難非仁人之用心也故憂天憫人之士往往混跡羣小之間崎嶇艱難以挽時事之窮雖未必有濟而其心則已苦矣然以為苦而怨焉猶性情之薄也十月之詩人身任其勞不以為苦而安之若命厚之至也孔子曰君子之仕也行其義也又曰天下有道丘不與易得詩人之心矣浩浩昊天不駿其德降喪饑饉斬伐四國旻天疾威弗慮弗圖舍彼有罪既伏其辜若此無罪淪胥以鋪賦也昊廣也駿大也旻仁也疾暴威怒慮思圖謀也舍棄淪陷胥皆鋪遍也此從王東遷之臣傷時事而作也言昊天至廣而不大其惠既降喪亂又降饑饉如斬伐此四國之人也旻天至仁而今乃暴怒曾不熟慮而徐圖之也如慮之而圖之彼有罪之人若褒姒皇父軰既已棄之而伏其辜矣今東周之君民尚無罪也而使之普遍陷溺則如之何哉周宗既滅靡所止戾正大夫離居莫知我勩三事大夫莫肯夙夜邦君諸侯莫肯朝夕庶曰式臧覆出為惡賦也周宗周之宗社也戾定也正大夫六官之長也我從遷者自謂也勩勞也三事大夫執事之臣也言西周宗社既已滅矣東周播遷尚無定局六卿之長各居其邑不肯從遷故不知我之勞也從遷諸臣雖不離居而莫肯夙夜在公東都畿内之邦君諸侯亦不肯朝夕來覲我猶望之曰庶幾閉門思過改而從善乎乃有時而復出則仍然為惡乃知喪亂饑饉皆由人致非昊天之不仁也如何昊天辟言不信如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天賦也辟言法言也此呼天而訴之也言如何乎昊天也覆出為惡雖法與之言亦不信矣時事如此喪亂未已如彼行道無所底至也凡百君子通指諸侯大夫也不知有國宜知有身既知有身而欲敬守之則宜相畏而各盡其職今不相畏是不畏天也不畏天豈能保其身哉辟言不信而猶忠告之詩人之厚也戎成不退饑成不遂曾我􅉏御憯憯日瘁凡百君子莫肯用訊聽言則答譖言則退賦也遂進也􅉏御近侍也憯憯憂貌瘁病訊告也譖讒也言西周之戎已成矣而冦賊不退東周之饑已成矣而年歳不遂不惟疎賤之人流離失所併近侍之臣亦憂苦致病乃凡百君子當此之時猶莫肯以道告君惟工於揣摩度言之而必聽者則迎合而答之一聞讒譖之言則緘黙而退不敢身直其事詭隨固位而不顧時事之日非庸臣誤國千古如斯矣哀哉不能言匪舌是出維躬是瘁哿矣能言巧言如流俾躬處休賦也此承上文言聽言答而譖言退者彼亦有所不得已也不揣摩而直言王之所謂不能言者也言一出口即危其身不直言而揣摩王之所謂能言者也巧言如流其身乃安此其所以莫肯用訊也維曰于仕孔棘且殆云不可使得罪于天子亦云可使怨及朋友賦也于往棘難殆危也言當此忠直獲罪奸諛得意之時而猶欲往仕則甚難而且危何則巧言之人王之所謂可使者也王云可使我云不可使則得罪于天子王云可使我亦云可使則朋友之離居者又怨我不能直言是無術以自免也謂爾遷于王都曰予未有室家䑕思泣血無言不疾昔爾出居誰從作爾室賦也爾謂朋友也䑕思猶癙憂也言朋友責善我不敢辨但既知怨我則宜共出圖君乃謂爾遷于王都則曰未有室家憂愁涕泣語皆痛切而究之非實情也如果為無室之故昔爾出而離居之時誰為作爾室者離居則自作之從遷則曰不能是與巧言以悮國者相去亦無幾矣雨無正雨當作兩七章二章章十句二章章八句三章章六句兩無正傷無臣也當是時正大夫離居不從遷也在西周者也三事大夫邦君諸侯在東周者也在東周者覆出為惡而莫肯用訊在西周者託言無室而實不勤王兩處皆無正人故曰兩無正也然推其無正之故則皆王之惡直言而喜巧言有以致之乃知戎成饑成匪降自天皆由於人成亂者臣也啟亂者用臣者也然則人君之好惡可不慎哉祈父之什十篇六十四章四百二十六句御纂詩義折中卷十二
