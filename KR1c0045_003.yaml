body:
  text: 邶風一之三邶國名武王克商分自紂城朝歌以北謂之邶南謂之鄘東謂之衛邶不詳其始封其後并入於衛故邶風皆衛事也邶雖入衛而王朝之籍猶有邶在故太史採風其得之邶地者仍謂之邶孔子因之者不豫衛之得滅邶也魏滅於晉仍存魏風亦猶是也泛彼柏舟亦泛其流耿耿不寐如有隱憂微我無酒以敖以遊比而賦也泛猶泛也微猶非也衛君棄君子而用小人故君子憂之而賦此詩也嚴粲曰舟必有人以維楫之而後有所濟今柏舟雖堅而無人維楫亦泛其流而已將何所泊乎以喻國無賢人將日敗壞而無所止也李樗曰仁人之所憂者國也此不可以酒解亦非敖逰之所能釋也我心匪鑒不可以茹亦有兄弟不可以據薄言往訴逢彼之怒賦也鑒鏡茹度據依訴告也言鑒能度物而我心匪鑒故人之情偽不能預照兄弟至親宜可憑依而不度其不可是以往訴我之憂而反逢彼之怒也鄭康成曰責以兄弟之道謂同姓臣也我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也賦也棣棣間習之貌選擇也言兄弟之怒我者蓋謂我孤介自守必行其志而不能貶道以隨時也然我自度之矣石猶可轉而我心匪石則自守者不可易也席猶可卷而我心匪席則必行者不可屈也欲自貶損而威儀棣棣無可擇而改者則終不能隳方以為圎也憂心悄悄愠于羣小覯閔既多受侮不少靜言思之寤辟有摽賦也悄悄憂貌羣小衆小人之在君側者覯見閔病辟拊心也摽重拊之也不貶道以隨時則國事愈可憂矣必自守以行志則小人愈愠怒矣羣小皆愠則所以中傷而凌辱之者無所不至矣故覯閔而又受侮也既多不少言小人之衆也日居月諸胡迭而微心之憂矣如匪浣衣靜言思之不能奮飛比而賦也居諸語辭迭更微暗也日喻君月喻臣君暗則無以察其臣而臣亦暗臣暗則無以輔其君而君愈暗是君臣更迭而暗如日月之更迭而微故中心隱憂如衣垢而不浣也如是則可以去矣顧以地處親賢心憂宗國雖時不可為而終欲委曲以圗濟不能恝然而奮飛也朱子曰五倫之際皆當以此為法屈原不忍其憤懷沙赴水此賢者之過也賈誼曰歷九州而相其君兮何必懷此都也又失之逺矣柏舟五章章六句詩序曰柏舟仁而不遇也夫以柏舟之仁人心不轉而儀不選亦可以見信於君矣而終不遇者以君不眀而小人蔽之也君之不眀非必暗且弱也往往聰眀才武之主一念嗜好有所不謹為小人所迎合遂不覺而用之小人既用迎合愈巧而君子猶不轉而不卷是以君心愈疏而小人皆愠日思所以病侮之而國遂不可為矣正風之變皆由於此也緑兮衣兮緑衣黃裏心之憂矣曷維其已比也緑間色黃正色也間色而乃以為衣正色而反以為裏以比嬖妾蒙寵而顯夫人見疏而微故心憂之而不能止也緑兮衣兮緑衣黃裳心之憂矣曷維其亡比也上曰衣下曰裳亡忘也嚴粲曰黃裏掩蔽而已黃裳則失位矣謝枋得曰嫡妾易位則家不齊而國不治故為君憂為君之子憂而非為一身也緑兮絲兮女所治兮我思古人俾無訧兮比也訧過也言緑本絲也而今為衣者由治絲之女染織而成以喻妾本微賤而今蒙嬖寵亦由不能防微杜漸以至於此因思古人當必有善全之道俾君與妾皆歸於無過而傷己之不能也絺兮綌兮淒其以風我思古人實獲我心比也淒寒也絺綌質薄故寒風入之程子曰絺綌所以來風是也以喻己之被掩失位亦德有未周故生讒間因思古人厚積其德而頑讒胥化先得我心之同然當則而效之也緑衣四章章四句詩序曰緑衣衛莊薑傷己也莊公惑於嬖妾莊薑賢而失位乃莊薑不怨公與妾也而自傷之緑絲女治傷己之才疏而有以致之也絺綌以風傷己之德薄而無以處之也可謂忠厚之至矣抑人之賢否其辨甚眀而或至於倒置者其好惡僻也不好窈窕斯貞女見棄緑衣之夫人所以被掩於嬖妾也不惡讒諛斯直臣見疏柏舟之仁人所以受侮於羣小也然則人君之好惡可不慎哉燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨興也燕燕雙燕也差池分飛也歸大歸也雙燕同飛而羽忽差池以興二人同處而一人逺别也之子謂戴媯也莊薑無子以戴媯之子完為子莊公卒完即位嬖人之子州吁弒之故戴媯大歸於陳而莊薑送之也婦人之禮迎送不出門而逺送于野者有所謀也燕燕于飛頡之頏之之子于歸逺于將之瞻望弗及佇立以泣興也上飛曰頡下飛曰頏將送也以燕之上下相逐興人之彼此相送也佇立以泣者行人已逺猶不忍歸故久立以望之也燕燕于飛下上其音之子于歸逺送于南瞻望弗及實勞我心興也以燕之上下而音漸逺興人之逺别而信難通也送於南者陳在衛南也泣涕如雨行且泣也佇立以泣止行也實勞我心止泣也不泣而勞心者所謀之事未知濟否故心憂之不止傷别也仲氏任只其心塞淵終溫且惠淑慎其身先君之思以朂寡人賦也仲氏字也戴媯乃厲媯之娣故曰仲氏也能承大事曰任春秋隱公四年二月衛州吁弒其君完九月衛人殺州吁于濮濮陳地也史記曰州吁弒桓公自立欲伐鄭石碏因桓公之母家於陳詳為善州吁至鄭郊石碏與陳侯謀因殺州吁于濮由此觀之戴媯之歸陳乃石碏用陳侯以討賊之因也然則仲氏之所任可知矣莊薑之逺送于野其故亦可想矣仲氏任此大事而莊薑知其有濟者以其心誠實而淵深其身和順而謹飭又能思先君之恩則其必討嗣君之賊可知也此固仲氏之能任而莊薑亦可謂知人善任矣燕燕四章章六句詩序曰燕燕衛莊薑送歸妾也州吁弒立衛人脅從而莊薑戴媯乃能內用謀臣外結與國討賊定亂其功可謂竒矣究其所以成功未始不本於正也任天下之事不惟其才惟其德德具於身心非塞無以立本非淵無以沉幾非溫無以和衆非惠無以循理非淑無以慮善非慎無以集成有此六者又加之以忠愛則德全矣以此定難何難不濟以此圗功何功不成然則人之所以任事與夫擇人而任以事者讀燕燕之卒章亦可以得其大凡矣日居月諸照臨下土乃如之人兮逝不古處胡能有定寧不我顧賦也之人謂州吁也古常也不古處不以常道相處也定止其亂也州吁弒桓公將不利於莊薑故莊薑憂之也言日月之明照臨下土而此人乃不以道相處是亂未已也何時而能有定乎豈日月之照臨獨遺我而不顧乎何為至今不定也日居月諸下土是冒乃如之人兮逝不相好胡能有定寧不我報賦也不相好欲相害也報善惡之應也言日月之恩丕冒下土而此人乃欲相害則亂已迫也何時而能有定乎豈日月之丕冒而我獨不獲為善之報乎何為宜定而久不定也日居月諸出自東方乃如之人兮德音無良胡能有定俾也可忘賦也言日朝月望皆出東方則照臨更眀矣而此人乃無良善之德音是相害之意徵色發聲矣何時而能有定乎設能有定則無良之音我亦可以相忘蓋止求一國之安而不計一身之辱也日居月諸東方自出父兮母兮畜我不卒胡能有定報我不述賦也畜養述論説也言日月之盛東方自出則丕冒更廣矣而我今乃遇此人將恐父母之遺體不能令終矣何時而能有定乎設能有定使先君之國家獲安則天之報我與否亦可置之不論蓋欲以身殉之也日月四章章六句日月莊薑惡州吁也太史公曰人窮則返本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也莊薑之呼日月與父母蓋窮之至也然而終望定其亂者豈虛願哉當戴媯歸陳之時定亂原有成謀事若不濟以死繼之莊薑亦有成算卒之州吁授首而衛國以安則日月父母未嘗不鑒其誠而隂佑之焉善惡之報不誣也正月之詩曰既克有定靡人弗勝有皇上帝伊誰云憎為善者可以興矣終風且暴顧我則笑謔浪笑敖中心是悼比也終風終日風也洪範曰狂恆風若是也暴疾謔戲浪蕩悼傷也朱子曰莊公之為人狂蕩暴疾莊薑不忍斥言故以終風且暴為比言雖其狂暴如此亦有顧我則笑之時但出於戲慢之意而無愛敬之誠則使我不敢言而心傷之耳終風且霾惠然肯來莫往莫來悠悠我思比也霾雨土也惠順也朱子曰終風且霾以比莊公之狂惑也雖其狂惑亦或惠然而肯來但又有莫往莫來之時則使我悠悠而思之也終風且曀不日有曀寤言不寐願言則嚏比也風雲蔽日曰曀有又也曀而又曀以比人之狂惑旋開而旋蔽也嚏氣疾也疾而言願者雖疾不怨所謂願言思伯甘心首疾也曀曀其隂虺虺其靁寤言不寐願言則懷比也曀曀連日之隂也虺虺不斷之雷也以比人之狂惑愈深而未已也懷親附也莊薑以為中心是悼性情不合己亦有過焉是當不悼而親附之庶幾誠心感通惠然常來則狂惑可開也夫暴而霾霾而曀曀而隂莊公之待莊薑也愈薄悼而思思而嚏嚏而懷莊薑之待莊公也愈厚可謂至德矣終風四章章四句終風莊薑懷莊公也朱子曰此詩當在燕燕之前是也天下無不可處之境亦無不可化之人雖不可化不可以為難化而遂置之也是故人倫之變知其不可奈何而安之此易為也即激烈而以身殉亦無益也必思積誠以化之積誠以化别無他術親愛之而已矣性情通則心移恩誼篤則神洽故化也舜之於瞽瞍文王之於紂莊薑之於莊公皆是也晨門謂孔子曰是知其不可而為之者與先聖後聖如出一轍矣擊鼓其鏜踊躍用兵土國城漕我獨南行賦也鏜鼓聲踊躍歡忭之狀用兵興師也南行者衛將伐鄭鄭在衛南也擊鼓踊躍想見喜兵好鬬之狀故衛人怨之言軍役繁興或築土於國或築城於漕而已獨南行有死亡之憂為更苦也從孫子仲平陳與宋不我以歸憂心有忡賦也春秋隱公四年宋公陳侯蔡人衛人伐鄭衛書人非卿也此呼名賤之也平陳宋非事也宋殤公欲除公子馮州吁與殤公同惡故糾陳蔡以助之是勞民以濟惡也帥賤而師出無名又久不歸故衛人憂之也爰居爰處爰喪其馬于以求之于林之下賦也爰於居次處安也軍次有常處軍行有常制今則隨意而居擇便而處不戒而喪馬逺求于林下師久不歸失伍離次上無節制而下有敗形也死生契闊與子成説執子之手與子偕老賦也契合闊離也從軍者見有敗亡之形故追言其南行之初與妻分别執妻之手與妻成説死生離合必與偕老蓋欲生還而復契有成説焉即下文所謂洵也于嗟闊兮不我活兮于嗟洵兮不我信兮賦也于吁也洵約也信踐之也言從前之約如彼而觀此事勢則是闊而不復契矣死而不復生矣偕老之約永訣而不能踐矣蓋傷心痛哭之詞也擊鼓五章章四句詩序曰擊鼓衛人怨州吁也衆仲曰州吁阻兵而安忍阻兵無衆安忍無親夫兵猶火也弗戢將自焚也觀擊鼓之詩其阻兵安忍衆叛親離之形如繪弗戢自焚原無足惜聖人存此者所以示戒也夫兵凶器戰危事也寡人之妻孤人之子獨人父母其肝腦塗地之狀有目不忍見也其寃痛號呼之聲有耳不忍聞也而喜軍功而勤逺略者尚踊躍於用兵讀擊鼓之卒章亦可以惻然止矣凱風自南吹彼棘心棘心夭夭母氏劬勞興也南風長養故曰凱風棘心稚弱難養者也夭夭少好貌衛有七子之母因家貧失養不安其室其子知之故感頌其母以自責也言風吹棘心而至於夭夭則樂育深矣母養七子而至於長成則劬勞甚矣凱風自南吹彼棘薪母氏聖善我無令人興也令善也言吹棘心而至於成薪則凱風至仁而薪非美材有負於風養七子而至於成立則母氏聖善而子無令人有愧於母也聖者明達善者賢淑事莫勞於養幼子母養七子而皆能長成此必實有賢淑之心又有眀達之才非溢美也爰有寒泉在浚之下有子七人母氏勞苦興也浚衛邑言寒泉猶能養人而使浚民滋益七子乃不能養母而使母氏勞苦曾寒泉之不若也母養子之少子養母之老當其少也母氏既劬勞於前及其壯也母氏又勞苦於後是其勞未有已也蓋所以自責者甚深而凡為人子者皆可以鑒矣睍睆黃鳥載好其音有子七人莫慰母心興也傳曰睍睆好貌箋云睍睆以興顔色説也好音以興辭令順也言黃鳥尚能美其色好其音以恱人七子乃不能和顔色順辭令以慰母曾黃鳥之不若也母氏勞苦責其不能養口體也莫慰母心責其不能養志也凱風四章章四句詩序曰凱風美孝子也能盡孝道以慰母心而成其志也凡子之事父臣之事君有不恱者皆由於見君父之過而不自知其過故諫而不入諍而得罪以舜之大孝而不得於親曰父母之不我愛於我何哉是求其過而不得宜親之不悅也逮其後也負罪引慝夔夔齊栗瞽亦允若由於自知其過故親信而順之也凱風之母不安其室是亦有過焉乃七子不見親之過而惟自責其過於是乎母心慰而已安母之志亦成則與舜之底豫有同功矣凡為臣子者皆當以此為法也雄雉于飛泄泄其羽我之懷矣自詒伊阻比也雄雉文眀而耿介喻君子也泄泄倦飛貌詒遺阻隔也衛之君子逺仕他邦其妻思之言君子逺行勞倦如雄雉之泄泄其羽而阻隔不見是可懷也又自追怨言夫之阻隔我實遺之蓋必其初勸夫逺仕而後悔之也雄雉于飛下上其音展矣君子實勞我心比也雉飛而下上其音喻君子之為國為民無不直言也此固展矣君子誠心盡職但恐上觸人君之怒下招同列之嫌故實勞我心憂其得禍也瞻彼日月悠悠我思道之云逺曷云能來賦也日月迭往迭來君子去而不返故瞻日月而思之望其來也然道之云逺曷云能來既不能來徒思無益故下章贈之以言也百爾君子不知德行不忮不求何用不臧賦也百猶凡也言逺仕之道在於善處同列凡共仕者皆君子也但能無所忮害又不貪求則百爾君子皆知汝之德行而不相侵軋何所往而不善哉朱子曰憂其逺行之犯患冀其善處以自全也雄雉四章章四句雄雉勉以德行也居亂國事暴君直道盡言將恐不免然欲其免而枉道緘默乎又非君子之所為也夫仕宦之禍不起於人君而起於同列亦不起於同列而起於己心不能容人故疾人之所有而忮心生不能正己故恥己之所無而求心起同列之人鄙其求而妬其忮則相與擠之矣不忮則於人無患不求則於物無爭無可鄙也亦無可妬禍何由作然此亦婦勉其夫故止望其免禍也人臣事君幸而逢堯舜則為臯陶稷契不幸而逢桀紂則為龍逢比干有所瞻顧而託云眀哲保身大不可也然過於激烈而有好名之念則又賢者之過矣當死當生惟義所在治世之修身致主與亂世之殺身成仁其道一也匏有苦葉濟有深涉深則厲淺則揭比也匏瓠也濟渡處也行水曰涉束衣而涉曰厲褰裳而涉曰揭匏者渡水之具今有苦葉尚未可用喻所學之未成也濟者渡水之處今有深涉則未可濟喻世途之甚險也無匏而涉則必厲揭故當詳審而慎處之不可輕進也有瀰濟盈有鷕雉鳴濟盈不濡軌雉鳴求其牡比也瀰水滿貌鷕雌雉聲軌車軸也飛曰雌雄走曰牝牡濟盈必濡軌而今不濡喻人之名聲洋溢而底藴甚淺也雉鳴當求雄而今求牡喻人之美言招賢而實引匪類也徇名而不察實聽言而誤信之則必失其身矣雍雍鳴雁旭日始旦士如歸妻逮冰未泮比也雍雍鳴雁納采之物也旭日始旦行禮之時也士如歸妻喻同道之君子以禮相求也逮冰未泮言及時而往從之也招招舟子人涉卬否人涉卬否卬須我友比也舟子主渡者卬我須需也言舟子招渡人涉而我否者以先涉之人非我同類故需我友而後涉以喻當路之人雖亟相招苟非其人寧守道以待時不可偕匪人以共事也匏有苦葉四章章四句匏有苦葉審出處也君子雖急於濟世亦不可因急而失身故涉川者利用需言有待也所學未成不可輕用內度之已也情偽難測不可輕信外度之人也眀君賢相以禮相求則往從之所以救世也如其不然則寧不仕所以守身也傳曰翹翹車乘招我以弓豈不欲往畏我友朋可以知此詩之義矣習習谷風以隂以雨黽勉同心不宜有怒采葑采菲無以下體德音莫違及爾同死比而賦也習習和舒也谷風東風也葑蔓菁菲葍類無以豈不以也下體根也葑菲之根皆可食德音善言也婦人有德而為夫所棄故作此詩言隂陽和而雨澤降如夫婦和而家道成故宜同心不宜怒也采葑菲者不以花而以根如娶妻者不以色而以德婦有德音而夫能不違則相與終身可矣此夫婦之正道也行道遲遲中心有違不逺伊邇薄送我畿誰謂荼苦其甘如薺宴爾新昏如兄如弟賦而比也畿門限也荼苦菜薺甘菜也言黽勉同心而夫怒見棄於己之初心有違矣乃已行甚遲而夫送甚近是離别之際其苦如荼而夫反甘之如薺也此無他故以其知有新昏之樂而遂忘去婦之悲也涇以渭濁湜湜其沚宴爾新昏不我屑以毋逝我梁毋發我笱我躬不閲遑恤我後比而賦也涇渭合流渭清而涇濁湜湜清貌沚渚以用也梁笱所以取魚逝決發起閲容恤憂也言涇以與渭合流而愈見濁若别出之渚未嘗不澄清也我以新人相形而始見絀若自具之德未始不可用也今既不容我之身尚望勿廢我之事如梁笱之類勿逝勿發可也然我躬不容而何暇憂我後哉亦任之而已忠臣去國不憂其身之廢而惜其功之無成亦猶是也就其深矣方之舟之就其淺矣泳之遊之何有何亡黽勉求之凡民有喪匍匐救之比而賦也方桴舟船也潛行曰泳浮水曰遊匍匐手足並行也深方舟淺泳遊詳審其事之難易而各盡心以處之也有求多亡求有不計其家之有亡而皆盡力以求之也既能持家而匍匐救喪兼能睦鄰婦德亦可謂無虧矣不我能慉反以我為讎既阻我德賈用不售昔育恐育鞠及爾顛覆既生既育比豫于毒賦也慉養既盡阻却育生鞠窮也承上章而言我之德如此乃不慉而反以為讎者由於好色而不好德故舉我之德而盡却之如彼賈人貨雖良而不見售也夫昔日持家睦鄰相與為生者恐生計有窮及爾顛覆原為爾非為我也今爾既因我而生育不鞠何為比我于毒而欲棄之乎免死狗烹鳥盡弓藏千古有同慨矣我有旨蓄亦以御冬宴爾新昏以我御窮有洸有潰既詒我肄不念昔者伊余來塈比而賦也旨蓄鹹菜也御禦也洸武貌潰怒貌既盡詒遺肄勞塈息也新婦三月而後執婦功故初昏言息也言我有旨蓄原以禦冬月之乏至春夏則不食矣今爾新昏以我禦窮時之苦至安樂則棄之矣有洸有潰怒之也既詒我肄勞之也怒而勞之所以速其去也曾不念昔初昏之時乃伊迎余而來息乎何為有初無終也蓋今雖見棄而不忘昔日之恩欲夫追維而或生悔悟之意也亦可悲矣谷風六章章八句詩序曰谷風刺夫婦失道也婦之事夫德與色而已色不可強而為德可勉而至夫輕色而重德則貌陋者恐見憎而益修德皆有刑于之好色衰者以年髙而德彌邵亦獲偕老之慶此聖人之教所以通人倫之窮而平天地之憾也若不知好德而惟慕其色則無色者固無由見憐於前即有色者亦不能不衰於後以新間舊以妾陵嫡家國之禍不可勝言矣故關雎好德足以保天下谷風好色并不能保其妻孰得孰失何去何從必有能辨之者詩可以觀不益信哉式微式微胡不歸微君之故胡為乎中露賦也式發語辭式微之微猶衰也微君之微猶非也中露野處也黎侯為狄所逐久寓於衛其臣激而勸之也曰衰微甚矣何為而不歸為君之故也吾君失國之故因狄侵迫故相從以求復不然何為處於中露夫臣以君之故而中露則君宜自思其故不可久在草莽也式微式微胡不歸微君之躬胡為乎泥中賦也又言衰微甚矣而不歸者為君之躬也吾君現在之躬尚有可為故相從以圖興不然何為處於泥中泥中汚辱也夫臣以君之躬而泥中則君宜自重其躬不可久辱泥塗也式微二章章四句詩序曰式微黎侯寓於衛其臣勸以歸也夫主憂臣辱主辱臣死君已失國而尚憚中露泥中之辱乎所以言此者激其君以有為也失國必有其故得國惟視其躬狄人侵之可以暫避狄人既去原可復歸躬有失德雖安亦危躬無失德雖亡可存不自奮而碌碌因人非丈夫也故言君之故與躬以諷之其存君興國不忘欲返言短而意則長矣非不甘其辱而有所怨也旄丘之葛兮何誕之節兮叔兮伯兮何多日也興也旄丘地名誕長也叔伯同姓之稱也黎侯寓衛而衛人不恤故因時物以起興言旄丘之葛何其節之長也叔伯不救何其日之多也怪而嘆之也何其處也必有與也何其久也必有以也賦也處安處也與與國也以他故也承上章而言多日則安處久矣何其處也意必有與國而俟其來也何其久也意必有他故而不能來也不遽怨而曲諒之厚之至也狐裘蒙戎匪車不東叔兮伯兮靡所與同賦也蒙戎雜亂之貌黎在衛西黎人來衛是車東也賦葛而又賦裘追計之也言當狐裘蒙戎之時我已無車不東今裘易而葛長終於不救者非有與而有以乃叔伯之中無與我同心者耳鄒泉曰靡所與同者謂我有亡國之憂而彼無恤患之意我有恢復之志而彼無拯救之心也瑣兮尾兮流離之子叔兮伯兮褎如充耳賦也瑣瀆告也尾追隨也流離寄寓也褎笑貌耳聾之人恆多笑也言我瑣瀆而尾隨者以流離失所情迫相求而衛之君臣乃褎然如塞耳而無聞則末如之何也朱公遷曰一章怪之二章疑之三章微諷之四章直責之式微處困而思奮旄丘責人而不刻可謂賢矣旄丘四章章四句旄丘黎人責衛也王制屬有長連有帥卒有正州有伯天子端拱方伯旬宣講信修睦救災恤患所以戢強暴而安弱小也黎與衛鄰為狄所滅而衛人不救既無恤患睦鄰之義兼有唇亡齒寒之憂異日者衛亦為狄所滅賴齊桓而後存衛不救黎而亡齊桓救衛而霸得失之際可以觀矣春秋之作也桓莊以前傷天下之無王襄昭以後傷天下之無霸與旄丘有同慨焉聖人之惡強暴而思戢之哀弱小而欲安之無所不致意也簡兮簡兮方將萬舞日之方中在前上處賦也簡擇也萬者舞之總名上處前列也衛之賢者隱於伶官衛君不識不能簡用君子傷之而作是詩言擇人而充舞列久暴於日中而不之恤也碩人俁俁公庭萬舞有力如虎執轡如組賦也碩大也俁俁魁偉之貌轡馬韁組絲縧也力能御馬則轡柔如組矣言賢人與選而舞於公庭觀其軀幹壯大知其有力如虎若使之馳驅王事自能馴調六馬執轡如組矣序曰衛之賢人仕於伶官皆可以承事王者是也左手執籥右手秉翟赫如渥赭公言錫爵賦也籥管翟羽也赫赤貌渥厚赭丹也錫爵賜酒也言此有力如虎之人不使之執轡乃使之執籥秉翟用違其才矣然其顔色之充揚不可掩也衛君即不能知力之如虎亦當竒其貌之渥丹乃止言賜酒則是終以伶人待之矣但知於人中簡舞不能於舞中簡人可慨也山有榛隰有苓云誰之思西方美人彼美人兮西方之人兮興也榛似栗而小苓菌也西方美人西周之聖王也言山尚有榛隰尚有苓而四海之大乃無用賢之君則不得不思西周之聖王矣以斯人而當文武之時自當充奔走禦侮之選其執轡如組不虛也乃美人處於西方而不能再覩則斯人亦終於伶官而不復見用矣豈不深可慨哉簡兮四章三章章四句一章六句詩序曰簡兮刺不用賢也夫賢才難得也幸而有之又使之屈於下僚屈於下僚其君非不見之也又不能察識而泛泛視之則終屈而不得伸矣賢人常有而用賢之君不常有君能用賢則舉賢於上位而天下興得人之頌君不用賢則棄賢於下僚而朝廷有無人之憂是以人君每思借才於異代而賢人君子又慨想古之眀王是誰之責哉毖彼泉水亦流于淇有懷于衛靡日不思孌彼諸姬聊與之謀興也毖泉始出也淇衛國水名孌好貌諸姬謂娣姪也衛女嫁於諸侯父母終思歸寧而不得故作此詩言泉水尚流於淇而已乃不歸於衛故無日不思進諸姬而與之謀為歸衛之計也出宿于泲飲餞于禰女子有行遠父母兄弟問我諸姑遂及伯姊賦也泲禰皆地名自衛來時所經之處也餞送行也此必諸姬之中有以父母殁不得寧兄弟告之者故言我始嫁之時宿泲餞禰父母兄弟皆逺之焉思父母亦思兄弟寧父母獨不可寧兄弟乎此事當問我諸姑與伯姊也夫之母婦謂之姑諸姑伯母叔母也夫之女兄婦謂之姊伯姊年長者也蓋以諸姬為少不更事欲詢於尊長以定謀也出宿于干飲餞于言載脂載舝還車言邁遄臻于衛不瑕有害賦也干言皆地名適衛所經之處也脂膏舝軸遄速臻至瑕何也此問姑姊之詞也言來時宿餞而來歸時亦宿餞而歸膏塗車軸不日即至此亦何害於理而云不可乎我思肥泉兹之永歎思須與漕我心悠悠駕言出遊以寫我憂賦也肥泉衛水須漕衛邑也此必姑姊皆以為不可而遂止也止而不歸故思而永歎又思須漕而出遊亦不過心之悠悠而非實有其事也抑言寫憂是心有憂也此必有不得不歸之事故憂而思之越禮而謀歸然卒於不歸則所謂發乎情而止乎禮也泉水四章章六句詩序曰泉水衛女思歸也先王緣人情而制禮有順而導之者有逆而止之者順其情而行之易逆其情而止之難泉水抑其難己之情而卒止乎禮以此為法則內之可以克己外之可以坊民抑謀及於人事之師也書曰詢謀僉同又曰尚猷詢兹黃髮則罔所愆泉水之謀於諸姬詢僉同也問姑及姊詢黃髮也卒從其言而不歸舍己從人也能盡人之言擇善而從之以此為法則內之可以進德外之可以崇功然則泉水之為教亦多矣出自北門憂心殷殷終窶且貧莫知我艱已焉哉天實為之謂之何哉賦也此衛大夫困於行役之詩也出自北門與我入自外相應言出自內也自內出外承王事也憂心殷殷非憂事也憂所以辦事也凡辦事者必需財窶則不能為禮無出外之具矣而且貧無以自給有內顧之憂矣艱難如此而君相皆莫之知將終於貧窶而無展布之日也已焉哉決詞也不復有他望也天實為之不敢尤人而歸於天也謂之何哉不敢怨天而安於命也王事適我政事一埤益我我入自外室人交遍謫我已焉哉天實為之謂之何哉賦也王事王命之事也政事一國之事也適之一皆埤厚益增謫責也盡人而謫曰交每事而謫曰遍言出自內則事務叢集入自外則怨謗交加蓋困於內外極矣王事敦我政事一埤遺我我入自外室人交遍摧我已焉哉天實為之謂之何哉賦也來不可辭曰適敦則迫不容緩更甚於適矣陸續不已曰益遺則委擲不恤更甚於益矣誚而讓之曰謫摧則挫而辱之更甚於謫矣內外之艱日甚而守分安命終不改乎其初所以為賢也北門三章章七句北門仕不得志也夫誰司天祿而使勞臣無俯仰之資誰秉國鈞而使從事有獨賢之歎此必有任其責者矣而賢者不怨也不惟不怨而已且有所以處之之道焉天下事莫患乎無可冀而心不己故多出位之思抑莫患乎無可諉而心不甘故有曠官之誚北門之賢者決志於已則以為分所固然而勵其守者益堅一歸於天則以為理所當然而盡其職者益勤且恬然安之而不復有所謂則內無悲憤之意而外無不平之鳴所謂知其不可奈何而安之若命也故曰詩可以怨謂其宜怨而不怨也謂其雖怨而善於處怨也謂其不怨而且善於處不怨也北風其涼雨雪其雱惠而好我攜手同行其虛其邪既亟只且比也北風喻嚴急也雨雪喻慘虐也涼風初至也雱雪初來也惠仁愛也虛寬邪徐亟急也只且語辭衛之賢者憂國危亂欲偕友以同去也言嚴急之象已兆慘虐之狀已形性仁愛者不合於時當相攜以同去不可以為寬且徐也而俟之其事既已急矣蓋懼及於禍而惟恐去之不速也北風其喈雨雪其霏惠而好我攜手同歸其虛其邪既亟只且比也喈疾而有聲更甚於涼矣霏密而四布更甚於雱矣行尚未知所之今則決計欲歸隱也莫赤匪狐莫黑匪烏惠而好我攜手同車其虛其邪既亟只且比也狐邪媚之獸烏不祥之鳥喻小人也邪媚小人之態不祥小人之實也滿目皆赤而無非狐滿目皆黑而無非烏喻小人之衆也同行同歸猶商之也同車則已駕矣易曰君子見幾而作不俟終日其是之謂乎北風三章章六句詩序曰北風刺虐也國家危亂皆由於虐政虐政之興皆始於小人小人一用則必言利言利則必重斂重斂而不得繼之以嚴刑而虐政行矣故赤狐黑烏者北風雨雪所由來也虐政既行則小人各引小人而舉朝皆是虐政大行則庸人皆變小人而舉國若狂故莫赤匪狐莫黑匪烏者北風雨雪之極致也當其用一赤狐用一黑烏之初百姓未受其害而人君亦以為無傷及乎莫匪赤狐莫匪黑烏之日則百姓不勝其苦而人君悔之而無及且欲去之而不能然則用人可不慎哉靜女其姝俟我於城隅愛而不見搔首踟蹰賦也靜女美稱也姝殊色也城隅期會之所也不見期而不至也搔首踟蹰久待之也期會城隅而以為靜女愛其色之美則忘其行之醜也靜女其孌貽我彤管彤管有煒説懌女美賦也孌好貌彤赤也古者針筆皆有管此靜女之所佩而解以貽所私也煒光也管無光而以為有光者悅女之美覺管亦美也自牧歸荑洵美且異匪女之為美美人之貽賦也牧野外也荑茅之始生者洵信女汝謂荑也言靜女既會之後又自野而貽我以荑見之而信以為美不止於美而且異者非荑之果美也以其為美人之所貽則不美者亦美耳愛憎之極美惡易位臨亂之君各賢其臣亦若是矣獨管荑也與哉靜女三章章四句靜女刺迷也管本無煒荑何足異而以為煒且異者溺愛則不明也昔彌子瑕食桃而甘以其半與衛君公曰愛我哉忘其口味以啖寡人彌子母病矯駕君車以出公曰孝哉為母而忘其刖罪及彌子色衰愛弛公怒曰是嘗矯駕吾車又啖我以其餘桃故彌子之行未變於初也當其愛時則人以為罪君以為功及其不愛則前為功者後即為過故曰好而知其惡惡而知其美者天下鮮矣人君鑒此於其所愛必察之焉曰得毋尚有可疵乎於其所惡必察之焉曰得毋尚有可用乎則不至因喜而謬賞因怒而濫刑亦不因迎合而誤用小人因觸忤而久棄君子其於治天下庶幾矣新臺有泚河水瀰瀰燕婉之求籧篨不鮮賦也新臺新築之臺也泚鮮眀也瀰瀰滿也燕婉安和籧篨醜疾也鮮少也衛宣公欲納伋之妻作新臺於河上而要之國人惡之而作是詩也新臺有泚詫其事也河水瀰瀰志其處也燕婉美伋也言齊女之來本欲求伋乃不見燕婉而見籧篨也籧篨之人亦世之所少有何為此地不鮮乎怪之也新臺有灑河水浼浼燕婉之求籧篨不殄賦也灑髙峻也浼浼平也殄絶也言籧篨之人亦天之所不佑何為至今不殄也厭之也魚網之設鴻則離之燕婉之求得此戚施比也鴻雁之大者離麗也戚施亦醜疾也言魚網之設本以求魚而反得鴻以比齊女之來本求燕婉而反得戚施也不鮮不殄初見之也至於得則成婚矣此人倫之大變狄人入衛始於此矣籧篨不能俯戚施不能仰宣公本無此疾而云然者以其既無人理則亦非復人形也惡之甚也新臺三章章四句詩序曰新臺刺衛宣公也宣公之事人之所不忍言而經存之者何哉淫亂之禍必至滅亡人知之焉乃眀知而故蹈之不能自克故也當其淫亂之初情欲之感已動滅亡之事未來不勝其欲而遂為之逮底於滅亡則悔無及矣聖人於刺淫之詩多存之使知籧篨戚施之狀行道之人指笑唾罵無所不至苟有人心寧不恥此果能恥之則必自克其欲而守禮防淫禍亂無由作矣此聖人所以仁天下而救其亡也豈徒曰志亂之所由起哉二子乘舟泛泛其景願言思子中心養養賦也二子謂伋壽也乘舟渡河如齊也景古影字養養猶漾漾心不定也左傳曰衛宣公為急子娶於齊而美公娶之生壽及朔宣薑與朔搆急子公使諸齊使盜待諸莘壽子告之使行不可曰棄父之命惡用子矣將行飲以酒壽子載其旌以先盜殺之急子至曰我之求也此何罪盜又殺之是壽先濟而伋從之故二子皆乘舟也國人知其事欲救之而不得故思之養養然悲二子之志而傷宣公之非人類也二子乘舟泛泛其逝願言思子不瑕有害賦也逝往也景猶見之逝則不復見矣不瑕有害憂其必見害也太史公曰余讀世家言至於宣公之子以婦見誅弟壽爭死以相讓此與晉太子申生不敢眀驪姬之過同俱惡傷父之志然卒死亡何其悲也或父子相殺兄弟相戮亦獨何哉二子乘舟二章章四句詩序曰二子乘舟思伋壽也次二子乘舟於新臺之後者著淫禍也有穢行者必有竒禍夫新臺之要納伋之妻非欲殺伋也伋且不殺何有於壽然而嫌隙既生讒間必起雖欲不殺不可得矣以二子之相讓以死雖伯夷叔齊何以加兹使伋嗣位而壽輔之則衛可勃興桓文豈足道哉卒至孝子悌弟駢首就戮而國亦隨以滅亡得禍之慘莫此為甚而原其初則一念之不自克以至於斯也情欲之災烈於鴆毒枕席之變慘於兵戎讀此詩者宜何如戒慎哉邶十九篇七十二章三百六十三句御纂詩義折中卷三
