body:
  text: 陳風一之十二陳國名在禹貢豫州之域帝舜之後閼父為周陶正武王以元女大姬妻其子滿而封於陳與黃帝帝堯之後共為三恪子之湯兮宛丘之上兮洵有情兮而無望兮賦也湯與蕩同宛丘地名洵信也望人所瞻仰也陳國無政在位者皆遊蕩於宛丘之上國人譏之以為雖有情致而無威望也毛𫝊曰子大夫也坎其擊鼓宛丘之下無冬無夏値其鷺羽賦也坎鼓聲値植也鷺鳥名其羽可以為翳舞者之所持也坎其擊缶宛丘之道無冬無夏値其鷺翿賦也缶瓦器可以節樂翿翳也徐常吉曰古者春秋敎以禮樂冬夏教以詩書今冬夏値其羽翿則無時而不舞矣此書所謂恒舞也宛丘三章章四句宛丘陳人刺其上也昔胡公之封於陳也武王妻以元女大姬大姬好巫覡之事相沿成俗故在位者多敖遊而恒舞夫其遊而舞也亦有託而云然以為有情也且謂情之所鍾不妨越禮而不知無威儀之節則不足以定命無荘涖之容則不足以觀民有情無望非小失也古今才士有文而無行其病皆在於此讀宛丘之詩其亦可以自儆也夫東門之枌宛丘之栩子仲之子婆娑其下賦也枌白榆也栩樹名子仲氏也子仲之子貴族之子也鄭康成曰之子男子也婆娑舞貌何楷曰或舞於東門之枌下或舞於宛丘之栩下明其非一時非一處也穀旦于差南方之原不績其麻市也婆娑賦也穀善也穀旦良辰也差擇也高平曰原范祖禹曰民於善日則擇高明之地而荒樂焉是也不績其麻廢女工也市易也彼此交易而舞故曰市也穀旦于逝越以鬷邁視爾如荍貽我握椒賦也逝往越於鬷衆邁行也言穀旦往遊不暇擇地但視人衆之處而行焉則遊愈勤而志愈荒矣荍荆葵也椒芬芳之物也越以衆邁男女會矣於是男悦女曰視爾之貌如荍華然女遂貽以一握之椒而通情好也此與鄭之采蘭贈芍同俗故詩人叙其事而醜之也東門之枌三章章四句詩序曰東門之枌疾亂也疾其嬉遊而至於淫亂也昔先王之敎民也君子勤禮小人盡力𫝊曰民生在勤勤則不匱又曰民勞則思思則善心生逸則淫淫則忘善忘善則惡心生今陳之俗恒舞酣歌在民上者無冬夏而値其鷺羽其下化之越鬷邁而市也婆娑則是上不勤禮而下不盡力也有男不耕孰授之食有女不績孰授之衣女遊而冶必至誨淫男惰而貧或至為盗是不勤致匱忘善而惡心生也立國如此何以長世君子是以知陳之先亡也衡門之下可以棲遲泌之洋洋可以樂飢賦也衡門橫木以為門也棲遲止息也泌水名洋洋流動之貌朱子曰此隱居自樂而無求者之詞言衡門雖淺陋而亦可以遊息泌水雖不可飽然亦可以玩樂而忘飢也豈其食魚必河之魴豈其取妻必齊之姜賦也姜齊姓飲食男女人之大欲存焉故以食魚取妻概其餘也豈其食魚必河之鯉豈其取妻必宋之子賦也子宋姓豈其必者有亦不却無亦不求志有在而不暇及乎此也衡門三章章四句衡門守道也人之有欲也皆期其必得必欲得而不得於是乎目前之境皆以為不可不知境不同而道同得其所以處之之道則境無不可而道外之物皆可以不必是故衡門泌水人所難安而心以為可則可矣道固無不在也魴鯉姜子人之所欲而心以為不必則果不必矣於道無加損也此則所謂素位而行不願乎外者與可以無入而不得矣君子哉東門之池可以漚麻彼美淑姬可與晤歌興也漚漸漬也鄭康成曰於池中柔麻使可緝績以作衣服興賢女能柔順君子成其德教也晤猶對也言淑姬賢女君子宜與晤對詠歌相切化也東門之池可以漚紵彼美淑姬可與晤語興也紵麻屬答述曰語晤語者迭為問對相辨論也東門之池可以漚菅彼美淑姬可與晤言興也菅草名可以為索自述曰言晤言者各陳已意互証明也東門之池三章章四句東門之池思賢妃也人君之德以養而成非一日之積也陳之為國舊矣太姬之初已有巫風繼世之君必有恒舞於宫酣歌於室者以為非此無可與娯也諍臣直言謂宜不邇聲色則格而不入矣詩人思有以易之以為誠得賢媛相晤與歌與言如池水之漚麻漸漬而不覺久而化焉則自知巫覡之紛若不如淑姬之幽閒庶幾以琴瑟之靜好易羽翿之婆娑矣然而豈易得哉此關雎之君子所由寤寐思淑女也東門之楊其葉牂牂昏以為期明星煌煌賦也牂牂盛貌煌煌大明也此與人有約而不信也東門之楊所約之地也昏以為期所約之時也如期俟之至於明星已出而不來是失信而爽約也東門之楊其葉肺肺昏以為期明星晢晢賦也肺肺密貌晢晢小明也將曉則星光微矣東門之楊二章章四句東門之楊刺無信也人之生也信義為大以義相約加之以信久要不忘所以為成人也世之衰也人棄信而忍於作偽離騷云曰黄昏以為期兮羗中道而改路亦猶是矣人情反覆可勝歎哉故君子之與人約也必審其所約之事必擇其與約之人思其終也思其復也思其反也誠愼之也墓門有棘斧以斯之夫也不良國人知之知而不已誰昔然矣比也棘惡木斯析也夫謂陳佗也已去也誰昔猶疇昔也陳佗欲俟桓公之卒而作亂是墓門之棘也墓門有棘則宜斧以斯之乃佗之陰謀國人皆知而卒不能去盖自疇昔已然非一日之積矣追咎桓公也墓門有梅有鴞萃止夫也不良歌以訊之訊予不顧顚倒思予比也梅美木鴞惡鳥訊告也蘇轍曰墓門有梅而鴞集之梅雖美將得全乎以比桓公雖有太子免以為後而佗在焉欲其無危不可得也歌以訊之告桓公也告之而不顧至於顛倒而後思予則已晚矣其後佗果殺免也則詩人之先見為不可及矣墓門二章章六句詩序曰墓門刺陳佗也左傳隱公七年陳五父如鄭涖盟㰱如忘洩伯曰五父必不免不頼盟矣是佗之不良國人知之鄰國亦知之而陳侯不知不明也知而不已不斷也不明不斷何以定亂是故歌以訊之望其明也斧以斯之望其斷也防有鵲巢卭有㫖苕誰侜予美心焉忉忉比也防堤也卭丘也㫖美也苕草名好生下隰侜誑也忉忉憂也鵲巢於大樹防以止水安有鵲巢苕生於下濕卭乃高丘焉有旨苕今皆謂有之以比讒人駕為無實之詞以欺人所謂侜也誰如此以侜予心之所美使我忉忉憂之也中唐有甓卭有旨鷊誰侜予美心焉惕惕比也唐廟中路名甓瓴甋也俗謂之磚鷊小草雜色如綬惕惕懼也上章言以無為有此言似乎有之而實羅織其事也歐陽修曰中唐有甓非一甓也以積累而成路㫖鷊綬草雜衆色以成文猶多言交織以成惑是也其侜更巧故憂之甚而至於懼也防有鵲巢二章章四句詩序曰防有鵲巢憂讒賊也夫讒賊亦多術矣防巢卭苕本無其事而妄謂有之所謂譸張為幻也唐甓卭鷊集衆小事而遂張大之所謂萋菲成錦也家國之際讒言一興變故百出誠可畏也書曰無稽之言勿聽謂人之多言茍非確有証據概斷之以勿聽則讒賊止矣月出皎兮佼人僚兮舒窈糾兮勞心悄兮賦也皎眀也佼羙也佼人謂夏姬也僚好貌舒夏徴舒也古人二名間有截用一字者如晉重耳𫝊謂之重樂王鮒𫝊謂之鮒仲孫何忌經謂之忌是也陳靈公與孔寕儀行父淫於夏氏夏姬之子徴舒恥之故弑靈公此詩言當月出之時靈公悦夏姬之佼好而其子徴舒幽窈糾結勢必為亂故中心憂勞又悄然而不敢言也月出皓兮佼人懰兮舒懮受兮勞心慅兮賦也皓月光白也懰羙而清也懮受憂思而忍受也慅煩亂也悄然不言而中心煩亂不知所為也月出照兮佼人燎兮舒夭紹兮勞心慘兮賦也照月光照人面也燎人面亦有光也夭矯變紹糾𦂳慘哀痛也言其憂思而忍受者今夭變而糾𦂳則禍發甚速故煩亂者至於哀痛知靈公之必不免也月出三章章四句月出憂靈公也淫之為禍烈矣淫人之女如其父何淫人之妻如其夫何淫人之母如其子何當其月皎人僚色授魂予之時而環伺而欲刄之者已不可勝計矣聖人錄月出使淫亂之人知懽愛愈甚則禍機愈烈庶幾有畏而中止非徒播靈公之惡於衆也胡為乎株林從夏南匪適株林從夏南賦也株林夏氏之邑也夏南徴舒之字也朱子曰靈公淫於夏氏朝夕而往其民相與語曰君胡為乎株林乎曰從夏南耳然則非適株林也特以從夏南故耳盖淫乎夏姬不可言也故以從其子言之詩人之忠厚如此駕我乘馬說于株野乘我乘駒朝食于株賦也說舍也馬六尺以下曰駒說于株野者暮來而不返也朝食于株者未暮而即來也駕馬乘駒往來不息朝朝暮暮流連不已何為也哉則不必問而可知矣株林二章章四句詩序曰株林刺靈公也朱善曰衛之亂至牆茨而極於是有狄入衛之禍陳之亂至株林而極於是有楚入陳之禍然則狄非能入衛也宣姜實召之也楚非能入陳也夏姬實召之也此所謂女戎也比事以觀可以為淫亂者之戒矣彼澤之陂有蒲與荷有美一人傷如之何寤寐無為涕泗滂沱興也陂澤障也荷芙蕖之葉也美人賢人也澤陂之草兼有蒲荷以興國中之美止有一人也夫有美一人可謂少矣又棄而不用則其傷心當如何哉無可如何故寤寐無為但見其涕泗滂沱而已此如賈誼之痛哭流涕實有所不容已也彼澤之陂有蒲與蕳有美一人碩大且卷寤寐無為中心悁悁興也蕳蘭也碩大壯盛也卷眷戀之意言忠君也碩大而且忠君授之以事宜無不肯為者乃寤寐無為但見其中心悁悁而已悁悁猶拳拳也彼澤之陂有蒲䓿菑有美一人碩犬且儼寤寐無為輾轉伏枕興也䓿蓞芙蕖之花也儼矜莊之意言敬事也碩大而且敬事授之以事宜無不能為者乃寤寐無為但見其輾轉伏枕而已涕泗滂沱急欲為也悁悁不忘為也伏枕則無志於為矣傷之至也澤陂三章章六句澤陂傷時也靈公淫荒泄冶諫而殺之諫臣被殺則忠臣束手傷心涕泣而末如之何故寤寐無為也夫天下之事天下之人為之也或有事而無為之之人或有人而不得為其事如此詩之美人碩大卷儼才足有為且急欲為事至於流涕而事卒不可為乃至無為而伏枕所謂雖有善者亦無如之何也故變風終於陳靈天下之亂至此而極矣陳風十篇二十六章一百一十四句檜風一之十三檜國名在豫州外方滎波之間周武王封祝融之後於此鄭武公滅之而遷國焉羔裘逍遥狐裘以朝豈不爾思勞心忉忉賦也逍遥閒適也此君子去國而思其君也言羔裘以燕居狐裘以視朝衣服容止宛然在目豈能不爾思乎所以决於去者以朝無善政故我心忉忉而不能安也毛傳曰國無政令使我心勞是也羔裘翺翔狐裘在堂豈不爾思我心憂傷賦也翺翔遊行也堂路寢也人君日出視朝退適路寢以聽大夫所治之政在堂者但在而已無所設施故我心憂傷也羔裘如膏日出有曜豈不爾思中心是悼賦也如膏潤澤而明也有曜照之有光也但華其衣服而不勤於政治故君之服愈美而我之心愈悼也羔裘三章章四句詩序曰羔裘大夫以道去其君也夫華其衣服逍遥翺翔皆細故也而君子去之者以道揆之也好華麗則日即於奢喜燕居則日習於怠奢者敝政之首而怠者積惡之原君子覩微而知著故決然去之也去之而猶思之不忘君之恩也思之而以去之故告之猶冀君之悟也故曰以道去其君也庶見素冠兮棘人欒欒兮勞心慱慱兮賦也庶幸也縞冠素紕旣祥之冠也棘瘠也季本曰棘葉少而枝瘦故謂居喪骨立者為棘人也欒變毁瘠之貌輔廣曰素冠欒欒情與服稱也慱慱憂勞之貌世衰禮廢不行三年之喪故祥以後之衣冠不復見矣賢者遭喪欲復古禮而獨行無助思得一素冠欒欒之棘人與為同志而不可見故勞心慱慱也庶見素衣兮我心傷悲兮聊與子同歸兮賦也素冠則素衣矣思而不見故傷悲也欲與同歸愛慕之詞也庶見素韠兮我心藴結兮聊與子如一兮賦也韠䕶膝朱子曰韠從裳色素衣素裳則素韠矣藴結思之不觧也與子如一甚於同歸矣素冠三章章三句詩序曰素冠刺不能三年也夫三年之喪天下之通喪也賢者俯而就不肖者跂而及檜國之俗不行此禮久矣舉國不行而莫以為非一人行之而反以為怪賢者思一同志之人而不得故憂之也勞心博𫝊非虚語也凡人之心根性而動父母之愛天性也性之所動心不容已故未見而傷悲藴結其心實有所不安也旣見而同歸如一以為必如是而心乃盡也先王制禮亦因是心而已豈强民而為之哉隰有萇楚猗儺其枝夭之沃沃樂子之無知賦也萇楚羊桃也猗儺柔美也夭少好貌沃沃光澤貌子指萇楚也朱子曰政煩賦重人不堪其苦歎其不如草木之無知而無憂也隰有萇楚猗儺其華夭之沃沃樂子之無家賦也樂無家者苦有家之累也隰有萇楚猗儺其實夭之沃沃樂子之無室賦也一門之内曰家夫婦所居為室樂無室者併不能養其妻也隰有萇楚三章章四句隰有萇楚民不樂生也夫人懷五常之性為萬物之靈誰甘於㝠然無知者且有心知則必有情欲聞以未有室家為苦矣未聞以無室家為樂也萇楚之民樂無室家困之至矣言其樂深於訴其悲也其所以致此者豈無故哉故君子聞安樂之音思仁政之所以造福聽哀苦之言思虐政之所以斂怨則為法為戒之心油然而興矣匪風發兮匪車偈兮顧瞻周道中心怛兮賦也發揚起貌偈疾驅貌鄭康成曰周道周之政令也怛驚動也朱子曰言常時風發而車偈則中心怛然今非風發也非車偈也特顧瞻周道思念王室故中心為之怛然耳匪風飄兮匪車嘌兮顧瞻周道中心弔兮賦也飄回旋也嘌漂摇不安之貌弔悲悼也有傷今思古之意矣誰能亨魚漑之釡鬵誰將西歸懷之好音興也亨烹同漑滌也鬵釡屬西歸歸於西周也朱子曰誰能亨魚乎有則我願為之漑其釡鬵誰將西歸乎有則我願慰之以好音以見思之之甚但有西歸之人即思有以厚之也匪風三章章四句匪風思西周也鄭桓公寄孥於虢檜之間武公繼桓公為平王司徒乃得虢檜之地而徙封焉是東遷之初虢檜猶在也檜之君子覩平王之政令非復文武之舊是以中心怛弔而思西歸也夫其思西歸者非直為河山之固也盖為惠鮮懷保西周之所以撫其民者東周不復見矣禮樂征伐西周之所以經其世者東周不復存矣故慨然興懷欲以文武之道治之也已不能歸而思能歸之人則其所懷之好音必天下之至計而惜乎當日未有聞之者也檜風四篇十二章四十五句御纂詩義折中卷八
