body:
  text: 王風一之六王風周東都之風也周公營洛邑為朝會諸侯之所平王東遷遂都焉其詩皆民間勞人思婦之作不可為雅止及境內不能被於天下不可名周故繫之王尊之也猶春秋之書王人也左傳襄公二十九年吳季札來觀樂邶鄘衛後為之歌王然則王風之名以及風詩之次第其來久矣彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉賦而興也黍穀名似蘆離離垂貌稷亦穀也似黍而小靡靡猶遲遲搖搖心動也周室東遷以鎬京與秦大夫行役至於宗周見沃野千里皆為秦有故言彼黍彼稷外之也心憂故國行靡靡而心搖搖此惟留心世道之人乃能知之若泛泛者則不知矣無可告語故呼天而訴之也朱子曰既嘆時人莫識己意又傷所以致此者果何人哉追怨之深也彼黍離離彼稷之穗行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉賦而興也稷穗下垂有如人之心醉朱道行曰如醉者搖搖之感深而沉冥也彼黍離離彼稷之實行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉賦而興也稷實堅結有如人之心噎朱道行曰如噎者搖搖之感鬱而凝滯也黍離三章章十句詩序曰黍離閔宗周也夫宗周者是文武所經營也是成康以來所世守也宫廟陵寢皆在焉土田上上山川險塞是天下之奧區也犬戎作難釁起一時秦襄力戰彼亦自復其仇耳為平王者留晉文侯鄭武公夾輔周室使襄公逐西戎而居之則周可復興與宣王爭烈矣乃懼其侵暴而即安於東舉西京而畀之秦異日者秦之代周實始於此大夫行役興懷於彼黍彼稷者傷周之物産而為秦之粢盛也周之民人而供秦之賦役也呼蒼天而問何人蓋嘆平王君臣以國與人不知誰實倡為此謀也不然赫赫宗周褒姒滅之舉世皆知而又問何人哉君子于役不知其期曷至哉雞棲于塒日之夕矣羊牛下來君子于役如之何勿思賦也君子婦人稱其夫也鑿墻而棲曰塒此農民行役而其妻思之也言君子于役不知返還之期則何日而可至哉雞棲于塒雞至也羊牛下來羊牛至也畜産皆至而君子不來如之何而能不思哉君子于役不日不月曷其有佸雞棲于桀日之夕矣羊牛下括君子于役苟無飢渴賦也佸會也桀杙也塒藏而桀露故先至者棲塒後至者棲桀也括至也苟無飢渴不敢望其來至而但望其生全也朱子曰君子行役之久不可計以日月而又不知其何時可以來會亦庶幾其免於飢渴而已矣此憂之深而思之切也君子于役二章章六句詩序曰君子于役刺平王也古之行役未有無定期者雨雪霏霏遣戍役而預言歸期也卉木萋萋勞還率而詳言歸期也今至於不知其期則是政令無節而不體民之心也公劉之詩曰乃積乃倉乃裹餱糧于槖于囊未有用其身命而不豐其衣食者今至於求免飢渴則是糗糧有缺而不恤民之身也民者國之本也平王東遷國家再造而虐用其民如此失本計矣君子陽陽左執簧右招我由房其樂只且賦也陽陽自得之貌簧笙也由從也房奏樂之所孔頴達曰房中之樂作於小寢天子以周南諸侯以召南言君子為伶官而志氣陽陽常若自得左手執簧右手招我使由房以為此中甚樂也我為所招者自謂也蓋其友感君子之相招而賦此也君子陶陶左執翿右招我由敖其樂只且賦也陶陶喜悅之狀翿舞羽也敖舞位也由房教以樂聲由敖教以舞容也君子陽陽二章章四句詩序曰君子陽陽閔周也君子隱於伶官相招為祿仕全身逺害而已簡兮之伶官以執籥見嘲尚思用世也故以賤為悲也由房之伶官以執簧相招止求全生也故以賤為樂也此可以觀世變焉然值危亂之時而陽陽陶陶近於玩世而不恭矣再言其樂只且贊之乎抑諷之也謂其性情不厚而果於忘世也諒其心而又欲進其德可謂益友矣揚之水不流束薪彼其之子不與我戍申懷哉懷哉曷月豫還歸哉興也以手激水曰揚戍屯守也申薑姓之國平王之母家也申侯弒幽王平王不討而反命諸侯戍之事不順則令不行故獨周人戍焉而諸侯不與也歐陽修曰激揚之水不能流束薪猶平王政衰不能令諸侯也彼其之子周民謂他國之當戍者也蘇軾曰不與戍申怨諸侯不至也曷月旋歸久戍而不得代也揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月豫還歸哉興也楚荆條也束楚輕於束薪矣而亦不流水弱之甚也甫吕也亦薑姓蓋當時以申故而並戍之揚之水不流束蒲彼其之子不與我戍許懷哉懷哉曷月豫還歸哉興也蒲草也束蒲更輕於束楚矣許亦薑姓之國周語曰申呂雖衰齊許猶在是也揚之水三章章六句詩序曰揚之水刺平王也朱子曰申侯與犬戎攻宗周而弒幽王此王法必誅不赦之賊而平王不共戴天之仇也今平王知有母而不知有父知其立已為有德而不知弒父為可怨至使復仇討賊之師反為報施酬恩之舉則其忘親逆理而得罪於天已甚矣又王室有故則方伯連帥以諸侯之師救之天子鄉遂之民供貢賦衛王室而已今乃勞天子之民逺為諸侯戍守故周人以非其職而怨思焉則其衰懦微弱而得罪於民又可見矣中谷有蓷暵其乾矣有女仳離慨其嘆矣慨其嘆矣遇人之艱難矣興也蓷益母草也暵燥也乾高地也仳别也慨嘆聲言天時亢旱物産凋殘故中谷有蓷在乾地者先暵矣凶年飢饉室家不保故有女仳離初見棄而慨嘆矣其慨而嘆也以為是遇人之艱難也諒之而不怨也中谷有蓷暵其修矣有女仳離條其嘯矣條其嘯矣遇人之不淑矣興也修平地也條長也嘯與嘯同淑善也旱之久在平地者亦暵矣棄之久則慨嘆者條嘯矣其條而嘯也以為是遇人之不善也怨之而不怒也中谷有蓷暵其濕矣有女仳離啜其泣矣啜其泣矣何嗟及矣興也濕窪地也啜泣貌旱之極在濕地者亦暵矣窮之極則條嘯者啜泣矣其啜而泣也以為事已至此末如之何雖嗟亦無及矣蓋不怨人而自悲且自勸其勿過悲也性情之溫厚如此而猶不免於見棄此則國家之大𫝑有所以致之而非一人之故矣詩人是以敘其事而深悲之也中谷有蓷三章章六句詩序曰中谷有蓷閔周也范處義曰世治則室家相保者上之所養也世亂則室家相棄者上之所殘也其使之也勤其取之也厚則夫婦日以衰薄而凶年不免於離散矣伊尹曰匹夫匹婦不獲自盡民主罔與成厥功故讀詩者於一物失所而知王政之惡一女見棄而知人民之困周之政衰民散而無以為國於此亦可見矣有兔爰爰雉離于羅我生之初尚無為我生之後逢此百罹尚寐無吪比也兔性隂狡爰爰自得之貌雉性耿介離麗羅網罹罪吪動也朱子曰兔爰爰而雉離羅以比小人致亂而以巧計幸免君子無辜而以忠直受禍是也無為不生事也小人得志則必生事生事則必立法立法而人不從則犯從之而不習則又犯故有一為必有一罹所為日多故逢此百罹也當此之時君子雖憂之而不敢動動則入於罹矣惟望寐而無吪庶可免於禍也有兔爰爰雉離于罦我生之初尚無造我生之後逢此百憂尚寐無覺比也罦翻車也無造不造言也小人生事則必造言所造之言非簧鼓以惑君志即萋菲以陷正人故有一造即為一憂所造日多故逢此百憂也寐可不吪覺則必吪故願無覺則永不吪矣有兔爰爰雉離于罿我生之初尚無庸我生之後逢此百凶尚寐無聰比也罿車羅也庸功聰聞也小人造言生事則必邀功以聚財而得功必有病於民以用兵而得功必有害於國故有一庸即為一凶邀功者衆故逢此百凶也寐而有聞則易覺故願無聰人呼之而亦不聞則永無覺矣此無聊之極思也兔爰三章章七句詩序曰兔爰閔周也天下之禍莫大乎君子退而小人進故曰小人之使為國家災害並至為之造之庸之小人為國也百罹百憂百凶災害並至也斯時之君子前者離於羅後者寐無聰所謂雖有善者亦無如之何也此不治之症惟明君可以醫之夫君之明者亦非有竒術也但熟察其爰爰之狀則可以知其為兔矣但細核其為造之庸則可以知其為凶矣知之既真出雉於羅而置兔於罦反覆手之間耳故君德以明為大一明而邪正分則君子進而小人退天下永無事矣綿綿葛藟在河之滸終逺兄弟謂他人父謂他人父亦莫我顧興也綿綿聮屬之貌岸上曰滸人之生也父母猶本也兄弟猶枝也葛藟以枝蔓聮屬庇其本根故雖在河滸而終不漂流物猶如此人乃不然遠其一本之兄弟而謂他人為父夫他人非天屬也雖謂之父豈我顧乎是疏者終不可以為親也綿綿葛藟在河之涘終遠兄弟謂他人母謂他人母亦莫我有興也水涯曰涘更險於滸矣朱子曰謂他人父者其妻則母也有心識之也春秋傳曰不有寡君綿綿葛藟在河之漘終遠兄弟謂他人昆謂他人昆亦莫我聞興也岸為水齧曰漘更險於涘矣而葛藟終在者以根枝盤結故也昆兄也遠其兄弟而謂他人為昆故雖謂之而不聞蓋異姓非一本也我薄於一本之兄弟而欲異姓之兄弟厚我此必無之事也葛藟三章章六句葛藟刺不睦也天性之親父母而下則惟兄弟其相親也天也非人之所能為也小雅曰常棣之華鄂不韡韡凡今之人莫如兄弟言他人不如兄弟也脊令在原兄弟急難每有良朋况也永歎言兄弟勝於他人也兄弟鬩于牆外禦其務言雖不令之兄弟猶勝於他人也每有良朋蒸也無戎言雖至好之他人終不如兄弟也今乃遠其兄弟而以他人為兄弟甚而他人之父亦父之他人之母亦母之人皆一本已獨二本是已不可為人又况終不見收乎窮而無所復入乃始悔之則已晚矣天下之遠兄弟而親他人者讀葛藟之詩其亦可以自反也夫彼采葛兮一日不見如三月兮比也葛蔓而善附似小人之黨援也彼采葛者喻讒人引用羣小結為朋黨以陷正人為正人者一日不見於君則乘間而讒之者衆矣故憂懼交集雖一日之暫有如三月之久也彼采蕭兮一日不見如三秋兮比也蕭蒿也氣味苦寒喻小人之陰險也陰險之人其為讒也隱而酷故憂懼之甚一日不見不止如三月直如三秋矣彼采艾兮一日不見如三歲兮比也艾似香而非香喻小人之柔姦也柔姦之人其為讒也深而巧故憂懼之極一日不見不止如三秋直如三歲矣張彩曰楚辭云何昔日之芳草兮今直為此蕭艾也意蓋本此采葛三章章三句詩序曰采葛懼讒也夫小人與君子不兩立者也其欲去君子之心無日忘之也其投間伺隙而欲中傷之亦無日忘之也無間可乘斯俟之耳俟之而得間未有不亟乘者也昔上官桀之讒霍光也伺光出沐日奏之恭顯之讒蕭望之也亦伺其出沐日奏之然則一日不見而讒殄作信有徵矣詩人之懼之也有以夫大車檻檻毳衣如菼豈不爾思畏子不敢賦也大車大夫之車也檻檻行聲毳衣天子大夫之服菼蘆也毳衣五采其青采如菼爾淫奔者相命之辭也子謂大夫也朱子曰周衰大夫猶有能以刑政治其私邑者故淫奔者畏而歌之如此然其去二南之化則遠矣大車啍啍毳衣如璊豈不爾思畏子不奔賦也啍啍遲重之貌璊赤玉也毳衣之赤采如璊穀則異室死則同穴謂豫不信有如皎日賦也穀生穴壙皎白也畏子不奔故生不得以同室然心未嘗忘奔也庶幾死得同穴而已有如皎日誓詞也朱公遷曰此所謂民免而無恥者大車三章章四句詩序曰大車刺周大夫也明其政刑使民畏之此亦能吏宜美而反刺之者為無其本也蓋周之衰久矣于役有飢渴之患執簧興招隱之思中谷不保其夫婦葛藟逺棄其宗族民不堪命所宜撫綏苟有志於中興自當大布之衣大帛之冠訓農課桑敬教勸學使民樂其生而親其上庶可以有為也今乃高車華服峻法示威不求民愛而但欲民畏此如元氣微弱之人尚投以猛烈之劑一時亦收汗下之功而其人遂成不治之症觀周之終衰而不振則政刑之效可覩矣為治者可不審所尚哉丘中有麻彼留子嗟彼留子嗟將其來施施賦也麻穀名皮可績為布子嗟賢人之字也施施從容自得之貌賢人隱於丘中藝麻麥果實以自給其友之在位者勸其出而仕也子嗟藝麻有若麻留子嗟焉夫麻留子嗟不過安貧自守不若來共天位可以從容展布也丘中有麥彼留子國彼留子國將其來食賦也子國亦賢人之字也子國種麥有若麥留子國焉夫麥留子國不過自食其力不若來食天祿可以無煩力作也丘中有李彼留之子彼留之子貽我佩玖賦而比也之子通指前二人也佩玖喻所行之道也言二人留於李下招之而不來夫君子不榮其身不可不行其道雖不貪位謀食亦當貽我以學之所得不可自高其節而懷寶迷邦也蓋所以勸之仕者其義益大矣丘中有麻三章章四句詩序曰丘中有麻思賢也致治之本在於得人不誠心以求賢而徒區區於政刑君子以為末也朘民之膏以富國國富而民生貧竭民之力以強兵兵強而民氣弱刑民之肌膚以立政政立而民命殘未有民受其損而國受其益者也惟用賢人以教養之經其俯仰之資申以孝悌之義行之以誠心要之以久道於是乎不增賦而國富不尚力而兵強不為苛細嚴猛之令而政立故民者邦之本也賢者民之天也敘丘麻於王風之末者聖人之所以為東周也王風十篇二十八章一百六十二句鄭風一之七鄭邑名在西都畿內宣王以封其弟友後為幽王司徒而死於犬戎之難其子掘突定平王於東都又得虢鄶之地乃徙居之而施舊號於新邑即今之鄭州是也緇衣之宜兮敝豫又改為兮適子之館兮還豫授子之粲兮賦也緇黑色宜稱也粲米也緇衣賢人之服也衣與身宜新作者也新衣至敝時已久矣敝又改為無厭心也適子之館就見之也還而授粲廪人繼粟也其禮之也隆其養之也備此王公之尊賢者也緇衣之好兮敝豫又改造兮適子之館兮還豫授子之粲兮賦也好鮮明也人志行高潔則覺其衣鮮明也所改為者又敝矣而又改造焉適館授粲重言之者見其久而不倦也緇衣之席兮敝豫又改作兮適子之館兮還豫授子之粲兮賦也席寬大也人德性安舒則覺其衣寬大也所改造者又敝矣而又改作焉適館授粲又言之者見其始終如一也緇衣三章章四句緇衣好賢也傳曰鄭武公養賢而賦緇衣是也天下之養賢者有矣而患其不能久也夫賢者之與人處非徒資其衣食而已將必有責難之事將必有匡正之言為其事而不便聞其言而不入則厭之矣故始厚者每至於終薄此不承權輿所以致慨也今武公之養賢衣欲其常新粟欲其常繼館欲其常適此必有遵其教而不以為苦味其言而彌覺其旨者是以久而不厭如此也儀之一也由於其心之結也故曰於緇衣見好賢之至將仲子兮無踰我里無折我樹把豈敢愛之畏我父母仲可懷也父母之言亦可畏也比也將請也仲子祭仲也里所居也二十五家為里把栁屬祭仲勸莊公使除叔段而公不從其不從也非愛假也有所畏也詩人知其情焉故為女拒男之辭以比之無踰我里比無預我家事也無折樹把比無害我兄弟也父母謂武薑也言非愛段而不懷祭仲乃畏薑氏而不敢輕動也將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也比也牆垣也古者牆下多樹桑五畝之宅樹之以桑是也諸兄謂諸大夫也將仲子兮無踰我園無折我樹檀豈敢愛之畏人之多言仲可懷也人之多言亦可畏也比也園圃也古者園內多樹檀樂彼之園爰有樹檀是也人謂國人也將仲子三章章八句詩序曰將仲子刺莊公也莊公即位武薑為假請京使居之祭仲曰都城過百雉國之害也君將不堪不如早為之所無使滋蔓蔓難圖也公曰多行不義必自斃子姑待之則是莊公非愛叔段而不除亦非不懷祭仲之隂謀但以內畏薑氏之迫外畏諸大夫之異同且畏國人之謗議是以隱忍而姑待之其中心之委折詩人如繪之矣天性薄而世故深君子惡之叔于田巷無居人豈無居人不如叔也洵美且仁賦也叔莊公之弟共叔段也田取禽也巷里塗也洵信美好仁愛人也朱子曰假不義而得衆國人愛之故作此詩言叔出田獵則所居之巷若無居人非實無居人也雖有而不如叔之美且仁是以若無人耳孔頴達曰言其仁者國人悅之之詞非實仁也叔于狩巷無飲酒豈無飲酒不如叔也洵美且好賦也冬獵曰狩飲酒燕會也鄒泉曰飲酒而好指其獻酬歡洽而言也叔適野巷無服馬豈無服馬不如叔也洵美且武賦也適之也郊外曰野服乘也鄒泉曰服馬而武指其控御馳騁而言也叔于田三章章五句詩序曰叔于田刺莊公也武薑愛叔假欲立之叔處危疑之地宜何如操心慮患而乃施與以市恩燕樂以明惠馳騁以示勇宜其不能終也抑莊公亦有過焉朱善曰仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣使莊公於叔假果能寵之以高位與之以大邑又使吏治其私邑無令施恩而得衆且使城郭不得以擅完車乘不得以擅修卒徒不得以擅動則雖欲為亂其誰與之今莊公不然始則恣其所為而不問終則操之已蹙而不恕則是其豫之者乃所以奪之其寵之者乃所以殘之也春秋書曰鄭伯克假于鄢傳曰假不弟故不言弟如二君故曰克稱鄭伯譏失教也得此詩之意矣叔于田乘乘馬執轡如組兩驂如舞叔在藪火烈具舉袒裼暴虎獻于公所將叔無狃戒其傷女賦也一車四馬曰乘衡外兩馬曰驂藪草澤火焚烈熾也袒裼去裼衣而袒其臂也空手搏獸曰暴狃習也叔假從莊公于田肉袒搏虎而獻于公蓋自誇其勇也國人愛而惜之故戒之曰請叔無習為此恐其或傷汝也張彩曰暴虎危矣以此而驕其兄則更危也叔于田乘乘黃兩服上襄兩驂鴈行叔在藪火烈具揚叔善射忌又良御忌抑磬控忌抑縱送忌賦也乘黃四馬皆黃也夾轅兩馬曰服上襄高騰之貌忌抑皆語詞磬折控止制馬使不行也縱放送催騁馬使速行也極言叔之材武恐其以誇材武而致傷也叔于田乘乘鴇兩服齊首兩驂如手叔在藪火烈具阜叔馬慢忌叔發罕忌抑釋掤忌抑鬯弓忌賦也鴇驄馬也阜火燼也慢遲罕稀掤箭筒釋解也鬯弓袋也收馬止射解矢韜弓也極言叔之整暇恐其以示整暇而致傷也材武之忌小整暇之忌大凡叔之所狃者皆足以致傷叔不知而國人知之也大叔于田三章章十句詩序曰大叔于田刺莊公也夫以叔之勇力超絶射御精良氣度間雅此實出衆之材觀其暴虎而獻于公亦有媚君之意非生而欲叛者也莊公忌之而不制之縱之使至於叛則不仁甚矣清人在彭駟介旁旁二矛重英河上乎翺翔賦也清人清邑之人也彭地名駟介四馬被甲也旁旁馳驅之貌二矛酋矛夷矛也英朱羽矛飾也二矛並建其英疊見故曰重英翺翔遊行也左傳曰鄭人惡高克使帥師次于河上久而弗召師潰而歸高克奔陳鄭人為之賦清人重英初次河上也翺翔次而無事也清人在消駟介麃麃二矛重喬河上乎逍遙賦也消亦地名麃麃武貌矛之上勾曰喬所以懸英也英敝而盡所存者喬而已重喬久次也逍遙無事之至也清人在軸駟介陶陶左旋右抽中軍作好賦也軸亦地名陶陶自得之貌左後軍右前軍也旋回抽拔也自彭而消自消而軸時更久矣止馳駟介不建二矛無鬭志矣翺翔逍遙之態忽而變焉左軍旋車而欲返右軍抽隊以潛遁中軍高克所自將作為好言以鎮撫之而亦不能固其志也有潰而已於是乎左右之將返國而中軍之將出奔矣惡一人而棄三軍謀之不臧未有甚於斯也清人三章章四句詩序曰清人刺文公也胡安國曰人君擅一國之名寵生殺豫奪惟其所制使高克不臣之罪已著案而誅之可也情狀未明黜而退之可也愛惜其才以禮馭之可也烏可假以兵權委諸境上坐視其離散而不之恤乎春秋書曰鄭棄其師其責之深矣羔裘如濡洵直且侯彼其之子舍命不渝賦也羔裘大夫之服也如濡潤澤也洵信直順侯美舍處渝變也言羔裘潤澤而毛順且美今之服此裘者能順其命而安處不變亦如裘之直且侯也命有二有義理之命有氣數之命舍而不渝者當其處常則安於所受之理而不渝其志及其處變則安於所定之數而不渝所守也羔裘豹飾孔武有力彼其之子邦之司直賦也飾緣袖也司主也言豹之為獸甚武而有力今之服豹飾者強毅不屈能主一國之直道亦如豹之武有力也直而云司者以直為其職也人之賢否必直言之不使用舍有未當以激揚為己任也事之是非必直行之不使措置有失宜以匡正為己責也羔裘晏兮三英粲兮彼其之子邦之彥兮賦也晏鮮明也英裘縫也以素組英裘之縫左右兩組中壓一組故曰三英裘黑而英白故粲也彥美士也言裘之三英粲然光明今之服是裘者能主邦之直道故為邦之美士如三英之粲然可觀也必司直而後為邦之彥者直道而言乃上有禆於君德能為邦家之光也直道而行乃下有益於民生能造邦家之福也羔裘三章章四句羔裘美大夫也天下之大夫多矣而不能為邦之彥者以其不直也人生本直而至於不直者以其渝也謂直道而行恐其得禍故渝而不直以求福也而不知禍福皆命也直而禍不直而福命也直而不禍不直而不福亦命也君子知命之宜安也故居易以俟之不渝其直而未嘗不得福是內外兩得之也小人不知天命而不安也故行險以僥幸徒渝其直而未嘗不得禍是內外兩失之也是故舍命而後能司直常伸之氣節從淡定出也司直而後為邦彥蓋世之勳名由節義生也遵大路兮摻執子之袪兮無我惡兮不寁故也賦也遵循摻攬袪袖寁遽絶也故舊也君子去國國人留之循大路而執其袪曰子無我惡而不留故舊不可以遽絶也嚴粲曰言故舊以先君之義諷之也遵大路兮摻執子之手兮無我魗兮不寁好也賦也魗與醜同范處義曰既摻其袪又執其手以期君子之必留既陳故舊之情又陳昔日之好以期君子之必聽非愛君憂國安能如是哉遵大路二章章四句詩序曰遵大路思君子也莊公失道君子去之國人思望焉蓋緇衣之養賢久矣莊公不承權輿君子原有可去之道而國人之留之者以為君子亦有可留之道也醴酒不設穆生不起申公白生強之曰獨不念先王之德歟漢之後主難與有為而武侯鞠躬盡瘁曰追維先帝之殊遇欲報之於陛下也夫父祖尊賢養士亦欲以貽子孫一不合而即去所謂國士之報安在故國君於賢誠不可不愛惜保護毋令解體而君子於去就之際亦當權其輕重而審處之誼不可絶自宜仍留時茍可為自宜姑待栁下惠三黜而不去屈原雖放逐惓戀楚國繫心懷王不忘欲返君臣雖以義合亦各有性情焉當厚積其忠愛以求有濟不可執見幾之説槩以悻悻而去為高也女曰雞鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳧與鴈賦也昧旦天將明也明星啓明也弋繳射鳧水鳥也朱子曰此詩人述賢夫婦相警戒之詞也女曰雞鳴以警其夫而士曰昧旦則不止於雞鳴矣婦人又語其夫曰若是則子可以起而視夜之如何意者明星已出而爛然則當翺翔而往弋取鳧鴈而歸矣其相與警戒之言如此則不留於宴昵之私可知矣弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不靜好賦也加中也宜烹調也朱子曰射者男子之事而中饋婦人之職故婦謂其夫既得鳧鴈以歸則我當為子和其滋味之所宜以之飲酒相樂期於偕老而琴瑟之在御者亦莫不安靜而和好其樂而不淫可見矣知子之來之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之賦也來招來之也順之從其言也意氣相投也好之愛其人也性情相契也雜佩觹燧針管之類贈送問遺報答也朱子曰婦人又語其夫我茍知子之所招而來及所親愛者則當解此雜佩以送遺報答之蓋不惟治其門內之職又欲其君子親賢友善以結其歡心而無所愛於服飾之玩也女曰雞鳴三章章六句女曰雞鳴盡婦道也家之興在於警勤禮之實在於和敬德之修在於親賢雞鳴昧旦相警戒也翺翔弋鴈男勤事也與子宜之女勤職也飲酒偕老能和樂也琴瑟靜好能敬謹也雜佩問報勸親賢也凡所以相其夫者無所不備矣雖桃夭之宜家何以加兹夫以衛風之淫而有雄雉之善言德行以鄭俗之靡而有雞鳴之和樂靜好亦可知人性之善士女皆同而關雎麟趾之化不擇地而皆可行也有女同車顔如舜華將翺將翔佩玉瓊琚彼美孟薑洵美且都賦也同車親迎也婚禮壻揖婦出門御車授綏是與女同車也舜木槿也翺翔既至夫家下車而行也佩玉瓊琚禮服也孟薑即同車之女未至夫家故稱女既至故稱字婦之也都嫻雅也蓋是時鄭俗猶行親迎之禮而女子之于歸者美而且賢故詩人稱之以為顔如舜華洵為美矣而其禮儀之嫻雅則尤可敬也有女同行顔如舜英將翺將翔佩玉將將彼美孟薑德音不忘賦也婦既升車壻御三周御者代之故不同車而同行也將將玉聲即所謂德音也記云古之君子必佩玉右徵角左宫羽趨以采齊行以肆夏進則抑之退則揚之然後玉鏘鳴也佩玉將將則其有德可知矣故詩人稱之以為有此德音其壻當永懷而不忘不可徒悅其色而已也有女同車二章章六句有女同車勸好德也女有婦德亦兼婦容而夫之於婦則不可色與德並重色與德並重久則重色而忘其德矣夫忘其德則婦不修德而以色為媚上必以此荒於政下必以此荒於業非細故也同車之詩雖顔如舜華而所不忘者專在德音能輕色而重德故聖人有取焉鄭六卿餞韓宣子于郊子遊賦風雨取其既見君子也子旗賦有女同車取其德音不忘也子栁賦蘀兮取其倡豫要女也宣子喜曰鄭其庶乎二三君子以君命貺起賦不出鄭志皆昵燕好也二三君子數世之主也可以無懼矣然則此詩之義亦可知矣山有扶蘇隰有荷華不見子都乃見狂且興也扶蘇木名荷華芙蕖也子都禮儀􅈺習者也狂放蕩也扶蘇荷華顔色可觀故以興子都也言山尚有扶蘇隰尚有荷華而朝廷之上不見子都而見狂且則是並無華國之士也山有橋松隰有遊龍不見子充乃見狡童興也橋與喬通松大木也遊長而曲也龍紅草高丈餘子充德義充實者也狡姦詐也橋松遊龍枝幹可用故以興子充也不見子充而見狡童言並無棟梁之材也山有扶蘇二章章四句山有扶蘇國無人也國於天地必有與立而以為無人者非無人也有人而不用也以謹飭者為拘迂以蕩佚者為高曠是以狂為都也於是乎不見子都而見狂且矣以忠信者為無能以姦偽者為有用是以狡為充也於是乎不見子充而見狡童矣其始也有人而不用及乎習尚既成舉國皆為狂狡則欲用而果無人矣讀山有扶蘇之詩千古有同慨焉蘀兮蘀兮風其吹女叔兮伯兮倡豫和女比也落葉曰蘀吹隕之也叔伯同姓之稱鄭介晉楚之間楚常伐鄭而晉不能救鄭大夫欲晉之急已也故言蘀兮蘀兮風其吹女以喻楚風甚競不止吹鄭并吹晉也叔兮伯兮苟能倡大義以攘楚則鄭自從而和之不止存鄭亦所以固晉也蘀兮蘀兮風其漂女叔兮伯兮倡豫要女比也漂與飄同捲而去之甚於吹矣要成也久而不變深於和矣蘀兮二章章四句蘀兮勸晉急鄭也晉楚爭鄭無歲不勤諸侯左傳曰鄭人患晉楚之故諸大夫曰楚弱於晉晉不吾疾也晉疾楚將辟之則鄭望晉倡久矣蕭魚會後不復叛晉倡豫要女非虛言也夫救災恤患大國之職也待小國之請而後圖之惰其職矣聖人録蘀兮憫鄭而責晉也彼狡童兮不與我言兮維子之故使我不能餐兮賦也狡童喻小人也小人有謀恐君子知之故不與言既不與言則君子不得進言矣故憂小人之蔽君至於不能餐也彼狡童兮不與我食兮維子之故使我不能息兮賦也不與食不與共食祿也息寐也既不與食則君子不得預事矣故憂小人之誤國至於不能寐也狡童二章章四句狡童小人用事也小人得志必去君子其不與言而不與食𫝑所必然也君子憂之者非好與小人言且食也夫此君子是嘗與其君言者也狡童不與言則君亦不與言矣是嘗食君之食者也狡童不與食則君亦不與食矣君子在位國原可為一用狡童遂能使君德不明而賢人屏迹至於廢寢忘餐而末如何也狡童之為禍烈哉子惠思我褰裳涉溱子不我思豈無他人狂童之狂也且賦也惠愛也溱鄭水名且嘆辭晉楚爭鄭而鄭左右從無歲不被兵鄭人譏其謀之不臧也故賦此詩以為不守信義而輕於向背此如人之與人交者思則從之不思則背之是狂童之狂耳豈足以謀國哉子惠思我褰裳涉洧子不我思豈無他士狂童之狂也且賦也洧亦鄭水名士人之佳者也重言狂童之狂深嘆之也褰裳二章章五句褰裳刺無信也春秋襄公八年楚子囊伐鄭子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰詩有之俟河之清人壽幾何民急矣姑從楚以紓吾民晉師至吾又從之犧牲玉帛待於二境以待強者而庇民焉不亦可乎遂從楚九年晉伐鄭又從之盟于戲楚子伐鄭又從之十年晉又伐鄭十一年楚又伐鄭晉又伐鄭故鄭人賦褰裳以為謀國者如狂童之狂也昭公十有六年鄭六卿餞宣子于郊子太叔賦褰裳宣子曰起在此敢勤子至於他人乎言晉必急鄭不敢使鄭復從楚也子太叔拜宣子曰善哉子之言是不有是事其能終乎言不鑒前人之狂惑後人未必能有終也然則此詩之義宣子言之詳矣子之丰兮俟我乎巷兮悔豫不送兮比也丰豐美也巷門外也鄭人悔不從晉故託為婦人之詞言男子親迎車已在巷而悔已之不送也以比晉人爭鄭兵已在道而悔已之不從也子之昌兮俟我乎堂兮悔豫不將兮比也昌壯盛也堂庭內也言男子親迎人已在堂而悔已之不將也以比晉人伐鄭兵已在郊而悔已之不服也衣錦褧衣裳錦褧裳叔兮伯兮駕豫與行比也衣裳錦褧嫁服也叔伯男子之字也言嫁服已備叔伯一來則從行矣以比賦幣已具晉君一來則迎服矣裳錦褧裳衣錦褧衣叔兮伯兮駕豫與歸比也與行從之也與歸則永不叛矣丰四章二章章三句二章章四句丰思從晉也鄭成公以楚子之集矢於其目也故終身不背楚成公卒後鄭兩屬焉亳城之盟鄭二於楚蕭魚會後永服於晉悔不將送而駕與行歸非虛言也聖人録之者美反正也夫晉楚匹也地醜德齊莫能相尚然而晉奉正朔是為王臣且諸姬也楚僣王號自狄之矣是晉者王之懿親而楚則王之叛臣也順逆既判賞罰自分是故從晉則為睦親王之所賞也從楚則為黨叛王之所誅也此文武周公之法孔子不敢易焉詩録丰而春秋美蕭魚勸從晉也正所以勸尊王也故曰春秋天子之事也東門之墠茹藘在阪其室則邇其人甚遠賦也除地為町曰墠圃畦也陂者曰阪畦稜也茹藘茜草可以染絳圃者之所種也賢人不仕而隱於圃在東門之外除地為墠植茜於阪而作室其中詩人知其賢也故賦而嘆之以為室在東門雖若甚邇而其人則意致甚逺可望而不可即也東門之栗有踐家室豈不爾思子不我即賦也栗表道樹也在圃之外踐行列整齊之貌君子隱居必修內行有踐家室如灑掃庭內琴瑟靜好之類覺其整齊嚴肅也如是之人世所希有豈不常思相見無如其遁於邱園不肯來我即也所謂足迹不入城市者與漢酒泉太守馬岌求見宋纎而不得銘其崖曰丹崖百丈青壁萬尋室邇人遐實勞我心語意與此相類然則此詩之為思賢有徵矣東門之墠二章章四句東門之墠思隱士也凡絶人以為高者內不足也離世以為隱者守不固也有道之士不有其才而亦忘其遇故混迹於稼圃樵漁之中而超心於功名爵祿之外以邇為遠乃真遠也墠中之人所謂隱不違親真不絶俗者乎推之不去招之不來何行之高也夫觀其家室之有踐非果於忘世者顧世不能用而其人乃自此遠矣豈不惜哉風雨淒淒雞鳴喈喈既見君子云胡不夷比也淒淒寒涼也喈喈和暢也夷平也風雨自涼雞聲自暢以比君子居亂世不改其和平之度也如此則可轉亂以為治故國人思之以為果得見此君子則憂亂之心何為而不平乎風雨瀟瀟雞鳴膠膠既見君子云胡不瘳比也瀟瀟風雨聲雜也膠膠羣雞聲應也瘳愈也風雨相雜雞聲相應以比君子居亂世不改其應求之素也如此則可得人以共治故國人思之以為果得見此君子則憂亂之疾何為而不愈乎風雨如晦雞鳴不已既見君子云胡不喜比也如晦風雨甚也不已雞聲續也雞以將旦故鳴如晦則恐疑為不旦而止其鳴也而雞鳴不已以比君子居亂世不已其求治之心也如此則人之憂不夷而不已人之疾不瘳而不已天下永被君子之澤如之何而能不喜也風雨三章章四句詩序曰風雨思君子也天下之生久矣一治一亂天心未有不厭亂者也民心未有不思治者也患有治世之才者或隨俗而易其守或臨難而變其節則以亂易亂而亂無時已矣故思君子之不改其度也然君子不改矣或有時而立於朝或有時而隱於野既隱於野則人無由見焉故操用人之柄者必使天下之人皆得見君子既得見之夫而後喜可知也青青子襟悠悠我心縱我不往子寧不嗣音賦也襟領也毛傳曰青襟學子之所服是也嗣續音問也學校廢壞師儒不安其職而去閔其弟子之失學而賦此也言青青子襟猶如在目悠悠我心靡日不思縱我不往視子子寧可不時通音問乎青青子佩悠悠我思縱我不往子寧不來賦也佩綬也毛傳曰士佩青組綬是也言禮聞來學不聞往教縱我不往而教子子寧可不來而求教乎挑兮達兮在城闕兮一日不見如三月兮賦也挑輕浮也達放曠也城闕城上之闕登高眺望之所也士離師而失學習為輕薄而荒於嬉遊此人才風俗之所關故中心憂之一日不見有如三月之久也子襟三章章四句詩序曰子襟刺學校廢也鄭人遊於鄉校以論執政然明謂子産曰毁鄉校何如子産曰何為夫人朝夕遊焉以議執政之是否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之仲尼聞是語也曰以是觀之人謂子産不仁吾不信也道之不明久矣鄭之執政前乎子産後乎子産者皆未必仁也則學校之廢有由然矣夫鄭非無事之國也需才豈不孔亟乃日搶攘於干戈會盟之間而以學校為緩圖至使師儒退而獨處士子散而嬉遊天地之生才有數壞之於平日而欲用之於一旦將安從得之一日不見而如三月豈直師弟朋友之相思哉以為學校不可一日而不興人材不可一日而不育教化不可一日而不明也揚之水不流束楚終鮮兄弟惟豫與女無信人之言人實迋女興也激揚之水不可流束楚以興他人之言不可間兄弟也迋與誑同言兄弟一本之親也不幸鮮少惟豫與汝猶一人也慎不可以人言間之夫人之間之者必謂彼之親汝勝於兄弟此必無之理非愛汝實誑汝也揚之水不流束薪終鮮兄弟惟豫二人無信人之言人實不信興也惟豫二人痛詞也止有二人若不相親則一身之外更無人矣人實不信謂迋汝之言彼原不信汝不可遽信也姚舜牧曰迋是一時之妄言不信是其平素之不誠推極於平素甚言其不可信也揚之水二章章六句揚之水勸睦也夫人之兄弟未有生而不睦者也當其少也食則同案坐則同席不能不相親也及其長也各妻其妻各子其子不能不漸疏也嗜好日多淫朋誘引兄弟規戒反成嫌隙於是內有妻子之浸潤外有朋友之萋菲人言滿耳而兄弟參商矣故欲睦兄弟必先不信人言夫舍己從人古有明訓而謂人言必不可信者非臆説也夫人而至於離間人之兄弟此其無良喪心豈尚有可信之言哉是故人言無凖以理為凖但勸兄弟使相睦者必其信而非迋者也但間兄弟使相離者必其迋而不信者也情雖難測理有可推以理詳情百不失一聖人之不逆億而先覺用此道也出其東門有女如雲雖則如雲匪我思存縞衣綦巾聊樂我員賦也如雲美且多也縞白色綦蒼色巾頭巾也縞衣綦巾女服之貧陋者員助也正月之詩曰員于爾輻是也此賢人自樂其室家也言出其東門有女甚多而我思不存焉夫縞衣綦巾我自有妻采蘋蘩而主中饋內助既有人矣又何慕乎人之女之多也出其闉闍有女如荼雖則如荼匪我思且縞衣茹藘聊可與娛賦也闉城曲闍城臺也荼茅華如荼美而秀也茹藘可以染絳裳色也娛樂也言出其闉闍有女甚美而我思亦不存焉夫縞衣茹藘我妻雖陋侍巾櫛而御琴瑟與娛其亦可矣又何慕乎人之女之美也出其東門二章章六句詩序曰出其東門閔亂也閔時俗之淫亂而作此詩也夫人之思淫由於多欲一夫一婦庶人之職而或以為少也裙布叉荆貧家之常而或以為陋也思其多而且美故淫心生焉思而不得徒亂其心思而得之遂敗其行無一可也夫樂不在於境而在於心心以為足隨境皆足以為不足無時能足矣能守分而安貧亦何入而不得樂我員而與之娛心以為可則信乎其可也故曰禍莫大於多欲福莫大於知止三復出其東門之詩所以造生民之福者無窮矣野有蔓草零露漙兮有美一人清揚婉兮邂逅相遇適我願兮比也蔓延也漙露珠也清揚目清而眉揚也婉和也邂逅不期而遇也適遂也野草蔓延由被零露以比民生蕃滋由被膏澤也清揚以比人之明婉以比人之順明則能察民之隱順則能給民之求此膏澤所由下於民也邂逅相遇而適我願以比人君得遇此人則求賢之願遂而養民之願亦遂矣野有蔓草零露瀼瀼有美一人婉如清揚邂逅相遇與子偕臧比也瀼瀼露多貌如語辭臧善也婉如清揚謂順而且明也不明則惠不能遍故明重於順也偕臧謂人君得遂其養民之願而賢人亦得遂其行道之願也易曰王明並受其福並受福者偕臧之謂也野有蔓草二章章六句野有蔓草思遇賢也養民者君之職而非得賢人則澤不下流易屯之五曰屯其膏言五為坎體本有膏澤以六二不字承宣無人雖有膏而屯也故賢人者民之命也求賢而欲其邂逅非簡其禮也夫賢人難得也茍知賢之所在自不難徵聘之加顧或求之而不得或招之而不至古來英賢之遇合往往失之意中而得之意外執一格以求之則所遇者僅矣故必無時不思有美無地不加物色夫而後耕耘樵漁之內班荆傾蓋之間莫不有所遇也然則所謂邂逅相遇者正其惠民之心無已偕臧之念甚切豈素不加意而徒聽之適然之數哉昔鄭伯享趙文子于垂隴子太叔賦此文子曰吾子之惠也取其有志於零露也鄭七子餞韓宣子于郊子齹賦此宣子曰孺子善哉吾有望矣取其有志於偕臧也孔子遭齊程木子于郯傾蓋而語贈以束帛子路曰士不中道相見子曰詩不云乎邂逅相遇適我願兮吾於是而不贈則終身不之見也教其留意於邂逅也溱與洧方渙渙兮士與女方秉蕑兮女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其相謔贈之以勺藥賦也渙渙冰解而水盛也蕑蘭也且語辭洵信訏大也勺藥亦香草也朱子曰鄭國之俗三月上已之辰采蘭水上以祓除不祥故其女問於士曰盍往觀乎士曰吾既往矣女復要之曰且往觀乎蓋洧水之外其地信寬大而可樂於是士女相與戲謔且以勺藥為贈也黃一正曰水上祓除古今有之但鄭之士女於此相要戲謔為風俗淫亂耳溱與洧瀏其清矣士與女殷其盈矣女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其將謔贈之以勺藥賦也瀏清貌殷衆也將猶相也冰初泮則水尚濁久則清矣蘭未盛則士女少久則衆矣黃佐曰俗荒於遊淫奔所由起也相夸詡而不知恥則慆淫之漸染深且久矣張彩曰篇內士曰女曰皆旁觀者聞而𫐠之之詞所謂直書其事而醜態自見也溱洧二章章十二句詩序曰溱洧刺亂也士女冶遊習為淫亂也鄭之立國也新桓武之初緇衣好賢羔裘司直故雞鳴之琴瑟靜好同車之德音不忘庶幾哉二南之遺風也逮其後也狂且狡童接踵在位學校不修子襟挑達於是乎風俗壞而溱洧賦與衛之桑中同矣彼則要之送之公然以之告於人此則謔之贈之詡然以之誇於衆蓋恥心既亡非政刑所能止也故桑中之後而衛中絶溱洧之後而鄭遂衰書曰德惟治否德亂與治同道罔不興與亂同事罔不亡治亂之迹詩既詳言之矣後之人慎所與同焉可也鄭風二十一篇五十三章二百八十三句孔子曰鄭聲淫蓋謂其樂之聲調非謂詩也鄭詩二十一篇女曰雞鳴有女同車出其東門貞而好德有二南之遺風溱洧則刺亂也餘十七篇皆有為而作非男女之私何淫之有詩三百一言以蔽之曰思無邪觀於鄭風益信矣御纂詩義折中卷五
