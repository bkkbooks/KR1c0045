body:
  text: 召南一之二召地名召公奭之采邑也文王之時周公爲政於國中召公宣布於諸侯而南國皆從化焉其自文王之國而被於諸侯者則謂之周南其因方伯所布而及於四方者則謂之召南維鵲有巢維鳩居之之子于歸百兩御之興也鵲鳩皆鳥名鳩性拙每居鵲之成巢如男有室而女居之也南國被文王之化諸侯能謹夫婦之禮故大昏成而詩人美之以鳩起興取其拙而安也婦無外事酒食是議安於拙而順以從夫徳之盛也故關雎取其有别鵲巢取其無為取有别者所以防荒淫之漸取無為者所以杜預政之原也御迎也百兩御之君親迎也韓奕之詩曰韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘是也維鵲有巢維鳩方之之子于歸百兩將之興也方據也能為家主進於居矣將送也百兩將之上卿送也𫝊曰凡公女嫁於敵國姊妹則上卿送之公子則下卿送之於大國雖公子亦上卿送之維鵲有巢維鳩盈之之子于歸百兩成之興也盈之娣姪衆也韓奕之詩曰諸娣從之祁祁如雲韓侯顧之爛其盈門是也成之婚禮成也百兩迎送以成之者敬其事也記曰敬愼重正而後親之也朱子曰此詩之意猶周南之有關雎也鵲巢三章章四句鵲巢重大昏也關雎之化行於南國女能修徳男知好徳故夫人專靜純一而國君備物盛禮以求之是文王以修齊之道化天下而諸侯皆修身以齊其家也諸侯修齊以教其國則四國之人各修其身各齊其家而比戸可封矣君子之道造端乎夫婦及其至也察乎天地信夫于以采蘩于沼于沚于以用之公侯之事賦也蘩白蒿也生於初春可以為葅于沼于沚者沼沚之旁蘩先生且就潔也事祭也冠以公侯者夫人助公侯以承祭無敢自専也朱子曰此猶周南之有葛覃也于以采蘩于澗之中于以用之公侯之宮賦也澗中澗之曲也宮廟也澗中則更潔矣廟中則更嚴矣被之僮僮夙夜在公被之祁祁薄言還歸賦也被髲髢所謂次也夫人祭服副此言被者非祭時也夙夜在公謂先祭視饎㸑薄言還歸謂既祭歸燕寢故服次也僮僮竦直貌祁祁安妥貌不知其人視其被被之僮僮其人竦直可知也是未祭而敬先積也被之祁祁其人安妥可知也是既祭而敬猶留也未祭而積之既祭而留之則當祭之時其敬可想矣采蘩三章章四句詩序曰采蘩夫人不失職也夫人與君共為社稷宗廟主是以承祭為職也祭主於敬沼沚采蘩敬其物也僮僮祁祁敬其儀也國君敬事天祖夫人敬事國君與之合敬以事宗廟是國君與夫人皆敬以供職也君與夫人各敬其職則國人莫不敬事此其所以格神人而和上下也喓喓草蟲趯趯阜螽未見君子憂心忡忡亦旣見止亦旣覯止我心則降賦也喓喓鳴聲草蟲蝗屬趯趯躍貌阜螽蠜也忡忡動也降下也南國大夫行役於外其妻思之謂蟲鳴螽躍時已秋矣而君子未歸故憂心忡動也相見曰覯見止我見君子也覯止君子亦見我也我不見君子而心動因知君子不見我而亦心動故冀其相見而君子之心降則我心亦降也以君子之心為心乃所以為思之至也朱子曰此猶周南之有卷耳也陟彼南山言采其蕨未見君子憂心惙惙亦旣見止亦旣覯止我心則說賦也蕨菜名暮春生惙惙鬱結也説喜意秋相思而春猶未至故憂心至於鬱結冀其相見而舒暢也陟彼南山言采其薇未見君子我心傷悲亦旣見止亦旣覯止我心則夷賦也薇似蕨而差大𥘉夏生夷平也由春至夏時更乆矣故憂之甚而至於傷悲冀其相見而心平也草蟲三章章七句詩序曰草蟲大夫妻以禮自防也夫婦之際離則憂合則喜人情也但恐其過中而失正遂至於害徳而傷生草蟲之詩情得中矣忡忡憂動惙惙憂深傷悲則更深矣降憂方釋說喜方生夷則憂喜俱平矣其憂也有漸其喜也有節以禮防心而歸於和平者也心平則情雖動而性靜萬物各靜其性王道之成也于以采蘋南澗之濱于以采藻于彼行潦賦也蘋藻皆水草濱涯也行潦道旁之水采蘋采藻薦有常品也于澗于潦采有常處也于以盛之維筐及筥于以湘之維錡及釜賦也盛貯也方曰筐圓曰筥湘烹也有足曰錡無足曰釜盛之湘之作事有序也筐筥錡釜用物有别也于以奠之宗室牖下誰其尸之有齊季女賦也奠置也宗室大宗之廟牖下奥也尸主齊敬季少也昏義曰古者婦人先嫁三月祖廟未毁敎於公宮祖廟旣毁教於宗室教成祭之牲用魚芼以蘋藻此詩季女主祭湘蘋藻而奠於宗室其為教成之祭無疑也朱子曰少而能敬化之所從來者逺矣采蘋三章章四句采蘋理陰教也女子十年不出姆教婉娩聼從觀於祭祀納酒漿籩豆葅醢敎助祭也教成而奠敎主祭也葛覃之詩勤儉孝敬采蘋有焉采盛湘奠事必躬親所以敎勤也蘋蘩荇藻不求備物所以敎儉也奠於宗廟所以教孝也齊以尸之所以敎敬也后妃以此自為即以此教人所由于歸之女皆能宜家也故曰天子聼男教后聼婦順教順成俗國家理治蔽芾甘棠勿翦勿伐召伯所茇賦也蔽芾盛貌甘棠杜梨翦去也伐戕其幹也伯方伯茇草舎也朱子曰召伯循行南國以布文王之化或舍棠樹之下其後人思其徳故愛其樹而不忍傷也蔽芾甘棠勿翦勿敗召伯所憩賦也敗殘其枝也憩休息也憩則暫於茇矣勿敗則非特勿伐而已蔽芾甘棠勿翦勿拜召伯所說賦也拜屈其條也說與稅同停車也税則暫於憩矣勿拜則非特勿敗而已止於樹者愈暫而愛其樹者愈深以見人之思之愈久而愈甚也甘棠三章章三句詩序曰甘棠美召伯也善政民畏之善教民愛之召伯之教明於南國其民愛而思之思其人而不得見見其樹如見其人焉故保䕶之無已也君子是以知周祚之延與燕之後亡也甘棠且不忍伐而况其君乎况其子孫乎是故祖宗行一寛大之政即貽子孫數世之福朝廷用一仁厚之臣即培宗社靈長之慶人之所以自為與夫為天下而用人者可以知所擇矣厭浥行露豈不夙夜謂行多露比也厭浥濕意行道夙早也以道露之濕衣比淫暴之汙人也召伯聼男女之訟而女子賦此詩以見志言道露沾濡豈不欲行但早夜以行則其露更多是以畏而不敢斯言也固嘗謂之於先矣非後悔也此必男有穢行女恐玷汙故强求而未有成言箋云媒妁之言不和是也誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足比也家謂求為室家之禮也速召致也事有似而實非雀無角而何以穿屋汝無家而何以速獄然汝雖速獄而實無家猶雀雖穿屋而實無角也無家者非無家也言未成而强為禮是非禮之禮不足為禮也昔徐吾氏之女欲適子南而公孫黑强委禽焉此所謂室家不足者也誰謂䑕無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從比也牙牡齒也雀實無角䑕有齒而非牡則疑似更難辨矣室家不足猶辨之也亦不女從則不辨而之死靡他矣女之貞烈固不可犯而召伯能辨曲直於疑似之間全貞女之節而不為强暴所汚此所以南國之人有甘棠之愛歟行露三章一章三句二章章六句詩序曰行露召伯聼訟也凡訟之興皆起於無情無情而能興訟者設為疑似之情也聼婚姻以媒聘然亦有媒雖遣而未和聘雖行而强委如此詩所云者一或不察則强暴得志而善良䝉寃下拂人性而上干天和非小失也故易有噬嗑詩存行露教聼訟也聖人之憂天下來世其至矣羔羊之皮素絲五紽退食自公委蛇委蛇賦也羔裘大夫之朝服紽兩皮相接之處素絲為組以英之三英高起故曰紽也委蛇自得之貌朱子曰南國化文王之政在位皆節儉正直故詩人美其衣服有常而從容自得如此也羔羊之革素絲五緎委蛇委蛇自公退食賦也革毛敝而革見也緎界也紽敝而界見也覆言自公退食者意在於退食也退食而委蛇家無事也節儉則不殖貨正直則不營私故家無事也羔羊之縫素絲五總委蛇委蛇退食自公賦也縫線綴之也革敝而縫見也合兩為一曰總緎敝而總見也重言退食自公者意在於自公也自公而委蛇國無事也節儉則無求而民自靜正直則理順而行自簡故國無事也羔羊三章章四句詩序曰羔羊大夫節儉正直也裘敝不易節儉可知也人常自得正直可知也君子是以知周治之隆也芣苢和平室家無事也羔羊従容朝廷亦無事也夫其無事者非不事也君心清則臣節儉君心明則臣正直事之可已者無所不已其不可已者亦順應而無容私焉日事事而行所無事故不見有事也或多事而事廢或省事而事理為治者可以審所尚矣殷其靁在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉比而賦也殷盛也陽奮為雷喻仁聲也南山終南也豐鎬在南山之北江漢在南山之南南國北望先見山陽故首言南山之陽也何斯之斯指其人也違斯之斯指其地也言仁心仁聞在山之陽而斯人乃違此地而逺供紂役至於莫敢或暇非計也然既已仕之則無去道矣振振信厚也信則不敢有二心厚則不敢有怨意故望其歸而不敢必其歸蓋以信厚之道勉其君子欲其不憚勤勞以終君臣之義也殷其靁在南山之側何斯違斯莫敢遑息振振君子歸哉歸哉比而賦也自陽而北則山之東西故繼言側也莫敢遑息無寧時也前役甫畢後役又來也殷其靁在南山之下何斯違斯莫或遑處振振君子歸哉歸哉比而賦也自側而北則山之陰故終言下也指其地者愈切矣莫或遑處無定所也此役未完彼役又興也供其役者愈勞矣如是而終不敢必其歸乃所以為信厚也殷其靁三章章六句詩序曰殷其靁勸以義也君臣之義有二分未定則以擇主而事為義貪祿而危其身非智也分已定則以終主之事為義臨難而易其節非仁也紂雖無道共主也旣已仕之則君臣之分定矣故明知文王之仁將必勃興而終勸其供紂之役不可遽歸此固其君子之信厚能刑于其妻抑文王服事之誠有以深入於人心故婦人女子皆明於大義如此也故曰周之徳其可謂至徳也已矣摽有梅其實七兮求我庶士迨其吉兮興也摽取也其實七取其三也庶士衆賢也吉賓興之期也言摽所有之梅摽其三而留其七是擇其先熟者而早取之焉人君求我國之庶士亦當迨賓興之吉期擇其尤者而早取之也摽有梅其實三兮求我庶士迨其今兮興也其實三摽其七也言摽所有之梅摽其七而留其三是趂其大熟之時而多取之焉人君求我國之庶士亦當及今之時廣其途以多取之不必待吉也摽有梅頃筐墍之求我庶士迨其謂之興也墍貯也頃筐墍之則樹無梅矣是盡取之也人君求我國之庶士亦當及今之時而有以謂之謂之者通其言也使天下之士皆得盡言以通於上則嘉言罔伏而野無遺賢矣此盡取庶士之道也摽有梅三章章四句摽有梅求賢也立國之道首在得人文王蹶興䟽附後先有力焉故曰濟濟多士文王以寜人但知其逸於得人而不知其勞於求賢如此也古今取士之制異名而不異實三年貢舉迨其吉也不時錄用迨其今也制藝試䇿迨其謂也然而或不得士者其求之異也古之時士不求君而君求士詢事以乞言即因言以考績故臧否可以立辨三代以後君不求士而士求君競為空言以干進上之人亦第取其言之工而不因言以試其功宜其㧞十而不得五也嘒彼小星三五在東肅肅宵征夙夜在公實命不同興也嘒微明也肅肅敬貌宵征夜行也命爵也箋云禮命之數不同是也凡進御於君者見星而徃見星而還故因所見以起興言微明之小星或三或五而在東是初昏時也當此時而肅肅以行者以今夜明早有在公之職役故也夙夜在公亦云勞矣而不辭其勞者以嫡貴妾賤命數不同故盡其職而不敢懈也嘒彼小星維參與昴肅肅宵征抱衾與裯實命不猶興也初昏則星在東者先見將旦則星在西者猶留故言參昴西方之宿也參昴不小而以為小者將旦則衆星皆没惟參昴在而光亦微也衾被裯褥猶相效也言將旦之時肅肅以行者以在公之役為君抱衾裯而安置之今事畢故還也抱衾與裯役亦賤矣而不嫌其賤者命旣不同不可相效故安於其分而不敢越也小星二章章五句小星妾循禮也周禮典命其數有九夫人視諸侯之命數娣媵以下貴賤之等視其國之卿大夫士故命各不同也天下之患莫大乎賤者不安其分視貴者而欲效之於是乎臣僭君而妾匹嫡家國之亂生矣先王制禮以定之使貴賤之等命數不同禮秩亦異而不可相效則上下辨而民志定矣小星之媵妾以命數不同之故安其分而盡其職君子是以知禮之不可以已也江有汜之子歸不我以不我以其後也悔興也水决復入曰汜以用也江漢之間有嫡不與媵俱歸者其媵思之言江水有汜而之子之歸乃不我用雖不我用或其後也悔而迎我則我將如汜之復入於江乎蓋望之也江有渚之子歸不我與不我與其後也處興也水岐成洲曰渚與偕也言江水有渚而之子之歸乃不我偕既不我偕而其後也又安處而不來迎我則將如渚之不復入江乎蓋疑之也江有沱之子歸不我過不我過其嘯也歌興也沱江之别流者過存問也嘯歎聲言江水有沱而之子之歸并不使人過而問我旣不問我是終不悔矣我雖思之亦屬無益其變嘯歎為咏歌如沱之不復望入江矣蓋安之也江有汜三章章五句詩序曰江有汜美媵也思而不怨困而能亨此士君子之所難而女子能之陳氏曰小星之夫人惠及媵妾而媵妾盡其心江沱之夫人惠不及媵妾而媵妾不怨蓋父雖不慈子不可以不孝各盡其道而已矣野有死麕白茅包之有女懐春吉士誘之賦也麕獐也茅包麕者𫝊云同田之獲而分其肉也懐思也女之懐春猶士之悲秋因時興思也吉士求婚之男也誘導也比隣之人同徃田獵分麕肉而以茅包之適遇懐春之女而同田之士遂欲無媒妁而自往誘之蓋急於求婚而不暇為禮也林有樸􅈪野有死鹿白茅純束有女如玉賦也樸􅈪小木也純束重包之也此同田之人明女之不可誘也言樸􅈪死鹿物本輕微而猶以白茅純束不使汙壞况此所有之女觀其徳容堅貞潔白有如美玉豈可不加愛䕶而反以非禮誘之乎舒而脫脫兮無感我帨兮無使尨也吠賦也舒徐也脫脫遲緩貌感動帨佩巾也箋云奔走失節則佩感也尨犬也𫝊云非禮相陵則犬吠也此同田之人勸士勿往誘也言女徳如玉不可輕犯當徐思而緩圗之勿疾走以動我佩巾恐其失儀也勿突徃而驚彼尨犬恐其生事也蓋所以保女之貞淑而止士之邪妄其相為也深矣野有死麕三章二章章四句一章三句詩序曰野有死麕惡無禮也同田之人惡吉士之無禮而止之也古者鄉田同井出入相友守望相助有善相勸有過相規是故比閭族黨無非勸善之人也耕耘樵獵無非規過之地也設有不檢之士偶動非禮之思則前後左右之人皆得惡而止之使不䧟於罪戾此三代聖王所由教成於上俗羙於下刑措不用而比戸可封也嗚呼盛矣何彼穠矣唐棣之華曷不肅雝王姬之車興也穠盛也唐棣郁李也肅敬雝和也王姬下嫁而能和敬以執婦道故詩人美之言何其穠盛乎則唐棣之華也豈不肅雝乎則王姬之車也其車如此其人可知矣何彼穠矣華如桃李平王之孫齊侯之子興也平王文王也國語太子晉曰自后稷之始基靖民十五王而文始平之是文王之為平王猶武王之為寧王當時有此稱也齊侯丁公伋也邑姜與伋為兄弟故王姬歸其子也以桃李二華興男女二人者未成婚之詞也未成婚則尊王故以平王之孫先齊侯之子君臣之義也其釣維何維絲伊緡齊侯之子平王之孫興也緡綸也以絲為綸旣成婚之詞也朱子曰絲合而為綸猶男女之合而為婚也旣成婚則尊夫故以齊侯之子先平王之孫夫婦之禮也何彼穠矣三章章四句詩序曰何彼穠矣美王姬也國立於君臣家始於夫婦婦挾富貴之勢以驕其夫而慢其舅姑則家不可齊矣故雖以天子之女下嫁諸侯亦必使之肅雝以執婦道然後諸侯卿大夫之女皆不敢以勢驕人而士庶人之家夫倡婦隨不令而自行矣此成周之盛事而夫子存之爲後世法也彼茁者葭壹發五豝于嗟乎騶虞賦也茁生出壯盛之貌葭蘆也壹發四矢也獸二歲曰豝五豝田禮也𫝊曰虞人翼五豝以待公之發是也騶虞瑞獸不食生物者也南國諸侯被文王之化皆能仁民而愛物故風雨時叙庶類蕃殖春田之時葭蘆茁茂五豝具焉而國君不忍盡殺矢止壹發故詩人歎之以為此仁厚之君不戕物命是即所謂騶虞矣猶麟趾之詩歎公子之即麟也彼茁者蓬壹發五豵于嗟乎騶虞賦也蓬蒿類獸一歲曰豵七月之詩曰言私其豵獸之小者也蓬細於葭而亦皆茁壯則所生者更盛矣豵小於豝而亦止壹發則所殺者更少矣騶虞二章章三句詩序曰騶虞鵲巢之應也南國被文王后妃之化諸侯刑于寡妻而夫人専靜純一以盡其職至於大夫之妻宗室之女皆能守禮是以教化成而風俗美陰陽和而庶類蕃有騶虞之瑞焉推其所由皆本於修身以齊家故曰鵲巢之應也召南十四篇四十章一百七十七句召南化成天下也鵲巢采蘩草蟲言夫人大夫妻之徳修身齊家之功也甘棠以下方伯布化則國治而天下平矣騶虞化成有如麟趾大旨與周南同而亦有異焉者周南多言仁心召南兼言仁政甘棠溥旬宣之績行露昭庶獄之愼摽梅詳取士之規小星定宮闈之禮野麕厚閭井之俗騶虞著蒐狩之制大經大法莫不具在所謂以睢麟之意行周官之法度也抑王道本於夭徳修身在於正心故二南之言心徳者宜致意焉周南之詩多率性而主和而葛覃之尊師兎罝之勤事未嘗不濟以敬也召南之詩多率教而主敬而羔羊之從容江汜之溫厚未嘗不歸於和也至於王姬肅雝則兼有敬和之美焉夫和仁也治化所由成也而必先以敬者非敬無以為和也萬物理而後和萬事序而後和故中庸之功極於位育而始於戒懼主敬以致和也天徳王道在於謹獨為周南召南者可以知所從入矣御纂詩義折中卷二
