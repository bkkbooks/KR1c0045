body:
  text: 唐風一之十唐國名本帝堯舊都周成王以封弟叔虞其俗勤儉質朴憂深思遠有堯之遺風焉後改號晉仍謂之唐者從其初也蟋蟀在堂歳聿其莫今我不樂日月其除無已大康職思其居好樂無荒良士瞿瞿賦也蟋蟀蟲名歳莫而蟋蟀猶在者盖其種類甚多如促織竈馬在煖屋中皆能度冬也除去也大康過於樂也職主也居所處之位也瞿瞿却顧之貌思其居故常内省也朱子曰唐俗勤儉其民終歳勞苦不敢少休及歳晚務閒乃敢相與燕飲為樂然其憂深而思遠也故方燕樂而又遽相戒曰不已過於樂乎盍亦顧念其身之所居者使雖好樂而無荒若彼良士之長慮而却顧焉則可以不至於廢事也盖其民俗之厚而前聖遺風之遠如此蟋蟀在堂歳聿其逝今我不樂日月其邁無已大康職思其外好樂無荒良士蹶蹶賦也逝往也邁去之速也外所居之餘也所居之外凡有關於居者皆思之也蹶蹶敏於事也思其外故常勤勉也蟋蟀在堂役車其休今我不樂日月其慆無已大康職思其憂好樂無荒良士休休賦也役車載任器以供役者歳晚則役車休農工畢也慆去而不返也憂意外之患也思居思外思其常也思憂思其變也休休安閒之貌能思憂則無憂矣故休休也蟋蟀三章章八句蟋蟀勸思也人情莫不好樂然患大康而至於荒荒則失業將有憂矣荒則失心并不知其有憂矣故治荒莫若思思者心之職也思欲其詳又恐其雜故貴愼也思欲其深又恐其逺故貴近也欲近而愼必先思居居者所處之位也素其位而思則無處不有當為之事不敢雜矣無時不有當盡之功不暇遠矣故曰思不出其位也不出位則位之外可不思矣而又思其外者何也外者居之餘也一身以外皆人也一室以外皆地也上下四旁之地親疎遠近之人皆念及之而後一室之内可以久處故思其外正所以安其居也如是則有備無患矣然而人之患常出於所備之外茍自謂無患則荒而失心勢必荒而失業以至於憂而不救故常恐其有憂而必思之似可以無憂而亦必思之於是乎有終身之憂而無一朝之患矣故曰思深哉其有陶唐氏之遺風乎山有樞隰有榆子有衣裳弗曳弗婁子有車馬弗馳弗驅宛其死矣他人是愉興也樞刺榆也榆白枌也婁亦曳也宛坐見貌愉樂也言山之有樞隰之有榆供人用也今子有衣裳而弗曳婁有車馬而弗馳驅夫其不用是欲常保其有也而不知一旦溘逝其所有者乃為他人用矣一生辛苦而他人是愉豈不大愚也哉山有栲隰有杻子有廷内弗洒弗埽子有鐘鼓弗鼓弗考宛其死矣他人是保興也栲山樗也杻檍也考撃也抑之詩曰夙興夜寐洒埽廷内維民之章關雎之詩曰窈窕淑女鐘鼓樂之然則埽廷内而考鐘鼓亦政教所關非小節也山有漆隰有栗子有酒食何不日鼓瑟且以喜樂且以永日宛其死矣他人入室興也易曰需于酒食貞吉禮記曰君子無故不去琴瑟然則酒食琴瑟亦禮樂之大端也朱子曰人多憂則覺日短飲食作樂可以永長此日也山有樞三章章八句山有樞廣儉也昔先王之教人勤儉以致富者非徒備物盖將以用之也因所有而善用之則所以厚生者即所以正徳是故曳婁衣裳以章身也馳驅車馬以立功也洒埽廷内以行禮也考撃鐘鼓以奏樂也酒食可以娛賓琴瑟可以和志喜樂可以陶性永日可以引年此則所謂國奢示儉國儉示禮乃富而教之之實功豈徒曰及時行樂已哉揚之水白石鑿鑿素衣朱襮從子于沃旣見君子云何不樂比也鑿鑿巉巖之貌襮領也諸侯之服朱中衣而繡黼領此云素衣朱襮降於諸侯也子指桓叔也沃曲沃也晉昭侯封桓叔於曲沃晉弱而曲沃强故詩人憂之言揚水緩弱而白石巉巖水之力不能轉石以比晉之力不能制沃也素衣朱襮始封之服也從子于沃從封之官也旣見君子得預其政也桓叔得大邑已從之而預其政則宜樂矣而若有不樂者何哉自問之詞也揚之水白石皓皓素衣朱繡從子于鵠旣見君子云何其憂比也朱繡即朱襮也襮上繡為黼形也鵠曲沃之邑也曲沃為都而又有旁邑見封地之廣也憂則更甚於不樂矣揚之水白石𥻘𥻘我聞有命不敢以告人比也𥻘𥻘水清石見之貌命桓叔之令也旣見君子故得聞之聞之而不敢告人此則其不樂而憂之故也夫不敢告必有不可告者也不可告而又告人曰不敢告則不啻告之矣嚴粲曰不敢告人正所以告晉也揚之水三章二章章六句一章四句揚之水憂晉也晉穆侯之太子曰仇其弟曰成師穆侯卒仇立是為文侯文侯卒昭侯立封成師於曲沃是為桓叔師服諫曰國家之立也本大而末小是以能固今晉甸侯也而建國本旣弱矣其能久乎其後晉潘父弑昭侯而納桓叔不克此盖桓叔受封之初與潘父有成謀詩人聞之而微其詞以告人也夫旣從桓叔而乃露其陰謀豈非負恩哉聖人錄之者重公義也凡受君恩而以國情告賊者是助逆也聖人之所誅也受私恩而以賊情告君者是反正也聖人之所與也詩錄揚之水敎人不以私恩廢公義也侯犯以郈叛叔孫謂郈工師駟赤曰郈非惟叔孫氏之憂社稷之患也將若之何駟赤對曰臣之業在揚水卒章之四言矣叔孫稽首駟赤卒出侯犯而以郈歸叔孫能反正矣知此詩之義矣椒聊之實蕃衍盈升彼其之子碩大無朋椒聊且遠條且興而比也椒樹名其實辛而烈聊語助詞朋比也且歎詞遠條長枝也曲沃强盛詩人憂之故言椒聊之實蕃衍則盈升矣彼其之子碩大則無朋矣又言椒聊遠條者歎其枝遠而實益蕃以比曲沃之子孫日盛將為晉國之患也椒聊之實蕃衍盈匊彼其之子實大且篤椒聊且遠條且興而比也兩手曰匊篤厚也鄧元錫曰碩大無朋况大都耦國也碩大且篤况厚施得衆也嚴粲曰此詩言桓叔之强而不及昭侯其意則憂昭侯之弱而非主桓叔言在此而意在彼也椒聊二章章六句椒聊惡曲沃也左傳曰先王之制大都不過三國之一中五之一小九之一大小有等所以强幹弱枝也晉之曲沃大都耦國矣桓叔之子孫日衆必有繁枝傷本之患坐視其强盛而不為之所非奮發而剪其宗親則隱忍而釀為簒奪事有必至勢難兩全故詩人預料而深憂之也春秋諸國私邑强而公室卑者多矣獨曲沃哉故分封之初都邑之大小不可不熟計也綢繆束薪三星在天今夕何夕見此良人子兮子兮如此良人何賦也綢繆纏綿也良人夫稱也國亂民貧婚姻不能備禮故當初婚之夕而酒饌不設但有綢繆之束薪而已燈燭稀微但見三星之在天而已凄凉如此此何夕也而乃見良人則良人之艱窘可知也子兮子兮見者相謂也良人家貧無以為禮而見者亦貧不能資助故共相嗟嘆以為無如此良人何也綢繆束芻三星在隅今夕何夕見此邂逅子兮子兮如此邂逅何賦也隅東南隅也昏見之星轉而在隅夜已久也邂逅新婦至而行禮也其禮草率如人之邂逅相遇也綢繆束楚三星在戸今夕何夕見此粲者子兮子兮如此粲者何賦也戸在室南在隅之星轉而在戸夜已分也粲美也粲者謂新婦也綢繆三章章六句綢繆憫貧也晉與曲沃屢世搆兵民貧日甚不能備物故冠婚無以為禮也一家凋敝比戸皆然故親友莫能相助也如此詩之所詠其由來非一朝矣沃之椒聊蕃衍私家日富也晉之束薪綢繆公室日貧也歴觀春秋諸國大抵諸侯虐用其民而大夫庇之民之所歸財之所聚故公室貧而私家富諸侯猶不悟而多取於民以使之日貧豈不愚哉有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉興也杕特生貌杜赤棠也湑湑潤澤貌踽踽無所親也比輔佽助也朱子曰杕然之杜其葉猶湑湑然人無兄弟則獨行踽踽曾杕杜之不若也鄧元錫曰他人不如同父一本故也呂祖謙曰茍他人可恃則行道之人胡不自相親比人無兄弟胡不外求佽助盖深曉晉君以行道之人必不相親茍非兄弟必不相助也有杕之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉興也菁菁盛貌睘睘無所依也同姓同祖也杕杜二章章九句杕杜刺晉君也不能親其宗族骨肉離散獨居而無兄弟也夫曲沃之子孫日衆矣晉君不之憂也而又疎忌其兄弟椒聊杕杜比而觀之孰存孰亡不待智者而後知矣抑沃之桓叔荘伯以晉無兄弟之故而取其國乃獻公又忌桓荘之子孫而戮之文公以後中軍執政不用公族卒為六卿所分遠兄弟而親他人後先相望也前覆而後不鑒何哉羔裘豹袪自我人居居豈無他人維子之故賦而比也袪袂也羔裘豹袪大夫之服也羔能羣而豹有力以比大夫之仁且勇也居居聚而不散也言大夫能仁而且勇吾人自聚而不散非無他人之可歸以子之故不忍去也羔裘豹褎自我人究究豈無他人維子之好賦而比也褎猶袪也究究集而能安也鴻雁之詩曰其究安宅是也羔裘二章章四句羔裘美大夫也潘父之弑昭侯也晉人立孝侯荘伯之弑孝侯也晉人立鄂侯武公之弑哀侯也晉人立小子侯以曲沃之强暴而晉屢世立君者此必有大夫焉能撫其民而用之其民不散故其國猶存也羔裘之所美意者即其人與豈無他人謂曲沃也言不歸沃而歸晉者惟大夫之故也夫晉雖弱人君也曲沃雖强人臣也弑君之賊人人所得誅也大夫能於危亡之際留己去之人心扶弱君以討强臣事之不濟則天也豈人謀尚有可訾哉詩錄羔裘所以嘉危時之義士憫弱國之孤臣為後世勸也肅肅鴇羽集于苞栩王事靡盬不能蓺稷黍父母何怙悠悠蒼天曷其有所興也肅肅羽聲鴇鳥名毛𫝊曰鴇之性不樹止苞叢栩櫟也孔頴逹曰盬與蠱同壞也靡盬言不可壞也蓺樹怙恃也晉人困於征役言鴇不樹止而今集于栩是失所也民以王事之故不得養其父母亦如鴇之失所也何時而能有所乎無所告而訴於天也肅肅鴇翼集于苞棘王事靡盬不能蓺黍稷父母何食悠悠蒼天曷其有極興也極已也黃佐曰征役已則得耕田以供子職矣肅肅鴇行集于苞桑王事靡盬不能蓺稻粱父母何嘗悠悠蒼天曷其有常興也行列也常復其常也人有常道能復其常則亂定而征役可已矣鴇羽三章章七句詩序曰鴇羽刺時也春秋隱公五年王命虢公伐曲沃而立哀侯于翼桓公九年虢仲芮伯欒伯荀侯賈伯伐曲沃所謂王事也伐曲沃而不能克立晉君而不能定所謂靡盬也晉人以此之故征役不已而至於失所原其始皆由於失常夫常者人之倫也君君臣臣是謂倫常今曲沃以大夫而簒弑臣失常矣王命不能行於曲沃君亦失常也至於王命不行則亂無由定矣無所可望故望天也所望天心厭亂牖我王心赫然勵精以圖治則君能出令誰敢干之君令而不違臣共而不貳則曲沃之簒弑不作而虢公虢仲之征役亦已民乃得蓺黍稷稻粱以養其父母上下皆復其常矣故有常而後有極有極而後有所此實撥亂返治之要道非空言也齊景公問政於孔子孔子對曰君君臣臣父父子子有常之謂也豈曰無衣七兮不如子之衣安且吉兮賦也衣七七命之衣也侯伯七命子謂武公也史記曲沃桓叔之孫武公伐晉取之盡以其寶器賂周釐王王使虢公命曲沃伯為晉侯曲沃人喜之故言此七命之服自莊伯以來舊有之焉然不如子之衣乃新命於王為安且吉也吉之云者旣受王命則諸侯不得而討之也豈曰無衣六兮不如子之衣安且燠兮賦也衣六六命之衣也天子之卿六命燠煖也燠之云者謂旣受王命則可久享晉國之富强也無衣二章章三句無衣傷世變也武公之罪大矣是王法所必誅也釐王貪其寶器誅討不加而爵命之是彰賂而敎弑也異日者魏斯韓䖍趙籍相繼而起又移所以命武公者命三卿矣隄防一决其流潰而不可止也抑武公簒弑而以賂得命豈不自雄其計不旋踵而已之大夫亦效其所為也出爾反爾可不戒哉有杕之杜生于道左彼君子兮噬肯適我中心好之曷飲食之比也道左僻處也噬發語詞曷何也朱子曰此人好賢而恐不足以致之故言杕然之杜生於道左其蔭不足以休息如已之寡弱不足恃頼則彼君子者亦安肯顧而適我哉然其中心好之則不已也但無自而得飲食之耳夫以好賢之心如此則賢者安有不至而何寡弱之足患哉有杕之杜生于道周彼君子兮噬肯來遊中心好之曷飲食之比也周曲也朱公遷曰道左則僻道周則迂杕杜生于偏僻迂迴之地力薄位卑有若此矣彼君子者適我且不肯况肯來以遨遊乎以意之淺深為次序也有杕之杜二章章六句有杕之杜美好賢也武公以簒得國諸侯不與也然以逆取之能以順守知立國在於得人故欲君子見輔而飲食之雖其心未必一出於正而其迹則與中心好賢者無異盖亦有足多者故詩人美之也厥後晉之卿材輩出如狐趙欒郤荀范韓魏之祖皆起於武獻之間文公悼公借衆賢之力以相繼為伯於天下武公啟之也以逆取國故卒有𤓰分之禍以順守之故遞主中夏之盟春秋之法功罪不相掩故無衣杕杜並存於經所謂惡而知其美賞罰之公也葛生蒙楚蘞蔓于野予美亡此誰與獨處賦也蘞草名此婦人夫亡送葬而思與同穴也言葛生蘞蔓在此曠野予心所美乃亡於此誰與同居乎塊然獨處而已葛生蒙棘蘞蔓于域予美亡此誰與獨息賦也域塋域也言葛生蘞蔓在此塋域予美乃亡於此誰與同室乎孑然獨息而已何楷曰此其夫所葬之地也角枕粲兮錦衾爛兮予美亡此誰與獨旦賦也角枕錦衾斂襲之具此臨其穴而望之也言棺木之内衾枕鮮明予美亡此誰與同寢乎獨宿至旦而已念及此則守節而與之合葬誼不容已矣夏之日冬之夜百歳之後歸于其居賦也居墓也言夏日永冬夜永百年之内無時不思要死而相從耳歸于其居則有與同處矣冬之夜夏之日百歳之後歸于其室賦也室壙也歸于其室則有與同息且同旦矣葛生五章章四句葛生美思婦也性情純篤而又不過於激烈此婦人苦節守志從一而終之正道故聖人有取焉采苓采苓首陽之巓人之為言茍亦無信舍旃舍旃茍亦無然人之為言胡得焉比也苓菌也首陽山名巔頂也舍置旃之也言采苓者必至首陽之巔親見其苓而後采之也人之為言未嘗目覩則姑勿遽信即使其言近理可信亦姑置之勿遽以為然而徐察之則讒言胡得行哉張榜曰讒人似是之言能投於卒然之頃而不能不露於徐察之後故舍旃舍旃為止讒之法也采苦采苦首陽之下人之為言茍亦無與舍旃舍旃茍亦無然人之為言胡得焉比也苦菜名與許也信之則許之矣采葑采葑首陽之東人之為言茍亦無從舍旃舍旃茍亦無然人之為言胡得焉比也從聼而行之也許之則行之矣謂無稽之言且勿信之即信其言勿許其事即使許之且勿行之但姑舎之置之不議不論則情偽自見矣采苓三章章八句詩序曰采苓刺晉獻公也夫驪姬之譖申生其事至易明也曲沃之胙置諸宫中已六日矣未有毒在肉中六日而不腐者茍亦無信則其情立見而惜乎其遽信而遽從之也唐德宗以郜國公主之故欲廢太子而立舒王李泌爭之且請從容三日究其端緒間一日上開延英殿召泌流涕曰非卿切言朕今日悔無及矣太子仁孝無他也此則舍旃舍旃之明驗也小弁之詩曰君子不惠不舒究之舒究云者舍旃而徐察之謂也唐風十二篇三十三章二百三句秦風一之十一秦國名在禹貢雍州之域初伯益佐禹賜姓嬴氏其後中潏居西戎其七世孫非子事周孝王養馬於汧渭之間封為附庸而邑之秦其曾孫秦仲為大夫犬戎作難平王東遷秦仲孫以兵送之王封為侯是為襄公曰能逐犬戎即有岐豐之地故秦居西都其後遂代周而有天下有車鄰鄰有馬白顚未見君子寺人之令賦也鄰鄰衆車之聲白顚額有白毛也寺人内官令𫝊命也朱子曰是時秦君始有車馬及此寺人之官將見者必先使寺人通之故國人創見而誇美之也阪有漆隰有栗旣見君子並坐鼓瑟今者不樂逝者其耊賦也阪漆隰栗所種之樹也定中之詩曰樹之榛栗椅桐梓漆是也鼓瑟初有琴瑟也八十曰耊言寺人𫝊令尊卑之分甚嚴並坐鼓瑟上下之情甚洽未見如彼旣見如此當此時而不樂則日月如流而老將至矣盖立國之初人情懽忻鼓舞之甚也阪有桑隰有楊旣見君子並坐鼓簧今者不樂逝者其亡賦也簧笙中金葉吹笙則簧動故曰鼓也逝而不留曰亡逝者其耊言遲暮之景轉盻即至來日苦少也逝者其亡言少壯之年往而不返去日苦多也車鄰三章一章四句二章章六句詩序曰車鄰美秦仲也始有車馬侍御禮樂也國之將興必有嘉祥所謂祥者非符瑞之謂也物産茂育人心和樂則為祥莫大焉觀此詩之所詠車衆馬多武備足也漆栗桑楊種植盛也力耕勇戰之業兆矣其君能通下之情而忘分以盡歡其臣能感君之恩而及時以自獻其慷慨沉雄諸國不逮也招八州而朝同列有以也夫然邦家新造首重寺人識者憂之故開國之規模不可不慎也駟驖孔阜六轡在手公之媚子從公于狩賦也驖驪馬也駟驖四馬皆驪也孔甚阜大也四馬八轡言六轡者兩驂内轡納之於觖故在手者止六轡也媚子所親愛之人也從公于狩習武事也奉時辰牡辰牡孔碩公曰左之舍拔則獲賦也時是辰時也辰牡者冬狼夏麋春秋鹿豕之類奉之者虞人翼以待射也公曰左之逐禽左也抜矢括也舍拔則獲矢不虚發言御之良而射之善也遊于北園四馬旣閑輶車鸞鑣載獫歇驕賦也閑調習也輶輕也鸞鈴也鑣馬銜置鈴於銜之兩旁故曰鸞鑣獫歇驕皆犬名以車載犬休息之也徐常吉曰田事旣畢人遊而馬閑車輕而犬休見從容整暇之意也駟驖三章章四句詩序曰駟驖美襄公也襄公始命為侯而有岐豐之地遵周之遺制用周之遺民故其射御田獵之事猶不異於古所云觀其奉時辰牡非所謂一發五豝乎公曰左之舍拔則獲與不失其馳舍矢如破同矣遊于北園馬閑犬息所稱蕭蕭馬鳴徒御不驚者其庶幾焉故曰此之謂夏聲大之至也其周之舊乎小戎俴收五楘梁輈游環脅驅陰靷鋈續文茵暢轂駕我騏馵言念君子溫其如玉在其板屋亂我心曲賦也此襄公命將使伐西戎将士之妻思而賦之也小戎兵車也俴淺同收軫也大車軫深八尺兵車之軫四尺四寸故曰俴收也楘文貌梁輈軏也所以鉤衡以皮革五處束之其文歴錄然也游環靷環也貫驂馬之靷於其中前却無定所以制驂馬使不得外出也脅驅以皮為之前係於衡後係於軫所以驅驂馬使不得内入也隂揜軓之橫板也靷引車之韋帯也鋈續陰板之上有續靷之孔銷白金以沃灌之也文茵以虎皮為車褥也暢長也轂所以貫輪兵車之轂長於大車故曰暢轂馬色青黒曰騏左足白曰馵板屋者西戎之俗以板為屋也溫其如玉美其德也戎事雖尚威究以德為本故曰德威惟畏也亂我心曲則其思念之情不能自己也四牡孔阜六轡在手騏駵是中騧驪是驂龍盾之合鋈以觼軜言念君子溫其在邑方何為期胡然我念之賦也赤馬黒鬛曰駵中服馬也黃馬黒喙曰騧盾干也畫龍於盾合而載之以為車衛也觼環之有舌者軜驂内轡也以觼係軜亦銷白金以為飾也邑城也前在板屋野處也今在邑則築城也患西戎之侵盗故築城以自衛且以鎮撫之也方將也言旣築城邑則必久居將不知以何時為歸期我胡然而念之盖以義止情勉君子使久居其地也俴駟孔羣厹矛鋈錞蒙伐有苑虎韔鏤膺交韔二弓竹閉緄縢言念君子載寢載興厭厭良人秩秩德音賦也俴駟以淺薄之甲被四馬欲其輕便也羣和也厹矛三隅矛也錞矛之下端蒙雜伐干也畫雜羽於干上也虎韔以虎皮為弓室也鏤膺鏤金以飾馬胸之帶也交韔交二弓於韔中顚倒安置之也閉弓檠也緄繩縢約也以竹為閉而以繩約之檠弓體使正也載寝載興起居不寧也厭厭安重也秩秩有序也言旣在邑而久鎮撫之當老成持重勿邀近功宣布德音使秩秩有序自近及遠則威惠所及彼將自服如趙充國屯田以制羗實伐戎之要道也小戎三章章十句詩序曰小戎美襄公也易曰師貞丈人吉貞師出以正也丈人老成之將也夫西戎殺秦仲是襄公不共戴天之仇也又弑幽王是王法必誅不赦之賊也今襄公奉天子之命以討賊兵以義動可謂貞矣故婦人女子皆知敵愾而無怨心也所用之將又能嚴以自衛溫以和人老成持重而宣布德音非所謂丈人乎宜其克復仇耻而基伯王之業也夫其攻守異勢而仁義不施乃始皇之過若襄公之經營締造則曷可少哉讀駟驖小戎庶幾哉有車攻采芑之遺風矣蒹葭蒼蒼白露為霜所謂伊人在水一方遡洄從之道阻且長遡游從之宛在水中央比也蒹葭蘆葦也蒼蒼色老也遡流而上曰遡洄順流而涉曰遡游言時至深秋葭蒼露白將結為霜肅殺之氣也秦政嚴急有此象焉故君子感時事而歸隱在水一方不可招而致也然君子非不欲仕也但惡不由其道逆其道而求之將终不可得見順其道而求之未嘗不宛在也而惜乎秦人終不能遡游從之也蒹葭淒淒白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡游從之宛在水中坻比也淒淒蕭瑟也晞乾也湄水草之交也躋升也言難至也坻渚也蒹葭采采白露未已所謂伊人在水之涘遡洄從之道阻且右遡游從之宛在水中沚比也采采摧折也已止也白露不止則必為霜矣右不相値而出其右也長與躋猶可至也不値而出其右則終不至矣小渚曰沚蒹葭三章章八句蒹葭刺遺賢也秦襄始封作西畤而祀上帝位在藩臣而臚於郊祀君子懼焉文公嗣立初定三族之刑僭禮變法之端兆矣此與三代聖王之治如春溫秋肅之相反故周之獻民有抱道不仕而隱於山巔水湄者焉設使秦人改其嚴急之政以禮求之行其道而仁其民不追踪西方之美人乎無如霜露之勢日盛則是道阻且右而所謂伊人終不可得用矣詩人反覆於遡洄遡游之際盖其以道維世之心流連而不能已也终南何有有條有梅君子至止錦衣狐裘顔如渥丹其君也哉興也終南山名條山楸也君子指其君也至止至於終南之下也錦衣狐裘諸侯之服也渥漬也渥丹赤而澤也其君也哉言容貌衣服稱其為君也朱子曰此秦人美其君之詞亦車鄰駟驖之意也終南何有有紀有堂君子至此黻衣繡裳佩玉將將壽考不忘興也紀山之亷角也堂山之寛平處也黑與青謂之黻五色備謂之繡將將佩玉聲也壽考不忘頌戒之詞服其服居其位則宜有其德故祝其君之壽考又欲其不忘修德以稱此位也終南二章章六句終南秦人美其君也襄公之時岐豐之地尚為犬戎所據文公始逐戎而走之東獵於汧渭之㑹至德公徙居雍則在終南之下也德公之子三人宣公成公遞讓國以及穆公而秦遂伯自文公至穆公累世皆有令德觀其錦衣佩玉聲明文物之盛不減於上國而秦人之頌祝亦與天保有臺相侣矣民罔常懐懐於有仁彼其所以撫綏之者亦必有道焉使其後世不改德宣成穆之業天倫雍睦民情愛戴即不變法豈不足以得天下無端而嚴刑峻令速其興適以速其亡也人謂周之得天下也以德秦之得天下也以刑不知秦之得之也亦以德其失之也則以刑觀於秦風可見矣交交黃鳥止于棘誰從穆公子車奄息維此奄息百夫之特臨其穴惴惴其慄彼蒼者天殲我良人如可贖兮人百其身興也交交飛而往來之貌從穆公從死也子車氏奄息名特傑出之稱穴壙也惴惴懼貌慄悼殲盡良善贖貿也蘇轍曰臣之託君猶鳥之止木黃鳥交交而和鳴三子乃不得其死曾黃鳥之不若也孔頴逹曰秦人哀傷三子臨視其穴惴然悼慄乃愬之於天也朱子曰三子皆國之良若可貿以他人則人皆願百其身以易之矣交交黃鳥止于桑誰從穆公子車仲行維此仲行百夫之防臨其穴惴惴其慄彼蒼者天殲我良人如可贖兮人百其身興也防當也言一人可以當百夫也交交黃鳥止于楚誰從穆公子車鍼虎維此鍼虎百夫之禦臨其穴惴惴其慄彼蒼者天殲我良人如可贖兮人百其身興也禦止其侮也黃鳥三章章十二句詩序曰黃鳥哀三良也春秋文公六年秦伯任好卒以子車氏之三子為殉皆秦之良也國人哀之為之賦黃鳥君子曰秦穆之不為盟主也宜哉死而棄民先王違世猶詒之法而况奪之善人乎詩曰人之云亡邦國殄瘁無善人之謂也今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也鴥彼晨風鬱彼北林未見君子憂心欽欽如何如何忘我實多比也鴥疾飛貌晨風鸇也鬱盛密貌君子謂賢人欽欽憂而不已也晨風疾飛而入林比君子高蹈而遠引也君子隱處心常思之思而未見故憂而不已不知君子因何故而忘我實甚盖欲知其所以去之之故而得其所以來之之術也山有苞櫟隰有六駁未見君子憂心靡樂如何如何忘我實多興也櫟柞櫟苞叢也駁梓榆也山宜有櫟隰宜有駁以興國宜有君子也未見君子則無以為國故不樂也山有苞棣隰有樹檖未見君子憂心如醉如何如何忘我實多興也棣唐棣檖赤羅也如醉則憂更甚矣晨風三章章六句詩序曰晨風刺康公也穆公好士西取由余於戎東得百里奚於宛求㔻豹公孫支於晉詢兹黃髪昧昧思賢故士多歸之康公意怠賢人去焉觀不承權輿之詩可見矣其上棄之其下思之并責其不可果於相忘此亦忠君憂國者之用心惜康公旣棄君子并思君子者而亦棄之也國無小用賢則强亦無大棄賢則弱君子是以知康公之無能為也豈曰無衣與子同袍王于興師修我戈矛與子同仇賦也袍襺也戈矛皆槍屬王于興師奉天子之命以興師也言豈為無衣而與子同袍乎因王于興師將修戈矛以同敵王之所愾故先同袍以相親也朱善曰與子同袍恩愛相結於無事之時也與子同仇患難相恤於有事之日也許謙曰先王之制比閭族黨相保相受八家同井相友相助平居交得其懽心一旦同在戰陣則其恩誼足以相救此王者之兵所以無敵也秦地周舊也故無衣之詩猶有先王之遺風焉豈曰無衣與子同澤王于興師修我矛㦸與子偕作賦也澤裏衣也朱子曰以其親膚近於垢澤故謂之澤㦸車㦸也長六尺周官建車之五兵戈殳㦸酋矛夷矛豈曰無衣與子同裳王于興師修我甲兵與子偕行賦也行往也偕作始發也偕行則在道矣無衣三章章五句無衣勤王也案此詩當在黃鳥之前康公以後無勤王之事史稱襄王出居於鄭使人告難於秦晉秦穆公將兵助晉文公納襄王殺叔帶此所謂王于興師也自平王東遷至於襄王八十餘年王室之聲靈不及於岐豐西都之民思先王如思高曾也戴時王如戴父母也一旦而奉王命以匡王室其忠愛感奮勃發於心而不容自己千載而下如将見之以如是之民而棄以與秦使秦撫而用焉不以禦暴而以之為暴可惜也故周之失計未有如東遷之甚者朱子曰雍州土厚水深其民厚重質直無鄭衛驕惰浮靡之習以善導之則易興起而篤於仁義以猛驅之則其强毅果敢之質亦足以勇戰力農而成富强之業非山東諸國之所及也我送舅氏曰至渭陽何以贈之路車乘黃賦也舅氏秦康公之舅晉公子重耳也出亡在外穆公召而納之時康公為太子送之而作此詩也渭水名秦都雍至渭陽者東行送之於咸陽也路車諸侯之車也乘黃四馬皆黃也我送舅氏悠悠我思何以贈之瓊瑰玉佩賦也悠悠長也送舅氏而長思者念其母也瓊玉名瑰美石也佩玉之制天子純用玉諸侯以下雜用石渭陽二章章四句詩序曰渭陽康公念母也康公之母晉獻公之女也秦穆公納晉文公康公送之見舅氏如見母焉故悠悠思之也經錄渭陽廣愛也夫伯叔者父之兄弟也舅氏者母之兄弟也列國之譜牒可考矣非同姓之宗族即異姓之婚姻茍能因愛父之故而愛伯叔因愛母之故而愛甥舅則講信脩睦兵戎何自起哉觀康公以念母而送舅氏遂能使文公入而晉國定文公伯而王室安盖因親以廣愛而其仁普矣故聖人有取焉案無衣當在黄鳥之前此詩又當在無衣之前然則詩之錯簡亦多矣於我乎夏屋渠渠今也每食無餘于嗟乎不承權輿賦也夏大也渠渠深廣貌承繼也權輿始也穆公好賢居之以大屋渠渠然深廣至於康公而禮貌衰矣雖大屋如故而每食無餘不能繼其始也於我乎每食四簋今也每食不飽于嗟乎不承權輿賦也簋陳食之器易曰二簋可用享每食四簋言其盛也再言不承權輿深歎之也權輿二章章五句詩序曰權輿刺康公也忘先君之舊臣與賢者有始而無終也禮貌旣衰賢人去焉盖自是穆公之伯業衰矣故康公屢敗於晉桓景哀悼數世不競以及厲躁簡公出子之不寧皆權輿之詩為之兆也是故國之興衰以人心卜之而已讀小戎無衣之詩人心合而知秦之必大讀晨風權輿之詩人心離而知秦之中衰向背之幾有如轉轂盛衰之應㨗於桴鼓遍覽十五國治亂得失之故亦可以不占驗而識妖祥不蓍蔡而定吉凶矣故曰其或繼周者雖百世可知也秦風十篇二十七章一百八十一句御纂詩義折中卷七
