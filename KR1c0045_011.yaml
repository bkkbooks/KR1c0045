  - {type: page-break, offset: 0, content: '', id: KR1c0045_WYG_011-1a, image: WYG0084/WYG0084-0183a.png}
body:
  text: 彤弓之什二之三彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓旣設一朝饗之賦也彤弓朱弓也弨弛貌受弓人獻而受之也貺與也鐘鼔大樂也用大樂者饗於廟也饗大飲也周語曰王饗有體薦燕有折爼公當饗卿當燕是也一朝饗之禮成於朝也劉彛曰湛露燕也彤弓饗也燕以示慈惠故至夜而不為過所以致其厚也饗以訓恭儉故終朝而即成禮所以致其欽也彤弓弨兮受言載之我有嘉賔中心喜之鐘鼔既設一朝右之賦也載抗之也載於弓檠抗體使正言其藏之謹也喜悦也悦其有功故貺之也右尊也饗之所以尊之也彤弓弨兮受言櫜之我有嘉賔中心好之鐘鼔既設一朝醻之賦也櫜韜也韜於弓衣使色常新言其載之密也好愛也言不止喜其功正愛其人也醻猶厚也尊而厚之篤而不渝也輔廣曰櫜重於載載重於藏好誠於喜喜誠於貺醻厚於右右尊於饗彤弓三章章六句詩序曰彤弓天子錫有功諸侯也春秋傳曰諸侯敵王所愾而獻其功王於是乎錫之彤弓一彤矢百玈弓矢千以覺報宴是也呂祖謙曰受言藏之言其重也弓人所獻藏之王府以待有功不敢輕與人也中心貺之言其誠也中心實欲貺之非由外也一朝饗之言其速也以王府寳藏之弓一朝舉以畀人未嘗有遲留顧惜之意也後世視府藏為己私分至有以武庫兵賜弄臣者則與受言藏之者異矣賞賜非出於利誘則廹於事勢至有朝賜鐵劵而暮屠戮者則與中心貺之者異矣屯膏吝賞功臣解體至有印刓敝而不忍予者則與一朝饗之者異矣菁菁者莪在彼中何既見君子樂且有儀比也菁菁盛也莪蘿蒿也中阿阿中也儀禮也此天子視學而燕師儒也菁菁之莪在彼中阿以比凡民之秀來自田間也君子教人者也既見君子而後知其教人也循循善誘使樂之而不以為苦且教之以禮使日用動靜之間皆有威儀既興起其善心又有所持循以進於善則其德日長而至於成如莪之菁菁然盛也菁菁者莪在彼中沚既見君子我心則喜比也莪在沚中資其灌溉以比士在泮宮受其教澤也君子之教人也樂且有儀如此故天子見而喜之喜其能為國家長育人材也菁菁者莪在彼中陵既見君子錫我百朋比也莪出沚而在陵以比選造之士進而在位也君子之善教如此則國家収得人之效故天子喜之以為所以錫我者不啻百朋之多矣汎汎楊舟載沉載浮既見君子我心則休比也楊舟楊木為舟也汎汎無人操之也舟無人操則浮沉莫定以比國無人治則安危未可知也既見君子而収得人之效則國家可以久安長治如楊舟之有浮而無沉矣故天子之心喜而休焉所謂勞於求賢而逸於得人也菁菁者莪四章章四句詩序曰菁菁者莪樂育才也樂師儒之能長育人才也鹿鳴之三魚麗之三皆所以尊賢也天保以上治内采薇以下治外皆得賢人而用之也顧尊而用之者在朝廷育而教之者在學校學校無才朝廷不可得而用故師儒之選不可以不慎教化之道不可以不明也且夫聖人之教原非以强人也人性皆善故雖下愚不能無道心因其天良而啟牖之使油然而不容已則樂之矣因其樂善而輔之以威儀以定其命斯强立而不返矣不樂則苦而不入無儀則學而不固樂且有儀内外交養所由學成於下而治隆於上也將欲成天下之人才者讀菁莪之詩其亦可以深長思矣六月棲棲戎車既飭四牡騤騤載是常服玁狁孔熾我是用急王于出征以匡王國賦也棲棲猶皇皇飭整也常服軍裝熾盛匡正也厲王之居彘也玁狁内侵宣王即位命尹吉甫伐之也朱子曰司馬法冬夏不興師今六月出征者以玁狁勢盛事在危急故也朱善曰此所謂兵加於己不得已而應之也比物四驪閑之維則維此六月既成我服我服既成于三十里王于出征以佐天子賦也比齊也物力也比物而得四驪力與色皆齊也閑習則法也習之使合法也我服戎服也三十里一舍也古者吉行日五十里師行日三十里朱子曰戎服既成即日引道不徐不急盡舍而止見應變之速而不失其常度是也以匡王國者都邑震驚宜有以安之以佐天子者四夷不庭當為天子鎮撫之也四牡修廣其大有顒薄伐玁狁以奏膚公有嚴有翼共武之服共武之服以定王國賦也修長廣大也顒大貌四驪閑則士卒之馬也四牡修廣將帥之馬也薄廹也如肉薄登城之薄玁狁已深入當廹而逐之也膚大公功也嚴陣翼輔也中軍節制而左右軍輔之也共與恭同武服軍事也三軍各敬其事則營壘固而備防周也如此則軍威伸於外人心安於内而王國定矣所謂佐天子以匡王國也玁狁匪茹整居焦穫侵鎬及方至于涇陽織文鳥章白斾央央元戎十乗以先啓行賦也茹度也整久駐也焦穫河東地名左傳曰許君焦瑕是也鎬方河西地名涇陽在渭北織同幟鳥章鳥隼之章前軍所建也白斾以帛為斾繼旐者也後軍所建也央央鮮明貌元戎軍之前鋒也司馬法所謂選鋒也言玁狁不自揣度使其大衆屯駐焦穫以其遊兵侵掠鎬方至於涇陽大舉深入此不可與爭鋒宜出竒以勝之於是三軍結陣不動使前軍選鋒十乗先行而後軍繼發玁狁懼我之阻其歸路也於是乎侵者還而居者走矣戎車既安如輊如軒四牡既佶既佶且閑薄伐玁狁至于大原文武吉甫萬邦為憲賦也玁狁既走則王師不戰故戎車安也輊前傾也軒後却也後望如輊前視如軒則車平矣安之至也佶壯貌閑調適也追之而言馬閑者緩追也懼之使走而已大原晉陽也至大原而止者不窮追也逐之出境而已其出竒制勝也可謂武其不勤逺略也可謂文文以綏衆武以威敵安内攘外之道莫善於此可以為萬國之法矣吉甫燕喜既多受祉來歸自鎬我行永久飲御諸友炰鼈膾鯉侯誰在矣張仲孝友賦也燕天子燕之也祉福也燕而喜之錫予便蕃故多受祉也來歸自鎬者自鎬京而歸於尹邑也我行永久歸告家人之辭也御進侯維也飲御諸友不忘舊也炰鼈膾鯉不敢侈也諸友皆禮貌之而常在左右者則惟張仲以其孝友也武臣有功則恐其驕常與孝友之人處資其和順以化其驕心乃可長保其禄位矣前言有功此其善居功也六月六章章八句詩序曰六月宣王北伐也倉卒興師車堅馬良軍政修也常服皆載器械備也玁狁熾而我用急兵端不自我始也比物四驪畜牧蕃也閑之維則訓練勤也不踰月而服成其才敏也三十里而止舍其神定也好整以暇乃大勇也有嚴紀律嚴也有翼陣法善也共武之服臨事而懼敬慎不敗也鳥章前軍白斾後軍也中軍左右不可輕動前軍選鋒後軍遊騎可擇便而趨利也元戎十乗用寡也竒兵欲輕齎而疾趨故不可以用衆且既謀成不戰則不必勞費也以先啟行貴神速也間道疾驅以出其背使驚而内顧則不戰而走矣有嚴有翼以正合也元戎先行以竒勝也戎狄内侵利在速戰狼奔豕突難與力爭故必用老成持重之將勿倉皇以失度勿見小而邀功深溝高壘以老之堅壁清野以困之别出竒兵以撓之截其糧道以饑之擣其巢穴以懼之則不戰而走矣既走而追之不急而致其反噬不逺而疲我嘉師所謂不戰而屈人也歴觀後代禦戎之道合乎此則勝反乎此必敗然則豈直萬邦為憲哉萬世為法可也至於有功而驕固由武臣不學亦由所交匪人故以張仲之孝友终焉欲其移孝以為忠移弟以為順忠順不失以事其上則善始善終矣後之為將者三復此詩可也薄言采芑于彼新田于此菑畝方叔涖止其車三千師干之試方叔率止乗其四騏四騏翼翼路車有奭簟笰魚服鉤膺鞗革比而賦也宣王之時蠻荆背叛而王命方叔征之也芑苦菜也田一嵗曰菑二嵗曰新田民間采芑或於新田或於菑畝以比天子徵師或於内采或於外服也涖臨也諸侯兵至而方叔親閲之也司馬法兵車一乗甲士歩卒共百人其車三千法當用三十萬人師衆干扞試肄也聚衆而肄扞禦之方訓練之也率總統之也呂大臨曰涖止布其行陣率止作而用之是也翼翼順序貌路車戎路也奭赤也簟笰以竹簟為車蔽也鉤膺樊纓也鞗革轡首也極言其車馬之美見軍容之盛也薄言采芑于彼新田于此中鄉方叔涖止其車三千旂旐央央方叔率止約軧錯衡八鸞瑲瑲服其命服朱芾斯皇有瑲葱珩比而賦也中鄉民所居也采芑中鄉以比天子用鄉遂之民也交龍曰旂左軍所建龜蛇曰旐後軍所建旂旐央央五軍皆啟行也約軧以皮束轂也錯衡文衡也鈴在鑣曰鸞馬口兩旁各一四馬故八鸞也三十萬衆之中而聞鸞聲之瑲瑲行有紀律也命服禮服皇鮮明也葱蒼色珩佩首横玉也領兵在道而冠裳佩玉如此以明天子之師有征無戰不煩戎服也鴥彼飛隼其飛戾天亦集爰止方叔涖止其車三千師干之試方叔率止鉦人伐鼓陳師鞠旅顯允方叔伐鼓淵淵振旅闐闐比而賦也隼飛戾天而集於所止之處以比王師逺行而至於所征之地也啟行有師干之試閲兵也既至有師干之試威敵也鉦鐃也伐擊也鉦人伐鼓互言之也鞠告也將戰而誓告之陳師鞠旅亦互文也顯明允信也顯允方叔者不尚竒詭而昭明信義也伐鼓進兵也淵淵聲和也將戰而鼓聲和者不暴怒也振旅還師也方伐鼔而即振旅者荆蠻迎服也闐闐徐行聲也退師有法故依次而不亂也德威所臨望風迎服其進不怒其退不懾亦可以想王師之氣象而識大將之風規矣蠢爾蠻荆大邦為讎方叔元老克壯其猶方叔率止執訊獲醜戎車嘽嘽嘽嘽焞焞如霆如雷顯允方叔征伐玁狁蠻荆來威賦也蠢爾無知之貌讎敵也齒德俱尊曰元老壯大猶謀也言荆蠻小醜而敢與大邦為敵者以其蠢然無知自謂兵力足與中國抗衡也無以威之雖勝不懼勢將復叛故必總大衆以臨之使知天威之難犯將不戰而永服元老之猶所以為壯也其軍三千至此始言其故矣執訊執其為首者訊問之獲醜獲其同謀之醜類也嘽嘽衆也焞焞盛也霆雷車聲也旋歸之軍容不異於初出也又言顯允方叔者歸功於將也有必勝之將無必勝之兵將若不能兵衆適以致亂惟顯允之方叔其德固足服人又曾征伐玁狁勲名素著是以敵人懷德畏威望風來服也振旅闐闐至此始言其故矣采芑四章章十二句詩序曰采芑宣王南征也北伐之師用竒用寡元戎十乗寡之至矣南征之師用正用衆其車三千衆之至矣非不知用衆之勞費以為不戰而永服則費乃所以為省勞乃所以為逸也顧用寡易用衆難以漢高之雄才不過能將十萬方叔將三十萬衆而布陣不亂啟行無譁伐鼓則進振旅則退如臂使指則其才可想矣秦之伐楚也王翦欲用六十萬人始皇以為怯使李信將二十萬伐之出即敗衂卒用六十萬而後定人以為王翦之竒謀而不知其祖方叔之餘智也項籍之戰垓下也淮陰侯將三十萬衆自當之楚兵來而少却楚兵却而復乗指揮如意卒困項王人以為韓信之神勇而不知其歩方叔之後塵也且用寡用衆後人效其迹而不能得其心吉甫之用寡也期於不戰而走之方叔之用衆也期於不戰而服之不惟我師無鋒鏑之苦併敵人亦蒙好生之德此則三代以上之將略而非王翦韓信所能知也晉作三軍謀元帥趙衰曰郤縠可其為人也説禮樂而敦詩書敦詩書而可為元師者以為將之道詩書具言之也我車既攻我馬既同四牡龐龐駕言徂東賦也攻堅也同齊也毛傳曰宗廟齊豪尚純也戎事齊力尚强也田獵齊足尚疾也龐龐充實也東洛邑也詩序曰宣王能内修政事外攘夷狄復文武之境土修車馬備器械復㑹諸侯於東都因田獵而選車徒焉田車既好四牡孔阜東有甫草駕言行狩賦也田車田獵之車阜大也甫草地名可獵之所也天子諸侯之獵不時則傷農不地則害物甫草行狩言得地也之子于苖選徒囂囂建旐設旄搏獸于敖賦也之子有司也苗狩獵之通名選數也囂囂其聲衆也旐以致衆故建旐也設旄注旄於旐首也敖山名搏獸校勇也范處義曰易野以車為主故用以選車田車既好是也險野以人為主故用以選徒搏獸於敖是也駕彼四牡四牡奕奕赤芾金舃㑹同有繹賦也奕奕連絡布散之貌金舃赤舃而加金飾也時見曰㑹殷見曰同繹陳列聯屬之貌朱善曰諸侯之來朝也來非一方止非一所先後不同逺近各異此其所以連絡布散也及其㑹同也五等各以其爵尊卑有序貴賤有等此其所以陳列聯屬也亦可想見當時朝㑹之盛矣決拾既佽弓矢既調射夫既同助我舉柴賦也決以骨為之著於右手大指以鈎弦也拾以皮為之著於左臂以遂弦也佽比也調謂弓之强弱與矢之輕重相得也射夫諸侯之人也同協也柴説文作㧘謂積禽也言諸侯皆佽決拾調弓矢率其屬以助天子恭順之至也四黄既駕兩驂不猗不失其馳舎矢如破賦也猗偏倚也馳御車之法也劉瑾曰五御之目三曰過君表五曰逐禽左此田車之馳法也舎矢如破巧而力也蘇轍曰不善射御者詭遇則獲不然則不能也今御者不失其馳驅之法而射者舎矢如破則可謂善射御矣蕭蕭馬鳴悠悠斾旌徒御不驚大庖不盈賦也蕭蕭悠悠皆閑暇之貌徒歩卒也御車御也不驚不喧譁也大庖君庖也不盈取之有度也古者田獵獲禽上殺以為乾豆奉宗廟次殺以奉賔客下殺以充君庖每禽取三十焉其餘均及於衆是以獲雖多而君庖不盈也朱公遷曰行事從容馭軍整肅處已儉約待人周徧兼有之矣之子于征有聞無聲允矣君子展也大成賦也之子于征統承上文自徂東以至田畢也是役也但聞其師之行而不聞其行之聲嚴靜之至也馭軍有法卒事有儀信矣其君子也誠哉其大成也朱善曰存於中者有興衰撥亂之志施於外者有揆文奮武之規得不謂之君子乎靜治於往狩之初整肅於旋歸之際得不謂之大成乎李公凱曰復新朝儀統一人心張皇六師維持王業深得制治保邦之道矣車攻八章章四句詩序曰車攻宣王復古也天子廵狩諸侯述職其來舊矣周都於雍與山東諸侯隔逺廵狩之典難以常行而諸侯來朝道里不均周公相成王以洛邑地中故營為東都使天子時往焉而諸侯就朝之則廵狩不煩供億述職無庸逺行甚盛典也洛誥曰其自時中乂萬邦咸休此之謂也夷厲以來久廢不行宣王中興能復舊制故詩人美焉然成王至洛肇稱殷禮而已宣王乃兼田獵何也此則時為之也自夷王下堂諸侯張矣繼以厲王之亂玁狁内侵蠻荆外叛諸侯之心向背不一征之則不可勝征也故因東都㑹同諸侯咸集而選車徒以行狩使知天子神武克詰戎兵則順者益致其恭逆者潛移其志觀兵乃所以止兵也此蓋吉甫方叔之流克壯其猶而宣王用之故不動聲色而國勢以振可以想見中興之規模矣吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其羣醜賦也戊剛日也内事用柔日外事用剛日伯説文作禡祭馬祖也禱祭而祈之也既伯既禱而後用車馬重其事也醜類也羣醜獸之羣分而類聚者也升大阜而從之者試馬也既禱之而又試之慎之也吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所賦也庚午亦剛日也差分其等次也同聚也麀牝鹿也麌麌多也漆沮二水名順合曰從漆沮相從入洛又從入渭禹貢曰漆沮既從是也言擇日差馬往麀鹿所聚之地在漆沮既從之處乃天子田獵之所也瞻彼中原其祁孔有儦儦俟俟或羣或友悉率左右以燕天子賦也中原原中也祁大也儦儦疾走也俟俟徐行也獸三曰羣二曰友左右軍士也田獵之法作圍場開二門從田者分左右而入焉毛傳曰大芟草以為防褐纒旃以為門左者之左右者之右是也率有司率之也燕喜也天子田獵非為從禽蓋以纘武功也今有司悉率左右莫不自盡以奉其上則有勇而且知方庶天子見而喜之也既張我弓既挾我矢發彼小豝殪此大兕以御賔客且以酌醴賦也發發矢也豕牝曰豝兕野牛也發豝殪兕言能中微又能制大也朱公遷曰中微見其巧制大見其力是也御進也醴甘酒也周官五齊二曰醴齊是也酌祭之也坊記曰醴酒在室醍酒在堂是也言所獲之禽不止燕賔客且以奉宗廟見田獵之禮所闗甚重也吉日四章章六句詩序曰吉日美宣王田也車攻㑹諸侯以狩於東都吉日天子自獵於畿内也吕祖謙曰蒐狩之禮可以見王賦之復焉可以見軍實之盛焉可以見師律之嚴焉可以見上下之情焉可以見綜理之周焉欲明文武之功業者此亦足以觀矣鴻雁于飛肅肅其羽之子于征劬勞于野爰及矜人哀此鰥寡興也大曰鴻小曰鴈肅肅羽聲也之子謂流民也征行也矜憐也言流民在野而劬勞失所猶鴻鴈于飛而羽倦未集也丁壯者且不能堪至於鰥寡之人則尤可哀憐矣朱善曰惠鮮鰥寡文王以興哀此㷀獨幽王以亡故必鰥寡孤獨皆得其所而後為王政也鴻鴈于飛集于中澤之子于垣百堵皆作雖則劬勞其究安宅興也一丈為板五板為堵究终也言流民在外而築室以居猶鴻鴈于飛而集于澤中也百堵皆作其勞更甚於在野而甘心為之者冀其終之可以安處也其情亦可憫矣鴻鴈于飛哀鳴嗷嗷維此哲人謂我劬勞維彼愚人謂我宣驕興也詩人自言覩流民之狀而作為此詩以告哀也猶鴻雁之哀鳴嗷嗷也然惟明哲之人乃謂我宣民之劬勞使下情得以上達耳不知者且謂我行歌適志以宣驕也黄洪憲曰哲人洞悉民隱故謂我劬勞彼愚人者慮不周於民隱則無從知之矣言愚人正所以感哲人也鴻鴈三章章六句鴻鴈哀流民也夫始而在野終而安宅在上者未嘗無安定之功然與其安於既流之後不如養於未流之先也古之行仁政者八口之家比戸無饑而鰥寡孤獨莫不有養是遵何道乎詩人於流民之在野也固哀其劬勞於其築室也亦哀其劬勞而終言其作詩所以告哀此如後世監門繪圖之意而以哲人望其君也其㫖逺矣夜如何其夜未央庭燎之光君子至止鸞聲將將賦也其語辭央中也庭燎大燭也君子諸侯也王將視朝惟恐晏起故不安於寢常自度曰夜如何哉尚未央乎然而庭燎已有光矣朝者至而聞其鸞聲矣夜尚未央未必有所見聞蓋其惕厲之精神常警於寤寐故懸意其然而遂若果然也夜如何其夜未艾庭燎晣晣君子至止鸞聲噦噦賦也艾盡也晣晣小明也天將曙則火光微矣將將聲逺而聞其大也噦噦聲近而聞其節也夜如何其夜鄉晨庭燎有煇君子至止言觀其旂賦也鄉晨近曉也煇火氣也天將明則見煙矣言觀其旂辨色也入朝之時也自夜中以至於明無刻不警於心目其勵精圖治之意可想矣庭燎三章章五句詩序曰庭燎美宣王也列女傳曰宣王嘗晏起姜后脱簪珥待罪於永巷宣王感悟於是勤於政事早朝晏退以成中興之業是也此固姜后之賢淑而宣王能聽之聽之而改之改之而久不倦也可不謂難乎從諫如流改過不吝其有之矣周道復興有以也沔彼流水朝宗于海鴥彼飛隼載飛載止嗟我兄弟邦人諸友莫肯念亂誰無父母比也沔流貌水流歸海猶諸侯之朝天子也書曰江漢朝宗于海是也流水有入海之日飛隼有載止之時以比禍亂有止息之期也將欲止亂必先念亂深思而預防之則亂不生矣乃兄弟以及邦人諸友莫有肯念亂者豈獨無父母乎縱不憂身亦當憂親何為不念之也沔彼流水其流湯湯鴥彼飛隼載飛載揚念彼不蹟載起載行心之憂矣不可弭忘比也湯湯泛流不歸海也載揚高飛不載止也以比禍亂日生不止息也不蹟不循道也亂匪自天皆由於人人不循道故致亂生彼之不蹟我不敢不念也載起載行深念之也不可弭忘久念之也念致亂之由欲得止亂之道也鴥彼飛隼率彼中陵民之訛言寧莫之懲我友敬矣䜛言其興比也章首脱二句以上文例之大約謂流水湯湯而循其故道必有所歸隼飛載揚而率彼中陵必有所止以比禍亂不已而弭之有方則可以息也原亂之所由生多由於野有訛言而朝有䜛言巧言之詩曰亂之初生僭始既涵亂之又生君子信䜛是也訛言起於小民豈無懲治之法䜛言興於朝臣亦有消弭之道我深念之惟有敬而已矣敬以存心則恐懼修省而内無可疵敬以處事則謹小慎微而外無可議兄弟邦人諸友果能如此䜛言何自而興乎䜛言不興君子得以行其志則民之訛言可以懲治而亂止矣此皆念之而後知之者何為莫肯念亂也沔水三章二章章八句末章脱二句沔水憂亂也宣王信䜛而殺杜伯其友左儒死之又宣王之時童謠曰檿弧箕服實亡周國不數年而有褒姒之禍是䜛言訛言皆興而亂端兆矣有識之士預見而深憂之所必然也顧憂亂而不得止亂之方徒憂無益耳沔水之詩人推亂之所由生而歸於讒又推亂之所由息而歸於敬則可謂深知止亂之道矣宣王不能用也而卒為亂階豈不惜哉鶴鳴于九臯聲聞于野魚潛在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯比也鶴鳥名善鳴者也澤曲曰臯九臯九曲之澤言幽深也蘀落葉錯礪石也朱子曰此陳善納誨之辭也鶴鳴九臯而聲聞于野言誠之不可掩也魚潜在淵而或在于渚言理之無定在也園有樹檀而其下維蘀言愛當知其惡也他山之石而可以為錯言憎當知其善也由是四者引而伸之觸類而長之天下之理其庶幾乎鶴鳴于九臯聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維榖他山之石可以攻玉比也榖一名楮惡木也攻治之也吕柟曰二章之言相似而意别于野以四方言也于天以上下言也在淵在渚言事雖在於幽逺而道不下帶而存不可以為逺而忘之也在渚在淵言事雖在於目前而理則深邃莫測不可以為近而忽之也維蘀以榮悴言利害安危之謂也則思亂防危之意其可怠乎維榖以美惡言邪正是非之謂也則察奸逺佞之意其可少乎為錯泛以制器言之也攻玉則其人之德成矣程子曰玉之温潤天下之至美也石之麤厲天下之至惡也然兩玉相磨不能以成器以石相磨然後玉之為器得以成焉猶君子之與小人處也横逆侵加然後修省畏避動心忍性增益豫防而義理生焉道德成焉吾聞諸邵子云鶴鳴二章章九句鶴鳴納誨也易曰書不盡言言不盡意聖人立象以盡意以為象之所包廣於言也詩之比興立象之道也以象逆意其中無所不有是故切磋琢磨不言貧富而子貢以為己言之也素以為絢不言禮後而子夏以為不啻言之也魚躍鳶飛揭大道之要深厲淺揭著行藏之宜言近㫖逺不可勝舉鶴鳴之詩其尤著者也是故詩之為教其引典故也通於禮其道政事也通於書其設物象也通於易其屬辭褒貶也通於春秋學者不可以不盡心也彤弓之什十篇四十章二百五十九句御纂詩義折中卷十一
