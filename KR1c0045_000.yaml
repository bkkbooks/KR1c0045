body:
  text: 乾隆二十年夏四月御製欽定四庫全書經部三御纂詩義折中篇目詩𩔖第一卷國風周南關雎桃夭葛覃兎罝卷耳芣苢樛木漢廣螽斯汝墳麟之趾第二卷召南鵲巢行露采蘩羔羊草蟲靁采蘋殷其甘棠梅摽有小星穠江有汜騶虞何彼矣野有死麕第三卷邶柏舟撃鼔緑衣凱風燕燕雄雉日月苦終風匏有葉谷風北門式微北風旄丘靜女簡兮新臺泉水乗舟二子第四卷鄘柏舟桑中牆有􅗔奔鶉之奔君子偕老定之方中蝃蝀干旄相鼠載馳衛淇奥芄蘭考槃河廣碩人伯兮氓狐有竹竿木𤓰第五卷王黍離水君子于役谷有君子陽陽爰揚之中蓷兎葛藟大車采葛有麻丘中鄭緇衣于將仲子清人大叔田叔于田遵大路羔裘女曰雞鳴童蘀兮狡有女同車褰裳丰山有扶蘇東門之墠風雨蔓子衿野有草揚之水溱洧出其東門第六卷齊雞鳴未還東方明著山南東方之日令甫田盧敝笱猗嗟載驅魏葛屨陟岵汾沮洳閒十畝之園有桃碩鼠伐檀第七卷唐蟋蟀椒聊山有樞杕杜綢繆揚之水鴇羽羔裘無衣葛生有杕之杜采苓秦車鄰黄鳥駟驖晨風小戎無衣蒹葭渭陽終南權輿第八卷陳宛丘之東門之枌門東門楊墓衡門鵲東門之池防有巢月出澤陂株林檜羔裘匪風素冠隰有萇楚第九卷曹蜉蝣鳲鳩候人下泉豳七月伐柯鴟鴞九罭東山狼跋破斧第十卷小雅鹿鳴之什鹿鳴常棣四牡伐木皇皇者華薇天保采出車南陔杕杜白華之什白華嘉華黍南有魚魚麗崇丘由庚有臺南山由儀湛露蓼蕭第十一卷彤弓之什彤弓采芭菁菁者莪日車攻吉六月鴻鴈庭燎鶴鳴沔水第十二卷祈父之什祈父斯干白駒無羊黄鳥山我行其野節南正月正十月之交雨無第十三卷小旻之什小旻斯小宛何人小弁巷伯巧言谷風蓼莪四月大東第十四卷北山之什北山鼓鐘無將大車南山小明楚茨信甫田者大田裳裳華瞻彼洛矣第十五卷桑扈之什桑扈青蠅鴛鴦𥘉頍弁賓之筵車舝魚藻采菽菀柳角弓都人士之什都人士白華隰桑采緑緜蠻黍苖瓠葉漸漸之石何草不黄苕之華第十六卷大雅文王之什文王旱麓大明思齊緜矣皇棫樸靈臺下武有聲文王第十七卷生民之什生民假樂行葦公劉旣醉泂酌鳬鷖卷阿民勞板第十八卷蕩之什蕩高崧抑民烝桑柔韓奕雲漢江漢常武召旻瞻卬第十九卷頌周頌清廟之什清廟維清維天之命作烈文天昊天有成命時邁執競我將思文周頌臣工之什臣工豐年噫嘻有瞽振鷺潛雝客有載見武周頌閔予小子之什閔予小子毖敬之小訪落載芟良耜桓絲衣賚酌般第二十卷魯頌駉水泮有駜閟宫商頌那發長烈祖殷武𤣥鳥臣等謹按詩義折中二十卷乾隆二十年皇上御纂鎔鑄衆説演闡經義體例與周易述義同訓釋多參稽古義大㫖亦同盖我聖祖仁皇帝欽定詩經𫝊説彚纂於集𫝊之外多附録舊説實昭千古之至公我皇上幾暇研經洞周窔奥於漢以來諸儒之論無不衡量得失鏡别異同伏讀御製七十二侯詩中虹始見一篇有晦翁舊解我疑生句句下御注於詩集𫝊所釋蝃蝀之義詳為辨證併於所釋鄭風諸篇槩作淫詩者亦根據毛鄭訂正其訛反覆一二百言益足見聖聖相承心源如一是以諸臣恭承彛訓編校是書分章多凖康成徴事率從小序使孔門大義上溯淵源卜氏舊𫝊逺承端緒因欽定詩經以樹義即因御纂周易以立名作述之隆後先輝耀經術昌明洵無過於昭代者矣乾隆四十年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
