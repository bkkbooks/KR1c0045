front:
  text: 欽定四庫全書御纂詩義折中序詩之教大矣古今言詩者衆矣自小序而下箋䟽𫝊注各名其家各是其説辨難紏紛㡬如聚訟曩嘗肄業於此流連諷咏豁然心有所得而考之昔人成說徃徃拘牽扞格不能相通辛未秋間與尚書孫嘉淦論及諸經其所見平實近理因先從事毛詩授以大指命之疏次其義凡舊説之可從者從之當更正者正之一無成心唯義之適視事餘功親為釐定以備葩經之一解編既竣在館諸臣以序請夫詩之道何仿乎其在虞書則曰詩言志志者詩之本也聲與律其後起者也其在魯論則曰一言蔽之思無邪無邪者詩之教也興觀羣怨事父事君其道不越乎此也其在子輿氏則曰以意逆志是為得之此説詩者之宗也逆志而得其志之所在則詩之本得而其為教也正矣𫝊曰衆言淆亂折諸聖用中者聖學之大成也雖不能至心嚮徃之爰竊取皇祖周易命名之義命之曰詩義折中而叙其槩以為弁
