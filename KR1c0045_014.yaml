body:
  text: 北山之什二之六陟彼北山言采其把偕偕士子朝夕從事王事靡盬憂我父母賦也偕偕壯貌士子詩人自謂也陟山采把望父母也偕偕從事不得養父母也以王事靡盬之故不得養其父母而且使父母思己故曰憂我父母也溥天之下莫非王土率土之濵莫非王臣大夫不均我從事獨賢賦也溥遍也率循濵涯也言父母已所獨也王事人所同也天下莫非王土率土莫非王臣皆宜從事而我獨任勞是大夫之賦政有不均也四牡彭彭王事傍傍嘉我未老鮮我方將旅力方剛經營四方賦也彭彭行而不息也傍傍勞而不已也嘉鮮皆善也將壯也言車馬馳驅而不已者謂我未老而方壯膂力正強可以經營四方也此獨賢之故也或燕燕居息或盡瘁事國或息偃在牀或不已于行賦也燕燕安間貌瘁病也或安居於家或盡瘁於國或髙卧於牀或奔走於道則苦樂大相懸矣此不均之實也或不知呌號或慘慘劬勞或栖遲偃仰或王事鞅掌賦也呌呼號召也慘慘苦貌或耳不聞徴發之聲或面常帶憂苦之狀或退食從容而俯仰作態或經理煩劇而倉卒失容極言不均之致也或湛樂飲酒或慘慘畏咎或出入風議或靡事不為賦也言不止勞逸不均而已或湛樂飲酒則是既已逸矣且深知逸之無妨故愈耽於逸也或慘慘畏咎則是勞無功矣且恐因勞而得過反不如不勞也或出入風議則已不任勞而轉持勞者之短長或靡事不為則是勤勞王事之外又畏風議者之口而周旋彌縫之也此則不均之大害而不敢詳言之矣北山六章三章章六句三章章四句北山刺時也夫君子之仕也原以宣勞非求逸也王事靡盬而膂力方剛已欲求逸誰當任勞顧勞可也勞而不均不可也止於勞逸不均猶可也使勞者受逸者之害不可也自古疆場多事之秋君子竭力致身以勞於外而一二得志之小人居息偃仰出入風議始則媒孽而亂其謀終則阻格而制其命於是乎賢勞之人功無可成而罪且不免北山之詩人致怨於大夫有以也誰秉國均必有任其責者矣無將大車祗自塵兮無思百憂祗自疷兮興也將送也疷當作昏也此戒多憂之纍心也言無隨大車而行無益於車而止自塵也無逐百憂而思無損於憂而止自昏也無將大車維塵冥冥無思百憂不出于熲興也冥冥昏之甚也熲與耿同小明也將車久則塵愈多故所見者目前之物而已數步之外則冥冥而無所覩也思憂多則昏愈甚故所明者所憂之事而已此事之外則茫然而無所知也心憂則昏而以為明者不出於所明之外是明者小而昏者大也無將大車維塵雍兮無思百憂祗自重兮興也雍塞也塵多之甚則氣閉而不通也重平聲言重昏也熲者昏於大而明於小於所明而又三思焉則私意起而轉惑并其熲者亦昏矣故曰重也祗自重者言適以重其昏而於所憂之事則毫不能有所轉移也無將大車三章章四句無將大車戒迷也人生之憂不可勝述也天運之循環禍福之倚伏如大車之輪轉非人力所能為逐事而思之機愈深智愈巧而禍愈甚故詩人戒以無思也夫無思者非無所用其心也不思利害而思可否不思趨避而思修為則理得心安而憂自解矣咸之九四曰貞吉悔亡勸思理也憧憧往來朋從爾思戒思憂也明明上天照臨下土我征徂西至于艽野二月初吉載離寒暑心之憂矣其毒大苦念彼共人涕零如雨豈不懷歸畏此罪罟賦也艽野地名二月周正建丑之月也毒害也共人僚友之處者即後所謂靖共者也罪法罟網也大夫困於行役而作此詩言上天照臨下土人之寃苦皆宜鑒之我為人所害而西征至於艽野可謂逺矣二月之初已罹於寒又由寒以至於暑可謂久矣逺行久役艱阻備嘗其人之害我亦大苦矣因思我之僚友意欲援我使歸故感激而至於涕零然我豈不懷歸哉畏此法網之密恐歸而又獲戾也昔我往矣日月方除曷云其還歲聿云莫念我獨兮我事孔庶心之憂矣憚我不暇念彼共人眷眷懷顧豈不懷歸畏此譴怒賦也除歲除也周之二月歲除之時也庶多也眷眷勤厚之意譴責也言昔以歲莫往今未知何時還而歲又莫矣且身獨而事多又恐辦理不暇是以眷顧共人思與同事而畏害我者之譴怒未息是以不敢遽歸也昔我往矣日月方奧曷云其還政事愈蹙歲聿云莫采蕭穫菽心之憂矣自詒伊戚念彼共人興言出宿豈不懷歸畏此反覆賦也奧與隩同歲除之時民皆隩處也蹙急也采蕭積薪也穫菽聚糧也言昔以歲莫往今復歲莫而無由得還者以政事愈急而我愈不暇故采蕭穫菽以為度嵗之計其苦無時已矣然不敢怨人也此皆我不聽正直之故因而益念共人至於束裝啓行然終於不歸者畏害我之人反覆無常雖與之釋怨而終不可信也嗟爾君子無恆安處靖共爾位正直是與神之聽之式穀以女賦也君子謂共人也恆常也靖者盡心共者盡職也神之敬之也聽之從之也式用穀善以與也言我不能歸矣故贈友以言也嗟爾君子無以安處為常當思患而預防之內盡其心外盡其職且擇正直之人相與敬之如神明惟其言之是聽則朋友皆用善道以與汝庶乎可以免禍矣蓋深悔已之濫與小人而不聽正言故願共人之無蹈覆轍也嗟爾君子無恆安息靖共爾位好是正直神之聽之介爾景福賦也息心安也言不止身不可安處心亦不可安息也好愛之也言不止其身相與且其心好之也如此則式穀以女不止免禍且可得福矣小明五章三章章十二句二章章六句小明勸擇交也大夫與正人兼與小人故受小人之害而至於逺行不還因勸所與之正人當専心從君子無復與小人為緣也此雖一時憤激之言然果能靖共爾位而好是正直則所以免禍求福之道莫有外於此矣凡百君子敬而聽之可也鼓鐘將將淮水湯湯憂心且傷淑人君子懷允不忘賦也鼓擊也將將聲大也湯湯水盛也言聞鼓鐘於淮水之上不樂而憂且傷者有懷於古而傷今之不然也淑人君子以善養人之君子也孟子曰以力服人者非心服也以善養人然後能服天下是故教人以禮則民逸威人以兵則民勞逸則聞音而生樂勞則聽樂而生哀哀樂之感禍福之應也然則詩之允懷淑人其故可想矣鼓鐘喈喈淮水湝湝憂心且悲淑人君子其德不回賦也喈喈聲和也湝湝流長也悲則更甚於傷矣回邪也懷古人之不回則今人之回可知也鼓鐘伐鼛淮有三洲憂心且妯淑人君子其德不猶賦也鼛役鼓也周禮以鼛鼓鼓役事是也水中之地曰洲言鼓鐘而又伐鼛是流連而又興作民力竭矣故傷淮水之涸而洲見也妯動也悲而且驚則心動矣猶似也言古人之德殊不似今人也蓋至此始微露憂心之故矣鼓鐘欽欽鼓瑟鼓琴笙磬同音以雅以南以籥不僭賦也欽欽聲有莭也琴瑟堂上之樂也笙磬堂下之樂也雅南樂章儀禮工歌三笙入三間歌三皆雅也上關雎笙鵲巢上葛覃笙采蘩上卷耳笙采蘋皆南也籥舞器也僭差也言樂聲舞容皆不僭而傷悲且妯者其樂是而其人非也故曰禮云禮云玊帛云乎㦲樂云樂云鐘鼓云乎㦲此可以知禮樂之本矣鼓鐘四章章五句鼓鐘傷時也序曰刺幽王也考之載籍無幽王東巡之事韓詩謂昭王時作而亦無確據史稱穆有塗山之㑹塗山在淮南又王西巡歸伐徐徐與淮近竹書王三十七年大起九師東至於江遂伐越既由江至越則淮之南北屢經之矣𫝊曰穆王巡行天下皆有車轍馬跡焉祭公謀父作祈招之詩以止王心曰祈招之愔愔式昭德音思我王度式如玊式如金形民之力而無醉飽之心鼓鐘之作與祈招同㫖其為穆王時詩無疑也淑人君子懷允不忘有以也懷其尚德而不勞民之力也楚楚者茨言抽其棘自昔何為我藝黍稷我黍與與我稷翼翼我倉既盈我庾維億以為酒食以享以祀以妥以侑以介景福賦也楚楚盛密貌茨蒺藜也抽除也我主祭者自謂也與與翼翼皆蕃盛貌積粟曰庾十萬曰億妥安坐也禮曰詔妥尸是也侑勸食也介助景明也言剪除茨棘以為田畝自昔先人何為如此乎蓋將使我於此藝黍稷也我黍我稷我所藝也我倉我庾我黍稷之積也國非無良農也以為人之為之不如我所自為之誠也於是酒食享祀妥侑介福皆以我之黍稷為之蓋力田以致養乃祭祀之本也濟濟蹌蹌潔爾牛羊以往蒸嘗或剝或亨或肆或將祝祭于祊祀事孔明先祖是皇神保是饗孝孫有慶報以介福萬夀無疆賦也濟濟蹌蹌敬之容也禮曰大夫濟濟士蹌蹌是也潔與潔通在滌也藝黍稷滌牛羊粢盛犧牲備而後往蒸嘗重之也剝解其皮亨熟其肉肆陳其骨體於爼將奉而進之也屢言或者各司其事非一人也祊廟門內也祭祊求神也祀事與祊並舉者也祼鬯求諸隂焫蕭求諸陽直祭祝于主索祭祝于祊也皇君臨之也神保保先祖以來者護從之屬也求神而神來乃孝孫之慶故神報以福併報以夀也此初獻之事也執㸑踖踖為爼孔碩或燔或炙君婦莫莫為豆孔庶為賔為客獻酬交錯禮儀卒度笑語卒獲神保是格報以介福萬夀攸酢賦也㸑竈也踖踖敬而敏也孔碩牲體大也言薦熟也燔燒肉炙炙肝言從獻也禮云主人獻尸賔長以肝從主婦獻尸兄弟以燔從是也莫莫敬而靜也凡祭也者必夫婦親之所以備內外之官也豆所以盛羞者君婦所為也孔庶多也二羞皆具言備物也賔客四方來助祭者賔長為賔衆賔為客也獻酬互飲也主人酳尸主婦亞獻賔三獻畢主人遂酌以獻賔而賔酬之也交錯旅酬也衆賔與兄弟皆遍也卒盡也言其禮儀盡合法度而笑語盡得宜也古者於旅也語故有笑語也格至也前言饗者初來而饗其祀今言格者親至酬獻之地而報以福夀若與之相酬酢也此亞獻終獻之事也我孔熯矣式禮莫愆工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如幾如式既齊既稷既匡既敕永錫爾極時萬時億賦也熯勞也幾期式法也齊整肅也稷敏給也匡正敕戒也言主人甚勞而行禮莫愆故神使工祝往告孝孫而賞賚之也苾芬孝祀言黍稷馨香牛羊肥腯也神嗜爾飲食之豐潔故豫爾以諸福之物如期而來如法而具也踖踖莫莫既齊也孔碩孔庶既稷也禮儀卒度既匡也笑語卒獲既敕也神悅爾禮容之莊敬故錫爾以衆善之極億萬斯年永永無已也朱子曰各隨其事而報之以其類是也此言獻畢受嘏之事也禮儀既備鐘鼓既戒孝孫徂位工祝致告神具醉止皇尸載起鼓鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私賦也既備禮成也既戒樂止也徂位阼階下西面之位也致告告利成也神無形而言具醉者誠敬之至如見之也尸稱皇尊之也神依於尸神醉故尸起也鼓鐘金奏肆夏也送尸而先祖歸故神保亦歸矣前同饗今同歸也廢去也朱子曰不遲者以疾為敬亦不留神惠之意也鄭康成曰祭畢既歸賔客之爼同姓則留與之燕所以尊賔客親骨肉是也燕而言私者非狎昵之謂也祭重公義雖諸父亦在臣子之列燕伸私恩故天子諸侯皆尊諸父而與兄弟齒也此送神之事也樂具入奏以綏後祿爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君夀考孔惠孔時維其盡之子子孫孫勿替引之賦也祭畢而燕於寢故廟中之樂皆入奏於寢也綏安也人神之主也祭而受福今祿也燕而人歡則神喜而又降之福故曰以綏後祿也爾殽即所徹之羞也記曰因其酒食聚其宗族以教民睦是也莫怨具慶所謂親親則諸父昆弟不怨也小大稽首燕畢祝嘏也言神既醉飽而使君夀考矣人之意亦與神同也孔惠孔時言此祭甚順於理甚得其時也盡者推其意而廣之使天下之事無不順理而得時也又欲子子孫孫勿廢祭事且引而伸之不數不疏也以祭祀之道通之天下而垂於萬年所以為逹孝也此言燕私之事而以孔惠孔時四語總結之也楚茨六章章十二句楚茨天子祭祀之禮也古者天子為藉千畝冕而朱紘躬秉耒以事天地山川社稷先古敬之至也周禮充人掌繫祭祀之牲牷於宰芻之三月又大司樂尸出入奏肆夏鐘師掌金奏鼓鐘以奏九夏肆夏其一也記曰先王之所以治天下者五貴有德貴貴貴老敬長慈幼楚茨之義備矣黍稷倉庾躬耕藉田而藏之御廩潔爾牛羊則在滌而芻之也尸稱皇而鼓鐘送之其為天子之禮無疑矣先祖孝孫所以序昭穆也執㸑為爼序事以辨賢也君婦為豆助內以備物也為賔為客尚德而序爵也獻酬交錯以逮賤也父兄燕私以養老也小大咸在以慈幼也正君臣親父子明夫婦貴貴而賢賢老老而幼幼先王所以治天下之道如指諸掌矣君子是以知祭之為義大也信彼南山維禹甸之畇畇原隰曽孫田之我疆我理南東其畝賦也信與伸通山之引伸綿亘者也甸治也維禹甸之修水道也禹曰豫决九川距四海濬畎澮距川畎澮達於川則溝洫修而川麓綿亘皆可樹藝矣由是以封建諸侯而原隰墾闢曽孫得以田之也既守封域益修禹功疆以定其經界理以達其遂溝而畎畝之縱橫物土之宜而布之矣劉彛曰其遂東入於溝則其畝南矣其遂南入於溝則其畝東矣此井田之法也上天同雲雨雪氛氛益之以霡霂既優既渥既霑既足生我百穀賦也同雲雲色同也氛氛猶紛紛也霡霂小雨也優渥霑足皆饒洽之意陸佃曰豐年之冬必有積雪而其春必有小雨故是詩雨言小雪言盛也然雪欲其盛又欲其澤浸之周故繼之曰優渥雨欲其小又欲其膏潤之遍故繼之曰霑足如此則雨雪得宜而百穀生矣朱公遷曰田之治者禹之功穀之生者天所賜詳述之不忘本也疆埸翼翼黍稷彧彧曾孫之穡以為酒食畀我尸賔夀考萬年賦也埸田畔也翼翼整飭貌彧彧茂盛也畀與也此承上文而言也南東其畝則疆埸翼翼矣生我百穀則黍稷彧彧矣凡此國中之田皆曾孫之穡故收其所入以為酒食而妥侑皇尸獻酬賔客庶神降我以夀考之福也中田有廬疆埸有瓜是剝是菹獻之皇祖曾孫夀考受天之祜賦也中田公田也八家同井其中為公田內以二十畝分八家為廬舍也墻下有樹田畔有植瓜其一也漢書曰瓜瓠果蓏植於疆埸是也瓜成而剝削淹漬以為菹也夫祭祀之菹多矣水草之菹陸産之醢小物備矣三牲之爼八簋之實美物備矣而獨有取於中田之瓜者廬舍疆埸皆皇祖所締造瓜瓠剝菹乃孝孫所經營是以神悅而天降之祜也祭以清酒從以騂牡享于祖考執其鸞刀以啓其毛取其血膋賦也清酒鬱鬯之屬也騂赤色周所尚也鸞刀刀有鈴也膋脂膏也此正言其祭也祭以清酒灌地也求神於隂也從以騂牡迎牲也執鸞刀貴其義也聲和而後斷也啓毛告純也取血告殺也取膋升臭也合之黍稷實之於蕭而燔之求神於陽也此祭祊以前之事也記云祭之日君牽牲卿大夫序從入廟門麗於碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋此諸侯之祭禮也是蒸是享苾苾芬芬祀事孔明先祖是皇報以介福萬夀無疆賦也蒸進也享薦也苾芬香也言薦熟也祀事薦熟以後之事也何楷曰楚茨詳於後而略於前自祭祊以前但以祀事孔明一語槩之信南山詳於前而略於後自薦熟以後亦以祀事孔明一語槩之是也前言畀尸賔以介夀獻皇祖以受祜皆擬議之詞至此則先祖果來而報之以福夀也言皇祖言皇考又言先祖祫祭也信南山六章章六句信南山諸侯祭祀之禮也左傳曰民神之主也是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗㫖酒謂其上下皆有嘉德而無違心也所謂馨香無讒慝也信南山之義猶是也疆理田畝先成民也雨雪生榖所謂三時不害而民和年豐也祭以清酒力穡之所為也所謂有嘉德而無違心也從以騂牡畜牧之所得也所謂民力普存而備腯咸有也疆埸瓜菹謂物産之蕃滋也地無遺利而孝無餘思也苾芬蒸享所謂馨香無讒慝也得天之時因地之利盡人之力蕃物之産致力於民者勤而後致敬於神者備致敬於神者愈備則所以致力於民者愈不得不勤矣君子是以知祭之為義大也倬彼甫田歲取十千我取其陳食我農人自古有年今適南畝或耘或耔黍稷薿薿攸介攸止蒸我髦士賦也倬明貌甫大也十千計公田也一成十里以萬畝為公田一同百里以萬夫為公田皆十千之數也我田主也陳舊粟也農人私百畝以養公田者也介廬舍也蒸進髦士俊民也言此開明之大田嵗取十千之入非以之自有餘也將積而陳之取以食農人也農人足食益肆力於南畝故自古以來常有年也古既如此今亦宜然於是君公親適南畝見其耘耔以時而黍稷茂盛或於廬舍之旁或所止息之處進髦士而謀之將方社祈雨使今亦有年也以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以穀我士女賦也齊與粢同禮云稷曰明粢是也犧羊純色之羊也社后土方四方之神御迎也田祖先嗇也周禮凡祈年於田祖則吹豳雅擊土鼓以樂田畯是也穀善也此與髦士行之也以其粢盛與其犧牲祭社方而祈年非以自為凡以為農夫也又盛樂雩祭迎田祖以祈雨蓋欲大我黍稷使我之士女有養且樂於為善也方社統於地隂祀也故以禮為主祈雨禱於天陽祀也故以樂為重曾孫來止以其婦子饁彼南畝田畯至喜攘其左右嘗其㫖否禾易長畝終善且有曾孫不怒農夫克敏賦也曾孫田主也非祭而稱曾孫者民自比於家人故從其廟中之稱也攘取㫖美易治長竟有多敏速也此既雨而巡省也定中之詩曰靈雨既零命彼倌人星言夙駕稅于桑田是也婦子出餉敏於事也田畯至喜喜其敏也曾孫乃取其左右之所饋而遍嘗其㫖否固以見上下之相親而且㫖者知其有餘否者知其不足又將取陳以食之也民於是盡力耘耔禾治竟畝可預卜其善且多焉其所以曾孫不怒而農夫克敏者皆上之德意有以感之也曾孫之稼如茨如梁曾孫之庾如坻如京乃求千斯倉乃求萬斯箱黍稷稻粱農夫之慶報以介福萬夀無疆賦也茨屋茨言密比也梁車梁言穹窿也此納稼於圃之象也坻水中髙地京髙邱也此積粟於場之象也箱車箱求倉求箱者將以大車載黍稷稻粱而納於曾孫之倉也納於曾孫之倉而以為農夫之慶者曾孫不自食又將取其陳以食農人也曾孫勤農積粟皆以為民故農夫飲和食德咸欲報君共祝君夀之無疆上下相親之至也甫田四章章十句甫田勸農也民國之本也食民之天也農食之所從出也故立國之道勸農為先勸之云者非徒督責之也必有所以養之我取其陳食我農人養之善道也取其陳者出故納新無紅腐也食我農者周之給之不責償也歲取十千有常額也歲豐君取之歲歉君與之水旱不齊而民食常足故雖歉而亦如有年而且為之祈甘雨而且為之省耕耘禾易長畝甘雨時降則歲果常有而陳陳相因矣此先王之政所以贊天地之化而立蒸民之命也匪直此也古者士出於農野處而不昵其秀民之能為士者必足賴也省耕省耘之暇進髦士而與之講肄則隴畝皆庠序公卿皆師儒矣由是粢盛犧牲教民以禮琴瑟擊鼓教民以樂不怒克敏教民以敬報福祝夀教民以愛既厚其生復正其德本之以愛敬文之以禮樂而皆於勸農得之君子是以知后稷公劉之造周也大田多稼既種既戒既備乃事以我覃耜俶載南畝播厥百穀既庭且碩曾孫是若賦也種擇其種也戒飭其具也覃利俶始載事庭直若順也蘇轍曰田大而種多故於今歲之冬具來歲之種戒來歲之事凡既備矣然後事之取其利器而始事於南畝既耕而播之其耕之也勤其種之也時故其生也皆直而大以順曾孫之所欲此詩為農夫之詞以頌美其上若以答前篇之意也既方既皂既堅既好不稂不莠去其螟螣及其蟊賊無害我田稚田祖有神秉畀炎火賦也方房也孚甲始生也皂粒汁未滿也稂秀而不實者莠似苗而非苗也蟲食苗心曰螟食葉曰螣食根曰蟊食莭曰賊稚幼禾也既庭且碩言其苗也既方既皂言其秀也既堅既好言其實也既耘之後百草皆去稂莠似苖猶有存者既實之後并稂莠而去之則嘉穀愈茂也然又恐螟螣蟊賊之為田稚害也此則非人力所能去故望田祖之神取而付之炎火蓋田祖神農是為炎帝盛夏之時炎帝司令故其祝禱之詞如此此望神為曾孫除害而農夫亦享其利也有淹萋萋興雨祁祁雨我公田遂及我私彼有不穫稚此有不斂穧彼有遺秉此有滯穗伊寡婦之利賦也淹水氣也萋萋雲盛貌祁祁徐也雲盛則雨多雨徐則入土也公田曾孫之田也井九百畝其中為公田借八家之力以耕之故曰惟助為有公田也稚晚禾穧束秉把也滯刈之所不及也既無稂莠又無蟲害則所需者甘雨而已而猶欲其先公以及私蓋其尊君親上之義習以性成也雨𤾉時若則有年矣故於其收斂之時或有未穫之晚禾或有未斂之禾束或有遺忘之秉或有漏滯之穗皆留以為寡婦之利蓋古者鰥寡孤獨待養於上故留所有以與之所以廣曾孫之仁愛非狼戾而暴棄之也曾孫來止以其婦子饁彼南畝田畯至喜來方禋祀以其騂黑與其黍稷以享以祀以介景福賦也曾孫來止省斂也婦子饁田敏穫也田畯至喜喜其勤也歲功既成則宜報祭而不遽舉也必待曾孫之來乃祭之欲曾孫主之也望祀各以其方之色此特舉騂黑者蓋以螟螣蟊賊秉畀炎火故禮南方報祝融也雨我公田遂及我私故禮北方報元冥也以介景福農夫為曾孫祈福也輔廣曰以其婦子饁彼南畝所以慰上之心也以享以祀以介景福所以愛上之身也大田四章二章章八句二章章九句大田報祀也農夫感上之恩德故於收穫之後祀神而為上祈福也歲取十千上不自食所以食農夫也俶載南畝下不自為所以順曾孫也以祈甘雨以穀士女上勤下也雨我公田遂及我私下急上也以社以方農夫之慶上為下祈也以享以祀以介景福下為上報也上下相親至於如此而雨𤾉有不時若年穀有不順成者乎至於遺秉滯穗惠及鰥寡則庶幾哉大同之世矣雨欲其先之公也不必急已利欲其公之人也不必私於己非后稷公劉之盛德曷克臻此君子讀甫田大田良耜載芟諸詩未嘗不神逰於其際也成周之宇宙太和乃至斯乎卜年卜世有以也瞻彼洛矣維水泱泱君子至止福祿如茨韎韐有奭以作六師賦也此詩以三句為韻矣與止叶茨與師叶珌與室叶同與邦叶也洛水名在東都君子至止者朝㑹於東都也諸侯皆至則天子之福祿愈多故言如茨積之崇也韎茅搜韐韠也茅搜染韠士大夫之戎服也奭赤貌作起也言天子來而百官皆戎服者蓋起六師以從行欲因朝㑹以講武也瞻彼洛矣維水泱泱君子至止鞞琫有珌君子萬年保其家室賦也鞞刀下飾琫刀上飾珌玊也鞞琫有珌天子之刀飾也公劉之詩曰鞞琫容刀是也韎韐有奭百官戎服也鞞琫有珌天子亦戎服也家室王室也天子之神武如此知其能億萬斯年保固王室以臨諸侯也瞻彼洛矣維水泱泱君子至止福祿既同君子萬年保其家邦賦也福祿如茨諸侯以福祿崇天子也福祿既同天子以福祿綏諸侯也邦諸侯之國也天子神武則諸侯畏服而小大相安不惟保王室兼能保萬邦矣瞻彼洛矣三章章六句瞻彼洛矣諸侯朝天子於東都而頌美之也朱善曰周人尚文其弊也恐至於弱故周公戒成王曰詰爾戎兵召公戒康王曰張皇六師皆欲其振厲奮發以聳萬民之觀瞻一四方之趨向也此詩言天子至洛水之上親御戎服以起六師修戎備於巡幸之時講武事於朝㑹之日據地勢以合人心遵國典以承天祜使諸侯咸知王靈之赫奕是固福祿之所由聚邦家之所由安也裳裳者華其葉湑兮我覯之子我心寫兮我心寫兮是以有譽處兮興也裳裳猶堂堂美盛也湑光潤也鄭康成曰華裳裳於上喻君也葉湑然於下喻臣也眀主賢臣以德相承而治道興是也之子謂諸侯也心寫悅而抒也天子遇諸侯而心寫者悅其有才德也君臣相得則聲譽益彰而上下相安是以有譽處也裳裳者華藝其黃矣我覯之子維其有章矣維其有章矣是以有慶矣興也蘇轍曰黃色之正也藝黃之盛也有章有文也君子之有文燦然如華之黃也朱公遷曰和順積中英華發外交際之頃不愆於儀則能得君而獲福矣此美諸侯之能文也裳裳者華或黃或白我覯之子乘其四駱乘其四駱六轡沃若興也或黃或白非一色也沃若柔而潤也言我覯之子見其乘四駱而六轡沃若所謂有力如虎執轡如組也或有文章或善射御如華之或黃而或白也此美諸侯之能武也左之左之君子宜之右之右之君子有之維其有之是以似之賦也此承上二章而言也至治之世必右文文右則武其左也左之而宜者見其才之無不能也右之而有者見其德之無不備也惟其德之存於中者無所不有是以才之見於外者與德相似而無不宜焉以此見有德者必有才而武功仍本於文德也裳裳者華四章章六句裳裳者華天子㑹諸侯於東都而嘉美之也瞻洛之頌天子也専美其能武裳華之美諸侯也兼嘉其右文蓋天子神武則足以威服四海而諸侯亦䝉其休諸侯尚文則承宣德意講信修睦而九伐之法雖設而可不用矣詞不同而義各有當也北山之什十篇四十六章三百三十四句御纂詩義折中卷十四
