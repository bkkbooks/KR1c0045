body:
  text: 鄘風一之四鄘不詳其始封後入於衛故鄘風皆衛事也鄘滅矣猶繫鄘存鄘也不予衛之得滅鄘也春秋昭公八年楚既滅陳矣九年猶書陳灾與詩存邶鄘同義故曰詩與春秋相表裏者也汎彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只興也中河河中也髧髮垂貌髦子事父母之飾儀匹也之至矢誓諒信也此節婦恐父母奪其志也舟在河中不復出岸以興婦在夫家不復之他也兩髦之人既為我匹一與之齊終身不改故至死誓無他焉母猶天也猶不諒人之心乎以衛之淫風流行而獨能皎然不汙於此見天理之常存而人心之不死也汎彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只興也舟在河側亦不行陸以興婦雖夫死亦不他適也特獨也夫為婦匹則婦之心中止夫一人而已故曰特也慝邪之隱於心者也許謙曰之死靡他其事猶顯至於一念邪思亦誓不發則心純而節永不渝矣柏舟二章章七句柏舟美節婦也婦從一而終故夫死不嫁然或門户衰微無人可依家道貧窘不能自給當此之時能堅其志而靡他且純其心而靡慝此其幽獨自盟之衷實有人不知而天諒之者若掩没不彰則無以勸善矣聖人錄柏舟於鄘風之首所以𤼵潛徳之幽光使苦節者得以自慰也抑士庶之家多有婦欲守志而父母奪而嫁之者夫其嫁之所以憐之也然與其失節而生何如守節而死况子本無他而親奪其志亦不善愛其子矣聖人錄柏舟使天下之為舅姑父母者曲諒貞婦之心而勿奪其志所以培植人倫扶持節義其意逺矣牆有茨不可掃也中冓之言不可道也所可道也言之醜也興也茨蒺藜蔓生多刺中冓閨閫也衛自宣公以來宫闈淫亂人所難言詩人疾之言牆上之茨蔓刺而不可掃也閨閫之言淫亂而不可道也擇其可道者道之猶覺言之甚醜則其不可道者何如哉是不道之道深於道也牆有茨不可襄也中冓之言不可詳也所可詳也言之長也興也襄盡除之也詳悉數之也長者其事甚多詳之而不能盡也牆有茨不可束也中冓之言不可讀也所可讀也言之辱也興也束約之也讀者約其詞使可誦也詳者多言之讀者少言之多言之而不能盡其狀少言之而不能諱其惡故以為汙我齒頰也夫已之所為而至使人不忍言亦不可以為人矣上之所為而至使下不忍言亦不可以為上矣牆有茨三章章六句詩序曰牆有茨衛人刺其上也楊時曰中冓之言至不可讀聖人何取焉而著之經也蓋自古淫亂之君以為宻於閨門之中世無得而知者故自肆而不返聖人著之於經使後世為惡者知雖閨中之言亦無隱而弗彰也其為訓誡深矣君子偕老副笄六珈委委佗佗如山如河象服是宜子之不淑云如之何賦也偕老同生死也副后夫人之首飾笄簪也珈以玉為之笄之飾也委委舒徐佗佗安重安重故如山舒徐故如河也象服禮服宜稱也言夫人與君偕老故與君同尊而有副珈之飾焉必徳容之盛如山如河而後稱其服今子之不淑失偕老之義矣其如此服何哉惜其不稱也玼兮玼兮其之翟也鬒髮如雲不屑髢也玉之瑱也象之揥也揚且之晳也胡然而天也胡然而帝也賦也玼鮮眀也翟祭服鬒黑也如雲美且多也髢假髻髮多則不用也瑱所以塞耳揥所以摘髮以美玉象骨為之也揚且歎美之辭晳白也極言其承祭之時服飾容貌之盛也胡然而天言非世之所有也胡然而帝言非人所能為也以不淑之人而如此其故不可觧矣故曰胡然也瑳兮瑳兮其之展也蒙彼縐絺是紲袢也子之清揚揚且之顔也展如之人兮邦之媛也賦也瑳潔白也展見賔之服絺之細者曰縐紲袢服名衣展衣而蒙以縐絺是所謂紲袢見賔之盛服也清目眀揚眉秀顔額豐也極言其見賔之時服飾容貌之盛也展誠媛賢也言果内有實徳外又如是之美焉豈非女中之賢而邦家之光哉勉以能稱也君子偕老三章一章七句一章九句一章八句詩序曰君子偕老刺衛夫人也刺夫人之詩而經存之者為其立言有體也不言其惡而極言其美惜其不稱而勉以能稱庶幾化不淑而為賢媛也士之有才猶女有貌也有才而得位猶有貌而居尊亦難得之遇也果自惜其才與遇而脩徳以稱之非國之良哉而以一念營私遂失其才并其名與位而亦失焉可惜也小人不自惜而君子惜之聖人存其惜之之辭所以使後之小人知自惜也所以使後之君子知惜小人也君子憐小人而惜之小人亦知自惜而勉以求稱其才與位撥亂反治之樞機莫大於是矣豈徒曰刺夫人之不淑已哉爰采唐矣沬之鄉矣云誰之思美孟姜矣期我乎桑中要我乎上宫送我乎淇之上矣賦也唐蒙菜也沬衛邑所謂妹邦也姜齊國之女貴族也桑中上宫遊觀之所期約要迎也衛風淫亂至於世族在位相竊妻妾詩人疾之而賦是詩也託采唐而思孟姜男好淫也期之要之送之女誨淫也期我要我送我公然言之不恥淫也詩人如其言而述之當局者不恥而旁觀者恥之也爰采麥矣沬之北矣云誰之思美孟弋矣期我乎桑中要我乎上宫送我乎淇之上矣賦也麥榖名秋種夏熟朱子曰弋春秋或作姒蓋杞女夏之後亦貴族也爰采葑矣沬之東矣云誰之思美孟庸矣期我乎桑中要我乎上宫送我乎淇之上矣賦也葑蔓菁秋菜也庸與鄘通鄘為衛所滅其後在衛亦貴族也鄧元錫曰采唐采麥采葑不一其時沬鄉沬北沬東不一其地孟姜孟弋孟庸不一其人而期而要而送如出一軌焉蓋恥心亡而淇沬之間風潰四流而不可止也桑中三章章七句詩序曰桑中刺奔也事之可恥莫甚於淫奔乃公然為之而公然言之不惟不恥而且以相誇衛風至此人類無以異於禽獸矣不再造不可以國天之亡之蕩其穢也豈得已哉禍有自起福有自生讀新臺知桑中所從來也其上為之其下效之也讀定中知上為下效未有不亡且以知亡而後存必盡反其所為焉前事者後事之師也可不鑒哉鶉之奔奔鵲之彊彊人之無良我以為兄興也鶉䳺屬奔奔彊彊居有常匹飛則相隨之貌人謂公子頑也朱子曰衛人刺宣姜與頑非匹偶而相從也故為惠公之言以刺之曰人之無良鶉鵲之不若而我反以為兄何哉鵲之彊彊鶉之奔奔人之無良我以為君興也人謂宣姜君小君也鶉之奔奔二章章四句鶉之奔奔衛人刺其上也范處義曰衛詩至此而人道盡天理滅矣楊時曰詩載此篇見衛為狄所滅之因也故在定之方中之前定之方中作于楚宫揆之以日作于楚室樹之榛栗椅桐梓漆爰伐琴瑟賦也定室星也營室昏中興築之時也楚邑名宫廟揆度也揆日測日景也榛栗之實可食桐可為琴椅桐類梓可為器漆可飾物皆良木也衛為狄所滅文公徙楚邱以興衛定之方中順時令也揆之以日正方位也先作楚宫重宗廟也繼作楚室立朝堂也建國之初百物宜備故田疇之外佐以種樹阜財用也榛栗以備籩豆椅桐以伐琴瑟興禮樂也升彼虚矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧賦也虚土阜也堂邑名景大山京髙陵允信臧善也此叙其將營宫室之先也升虚望楚審形勢也望楚與堂建都邑也景山與京慎封守也將設險以守國也降觀于桑辨植産也物土之宜而布其利也卜云其吉謀及卜筮慎之至也終焉允臧要其成也能慎始者必能善終盡人事者必獲天佑也靈雨既零命彼倌人星言夙駕說于桑田匪直也人秉心塞淵騋牝三千賦也靈神也零降也倌人主駕之官星見星之時說舎止也匪直猶言不但秉操塞實淵深也馬七尺以上為騋牝字駒者也此言其既營宫室之後也靈雨既零者政事脩和天休薦至應時而降有如神賜也命彼倌人申戒令也星言夙駕勤廵行也說于桑田者課農夫之事觀紅女之工重衣食之原也如是則人富庶矣不但人也因其秉心之塞淵馬亦至三千之多焉邱牛甸馬足供武備則富而且强矣鄒泉曰懷國家根本之圗而不事乎虚文所以為塞實建國家乆逺之策而不狃於近利所以為淵深也左傳曰文公衣大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乗其季年乃三百乗定之方中三章章七句詩序曰定之方中美衛文公也狄人入衛文公渡河野處漕邑齊桓公城楚邱而遷之定中再造衛也觀其立國之初日不暇給然規模鴻逺矣因天之時辨方正位察地之利體國經野立其基也基立而政行焉養之以農桑衛之以戎焉教之以禮樂而歸本於心之塞淵天徳王道燦然可覩矣夫猶是衛也昔何為而淪胥今何為而昌熾邦之興廢曰由一人人之聖狂曰由一心觀衛之所以滅與其所以再興亦治亂得失之林也蝃蝀在東莫之敢指女子有行遠父母兄弟比而賦也蝃蝀虹也日與雨交倏然成質天地間不正之氣也莫之敢指惡之也以比淫奔之人人皆賤之也又况女子有行必遠其父母兄弟以禮而行猶可歸寧以奔而行不可復返何為盡棄所親乎朝隮于西崇朝其雨女子有行遠兄弟父母比而賦也虹映日而成暮日沉西故蝃蝀在東朝日升東故蝃蝀隮西也崇終也從旦至食時為終朝方雨而虹見則其雨終朝而即止以比淫奔之人其夫婦之情亦不能乆蓋不特人賤之其夫亦賤之也又况女子有行盡逺其兄弟父母人即不念兄弟未有不思父母何為不顧所生乎乃如之人也懷昏姻也大無信也不知命也賦也乃如之人兼男女而言昏姻男女之欲也言淫奔之人但知懷男女之情欲而不知夫婦者人之正道亦天之定理今背人道逆天理而淫奔則是大無信而無處不欺人也不知命而無時不違天也天人之所不佑行將何之矣指蝃蝀觸其羞惡之良也遠父母發其惻隱之心也大無信啓其畏人之念也不知命動其畏天之思也程子曰人雖不能無欲然當有以制之無以制之而惟欲之從則人道廢而入於禽獸矣以道制欲則能順命蝃蝀三章章四句詩序曰蝃蝀止奔也一章二章先止女也婉諷之也巽與之言也三章兼止男也直責之也法語之言也蓋深知淫奔之可恥故不惜諄復以止之也夫猶是衛之人也桑中之詩何為並不知恥有先之者也新臺是也蝃蝀之詩何為深以為恥亦有先之者也定中是也上好淫則下勸奔上惡奔則下止淫上縱欲則下從懷上好義則下順命民皆勸奔雖欲不亡不可得也民皆順命雖欲不興不可得也國之興亡在於風俗之美惡俗之美惡在於人心之貞淫國風於好徳好色之際三致意焉豈無故哉相䑕有皮人而無儀人而無儀不死何為興也相視也儀威儀也儀者身之文猶皮也䑕尚有皮人反無儀曾䑕之不若也人不如䑕生不如死且即不死將何所為哉相䑕有齒人而無止人而無止不死何俟興也止容止也止者事之節猶齒也人之生也欲有所為不能即為故生以俟之人而無止俟亦無益又何必俟哉相䑕有體人而無禮人而無禮胡不遄死興也體支體也禮無不在猶體之無不具也人而無禮儀與止皆無矣無所為而無所俟則速死可也鄭康成曰生而敗俗傷化不如其死無所害也相䑕三章章四句詩序曰相䑕刺無禮也詩之為教温柔敦厚至相䑕而激烈有以也彼親見衛之先人淫亂無禮設使早死猶可以不亡惟不幸而不死是以稔惡而不可救是不死而多為無禮誠不如遄死之為愈也然則人之自命為人而生於世者宜何如自勵乎故三復相䑕不敢偷生辭之激也有取於其激也孑孑干旄在浚之郊素絲紕之良馬四之彼姝者子何以畀之賦也孑孑特出之貌旄牛尾也以旄注於干首而建之車後大夫之旗也素絲束帛也程子曰束帛乗馬以行禮於賢者是也物相比曰紕兩束也姝殊也畀與也此賢人在浚而衛大夫就見之也在郊入浚境也兩帛四馬備其禮也意誠而禮備彼姝者子宜何如以畀之乎蓋國人喜有此舉而欲賢者示以善道也孑孑干旟在浚之都素絲組之良馬五之彼姝者子何以予之賦也鳥隼曰旟組以合縫左右兩縧中壓一縧曰組素絲組之三束也在都則與賢者近矣故素絲加而為三良馬加而為五也孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告之賦也析羽為旌干之飾也祝屬也兩兩相屬蓋四束也在城則與賢者更近矣故素絲加而為四良馬加而為六也逓近則禮逓加好賢之至也朱善曰大夫者朝夕與君圖議國政者也賢者以所學而告之大夫大夫以所聞而告之君君以所告而施之政事則舉國咸賴之矣故國人喜而望之也干旄三章章六句詩序曰干旄美好善也夫苟好善則天下之人皆將輕千里而來告之以善况其邇者乎故就見賢人圖治之先務也衛本以淫亂無禮不樂善道而亡其國文公再造易轍改絃於是淫奔止於蝃蝀無禮刺於相䑕好善美於干旄舊染汙俗煥然一新矣三代而後學術不眀謂天徳無與於政事謂王道迂濶而不為試觀定中之詩其徳則秉心塞淵非有詭異之謀也其道則農桑禮樂非有操切之令也乃蝃蝀相䑕民皆有恥至干旄而格於善矣有恥則於變格善則時雍堯舜之治不可復行於後世乎徳眀而民新不虚也有志者設誠而致行之可也載馳載驅歸唁衛侯驅馬悠悠言至於漕大夫䟦渉我心則憂賦也載語辭弔生曰唁悠悠逺也山行曰䟦水行曰渉朱子曰許穆夫人閔衛之亡馳驅而歸將以唁衛侯於漕邑未至而許之大夫有奔走䟦渉而來者夫人知其將以不可歸之義來告故心以為憂也既不我嘉不能旋反視爾不臧我思不遠既不我嘉不能旋濟視爾不臧我思不閟賦也嘉許臧善遠違濟救閟暗也言大夫既不我許我自不能歸而救衛矣但視爾之意以我之歸為不善則誤矣我實有應反之道不遠於理也我實有能濟之策不閟於事也陟彼阿丘言采其蝱女子善懷亦各有行許人尤之衆稺且狂賦也蝱貝母也主療鬱症善懷多憂也行道也既不適衛故登髙采藥以觧憂因言女子多憂亦各有道非徒為無益之悲而許人乃以為過則是少不更事而且狂妄自以為是也我行其野芃芃其麥控于大邦誰因誰極大夫君子無我有尤百爾所思不如我所之比而賦也麥經霜而猶茂以喻國滅猶可興也因藉極至也此章乃道其不逺不閟之實也言我行其野見麥經霜雪尚能再茂豈國經禍亂不可復興故欲歸而唁之使控告於大國誰為因藉誰肯來至多方求之必有濟也言及於此則大夫君子當不以我為尤爾之所思不過守禮我之所之乃欲行權以救衛也然卒從其大夫而不歸所以為賢也載馳四章二章章六句二章章八句詩序曰載馳許穆夫人作也春秋閔公二年狄入衛宋桓公立戴以廬於曹許穆夫人賦載馳是也宋桓既立戴公矣又言控于大邦者欲求齊也文公為衛之多難也先適齊又齊子者戴公之姊也齊子歸齊文公在齊齊桓新伯諸侯服從非齊不足以存衛也誰因誰極夫人籌之熟矣亦各有行豈虚語哉而卒從其大夫而不歸未嘗果以許人為狂也智足圖存而貞能守禮故聖人有取焉鄘風十篇二十九章一百七十六句衛風一之五衛武王弟康叔之國紂之故都也左傳曰分康叔封畛土畧自武父以南及圃田之北境其後不知何時并得邶鄘之地瞻彼淇奥綠竹猗猗有匪君子如切如磋如琢如磨瑟兮僴兮赫兮咺兮有匪君子終不可諼兮興也淇水名奥隈也猗猗少而美也匪斐通文也治骨角者以刀切之復以銼磋之治玉石者以槌琢之復以礪磨之瑟嚴宻僴武毅赫盛大咺光明諼忘也此衛人美武公之徳也言竹之少也猗猗而美公之少也其文亦美有進徳之功焉是非判之使分如切也義理研之使精如磋也所以知徳也物欲克治務盡如琢也身心砥礪日新如磨也所以脩徳也其守禮也嚴宻其勝私也武毅其威盛大而可畏其儀光明而可象所以敬徳也如此則善言善行先得乎人心之同然故人皆則而效之不能忘也瞻彼淇奥綠竹青青有匪君子充耳琇瑩會弁如星瑟兮僴兮赫兮咺兮有匪君子終不可諼兮興也青青壯而盛也充耳瑱也琇瑩美石會縫也弁皮弁以玉飾皮弁之縫中圓眀如星諸侯之服也言竹之壯也青青而盛公之壯也其文亦盛有敬徳之容焉其充耳以琇瑩其會弁如明星蓋既為諸侯而盛服以臨民也夫既為諸侯則其事業固不同於少時然其敬則一也其守理去私不改其瑟僴也其可畏可象益著其赫咺也如此則善政善教深得乎民心故人皆追而思之不能忘也瞻彼淇奥綠竹如簀有匪君子如金如錫如圭如璧寛兮綽兮猗重較兮善戲謔兮不為虐兮興也簀棧也如簀老而宻也金錫言其精純圭璧言其溫潤寛舒展綽從容也猗倚也式上横木曰較與式重疊故曰重較憑式則容俯倚較則不俯不仰得其中也虐害也言竹之老也如簀而宻公之老也其文亦宻有成徳之詣焉學脩之乆而鍜鍊極於精純如金如錫也莊涖之乆而涵養至於温潤如圭如璧也瑟僴之乆恭而能安故舒展而從容然如倚重較不卑不亢則不檢束而自然中度也赫咺之乆降而和易故有時而戲謔然雖有戲言終不害理則不矜持而自不踰閑也蓋敬之熟而忘其敬忘其敬而自無不敬此則學脩之極致盛徳之形容非可作而致也淇奥三章章九句詩序曰淇奥美武公之徳也國語云武公年九十五猶箴儆於國曰自卿以下至於師長士苟在朝者無謂我耄而舎我必恪恭於朝以交戒我作懿戒之詩以自勵則其終身恪恭以成其徳可知也夫明徳新民止善大學之道也致知力行主敬先儒之學也淇奥之詩皆有之焉如切如磋者道學也致知之事也如琢如磨者自脩也力行之事也瑟兮僴兮者恂慄也敬存於中也赫兮咺兮者威儀也敬著於外也致知力行所以明明徳也而必歸於瑟僴赫咺是明徳主於敬也充耳㑹弁莊以涖之所以新民也而不改其瑟僴赫咺是新民主於敬也金錫圭璧幾於至善矣而從容而中度樂易而有節則是瑟僴赫咺之熟而化也仍不外於主敬而已故曰敬者聖學之所以成始而成終也定中掲王道之大端淇奥詳聖學之條貫心思而身體之脩已治人裕如也詩教豈不大哉考槃在澗碩人之寛獨寐寤言永矢弗諼賦也考成也架木為屋曰槃兩山夾水曰澗碩大寛廣言念永長矢誓諼忘也成屋於山水之間亦甚狹隘矣而碩人居之則以為寛焉蓋見其大而心泰故無境不寛也然或學不貞遇而情隨事遷則所謂寛者有時忘之矣碩人雖獨寐獨寤而常念此寛永誓不忘則執徳𢎞而信道篤所得有深焉者矣考槃在阿碩人之薖獨寐寤歌永矢弗過賦也曲陵曰阿薖猶窩也歌樂之也過踰也考槃在阿非可乆安也而碩人居之則以為窩焉伏處藏脩如得巢穴也然或入悅道徳而出慕紛華則所謂窩者又有過焉者矣碩人雖獨寐獨寤而嘯歌自適極天下美麗之境永誓不以踰此所謂不易乎世不成乎名其所守有定焉者矣考槃在陸碩人之軸獨寐寤宿永矢弗告賦也高平曰陸澗阿陸總一處也山中有澗澗旁有阿阿上有陸也軸車軸也輪轉而軸不動且所以轉輪也宿歸結也考槃在陸亦甚寂寞也而碩人居之則以為軸焉抱道觀時任世宙之推移而握其樞而不動且運其機於不窮所謂得其環中者也故獨寐獨寤而精神歸結於此永誓不以告人非不告也得於心者難於言即言之而人亦不觧也盖其所操有大焉者矣考槃三章章四句考槃美隱士也子謂顔淵曰用之則行舎之則藏惟我與爾有是夫夫既已舎之不患不藏而患其無可藏非為藏計也其所藏者即其所行者也碩人之弗諼其寛有可藏也弗過其薖乆藏之也至於弗告其軸則非一於藏矣用舎無與於已行藏獨運於心此孔顔之所以相視莫逆而非石隱者所能知也碩人其頎衣錦褧衣齊侯之子衛侯之妻東宫之妹邢侯之姨譚公維私賦也碩人謂莊姜也頎長貌褧襌衣也錦衣加褧為其文之著也東宫太子也言東宫之妹者明與同母皆嫡出也妻之姊妹曰姨姊妹之夫曰私邢侯譚公皆莊姜姊妹之夫也諸侯之女嫁於諸侯則尊同故歴言之此極稱其族類之貴也手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮賦也茅芽曰荑白而嫩也脂寒而凝白而潤也蝤蠐木蟲白而長也瓠犀匏子白而齊也螓額廣而方蛾眉細而曲倩口輔好也盼黑白分也此極稱其容貌之美也碩人敖敖說于農郊四牡有驕朱幩鑣鑣翟茀以朝大夫夙退無使君勞賦也敖敖從容也說舎也四牡駕車之馬驕壯貌馬銜外鐵曰鑣人君則以朱絲纒之故曰朱幩左右兩鑣故曰鑣鑣雉羽飾車曰翟前後設蔽曰茀此極言成婚禮儀之盛也夙早也衛人喜莊姜之賢故謂大夫之朝於君者皆宜早退使君無勞於政事得與夫人燕喜此以見舉國之人懽忻愛戴而公不見答實出人情之外矣河水洋洋北流活活施罛濊濊鱣鮪發發葭菼掲掲庶姜孽孽庶士有朅賦也黄河在齊西衛東北流入海洋洋活活充滿流動之貌施設也罛魚罟也濊濊罟入水聲鱣黄魚鮪黑魚葭蘆菼葦𤼵𤼵掲掲多而美也庶姜媵妾孽孽盛貌庶士媵臣有朅勇貌言齊與衛近一水可通其地富庶物産繁昌締姻大國宜相懽好又况庶姜庶士美盛如此則其娣媵之人想亦勝於嬖妾而卒不見答則不可觧矣碩人四章章七句詩序曰碩人閔莊姜也左傳曰衛莊公娶於齊東宫得臣之妹曰莊姜美而無子衛人所為賦碩人也其極言莊姜之美無所不備者求其不答之故而不得也怪莊公也聖人錄之怪天下之似莊公者也夫才之賢否貌之姸媸有目所共見也人之好惡亦不甚相逺也乃有時而至於相反者何也氣稟偏於所賦物欲蔽於所私任其所偏而之焉故好而不知其惡惡而不知其美溺於所蔽而甚焉故好人之所惡惡人之所好如莊公者氣質之偏本與莊姜不合又蔽於嬖妾之情欲故好其所好而不知與人之公好相反至於此也大學誠意之功所以必先致知蓋欲審其所好所惡使不至蔽於所偏也氓之蚩蚩抱布貿絲匪來貿絲來即我謀送子渉淇至于頓丘匪我愆期子無良媒將子無怒秋以為期賦也氓民也蚩蚩無知之貌布幣貿買也頓丘地名愆遲將請也此婦人被棄而自傷也朱子曰既與之謀而不遂徃又責所無以難其事再為之約以堅其志此其計亦狡矣以御蚩蚩之氓宜其有餘而不免於見棄蓋一失其身人所賤惡始雖以欲而迷後必有時而悟是以無徃不困耳士君子立身一敗而萬事瓦裂者何以異此可不戒哉乗彼垝垣以望復闗不見復闗泣涕漣漣既見復闗載笑載言爾卜爾筮體無咎言以爾車來以我賄遷賦也垝壞垣牆也復闗男子所居指所居以名其人也爾卜爾筮言為爾而卜筮也體卦兆賄財也此追念當日之情事也動之以涕泣欵之以笑言假之以卜筮餌之以貨財當日為之以為得計由今思之皆可恥也迷時為之而不知悟時恥之而無及是以君子隨事省察當境覺悟不可貽後日之恥也桑之未落其葉沃若于嗟鳩兮無食桑葚于嗟女兮無與士耽士之耽兮猶可說也女之耽兮不可說也比而興也沃若潤澤之貌以比己之容色光麗也鳩食桑葚則醉而失性以興女與士耽則淫而失身也女子一失其身實無詞可以自觧矣朱子曰士猶可說而女不可說者婦人深悔之辭不可便謂士之耽惑果無所妨也桑之落矣其黄而隕自我徂爾三嵗食貧淇水湯湯漸車帷裳女也不爽士貳其行士也罔極二三其徳比而賦也隕落徂徃漸漬帷裳車飾也爽差極定也桑之黄落以比己之容色凋謝也三嵗食貧值其夫之家道中窘也淇水漸車見棄而復囘也夫色衰而家貧非婦人之罪也而以此見棄則是女心不爽而士心罔極是以得新忘故而二三其徳耳然士固罔極而女豈真不爽哉莫爽於棄禮蔑義而惟情欲之耽則當其與耽之時已不能禁士之貳行矣至見棄而後知之不已晚哉三歲為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣兄弟不知咥其笑矣靜言思之躬自悼矣賦也三歲為婦指其食貧之時也言我三嵗之中不以家務為勞早起遲眠無日不然者欲使爾不貧也所謀既遂而反見棄捐歸而訴之兄弟又咥然其笑焉天壤之大無地可以自容然亦何所歸咎哉但自悼而已自悼云者傷其貪一時之耽而貽終身之戚也情欲之感可不懼哉及爾偕老老使我怨淇則有岸隰則有泮總角之宴言笑晏晏信誓旦旦不思其反反是不思亦已焉哉賦而興也及與泮涯也總角女子未笄之飾晏晏和也旦旦明也言相與為婚本期偕老不意見棄老使我怨也淇尚有岸隰尚有泮既立其限不可踰也總角之時已相和好婚姻之約信誓甚明原不思其老而反也反是不思自悼之甚也前惟致怨於終之見棄至是乃痛悔其始之不思蓋既與士耽宜其見棄是彼之反為固然而已之不思為可怪也此則以理自責并其夫亦不怨可謂悔悟深切而卒末如之何也亦已而已矣啜其泣矣何嗟及矣此之謂矣氓六章章十句氓棄婦自悲也谷風與氓二詩皆怨谷風怨而責之其詞直其始以正也氓怨而悔之其詞悲始不以正也始不以正後雖悔之亦無及矣是故過有悔而可改君子圗其終有悔而不可改君子慎其始始何以慎思其終而已矣易曰君子以永終知敝敝在終而所以敝在始當其始敝不見也永思其終則知之矣知其敝者知其反之謂也有反之自己者有反之自人者已反之者其言不可踐也人反之者其事不可乆也君子之謀始也必要乎已之所可踐故無言不謹也必操乎人之所不得反故無言不愼也籊籊竹竿以釣于淇豈不爾思遠莫致之賦也籊籊細而長也朱子曰衛女嫁於諸侯欲歸寧而不得故作此詩言思以竹竿釣於淇水而遠不可致也泉源在左淇水在右女子有行遠父母兄弟賦也泉源百泉也在衛西北淇水在衛西南吕大臨曰水以山為主衛之山東面故以北為左南為右也言思釣于淇者非思淇也泉源淇水在衛左右女子有行乃遠其父母兄弟而不得常在左右故思之也淇水在右泉源在左巧笑之瑳佩玉之儺賦也瑳白色笑而見齒故瑳也儺玉聲言淇泉左右諸姑姊妹常逰焉其巧笑之瑳然至今猶如見也其佩玉之儺然至今猶如聞也而遠莫致之故思之也淇水滺滺檜楫松舟駕言出遊以寫我憂賦也滺滺長流之貌檜松皆木名楫所以行舟也言淇水之中舟楫具焉安得駕言出遊以寫我憂乎不能寫憂則終身思之而已矣竹竿四章章四句詩序曰竹竿衛女思歸也衛女之思歸者三泉水謀歸也載馳衛有事也竹竿則衛無事而亦不謀歸徒思之而已聖人錄之者有取於其思也夫女子之行父母兄弟在焉其歸寧禮也其思歸情也不當歸而歸則越禮固非也不得歸而并不思歸則忘情亦非也人倫之際身所能至者盡其力所不能至者盡其心衛女守禮不歸而不已於思以為天性之親寤寐不忘必如此而心乃盡也且非徒盡心而已果能不已於思則必謹守婦道無貽親憂歲時問遺以慰親志心之所至力亦必至焉子之所以為孝臣之所以為忠亦若是已矣故聖人有取於其思也芄蘭之支童子佩觽雖則佩觿能不我知容兮遂兮垂帶悸兮興也芄蘭草名蔓生支枝同觿錐也所以觧結能理繁治劇者佩之佩觿比當繁劇之任也知主也言雖當大任而其才能不足為我主事也容飾也遂肆也悸驚動也言無他才能但見其脩飾容好敢為放肆氣體輕佻垂帶數摇而驟動有如驚悸也芄蘭之葉童子佩韘雖則佩韘能不我甲容兮遂兮垂帶悸兮興也韘决也所以引弓能射疏命中者佩之佩韘比掌軍旅之事也甲長也言其才能不足以長於我也芄蘭二章章六句芄蘭刺弱也年少而當重任如芄蘭之支葉弱而不能自舉也夫人之賢否原不拘於老少然閱歴之淺深則視其年不可强也果其才能出衆自不可拘限年之格若彼此不相上下與其用新進不如用老成蓋老成則資深而望重不生人之輕侮且乆閱世故則知畏慎熟諳人情必能謙抑若新進則反是此亦人心世道之所闗也誰謂河廣一葦杭之誰謂宋遠跂予望之興也杭渡也跂企也宋襄公之母出襄公即位夫人思之言誰謂河廣乎但一束葦即可渡之矣誰謂宋遠乎但一跂足即可望之矣然而終於不徃者限於義故也朱子曰嗣君承父之重母出則與廟絶義不可以私徃也誰謂河廣曾不容刀誰謂宋遠曾不崇朝賦也小船曰刀雖一刀而不容言狹之甚也不終朝而即至言近之甚也河廣二章章四句詩序曰河廣宋襄公母歸於衛思而不止故作是詩也竹竿之思衛也言逺河廣之思宋也言不逺逺莫致之猶可致也不逺而莫致則終不致矣割母子之愛而守義不徃可謂賢矣說苑曰宋襄公為太子請於桓公曰願立目夷公曰何故對曰臣之舅在衛愛臣若終立則不可以往輕千乗之國而欲從其母可謂孝矣母賢子孝如此無大故而被出則桓公之過也婦有七出斷以義也又有三不去原其情也聖人錄河廣使知有子之婦借令有過亦當審其輕重而善處之不可因私惡偏憎而遽出既傷夫婦之義而并絶其母子之恩也伯兮朅兮邦之桀兮伯也執殳為王前驅賦也伯夫之字也朅勇桀英武之稱殳槍類婦人因夫從王事而賦是詩言平日武勇為邦之桀今也執殳為王前驅勢必奮勇以死王事故深憂之也衛人行役而言為王前驅者有王命也猶北門之言王事適我也自伯之東首如飛蓬豈無膏沐誰適為容賦也蓬草名首如飛蓬言髮亂也膏沐所以澤髮者適主也言雖有膏沐而夫不在家以誰為主而與為容故任其髮亂而不顧也其雨其雨杲杲出日願言思伯甘心首疾比也杲杲明貌出日不雨也冀其將雨而卒不雨以比君子言歸而乆不歸也過期不歸其事可憂然此王事也生死惟命其誰敢怨故甘心思之以至於首疾不止髮亂而已焉得諼草言樹之背願言思伯使我心痗賦也諼草萱也服之令人忘憂背北堂也痗病也言焉得忘憂之草而樹之北堂乎然此憂終不忍忘也是以寧不求此草願言思之以至於心痗不止首疾而已盖婦人逆知夫之武勇必死王事故欲以身殉之也夫以身殉國婦以身殉夫而皆甘心為之者為王故也可謂義烈矣伯兮四章章四句伯兮美思婦也能知勤王之大義思而不怨也君子是以知文武之澤之入人深也東遷以後王室微矣而諸侯欲有所為猶假王命以行之以為非此不足動其民也故諸侯之尊王多假而百姓之尊王則真觀伯兮之詩一言為王前驅則義不旋踵雖婦人女子皆有同仇敵愾之心所謂四國有王於此見之矣苟有人焉奉天子之威靈因民心之愛戴行仁政以撫之約束諸侯而行其令猶運之掌爾是以孔子欲為東周不置也有狐綏綏在彼淇梁心之憂矣之子無裳比也綏綏獨行求匹之貌石絶水曰梁狐乃淫獸今獨行失其匹也以比人之無妻也狐性畏水今在梁失其居也以比人之無家也在梁宜裳而狐無裳以比綏綏獨行之人不止無妻無家并其一身之所需亦無以自給也民窮如此何以為國故詩人見而深憂之也有狐綏綏在彼淇厲心之憂矣之子無帶比也厲深水可渉處也帯所以束衣也在厲宜帯無帯以束衣則不可渉矣有狐綏綏在彼淇側心之憂矣之子無服比也在側則濟乎水矣無服周一身而言不但無裳與帯而已甚言其窮蹙之狀一無所有也有狐三章章四句有狐憫孤貧也人情一日不再食則饑終嵗不製衣則寒非有匹敵則不能以乆安其處故好貨好色必與民同以為生人之大欲在此也夫所謂與民同者亦非必遇人而推觧之比户而婚配之也經其農桑使得耕織定其禮儀以便嫁娶鰥寡孤獨皆有養也不幸而逢水旱則荒政十二以聚其民而并及於多昏使男女之無天家者皆得相資以為生而并可以牽制其轉徙盖所以為民計者至悉也衛之君臣專欲而不與民同故少多怨曠而老多鰥寡始於淫亂而終於流亡觀有狐之詩其孤苦貧窘與有蓷萇楚同悲視桑中溱洧之景象又别矣盖彼之淫亂尚生於飽煖此之流亡則廹於饑寒也世變逓降而生民之艱難日甚維持世道者宜何如軫念之也投我以木𤓰報之以瓊琚匪報也永以為好也比也木𤓰楙木之實形如小𤓰瓊玉名琚佩名朱子曰投我以木𤓰報之以瓊琚報之厚矣而猶曰匪報姑欲長以為好耳盖報人之施而曰如是足矣則報者之情倦而施者之徳忘惟其歉然常若無以報之則報者之情施者之徳兩無窮也方應龍曰此以風世之薄道徃來而較量於錙銖者投我以木桃報之以瓊瑶匪報也永以為好也比也瑶美玉也木桃更小於𤓰矣瓊瑶更美於琚矣投我以木李報之以瓊玖匪報也永以為好也比也玖青玉木李更小於桃矣瓊玖更美於瑶矣木𤓰三章章四句木𤓰美報施也記曰太上貴徳其次務施報矣施者不可望報受其施者不可忘報報之而不如所施薄也適如所施猶之薄也過於所施可謂厚矣然或自伐其厚而欲施者之徳已自謂過厚而謂先施者可以相忘猶之未厚也必如此詩之投漸輕而報愈重猶以為匪報則相好乃無已矣孔子曰吾於木𤓰見苞苴之禮行以為革薄從忠亦朋友信之之一端也推而上之諸侯之講信脩睦天子之厚徃薄來亦若是而已矣衛風十篇三十四章二百三句御纂詩義折中卷四
