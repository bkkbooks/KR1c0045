body:
  text: 曹風一之十四曹國名在兖州陶邱之北周武王以封其弟振鐸蜉蝣之羽衣裳楚楚心之憂矣於我歸處比也蜉蝣蟲也俗名浮生浮生之生為時甚暫其羽整潔如衣裳之楚楚以喻人之修飾衣裳者有似蜉蝣也君子心有憂焉欲其從我而得所歸庶乎可以久處也處安也得所歸則身安也蜉蝣之翼采采衣服心之憂矣於我歸息興也采采華彩也息靜也得所歸則心靜也蜉蝣掘閲麻衣如雪心之憂矣於我歸說興也閲與穴通管子曰掘閲得玉是也掘閲之本色並無所謂楚楚采采也於是而悟性近習逺則可息處并可說駕矣蜉蝣三章章四句蜉蝣閔世也玩細娛而忘逺慮非僅蚩蚩之氓為然矣其恃以不朽者何在孟子曰萬物皆備於我矣顧人各有我而迷者不悟矻矻窮年究不得其所歸則至人之心憂何時已哉彼候人兮何戈與祋彼其之子三百赤芾賦也候人道路迎送之人何與荷同祋殳也赤芾冕服之韠也大夫以上服之候人荷戈殳為赤芾者前導也言其榮也三百言其多也朱子曰晉文公入曹數其不用僖負羈而柔軒者三百人其謂是與維鵜在梁不濡其翼彼其之子不稱其服比也鵜水鳥能入水以取魚在梁而不濡其翼以比人之在其位而不盡其職也不盡其職則不稱其服矣維鵜在梁不濡其咮彼其之子不遂其媾比也咮喙遂稱媾寵也不濡翼魚在水中不入取也不濡咮魚在水面亦不啄也以比人之居其位而不事其事也如是則有負君之寵遇矣薈兮蔚兮南山朝隮婉兮孌兮季女斯飢比也薈蔚盛多貌隮升也婉孌柔順貌季女少而未字也朱子曰薈蔚朝隮言小人衆多而氣焰盛也季女婉孌自保不妄從人而反飢困言賢者守道而反貧賤也候人四章章四句詩序曰候人刺近小人也國家之爵祿原以待君子非以豫小人一豫小人則爵祿不足以為勸矣且小人進則君子必退小人之進者愈多則君子之退者愈困朝廷之用舍盡與草野之好惡相反則其國可知矣魏之伐檀君子有其功而無其祿小人有其祿而無其功曹之候人小人居其位而無其德君子有其德而無其位二國之政令相同而其危亡亦相似觀於此者可以鑒矣鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮比也鳲鳩布榖也含哺其子朝從上而下暮從下而上均平如一也淑善也淑人君子以善養人之君子也儀禮也鳲鳩在桑而其子有七以比王者宅中御宇而衆建諸侯也諸侯雖衆而王者相待之禮儀均平如一如鳲鳩之哺其子也夫其儀之一者非外飾也王者之心視天下為一家視萬民為一體以治萬民者惟諸侯故其心與之固結而不解也治本於禮禮本於仁心結斯儀一儀一而天下定矣鳲鳩在桑其子在梅淑人君子其帶伊絲其帶伊絲其辨伊騏比也騏青黑色也鳲鳩在桑而其子異處以比王者居京師而諸侯各居其國也梅美木也其子在梅喻國治也諸侯能治其國則天子無為而治但見其帶絲辨騏恭已垂裳而已蓋治戒其紛更而心防其驕泰故無為者所以養無事之福而恭已者所以清敬事之原也鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國比也棘惡木也忒差也其子在棘國難治也諸侯不能治其國亦不必遽有兵刑之加仍以禮治之而已等威嚴而使不敢僭豫奪當而使不敢肆天子之儀不忒則諸侯各謹其度而四國正矣蓋儀之一者非無别而槩施之也賞善罰惡使之同歸於正故其儀有時不一而未嘗忒也不一而不忒乃所以為至一也鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年比也榛衆木也其子在榛如常者也諸侯亦不必有竒才但安分守職則宣天子之德以臨其民而四國之人皆歸於正矣正是四國所謂百辟其刑之也正是國人所謂四方其訓之也至於四國之人皆沐天子之仁則普天之下同祝一人之壽君子萬年保其家邦所必然也鳲鳩四章章六句鳲鳩思聖王也曹叔振鐸太姒之少子也親承文王后妃之訓習覩武王成王之政而深識治化之原意曹之人猶有聞而知之者故鳲鳩之所言與二南無異也心如結兮所以正心也帶絲辨騏所以修身也正是四國則家齊國治而天下平矣心結儀一所以明明德也正是國人所以新民也胡不萬年則新命矣蜉蝣揭大道之要鳲鳩敷至治之澤三代以上之學猶可想見焉讀者不可不盡心也冽彼下泉浸彼苞稂愾我寤歎念彼周京比也冽寒也浸漬也叢生曰苞稂莠屬周京周之西京也周自東遷之後王命不行於諸侯大國行虐政以侵害小國如寒泉之浸苞稂不滋其生而反傷之詩人有感於此故愾然寤歎念周在西京之時未嘗有此事也案曹共公之時晉侯初伯執曹伯畀宋人又分其田後乃以賄免若四國有王豈至此哉冽彼下泉浸彼苞蕭愾我寤歎念彼京周比也蕭蒿也稂猶害榖蕭則野生而已而寒泉亦浸之以比當時小國有罪無罪皆不免侵削也京周西京之周也西京之周不同於東遷之周也冽彼下泉浸彼苞蓍愾我寤歎念彼京師比也蓍筮草也利用前民勝稂蕭逺矣而亦被浸以比當時小國亦有賢君而終不得免也京大師衆也念西京之大衆足以鎮服四國也芃芃黍苖隂雨膏之四國有王郇伯勞之比也芃芃美盛貌郇文王之後左𫝊曰畢原豐郇文之昭也郇本侯爵稱伯者為州伯也竹書載昭王六年王錫郇侯命是以郇伯繼召伯也言西周之時天下之民咸被王澤如芃芃之黍苖又有隂雨以膏之也其所以膏澤下逮者由四國諸侯皆知有王無敢自專而王又命郇伯旬宣以勞來之是以大國之虐政不行小國咸樂其生而傷今之不然也不思召伯而思郇伯者是時郇入於晉矣以見晉侯居郇伯之地而不能繼郇伯之業也故曰五伯者三王之罪人也春秋之作傷天下之無王與詩人有同心矣下泉四章章四句詩序曰下泉思治也程子曰易剝之為卦也諸陽消剝已盡獨有上九一爻尚存如碩大之果不見食將有復生之理上九亦變則純隂矣然陽無可盡之理變於上則生於下無間可容息也隂道極盛之時其亂可知亂極則自思治故衆心願戴於君子君子得輿也詩匪風下泉所以居變風之終也陳傅良曰亂極而不治變極而不正則天理滅矣聖人於變風之末係以思治之詩以示循環之理言亂之可治變之可正也曹風四篇十五章六十八句豳風一之十五豳國名在雍州岐山之北棄為后稷封於邰其子不窋失官而竄於戎狄之間不窋之孫公劉能復修后稷之業乃相土地之宜而立國於豳周公以成王未知稼穡之艱難述后稷公劉之化作七月之詩謂之豳風後人又取周公所作及凡為周公而作者附焉七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒嵗三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜賦也火心星也六月火昏中至七月則流而西也九月霜降天始寒婦功成授衣之候也一之日一月之日也周正以建子之月為一月也變月言日以别於夏時也觱發風寒栗烈氣寒褐毛布也于往耜田器也饁餉之也田畯勸農之官也此章言豳先公之教其民也衣食者民之本月令則上之所授也故以時警其民曰七月流火涼風至矣九月霜降宜授衣矣子月風寒丑月氣寒不止授衣并宜授褐若不預為之謀何以禦寒而卒歲乎寅月往修田器卯月舉足而耕丁壯在田家長同婦子而往餉之老幼男女皆盡力於南畝庶田畯至而喜之焉蓋教以不飢不寒之計也朱善曰大寒之候在於丑月而謀之於建申之時收穫之候在於酉月而慮之於建寅之日豫之至也張子曰民生本乎衣食此禮義之所以起孝弟之所以生王化之所以成也七月流火九月授衣春日載陽有鳴倉庚女執懿筐遵彼微行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸賦也載始也倉庚鳥名懿深美也微行小徑也柔桑稚桑也蘩菜名用以祭祁祁衆也公子公女也孔頴達曰諸侯之女稱公子是也同歸者同時而于歸也此承上章而言九月所授丁壯之布衣也若老者衣帛則其功更豫矣當春日始和倉庚初鳴之候女皆執筐采桑以飼蠶將為帛以衣其父母也又采蘩以供祭教婦職也為女子者不言而心有傷悲知其將與公子同時而于歸則不得久事其父母也男無不耕女無不蠶教以勤也布以衣少帛以養老教之以儉且知孝也采桑采蘩莫不躬親教之以誠且能敬也婚姻以時貴賤同之而又以逺其父母為悲得性情之正也然則二南之化所從來者逺矣七月流火八月萑葦蠶月條桑取彼斧斨以伐逺揚猗彼女桑七月鳴鵙八月載績載𤣥載黃我朱孔陽為公子裳賦也萑葦蒹葭也蠶月治蠺之月也條桑枝落之而取其葉也斨斧屬逺揚高枝也取葉存條曰猗女桑小桑也鵙伯勞也績緝麻也朱赤色陽明也此又承上章而言蠶事不始於今春也當上年七月流火之時已念及之故於八月即以萑葦為曲薄至於今年蠶月乃大采桑或伐條而取其葉或取葉而存其條曲薄具在取而用之至便也朱善曰蠶事既成又於鳴鵙之候而績其麻以為布蓋蠶之所成者可以供老疾給婚嫁奉君上而已非績麻以為布則無以為少壯者之衣也朱子曰凡蠶績之所成者皆染之或元或黃而其朱者尤為鮮明故用以為公子之裳言勞於其事而不自愛以奉其上是也蠶績分功元朱辨色老少異衣上下殊服物采等威已開周禮之先矣四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐狸為公子裘二之日其同載纘武功言私其豵獻豜于公賦也不榮而實曰秀葽苦菜蜩蟬也穫收禾也實墜曰隕葉落曰蘀于貉往取貉也同竭作以狩也纘習而繼之也豕一歲曰豵三歲曰豜此章因衣食之助而及武功也天地陽極而隂生國家治久而亂伏四月純陽微隂已胎故葽感之而秀五月陽盛一隂已生故蜩應之而鳴至八月而禾黍刈收至十月而草木黃落隂盛陽衰所必然也觀天地之化而人事可知矣故兵可百年不用不可一日不備然聖人又恐養兵而費民之財也習武而妨民之事也故纘武功於衣食之間夫老者衣帛即可卒歲君公之貴又必衣裘故於子月觱發之時往而取貉又取狐狸為公子裘而取獸之時巡伺捕逐禦寇緝奸之法已習於此矣於丑月栗烈之日使丁壯同出合圍羣獲習為戰陳又使私其獸之小者為養老之需獻其大者以充祭祀賔客及君庖之用而愛親敬長之道又習於此矣蓋聖人於農桑之間教兵戎又於兵戎之間教忠孝故民從其化而不知國享其福而不覺也五月斯螽動股六月莎雞振羽七月在野八月在宇九月在户十月蟋蟀入我牀下穹窒熏鼠塞向墐戶嗟我婦子曰為改歲入此室處賦也斯螽蝗屬動股以股鳴也莎雞蟲名振羽以翅鳴也宇簷下也在野在宇在戶入牀下者皆蟋蟀也穹空隙也窒塞也向北牖墐塗也十月而曰改歲以建子之月為歲首也此承上文裘褐禦寒之意而言宫室之制也萬物之出入作息與天地之隂陽寒暑相應故五月隂生而斯螽動股感其氣也六月盛暑而莎雞振羽迎涼風也七月暑平故可在野八月露寒故宜在宇九月霜降故宜在戶十月雨雪故入牀下蓋物性通於天道也聖人觀物以宜民一夫授五畝之宅其半在田其半在邑春令民畢出如在野而動股振羽也冬令民畢入如在宇在戶而入牀下也豳民習此久矣故當十月隂盛之時其家長修理在邑之室彌其漏隙去其鳥鼠塞向以當北風墐戶以禦寒氣而語其婦子曰歲將改矣可以入此室處矣蓋舊歲耕桑事畢宜隩處而息勞新歲微陽初生當安靜以養之也觀天之行察物之化驗民之情協張弛之宜而順性命之理所以為王道也六月食鬱及薁七月亨葵及菽八月剝棗十月穫稻為此春酒以介眉壽七月食瓜八月斷壺九月叔苴采荼薪樗食我農夫賦也鬱棣屬薁櫻屬葵菜名菽豆也剝擊也穫當作濩煮也煮稻米以釀酒也冬釀春熟故曰春酒介助也壽則眉長故曰眉壽壺瓠也叔拾苴麻子也荼苦菜樗惡木也此又承上文而言衣裘具矣宫室安矣則飲食之需宜有以助之且别之也果酒嘉蔬以佐梁肉所以養老者備矣瓜壺苴荼以佐疏食所以養農夫者裕矣植果於園藝蔬於圃種瓜壺於場畔采苴荼於原野周於所務而人皆習勤矣荼苦之菜惡木之薪安於其分而俗皆尚儉矣養老者厚則人皆知孝矣自奉者薄則人皆知弟矣勤儉孝弟教民之道莫要於此故曰禮始諸飲食其所以為養即其所以為教也九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯亟其乘屋其始播百榖賦也場圃同地物生之時則耕治以為圃物成之際則堅築以為場也榖連藁秸曰禾秀實在野曰稼先種後熟曰重後種先熟曰穋同聚也宫功官府之役也于茅往取茅也索綯以索絞茅也在邑之屋冬處之故墐其戶所以禦風也在田之屋夏居之故覆以茅所以禦雨也乘升也播種也此章終始農事而極道其憂勤之意也言自于耜舉趾以來黍稷重穋禾麻菽麥無不播也至九月以後而納之於場同之於倉亦可以休矣而不能也私事畢而公事興矣又當上入都邑而執宫功矣宫功既畢似可以少休矣而又不能也今年之事甫畢而明年之事又興矣於是晝往取茅夜以索綯之升在野之屋而覆蓋之以明春歲始當出而播百榖也今年之蠶事預計於上年之秋明年之農事預計於今年之冬不惟終年無休暇之日抑且終身無放逸之心念及此而所以役民之力用民之財者宜何如珍惜之也二之日鑿氷沖沖三之日納于凌隂四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆賦也沖沖鑿氷之聲凌隂藏氷之室蚤初旬也韭菜名四月上旬以羔韭祭司寒之神而啓氷也肅嚴也滌掃也朋衆也饗鄉飲也躋升稱舉兕觥大爵也此因飲食而極言功化之盛以見王道之成也天地之化隂陽而已四月莠葽陽極隂生十月改歲隂極陽生隂陽微盛寒暑往來聖人為裘以禦寒藏氷以禦暑隂盛而藏之陽極而出之而燮理之道行於日用矣日在北陸而祭司寒西陸朝覿而獻羔韭神嗜飲食薦其時物而祭祀之禮明於上下矣霜肅氣寒宜有以和之場滌勞息宜有以慰之聚衆飲酒教以饗禮使尚齒而貴爵而孝弟之道達於里黨矣饗禮既畢一飲食而不忘君也於是殺羔羊以躋堂酌春酒於兕觥而忠愛之忱通於上下矣羊酒之物有限忠愛之心無窮又相率而祝之願君壽至於萬年蓋天以生物為心君以仁民為職人君能仁愛其民則民皆祝君之壽欲長為其所愛也天必錫君以壽使長仁其所生也書曰欲王以小民受天永命此之謂也七月八章章十一句詩序曰七月陳王業也周自后稷以農事開基公劉克篤前烈王業之本實始於此周公以成王未知稼穡之艱難故陳后稷公劉風化之所由使矇瞍朝夕諷誦以教之其詩大義以衣食為本農桑為經而婚姻祭祀田獵宫室之類錯緯於其際至於衣則尊卑異製食則老少異糧孝親敬長之道無處不隱寓焉孟子之言王道也期於老者衣帛食肉以為此即孝弟之實庠序之教不過取其義而申明之耳是故養莫大於農桑教不外於孝弟先聖後賢其揆一也又於其中極道農夫紅女之勤勞惡衣菲食而常有飢寒之患乃已無衣而元黃為公子裳狐狸為公子裘已無食而取大豜以獻公殺羔羊以祝壽忠敬之心無所不至使誦此詩者知物力之艱難而深撙節之思感民心之忠敬而生愛養之意則所以謀其衣食教之孝弟經營其婚姻祭祀田獵宫室之類者自無不精且詳所謂本天德以行王道也仁厚之氣積為嘉祥斯百姓躋於仁壽君公至於萬年而王業成矣孔子曰於七月知周公所以造周也鴟梟鴟梟既取我子無毁我室恩斯勤斯鬻子之閔斯比也鴟梟惡鳥攫鳥子而食者也室鳥自名其巢也恩愛勤勞鬻養閔憂也武玉克商使弟管叔鮮蔡叔度暨霍叔監紂子武庚之國成王嗣立周公相之三叔以殷叛流言於國曰公將不利於孺子周公於是東征恐成王之疑已也故賦此詩託為鳥言曰鴟梟鴟梟爾既取我之子矣無更毁我之室以比武庚既誘三叔不可更亂王室也又言恩勤鬻子者蓋追念文考文母鞠子之哀而痛三叔之見取且以傷天倫有變而已無道以善全不怒而深悲之聖人之用心也逮天之未隂雨徹彼桑土綢繆牖戶今女下民或敢侮豫比也逮及徹取也土與杜通桑根也綢繆纒綿之意牖巢之通氣處戶其出入處也下民巢下之人也言室之毁多由於隂雨設能於未雨之前取桑根以固牖戶則人孰得而毁之以比武庚叛亂將毁王室望成王於未毁之先君臣同心以圖國政則內疑既釋外患自消三監雖叛無能為也豫手拮据豫所捋荼豫所蓄租豫口卒瘏曰豫未有室家比也拮据以爪挶草也捋取荼萑苕也蓄積租粟卒盡瘏病也蘇轍曰以手捋荼則至於拮据以口蓄租則至於卒瘏豫所以勤勞病瘁而不辭者以豫未有室家故也輔廣曰當時流言必以周公平日勤勞皆為已謀非為王室故公言此以釋成王之疑非自誇其功也豫羽譙譙豫尾翛翛豫室翹翹風雨所漂搖豫維音嘵嘵比也譙譙殺也翛翛敝也翹翹危也嘵嘵急也朱子曰羽殺尾敝以成其室而未定也風雨又從而漂搖之則其哀鳴安得而不急哉以比已既勞瘁王室又未安而多難乘之則其作詩以喻王亦不得不汲汲也鴟梟四章章五句詩序曰鴟梟周公救亂也成王沖齡踐祚未知周公之心三監皆叛流言四起王室之危如巢將覆矣夫肉必先腐也而後蟲生之人必先疑也而後讒入之羣叔流言亦乘成王之危疑而起設王之疑不釋則周之為周未可知也故鴟梟之詩憂外侮之意少而弭內患之意多蓋所以啓牖王心救亂之所由生也劉瑾曰公以貴戚大臣獨柄國政宗社安危係於一身成王既惑於流言故自言其功而不為誇謂王室為豫室而不為嫌其嘵嘵之音皆出於忠愛之誠惟欲悟王心而安王室並非為一已之禍福計也我徂東山慆慆不歸我來自東零雨其𪷟我東曰歸我心西悲制彼裳衣勿士行枚蜎蜎者蠋蒸在桑野敦彼獨宿亦在車下賦也東山所征之地也慆慆久也零落也濛雨貌裳衣平居之服也士事也枚如箸軍士所銜以止語者蠋桑蟲也蒸發語詞敦獨處不移之貌周公東征三年而歸作此詩以勞歸士故代之言曰我徂東山久而不歸既已勞矣幸而得歸中途遇雨則又苦也東歸宜喜而心西悲者軍務未畢不暇內顧既得生還則思家念切也衣履敝垢爰製歸裝新著冠裳不事戰陳矣蓋行間之苦身親嘗之故願勿復為此也旋車言邁經歷田間見蠋之在桑野悲人之在車下覩物傷懷也古者用車戰行載衣糧止為營衛故從軍之士以車為家玩獨宿車下之詞而生還之喜離家之悲三年從軍之况瘁長途露處之蕭條皆如繪矣我徂東山慆慆不歸我來自東零雨其濛果裸之實亦施于宇伊威在室蠨蛸在戶町畽鹿場熠耀宵行亦可畏也伊可懷也賦也章首四句備述往來之苦故重言之以見感念之深也果裸栝樓也施蔓延也果裸野生今施于宇者室久無人間寂如野故蔓草旅生也伊威鼠婦也室不掃則有之蠨蛸小蜘蛛也戶無人出入則結網當之町畽舍旁隙地也無人藝種故鹿以為場熠耀螢火也院落無人則終夜羣飛也田間茅屋荒蕪幽隂亦可畏矣乃不畏而懷之者生長於斯雖極敝陋常縈夢想也此皆其雨中車下夜闌不寐懸想之境蓋軍士在外神遊於其家而有如目覩聖人在上神通於其心而有如身受非周公其孰能之我徂東山慆慆不歸我來自東零雨其濛鸛鳴于垤婦歎于室灑掃穹窒我征聿至有敦瓜苦蒸在栗薪自我不見于今三年賦也鸛水鳥垤蟻封也穹窒見七月天將隂雨穴蟲先知故蟻出垤而鸛就食之遂鳴於其上也行人遇雨其苦尤甚故鸛鳴於垤則婦歎於室憂其夫之未至而遇雨也灑掃庭內穹窒牆垣冀其夫之將至而接待也冀其至憂其不至而我行忽至則其喜可知也行人初至覩物傷懷因見苦瓜繫於栗薪之上而曰自我之不見此於今已三年矣夫苦瓜栗薪皆微物也尚且感歎如此則父母妻子之團聚喜其見而悲其久不見者又當何如也我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠耀其羽之子于歸皇駁其馬親結其縭九十其儀其新孔嘉其舊如之何賦也倉庚飛婚姻時也熠耀鮮明也人心喜則物有光輝也黃白曰皇駵白曰駁誇其馬也悅其人則馬亦可愛也縭婦人之帨也母戒女而為之施襟結帨也筐篚之儀或九或十言其多也此皆新婚之禮也男女及時各遂其願其新婚者固甚美矣其舊有室家者逺歸而聚首喜慶又當何如也離别之憂上亦憂其憂歡㑹之樂上亦樂其樂所謂惟君子為能通天下之志也東山四章章十二句東山勞歸士也詩序曰一章言其完也二章言其思也三章言室家之望汝也四章樂男女之得及時也君子之於人序其情而閔其勞所以說也說以使民民忘其勞其惟東山乎朱子曰完謂全師而歸無鋒鏑之苦思謂未至而思有悽愴之懷至於室家望汝男女及時亦皆其心之所願而不敢言者上之人乃先其未發而歌詠以勞苦之則其歡欣感激之情為何如哉蓋古之勞詩皆如此其上下之際情志交孚雖家人父子之相語無以過之此其所以維持鞏固數十百年而無一旦土崩之患也既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將賦也隋銎曰斧方銎曰斨樵蘇之用也四國四方之國也皇匡也將大也周公東征三年而歸軍士諒其心而不怨也故作此詩言斧破斨缺勞亦甚矣然周公非為已也蓋將使四方皆歸於正則其哀我人也亦大矣朱善曰戮一人而天下服則向之不正者復反於正矣正四國即所以哀我人也蘇轍曰使周公潔身而退以避二叔之難則其亂將及於四方如是而周公亦清矣然未免於小也惟不嫌於自救哀斯人之不治誅管蔡以正四方而後可以為大也既破我斧又缺我錡周公東征四國是吪哀我人斯亦孔之嘉賦也錡斧屬吪化也皇者正其事吪則化其心也嘉有禮也以禮化之也既破我斧又缺我銶周公東征四國是遒哀我人斯亦孔之休賦也銶木屬嚴粲曰不言弓矢戈矛而專言斧斨者東征之役不尚殺戮若除道樵蘇則斧斨之用為多也遒聚而固之也既已化之又固結之使不變也休息也化而固之則兵可不用矣故曰休也破斧三章章六句詩序曰破斧美周公也朱子曰管蔡流言以謗周公而公以六軍之衆往而征之使其心一有出於自私而不在於天下則撫之雖勤勞之雖至而從役之士豈能不怨也哉今觀此詩固足以見周公之心大公至正天下信其無一毫自愛之私抑又以見當是之時雖披堅執鋭之人亦皆能以周公之心為心而不自為一身一家之計蓋亦莫非聖人之徒也學者於此熟玩而有得焉則其心正大而天地之情真可見矣伐柯如何匪斧不克取妻如何匪媒不得比也柯斧柄也克能也媒通二姓之言者也管蔡啓商以間王室欲定管蔡之亂此如伐柯裁不材之木也欲和庶殷之心此如娶妻合二姓之好也伐柯則匪斧不克此戡亂必用兵也取妻則匪媒不得比合好必用禮也伐柯伐柯其則不逺我覯之子籩豆有踐比也則法也我東人自謂也之子謂周公也籩竹器豆木器踐行列整齊之貌言伐柯者必執柯以伐之彼柯長短之則在此柯耳是合伐與則為一物也周公之東本以兵來而舉動一凖於禮故東人之覯周公者不見其干戈之維揚而但見其籩豆之有踐是合兵與禮為一事也蓋周公雖以兵振其威而實以禮行其教故東人之畏其威者固衆而服其教者尤深是陳師鞠旅之中即有過化存神之道也伐柯二章章四句詩序曰伐柯美周公也不尚兵而以禮為則也衛靈公問陳於孔子孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也夫非孔子之果未學也以為安上治民莫善於禮以禮為國則軍旅可不用也是故以禮止亂可以去兵不得已而用兵兵亦有禮果能以禮行兵則德威惟畏不戰而屈人矣孔子學爼豆於軍旅之先以禮止兵也周公踐籩豆於軍旅之際以禮行兵也故曰先聖後聖其揆一也九罭之魚鱒魴我覯之子衮衣繡裳興也九罭九囊之網也鱒魴皆魚之美者衮衣上公之服繪山龍雉火宗彛於衣繡藻采黼黻於裳也言布九罭之網而能獲鱒魴是漁人之幸也因三監之叛而得覯周公是東人之幸也極言衣裳之美者德與服稱愛其人並愛其服也鴻飛遵渚公歸無所於女信處興也遵循也渚小洲也鴻依水草故以遵渚為得所也女東人相謂也再宿曰信成王以禮迎周公東人知其將歸也故相謂曰鴻飛則遵渚矣公歸豈無所乎今特於女信處而已鴻飛遵陸公歸不復於女信宿興也高平曰陸鴻離渚而遵陸將北向也季本曰雁北向則經時不復矣言周公歸將留相王室而不復來東也是以有衮衣兮無以我公歸兮無使我心悲兮賦也朱子曰承上二章言周公信處信宿於此是以東方有此衮衣之人願其且留於此無遽迎公以歸歸則將不復來而使我心悲也九罭四章一章四句三章章三句九罭留周公也夫東方非公久居之處也東人非不知之而又心悲者則其情有所不能已也聖人之於人也德化有以動其性禮教有以服其心先得其所同然故人見而莫不悅之亦不能言其所以然也後世循吏所居民愛所去民思亦何以異此狼跋其胡載㚄其尾公孫碩膚赤舄几几比也跋躐也胡頷下肉載則㚄跲也孫讓碩大膚功也赤舄朱履也几几安重之貌狼性奸貪前高其胡以張望則後挾其尾以助力以比管蔡欲窺伺神器乃挾武庚以為助也公因此被謗讓其大功避居東方亦危疑之至矣而赤舄仍几几然不改其安重之度也以赤舄為言者人心有感足容易動懼則喪屨喜則折屐故觀赤舄之几几而寵辱不驚可知也狼㚄其尾載跋其胡公孫碩膚德音不瑕比也德音令聞瑕疵也言狼既㚄尾以得力則益跋胡以進取以比管蔡既得商奄之助則愈起跋扈之心乃流言四起而公之令聞卒未嘗少有所損蓋盛德之至而天下皆信之也程子曰周公之處已也䕫䕫然存恭畏之心其存誠也蕩蕩然無顧慮之意所以不失其聖而德音不瑕也狼跋二章章四句詩序曰狼跋美周公也處變而不失其常也范處義曰凡有欲之類莫不可制惟聖人無欲故天地萬物不能易也富貴貧賤死生如寒暑晝夜相代乎前吾豈有二其心乎哉亦順受之而已周公逺則四國流言近則成王未知而赤舄几几不改其度非元聖其孰能若是乎豳風七篇二十七章二百三句程元問於文中子曰敢問豳風何風也曰變風也曰周公之際亦有變乎曰成王疑周公則風遂變矣非周公至誠其孰能正之哉故終之以豳風言變之可正也變而克正危而克扶始終不失其本其惟周公乎係之豳逺矣哉御纂詩義折中卷九
