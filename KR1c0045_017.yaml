body:
  text: 生民之什三之二厥初生民時維姜嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷賦也姜姓嫄名髙辛氏之妃也言溯厥古初生天下之民者是爲姜嫄姜嫄何以生民以其生后稷也后稷播穀民頼以生則不啻姜嫄生之也其生后稷如何毛傳曰禋敬弗去也去無子求有子古者必立郊禖焉元鳥至之日以大牢祠於郊禖是也履隨也帝髙辛氏也武行敏疾歆饗介大攸止福祿所止也震動夙早育長也何楷曰言姜嫄從帝將事敏速上帝歆饗大降之福是以助祭甫畢身如有所震動遂早有娠而生育后稷也誕彌厥月先生如達不坼不副無菑無害以赫厥靈上帝不寧不康禋祀居然生子賦也誕發語詞彌終也終十月之期也先生首生也達小羊也羊子易生者也圻副皆裂也赫顯也居然猶徒然也言婦人產難首生尤難而如達之易並無圻副菑害之苦是上帝所以顯厥靈也乃姜嫄則心疑焉以為禋祀之後無端身動彌月首生並無留難事屬不經豈上帝之心有不寧乎前之禋祀有未安乎何爲而徒然生子也此則其見棄之由也誕寘之隘巷牛羊腓字之誕寘之平林會伐平林誕寘之寒冰鳥覆翼之鳥乃去矣后稷􅈱矣實覃實訏厥聲載路賦也隘狹腓芘字愛也㑹値也値人伐木也覆蓋翼藉也以一翼覆之一翼藉之也􅈱啼聲也覃長訏大載滿也滿路言其聲之大而人皆聞之也旣棄而靈異如此是以收而養之也誕實匍匐克岐克嶷以就口食蓺之荏菽荏菽斾斾禾役穟穟麻麥幪幪𤓰瓞唪唪賦也匍匐手足並行也岐峻立也嶷端重也就成也荏菽大豆斾斾枝葉揚起也黍稷稻粱皆謂之禾役行列也穟穟美好貌幪幪茂密唪唪多實也言后稷之幼也當實應匍匐之年已能岐然而峻立嶷然而端重曁乎稍長遂能蓺五穀以成就其口食禾麥爲主佐以麻菽葅以𤓰瓞而一人之口食就生民之口食皆就矣誕后稷之穡有相之道茀厥豐草種之黄茂實方實苞實種實褎實發實秀實堅實好實頴實栗卽有邰家室賦也稷善稼穡不止因天分地而已有以人力相助之道焉草害嘉穀故先除之便耕犁也黄土色也茂土肥也種之黄茂物土宜也立苗之道勿宻勿疏特苗則方之均布之也呂氏春秋曰横行必得縱行必術莖生有行則苗速長是也弱苗則苞之叢植之也呂氏春秋曰其長也欲相與居其熟也欲相扶故三以爲族乃多粟是也種當作鍾培之也漢書曰苗生葉以上稍耨隴土以附苗根土厚根深能風與旱是也褎與裒通聚也苖既秀再耘之收其旁土以阜苗足則粟不秕呂氏春秋曰能使穗大而均粟圓而薄糠是也如是以相之故后稷之穡必盛發而齊秀莖節堅而枝葉完好實繁而頴垂顆粒圓而栗栗然也朱子曰堯嘉其有功於民封於邰使即其母家而居之以主姜嫄之祀故周人亦世祀姜嫄焉誕降嘉種維秬維秠維穈維芑恒之秬秠是穫是畝恒之穈芑是任是負以歸肇祀賦也降天生之也秬黍也秠黍之一稃二米者也穈赤粱芑白粱也恒徧穫刈也畝棲於畝也任肩任負背負也肇始也言天降嘉種秬秠穈芑后稷敎民徧種之熟而穫畝之任負之歸以祀神報之且祈之也祭祀之禮自古有之而釀秬秠以爲酒烝穈芑以爲粢則自后稷始也以穀祀神而因以祈穀則穀常熟矣此后稷之所以生民也誕我祀如何或舂或揄或簸或蹂釋之叟叟烝之浮浮載謀載惟取蕭祭脂取羝以軷載燔載烈以興嗣歲賦也言后稷生民之功如此迄於今后稷往矣我則祀后稷焉舂擣於臼也揄杵抒之也簸箕揚之也蹂手揉之也所重在穀故治之精也謀卜日擇士也惟齋戒具修也蕭蒿也脂膟膋也以蕭焫脂尚臭也軷祭行道之神也祭行所以速神之來猶祭祊之意也燔燒也烈炙也所以爲羞也嗣繼也今歲所以繼往歲故嗣歲者新歲也言備物盛禮以祀之者所以興新歲之農事使有年也此周人孟春祈穀於上帝以后稷配之禮也卬盛于豆于豆于豋其香始升上帝居歆胡臭亶時后稷肇祀庶無罪悔以迄于今賦也卬我也木器曰豆瓦噐曰登盛於豆者葅醢也盛於登者太羮也居安也鬼神食氣曰歆胡何臭香亶信時期也庶庶幾也迄至也言爼豆始薦香氣初升而上帝已安饗之何以臭一達而神即如期而至其誠信如此哉蓋上帝之眷后稷久矣自后稷肇祀以來子孫世修其業不敢不敬天而至於有罪不敢不勤農而至於有悔兢兢業業以迄於今上帝嘉今之承祀者能不替生民之功是以居歆亶時如此也嚴粲曰周之郊也因稷而致所謂文武之功起於后稷尊以配天不亦宜乎生民八章四章章十句四章章八句生民祀后稷也周禮啓蟄之月上辛之日祈穀於上帝以后稷配是也述后稷之農事而推本於所生者見天為敎民稼穡而特生后稷天眷之故以之配之也長至之配也用思文元日之配也用生民思文簡而生民繁者因祈穀之故是以詳叙其相穡之始末以昭后稷之功抑以示祀后稷者必如后稷之有功於民乃足以當天心也則庶無罪悔矣是故有相之道后稷所以生唐虞之民也以興嗣歲文武所以生成周之民也而是詩之傳使後之長民者皆敬天勤農以庶無罪悔則聖人所以生萬世之民也敦彼行葦牛羊勿踐履方苞方體維葉泥泥戚戚兄弟莫遠具爾或肆之筵或授之几比也敦茁也行道也苞叢體成也泥泥潤貌戚戚内相親也爾與邇同肆陳也言道旁之葦勿為牛羊所踐履乃能叢生並長而枝葉潤澤以比兄弟之親勿為他人所䜛間乃能同心合力而家道昌隆也故戚戚之兄弟不可逺而日疎惟當近而日親是以相與燕飲幼者為之設筵長者又加之以几也何楷曰此下三章皆言燕兄弟之事然必有此心以為之主而後燕飲不為虛文也肆筵設席授几有緝御或獻或酢洗爵奠斝醓醢以薦或燔或炙嘉殽脾臄或歌或咢賦也設席筵上加席也周禮設莞筵加繅席設蒲筵加莞席是也緝續御侍也有相續而侍者也進酒於客曰獻客答之曰酢主人又洗爵酬客客受而奠之不舉也夏曰醆殷曰斝周曰爵醓肉汁也醢肉醤也燔燒肉炙炙肝殽切肉而升於爼也國語云親戚宴饗則有殽烝是也脾主臟也禮記云賓爼脊脇肩肺脾是也臄口上肉也歌人聲比於琴瑟也燕禮旅酬之後乃歌也徒擊鼓曰咢燕無咢射有之此通下章而言歌之後又射也敦弓既堅四鍭既鈞舍矢既均序賓以賢敦弓既句既挾四鍭四鍭如樹序賓以不侮賦也敦雕通堅猶勁也鍭矢也爾雅云金簇翦羽謂之鍭鈞停也簇與幹輕重稱也舍發也均皆中也賢中多者也句彀通引滿也射禮搢三挾一四鍭既挾則皆發矣如樹如手就樹之言皆中也不侮敬也不以中病不中者也射以中多為雋以不侮為德吕祖謙曰四鍭既鈞泛言射者也故繼之曰序賓以賢四鍭如樹專言勝者也故繼之曰序賓以不侮曾孫維主酒醴維醹酌以大斗以祈黄耇黄耇台背以引以翼壽考維祺以介景福賦也曾孫君卿大夫之通稱嗣位而主祭者也曽孫為主故兄弟皆稱賓也醹厚也大斗長勺也勺挹於尊而注諸爵斗挹於大器而注諸尊也燕禮之後有無算爵故挹以大斗也祈求也黄耇老人之稱以祈黄耇者飲酒既畢乃乞言於兄弟之年老者也台隆起之意老人腰曲故背隆起也引導翼輔也少者乞言老者指引之使不迷於所往勸勉之使不怠於所行也祺安也景明也此少者祝老者也恐其身有未安故禱其夀考維祺恐其心或昏憒故欲其介以景福也老者敎之少者祝之各盡其道也行葦四章章八句行葦燕兄弟也古者燕禮通乎上下非徒飲酒而已先王敎飬天下之道在是焉是故莫逺具爾所以親親也授几緝御所以長長也㫖酒獻酬所以飬陽也庶羞迭進所以飬陰也序賔以賢所以賢賢也序以不侮所以敬德也以祈黄耉所以廣敎也以引以翼所以幼幼也夀考維祺所以老老也經之以禮維之以樂参之以射而文武之事備矣君子是以知燕之為義大也既醉以酒既飽以德君子萬年介爾景福賦也此尸嘏主人之詞也旣醉以酒言飲食之豐也既飽以德言禮意之厚也感德心滿如飽也醉酒飽德如此故願君子萬年天助爾以明福也既醉以酒爾殽既將君子萬年介爾昭明賦也殽爼實也將進也昭明通於事也何楷曰言助𤼵其智慮小事大事無不周知所謂景福也曹粹中曰老將至而耄及之古人所慮也今錫之以夀考又大之以昭明則受福無窮矣昭明有融髙朗令終令終有俶公尸嘉告賦也融貫通也昭明而至於貫通則其明逺矣髙者識超於事先朗者鑒徹於事後故其所為之事無不令終言善全也所謂知終終之也俶始也事理無盡終則有始其明無窮其福亦無窮故公尸又有嘉言以告之也吕祖謙曰周之追王止於大王故宗廟之中尸之尊者乃公尸也其告維何籩豆静嘉朋友攸攝攝以威儀賦也静嘉清潔而美也朋友謂賔客助祭者也攝檢也此工祝致告之詞籩豆静嘉即楚茨所謂苾芬孝祀神嗜飲食也攝以威儀即楚茨所謂既齊既稷既匡既勅也祭主於誠禮主於敬誠不可見而寓於敬故相攝以威儀也威儀孔時君子有孝子孝子不匱永錫爾類賦也時節也孔時言威儀皆中節也孝子主人之嗣子也儀禮曰祭祀之終有嗣舉奠是也匱竭也孝者萬善之源也其德生而不已無有竭時故天亦錫之以其類使永無匱也其類維何室家之壼君子萬年永錫祚𦙍賦也壼宫中之巷也祚福𦙍子也言其類維何不越乎室家之間蓋孝子孝其妃亦孝也夫婦皆孝天又錫以能孝之𦙍子故曰錫類也其𦙍維何天被爾禄君子萬年景命有僕賦也僕附也言其𦙍如何乎彼既能類其父則天将被以爾身之禄使亦嗣位而為天子也既已嗣位則景命所集又有附屬之者如下文所云也其僕維何釐爾女士釐爾女士從以孫子賦也釐予也女士女之有士行者朱子曰謂生淑媛使為之妃也從隨也謂又生賢子孫也輔廣曰既有賢妃又生賢子孫天命之附屬者莫大於此矣既醉八章章四句既醉受釐也主人饋食尸嘏之也其詞繁而願奢似䛕而非䛕也易有之曰方以類聚物以羣分吉凶生矣言吉凶之與善惡類也惡與凶類善與吉類造物無心各予之以其類而已既醉所詠籩豆静嘉威儀孔時則君子之孝可知也君子孝故有孝子嗣子孝則所生者皆孝矣所謂類也永錫祚𦙍類也從以孫子亦類也不寧惟是嗣子孝則其妃亦孝所娶之婦皆孝矣室家之壼類也釐爾女士亦類也昔周之興也大王王季文王皆孝子也太姜太任太姒皆女士也太姜生王季太任生文王太姒生武王武王與邑姜又生成王以及無窮所謂永錫爾類也其前如此其後可知其享福之隆極古今之異而其獲福之故實庸行之常君子是以知孝之為道大也鳧鷖在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福祿來成比也鳧水鴨鷖鷗也鳧鷖行徐而有度游泳而不争人之和羣而嫺於禮者似之故以比衆賔也在涇比在燕也衆賔皆在而公尸乃來氣度安寧亦如鳧鷖也爾謂主人也燕禮司官尊于東楹之西兩方壺尊士旅食于門西兩圜壺所謂酒清也膳宰具官饌于寢東所謂殽馨也公尸來燕則福禄亦隨之而來祭祀所受之嘏至此而乃成矣爾主人而目公尸衆賓頌祝之詞也鳧鷖在沙公尸來燕來宜爾酒既多爾殽既嘉公尸燕飲福禄來爲比也沙水旁也鳧鷖在沙散處徐行以比衆賔在燕各事其事也來宜謂事皆愜於心也獻酬媵致皆舉所謂酒多也主人獻後薦脯醢賓升筵設折爼所謂殽嘉也為助也福禄來助使諸事咸宜也鳧鷖在渚公尸來燕來處爾酒既湑爾殽伊脯公尸燕飲福禄來下比也渚渟而不流也鳧鷖在渚聚而不飛以比衆賔入座安而不動也公尸來處亦安之也此辯獻之後大夫皆升就席工歌笙入之時也湑酒之泲者也旅酬之後尊壺不足故泲之所謂酒湑也賓升席坐乃祭脯醢所謂殽脯也來下者人處於此故福禄亦降於此若自天而下也鳧鷖在潨公尸來燕來宗既燕于宗福禄攸降公尸燕飲福禄來崇比也潨水㑹也鳧鷖在潨四處來㑹以比衆賓旅酌皆獻公尸也燕禮正歌備後乃立司正遍獻旅酌皆以進公今公亦齒而尊尸故皆獻尸也來宗衆尊之也于宗在宗室也言昨日祭畢既燕于宗而福禄攸降今又賔尸而燕之則福禄之來積而愈崇矣徐常吉曰祭畢之燕尸不與以其象神不敢留也燕於次日所以尊尸即所以尊神也鳧鷖在亹公尸來止熏熏㫖酒欣欣燔炙芬芬公尸燕飲無有後艱比也亹水流峽中兩岸如門也鳧鷖在亹相隨而出以比衆賔燕後出門而歸也熏熏和悅也言公尸之來當其止而飲食之時固已熏熏焉今將歸矣而㫖酒猶覺欣欣有餘歡也燔炙猶覺芬芬有餘香也公尸之燕飲如此則人懽而神亦喜永降之福而無有後日之艱矣鳧鷖五章章六句鳧鷖燕公尸也祭之明日繹而賔尸也君申其惠臣飲其和人有餘懽神有餘福其致此者非一日之積也是故讀芣苢知婦子之和平誦鳧鷖知臣工之委蛇婦子和平家皆静好也臣工委蛇人皆正直也所謂皥皥而不知為之者與君子於鳧鷖有餘思焉假樂君子顯顯令德宜民宜人受禄于天保右命之自天申之干禄百福子孫千億賦也假當作嘉君子謂王也顯顯光明也民庶民人有位者也右與佑通申重也干求也言可嘉樂之君子有顯顯之令德故能宜民宜人書曰在知人在安民是也民人者天之心也能宜民人則合天心而受天禄故保其身佑其行命為天子而又申之使其干天禄享百福而子孫衆多至於千億也穆穆皇皇宜君宜王不愆不忘率由舊章威儀抑抑德音秩秩無怨無惡率由羣匹賦也穆穆深逺皇皇美大君諸侯王天子也穆穆皇皇宜為君王記曰天子穆穆諸侯皇皇是也愆過忘遺也率循由行舊章成法也不敢有過誤不敢有遺忘惟前人之成法是遵能法祖也抑抑謙下也秩秩有序也匹偶也所謂公侯好仇也不敢怨其匡拂不敢惡其倨侮惟羣臣之嘉言是從能納諫也行先王之仁政則百姓咸被其澤故率由舊章乃所以宜民也從臣工之嘉言則賢人得行其道故率由羣匹乃所以宜人也由舊章以宜民由羣匹以宜人此武王之所以干禄也受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸墍賦也燕安也朋友謂諸臣也書曰友邦冡君謂百辟也又曰大史友内史友謂卿士也觧與懈通塈息也言君子之令德如此則可以受無疆之福而為四方之綱綱四方者持其大綱而四方之民自安也四方既安則君張其綱臣理其紀而清燕之福及於羣臣矣羣臣既安則順天子之德意以各盡其職而四方之民益以安息矣吕祖謙曰民之勞逸在下而樞機在上上逸則下勞矣上勞則下逸矣故不觧于位乃民之所由休息也何楷曰四方之綱宜民也燕及朋友則宜民乃所以宜人也百辟卿士媚于天子宜人也不觧于位民之攸塈則宜人乃所以宜民也假樂三章章八句假樂美武王也大明之詩曰保右命爾此詩亦云故知為美武王也穆穆皇皇宜君宜王言自諸侯而為天子也諸侯受命而為天子者惟湯武為然故中庸引此詩為大德受命之証也武王之為天子也上承穆考之謨下資四友十亂之助率由舊章率由羣匹其實録也以此宜其民人則受天禄所必然矣太史公曰天下稱頌周公言其能歌詠文武之德不益信乎篤公劉匪居匪康廼埸廼疆廼積廼倉廼裹餱糧于橐于囊思輯用光弓矢斯張干戈戚揚爰方啓行賦也篤厚也書曰公劉克篤前烈是也康安也公劉之祖不窋失官而奔於戎狄之間公劉不以其地為可居而遂安之也乃疆乃理敎耕植也乃積乃倉裕蓋藏也為居者謀也裹餱糧于橐囊為行者備也輯和光大也為居者謀思以和輯其民人為行者備思以光大其國家於是張弓矢揚戈戚以啟行葢将擇地而遷都也深謀逺慮動出萬全此公劉之所以為篤也篤公劉于胥斯原既庶既繁既順廼宣而無永歎陟則在巘復降在原何以舟之維玉及瑶鞞琫容刀賦也于往胥相原地名宣布也巘山舟帶也鞞刀鞘琫刀飾也言公劉初遷往相原地而本國之人從行者庶聚處者繁又有他國之歸順者宣布散處皆悅公劉之德而無愁歎之聲公劉于是陟山降原以相之將欲久居之也陟降徒行故人見其帶以玉瑶為佩而鞞琫飾刀也吕祖謙曰以如是之佩服親如是之勞苦斯其所以為厚於民也篤公劉逝彼百泉瞻彼溥原廼陟南岡乃覯于京京師之野于時處處于時廬旅于時言言于時語語賦也逝往也百泉地名杜佑云唐為百泉縣屬平凉郡魏於其地置原州溥大也南岡百泉之南山覯遇也京豳地師衆也京師之名始此言公劉逝彼百泉欲瞻溥原升其南山乃覯豳地以為更勝於原故遂定都而為京師也時是也處處處其當處者也廬旅安其旅寓者也言言公言之出令也語語宻商之議政也篤公劉于京斯依蹌蹌濟濟俾筵俾几既登乃依乃造其曹執豕于牢酌之用匏食之飲之君之宗之賦也依安也蹌蹌濟濟與祭之容也何楷曰行遷廟之禮是也筵几為神設也祭統云鋪筵設同几為依神也遷廟之禮奉神之衣服至於新廟奉者升君從升所謂既登也祝曰令月吉日可以徙于新廟所謂乃依也造召而進之也有司曰曹既祭之後乃召羣臣將燕之也牢豕閑也執豕于牢食之也酌之用匏飲之也宗之立宗法也吕祖謙曰上則統於君下各統於宗葢古者建國立宗其事相須也篤公劉既溥既長既景廼岡相其陰陽觀其流泉其軍三單度其隰原徹田為糧度其夕陽豳居允荒賦也溥廣也言土地漸闢既廣且長矣景測日也岡升髙也何楷曰既景乃岡者視陰陽之寒燠使種植各適土宜又觀其流泉之所經使溝洫得盡水利是也單周也言公劉自啟行以來止宿之處其軍常三周以環衛之今既定都矣宿衛之士散於田野故度其原隰畫井授田以徹法行之使通力合作而收其所入以為糧此寓兵於農之道也山西曰夕陽荒大也朱子曰定其軍賦與其稅法又度山西之田以廣之而豳人之居於此益大矣篤公劉于豳斯館涉渭爲亂取厲取鍜止基廼理爰衆爰有夾其皇㵎遡其過㵎止旅廼密芮鞫之即賦也館舍也何楷曰造作之處也百工之來不皆本國之人故為館以處之是也横渡曰亂張守節曰公劉從漆水横渡渭水而至南山是也厲砥鍜鐵也止居基始理治也厲鍜既取器用皆利而相宅授田經武之始事益以理矣止基既理居者益衆而又有來者於是度二澗而處之何楷曰皇澗縱故夾其兩旁過澗横故在水北而南鄉是也所以處續有之衆故曰止旅芮水名在隴州鞫水外也久而止旅益密故又度芮水之外而處之也吕祖謙曰風氣日開編民日衆規模日廣有方興未艾之象焉周之王業始於此矣公劉六章章十句公劉始遷豳也周以忠厚開基而積功累仁自公劉始觀其居有積倉行有裹糧飬民者裕矣陟巘降原陟岡覯京勤民者至矣庶繁順宣處處廬旅奠民居者固矣隂陽流泉度其隰原制民産者詳矣于豳斯館取厲取鍜利民用者周矣厚於為民所以為篤也而且弓矢干戈以飭武備玉瑶鞞琫以修禮服筵几登依以肅祀典執豕于牢以示儉也酌之用匏以尚質也飲之食之以廣愛也君之宗之以教敬也其軍三單兵制定矣徹田為糧農政詳矣其勤勞儉樸猶留渾噩之遺而創制顯庸已開官禮之兆積累可謂深厚綜理可謂周密矣深厚之謂篤周密亦謂篤故每章皆以篤稱之也泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母比也泂逺也行潦流潦也挹取也餴淅米也饎飯也言逺酌行潦之水挹而注之於器則可以餴饎以比詳察小民之情取而注之於心則可以飬民也故豈弟君子常念民之艱苦則可以為民之父母矣泂酌彼行潦挹彼注兹可以濯罍豈弟君子民之攸歸比也罍祭器也能挹行潦可以濯罍以比能恤民隱可以事神也民神之主也故恤民即所以事神神依之則民愈歸之矣泂酌彼行潦挹彼注兹可以濯溉豈弟君子民之攸塈比也溉器之當滌者也塈息也能挹行潦則物之塵垢皆可濯之以比能恤民隠則心之汙染皆可除之也故豈弟君子常念民之艱苦則嗜好功利之念皆息矣我無欲而民自静故可以為民之攸塈也泂酌三章章五句詩序曰泂酌召康公戒成王也昔武王誥康叔曰嗚呼小子封恫瘝乃身敬哉天畏棐忱民情大可見小人難保往盡乃心無康好逸豫乃其乂民周公曰嗚呼君子所其無逸先知稼穯之艱難乃逸則知小人之依召公之意亦猶是也故以泂酌行潦為比以為人君必逺察民情而知其艱難自能飬民如行潦之餴饎天畏棐忱自能事神如行潦之濯罍無康好逸豫自能修德如行潦之濯溉矣是故致治之術無他常取民情而注之心則保民之事自此起厲民之政自此息周公之陳七月召公之作泂酌此物此志也有卷者阿飄風自南豈弟君子來游來歌以矢其音賦也卷曲也阿陵也君子謂王也矢陳也言卷阿之上風來自南王以此時来㳺喜而作歌以陳其和樂之音也伴奐爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋矣賦也伴奐開舒之貌優寛徐也彌充而滿之也酋久也言志意開舒而来㳺於此寛徐以㳺而時休於此所以適其性也既適其性必推而廣之以滿其量使萬物各適其性斯受天之眷而似先公之悠久矣爾土宇昄章亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣賦也昄當作版版章猶版圖也言爾土宇版章既甚厚矣然山川城邑皆有神靈必彌爾性使㤙澤及於四海然後可為百神之主而常有土宇也爾受命長矣茀禄爾康矣豈弟君子俾爾彌爾性純嘏爾常矣賦也茀嘏皆福也言受命長茀禄康所謂純嘏也然福本於德必彌爾性使德純而不已乃可常享此純嘏也有馮有翼有孝有德以引以翼豈弟君子四方為則賦也似先公主百神常純嘏皆本於彌性顧性之量逺矣其充於己者自為之其及於人者必有衆賢之助焉鄒泉曰馮者忠諒可託心膂翼者才猷可任股肱孝者順徳則有移忠之心德者修己則具正物之學以之引導而不昧於所適以之輔翼而不怠於所行則豈弟君子得以錫極敷言而為四方之則矣顒顒卬卬如圭如璋令聞令望豈弟君子四方為綱賦也顒顒猶穆穆也卬卬猶皇皇也君顒顒於上彌性也臣卬卬於下引翼也圭君所執也璋臣所執也何楷曰兩璋之合則為一圭君有馮翼孝德與為一體如圭也臣能以引以翼協力比附如璋也如此則同心同徳善皆歸君逺者聞其聲譽近者挹其丰采而豈弟君子得以敷政優優為四方之綱矣鳳凰于飛翽翽其羽亦集爰止藹藹王多吉士維君子使媚于天子興也鳳凰靈鳥也雄曰鳳雌曰凰翽翽羽聲也集衆鳥集也鳳凰飛則衆鳥從之而集於所止之處也藹藹和羣貌忠厚慈祥曰吉謂己享福而人亦蒙休也媚順愛也王多有藹藹之吉士則可以惟所使而皆能媚於天子如衆鳥之集也鳳凰于飛翽翽其羽亦傅于天藹藹王多吉人維君子命媚于庶人興也鳳凰之飛上傅于天髙之至也王多有藹藹之吉人則可以惟所命而皆能媚于庶人能媚庶人則萬民愛戴而王愈崇髙亦如鳳凰之傅于天也夫下媚庶人卑之至矣而得衆乃可配天其卑也乃其所以為髙也鳳凰鳴矣于彼髙岡梧桐生矣于彼朝陽菶菶萋萋雝雝喈喈比也山之東曰朝陽菶菶萋萋桐生之茂也雝雝喈喈鳳鳴之和也言馮翼孝德王欲其有吉士吉人王欲其多其所以有且多者有道焉觀於鳳凰而知之矣鳳凰之鳴何以必於髙岡以梧桐生於髙岡之陽也鳳凰非梧桐不棲故梧桐菶菶萋萋斯鳳凰雝雝喈喈矣梧桐茂而鳳凰至禮貌隆而賢人來其理一也君子之車既庶且多君子之馬既閑且馳矢詩不多維以遂歌賦也言欲禮賢人必需車馬謂帛馬以聘之車服以庸之也今王之車則既庶且多矣王之馬則既閑且馳矣朱子曰此亦足以待天下之賢者而不厭其多是也遂達也詩不必多惟求達作歌之意耳其意無他欲王求賢而已故王之來歌以矢音也昭和樂之志也臣之矢詩以遂歌也盡忠告之心也卷阿十章六章章五句四章章六句詩序曰卷阿召康公戒成王也泂酌之戒勸飬民也卷阿之戒勸彌性與求賢也君德莫先於彌性王道莫大於飬民而所以上成君徳下奠民生者惟賢是頼故歸於求賢也能此三者君人之道備矣君作歌以志喜臣遂歌以陳箴此即雝雝喈喈之聲亦不必待鳳凰之鳴也民亦勞止汔可小康惠此中國以綏四方無縱詭隨以謹無良式遏㓂虐憯不畏明柔遠能邇以定我王賦也汔與迄同至也中國國中也詭隨懐詐而面從也謹斂束之意明人所共見也柔寛而撫之也能馴而習之也言民至今日亦云勞矣可以少安矣國中之民安而後四方可安也安民安國其道無他無縱詭隨而已蘇轍曰人未有無故而妄從人者惟無良之人將悦其君而竊其權以為㓂虐則為之無縱詭隨則無良之人肅㓂虐無畏之人止而王室定矣書曰柔逺能邇惇德允元而難壬人此之謂也民亦勞止汔可小休惠此中國以為民逑無縱詭隨以謹惽怓式遏㓂虐無俾民憂無棄爾勞以為王休賦也休息也逑聚也民得休息則聚而不散矣惽昏怓亂也何楷曰詭隨之人其心不明惟欲變亂成法以逞其㓂虐之謀此民之所深憂也夫其惽怓更張豈不自謂勤勞而有害無利是徒棄此勞耳故勸其無棄爾勞則已無事而王亦享安静之福矣民亦勞止汔可小息惠此京師以綏四國無縱詭隨以謹罔極式遏㓂虐無俾作慝敬愼威儀以近有德賦也罔極為惡無已也惡匿於心曰慝不畏明陽惡也将虐小民故不畏人之見之也作慝隂惡也将害正人故畏人之知之也沈守約曰我禁奸奸愈伺我君子不日親則小人終不可疎惟親近有德斯彼之窺覸消此謹之之道也何楷曰訑訑之聲音顔色距人於千里之外有德豈肯近乎故必敬慎威儀則所以近君子者在此所以逺小人者亦在此矣民亦勞止汔可小愒惠此中國俾民憂泄無縱詭隨以謹醜厲式遏㓂虐無俾正敗戎雖小子而式𢎞大賦也愒猶憇也泄猶洩也勞憇則憂洩矣醜穢也厲害也醜厲為穢言以害正人也如是則正人必敗而所以為㓂虐者酷矣戎汝也小子年幼也言汝雖年幼而王既用汝則進君子退小人之責皆在於汝此其所係甚大不可縱詭隨信醜厲而敗正人也民亦勞止汔可小安惠此中國國無有殘無縱詭隨以謹繾綣式遏㓂虐無俾正反王欲玉女是用大諫賦也繾綣親附也朱子曰小人固結其君是也小人之無良惽怓罔極醜厲其根皆起於繾綣詭隨其君委曲親附至於結而不觧則敢於無所不為矣正反云者與正道反也以正者為非而不正者為是也正敗猶有正也正反則無正矣玉寶之也愛而成之也言王之用汝欲玉汝也王欲玉汝我不可以不諫汝汝既日在王側見詭隨之人必無縱之不然而小人至於繾綣則君子至於正反将民無由息而國無由綏矣故諫汝乃所以為王也大諫云者大其聲而疾呼之也民勞五章章十句民勞戒近小人也賈誼曰安民可以行義而危民易與為非故民勞者國危之漸也民何以勞有虐之者也人何以能虐民盜君之權也何以盗君權以其詭隨也心知其不可而詐隨之則無所不隨矣人君悦其隨也彼則乗其悦而盗其權以虐其民矣此固詭隨者之無良亦以有縱之者也為大臣者見詭隨之人悦其圓而可共事也利其柔而不至於反噬也而不知既能詭隨必至繾綣而無良惽怓罔極醜厲之態皆出於是乎不畏明而為民憂矣作慝而俾正敗且正反矣葢一念不謹悦其隨而縱之以至於此也伊尹曰有言逆于汝心必求諸道有言遜于汝志必求諸非道能如是則可以謹無良而近有德矣上帝板板下民卒癉出話不然為猶不逺靡聖管管不實於亶猶之未逺是用大諫賦也板板反也反其常也癉病也話言猶謀也管管依據也亶實事也言上天反常下民盡病惟頼大臣維持之也今出言既不當為謀又不逺不以古聖為依據不切當今之事勢是日謀而終未逺也則不可以不諫矣天之方難無然憲憲天之方蹶無然泄泄辭之輯矣民之洽矣辭之懌矣民之莫矣賦也憲憲猶軒軒也泄泄猶㳫㳫也輯和洽合懌悦莫定也言天運艱難無軒軒然趾髙而氣揚也天歩顛躓無㳫㳫然意怠而神弛也猶逺而出之以話曰辭辭出而羣臣和輯則議協而民心合矣辭出而我王悦懌則政行而民事定矣出話之然在於猶逺故謀不可不慎也我雖異事及爾同僚我即爾謀聽我囂囂我言維服勿以為笑先民有言詢于芻蕘賦也事職事也僚同官也即就也囂囂自是也服事也芻蕘採薪者也言我與爾雖異職事同為王官我即爾謀欲猶之逺以為王也爾乃囂囂自是而不受人言則過矣夫我之言皆可見之施行所謂實於亶也汝勿以為迂濶而笑之古人有言詢於芻蕘而况同僚乎天之方虐無然謔謔老夫灌灌小子蹻蹻匪我言耄爾用憂謔多將熇熇不可救藥賦也虐殘也謔謔戱也灌灌猶欵欵忠告之狀也蹻蹻驕貌耄老而昬也熇熇熾盛也言天方虐民則更甚於艱與蹶矣爾乃謔謔則更甚於憲憲泄泄矣蘇轍曰老者知其不可而盡其欵誠以告之少者不信而驕之故曰非我老耄而妄言乃汝以憂為戱耳夫憂未至而救之猶可為也茍俟其益多則如火之盛不可復救矣天之方懠無為夸毗威儀卒迷善人載尸民之方殿屎則莫我敢葵喪亂蔑資曽莫惠我師賦也懠怒也夸誇也毗比也誇於外而比於内小人之状也夸毗則威儀卒迷而善人不為用故載尸也殿屎説文作唸㕧呻吟也葵揆也資猶貲也言民苦於虐呻吟而已莫敢與我為衡然民者上之資也今皆喪亂則無資矣財聚民散則財亦散而猶不惠我師乎天之牖民如壎如篪如璋如圭如取如攜攜無曰益牖民孔易民之多辟無自立辟賦也牖窓也壎篪相和也圭璋相合也以法止邪曰辟自此以下言逺猷也逺猷非小子所能為欲其告王也民方殿屎則莫先於惠民民性本善皆原於天天賦性於形猶開牖於室使其明也命分而為性故天倡則人和如壎如篪也性聚而為命故天行則人合如璋如圭也𤼵其性之所固有如取諸懐也迪以才之所能為如攜其手也因其性而教之勿益其所本無則牖民甚易耳所謂明明德以新民也若不脩德而立法則民殘矣人心有欲民之罹於辟者原自多端不牖其性而立法以禁欲則比戸可誅矣故戒其無自我而立辟也任德而不任刑此惠民之逺猷也价人維藩大師維垣大邦維屏大宗維翰懐德維寜宗子維城無俾城壞無獨斯畏賦也善人載尸故惠民之外莫要於用人价人大人也王朝之公卿也大師京師之大衆也大邦成國之諸侯也大宗大夫之强宗也宗子王之適子也藩籬垣墻屏樹翰羽也何楷曰善人在朝則天下消其逆萌而莫敢踰越故曰藩后非衆㒺與守邦故曰垣王者以天下為家侯甸采衛列於門庭故曰屏勲閥之舊枝葉之蕃足以羽翼王室故曰翰是也用人之道先繫其心人㒺常懐懐於有德王修德而使其懐之則藩垣屏翰乃心内向而王室寧矣不然則虚設而不為我用所謂載尸也至於宗子上嗣王而下為臣民之望乃王之城所以自衛也一有失德嫌疑内生則城壊而藩垣屏翰莫不離心王乃獨處於上矣至於獨則可畏矣至於獨而斯畏則已晚矣故願畏之於早也修德而畏獨此用人之逺猷也敬天之怒無敢戲豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾游衍賦也豫怠也渝變也馳驅縱恣也王與往通衍舒徐也言惠民在於修德用人亦在於脩德徳何以脩敬而已矣敬者即目前之境而存其心也方虐方懠天之怒也敬之則不敢戲豫而謔謔夸毗之状除矣方難方蹶天之渝也敬之則不敢馳驅而憲憲泄泄之態斂矣且天之當敬亦不待其怒與渝也雖平居作息天亦無不在焉昊天明矣爾必有出往之事天亦及爾出往無所之而不隨也昊天旦矣爾必有游衍之時天亦及爾游衍無所處而不在也敬之之詩曰陟降厥士日鑒在兹此之謂也知上帝之臨汝則戒謹恐懼不敢懈於隠微此修德之逺猷乃惠民用人之本也板八章章八句板誨逺猷也當天怒人怨之時乃徐商牖民懷德敬天之事近於迂闊而寡效無怪小子之蹻蹻也然而我言維服實之於當前之事勢則知之矣國家之要莫大於得人心人心未離雖危而可存人心已去雖安而易亡欲得人心非美言小數所可邀也必牖其固有之良使仁不遺親義不後君之念油然而不容已則民心不摇而藩垣屏翰皆環列而不敢動再加之以敬天則懐德維寜而宗子之城永不壊矣此實救時之切務非迂濶也且夫天性民所固有取之攜之至便也价人大師大邦大宗宗子具在也以德懐之至順也天隨處而皆臨敬存心而即是乃知所謂逺猷者其事至近而且易也聖謨洋洋嘉言孔彰而世卒莫之聽亦獨何哉生民之什十篇六十章四百三十三句御纂詩義折中卷十七
