body:
  text: 魯頌四之四魯在禹貢徐州之域成王以封周公長子伯禽其詩四篇皆樂歌也故列於頌駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黃以車彭彭思無疆思馬斯臧賦也駉說文云牧馬苑也駉駉非一苑也毛𫝊曰諸侯六間馬四種有良馬有戎馬有田馬有駑馬是也坰地名坰之野牧所也左𫝊曰凡馬日中而出日中而入是也驪馬白曰驈黃白曰皇純黑曰驪黃騂曰黃彭彭盛貌無疆思之廣也臧善也言在坰之馬毛色美備駕車壯盛所以如此者由於人君之心思慮廣逺無有疆域之限是以偶一思及於馬而馬遂臧焉蓋以仁心獲天眷不止牧馬一事已也駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾思無期思馬斯才賦也蒼白雜曰騅黃白雜曰駓赤黃曰騂青黑曰騏伾伾有力貌無期久而不止也才材力也孔穎達曰首章言良馬朝祀所乘故云彭彭有容也此章言戎馬戎馬貴力故云伾伾有力也駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹思無斁思馬斯作賦也青驪白鱗曰驒白馬黑鬛曰駱赤身黑鬛曰駵黑身白鬛曰駱繹繹不絶貌無斁深而不厭也作奮起也孔穎達曰此章言田馬田獵尚疾故言繹繹善走也駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛袪思無邪思馬斯徂賦也隂白雜曰駰彤白雜曰騢豪骭白曰驔兩目白曰魚祛袪健貌無邪思之正也徂行也常行而不疲也孔頴達曰此章言駑馬主給官役故曰祛袪强健也駉四章章八句駉考牧而祭馬神也定中之詩曰秉心塞淵騋牝三千彼勸畜牧故兼言牝此閲軍實故専言牡也其言秉心猶駉之思也塞者無邪之誠淵則兼有無疆無期無斁之義焉言馬政而及於思者探其本也國政之盛衰皆本於君心心不能無思而患其有邪一涉於邪則廣而愈荒久而愈迷深而愈鑿故貴無邪也以無疆無期無斁之思而一歸於無邪則専精以思理將睿可作聖且神與天通矣新氣化而育庶物皆本於此焉耕稼而五穀茂牧養而六畜蕃思中之一端也孔子曰詩三百一言以蔽之曰思無邪蓋以三百篇中事無所不有義無所不備而原所由作皆本於忠厚正大之心使讀之者感發其興觀羣怨之思油然自得其性情之正由是以行於人倫而達於庶事則家道以之興盛國運以之昌隆此實聖人删詩之本意駉之一言果足以蔽之也有駜有駜駜彼乘黃夙夜在公在公明明振振鷺鷺于下鼓咽咽醉言舞于胥樂兮賦而興也駜馬肥健貌重言有駜非一馬也乘黃來燕者所乘也公燕所也明明禮文辨治也振振羣起貌天子辟雍諸侯泮宫皆有水澤故鷺集焉因所見以起興也于下翔集以興舞也咽咽鼓節也胥相也樂民之樂民亦樂其樂是相樂也有駜有駜駜彼乘牡夙夜在公在公飲酒振振鷺鷺于飛鼓咽咽醉言歸于胥樂兮賦而興也乘牡馬皆牡也㑹飲者不乘牝也言飲酒重在酒也勞農以酒養老亦以酒也于飛將去以興歸也不醉無歸所以盡歡也醉而言歸所以成禮也有駜有駜駜彼乘駽夙夜在公在公載燕自今以始嵗其有君子有榖詒孫子于胥樂兮賦也青驪曰駽載燕言飲酒之禮與燕同也自今以始祝之也年豐而後蠟祭故祝自今嵗為始嵗嵗皆有年也飲酒所以養老故祝有齒德者皆有善道以遺子孫也願天常錫豐年願人常行善道亦可謂善頌善禱矣有駜三章章九句有駜蠟而飲酒也孟冬蠟祭勞農以休息之乃飲酒于序以養老焉禮運曰仲尼與於蠟賔則蠟而飲酒魯固行之矣雜記曰子貢觀於蠟孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂孔子曰百日之蠟一日之澤非爾所知也蓋謂民終嵗勤動一日飲酒所以弛其勞也而行禮奏樂尊爵養老弛而未嘗不張有文武之遺意焉有駜之詩其知之矣鼓舞胥樂極飲酒之歡而始於在公明明終於榖貽子孫酒以行禮未嘗繼以淫也好樂無荒故聖人有取焉思樂泮水薄采其芹魯侯戾止言觀其旗其旗笩笩鸞聲噦噦無小無大從公于邁興而比也泮水泮宫之水也天子之學曰辟雍水周環如璧諸侯之學東西南三面有水形如半璧故曰泮也芹水菜也泮水采芹因所見以起興抑以比魯侯之興學育材取而用之也戾至也觀其旗望之也笩笩飛揚貌噦噦聲和也小謂童子大成人者也舉國之人不論小大皆從公而往焉蓋喜公之視學而樂聞其教也思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭載色載笑匪怒伊教興而比也藻文草也蹻蹻盛貌其音言也昭昭詳眀也載色溫其容也載笑和其聲也溫厚和平不怒而明教之所謂循循善誘也書曰敬敷五教在寬此之謂也思樂泮水薄采其茆魯侯戾止在泮飲酒既飲㫖酒永錫難老順彼長道屈此羣醜興而比也茆蓴菜也在泮飲酒養老也禮記曰天子視學適東序釋奠於先老遂設三老五更羣老之席位焉天子如是諸侯可知也永錫難老祝老者使夀考也長道猶大道也羣醜謂淮夷也既飲酒之後與老者謀之將順大道以伐淮夷也王制云天子將出征受成于學此之謂也穆穆魯侯敬明其德敬慎威儀維民之則允文允武昭假烈祖靡有不孝自求伊祜賦也允信昭眀假至祜福也言此穆穆之魯侯既敬於內以自眀其德矣又敬於外以慎威儀所以為民則也教士養老信能文矣屈此羣醜又能武焉文王武王魯侯之祖也今允文可至於文王允武可至於武王格烈祖即所以孝周公也靡有不格則靡有不孝而文敷教化武振威靈其福皆自求之矣眀眀魯侯克眀其德既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚賦也眀眀即穆穆之著見也允文允武果能眀其德矣德明則教化興而逺人慕故既作泮宫而淮夷攸服也矯矯强貌馘殺而取其耳也淑善問訊也囚所虜獲者王制云出征執有罪反釋奠于學以訊馘告是也孔頴達曰馘者不服而殺之也故使武臣如虎者獻之囚者已服之人當受辭而斷其獄故使善訊如臯陶者獻之司馬光曰受成獻馘皆在學者欲其先禮義而後勇力也濟濟多士克廣德心桓桓于征狄彼東南蒸蒸皇皇不吳不揚不告于訩在泮獻功賦也廣推而大之也德心善意也狄與逖通東南謂淮夷也蒸蒸光明也皇皇正大也吳喧譁揚矜躁訩爭訟也言魯侯克明其德以服淮夷將帥之臣皆能推廣魯侯以德服人之心故桓桓于征但使之逺處東南勿犯中國而已不窮兵而黷武也功成之後其心光眀其事正大不喧譁不矜躁從未有爭功興訟以告於魯侯者第見其濟濟然羣在泮宫而各獻其功蓋其從公于邁受教有素故如此也角弓其觩束矢其搜戎車孔博徒御無斁既克淮夷孔淑不逆式固爾猶淮夷卒獲賦也觩弓弛貌搜矢多貌斁懈也固堅獲得也上章言將帥此章言士卒也成功而歸弓弛而不張矢束而不用戎車甚博道寬而無阻也徒御不懈守法而勤事也士卒凱還勝而不驕淮夷既克亦化于善而不敢違逆此皆因在學受成有善謀而能固守之是以淮夷之心終為我得所謂順彼長道屈此羣醜也翩彼飛梟集于泮林食我桑黮懷我好音憬彼淮夷來獻其琛元龜象齒大賂南金比也梟惡聲之鳥也黮桑實也梟食之則聲變孔頴達曰惡聲之鳥食桑椹而變音以比不善之人感恩德而從化是也憬悟也龜尺二寸曰元龜賂遺也南金荆揚之金也言鴟梟鳥也尚能變音淮夷人也豈不從化前之為逆是其迷也今之來服則其悟也悟而改過是以獻琛輸誠而樂中國之教化亦如飛梟之集泮林食桑黮而懷好音也泮水八章章八句泮水頌伯禽也明堂位云米廩有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也蓋泮宫作於始封之日也費誓曰徂兹淮夷徐戎並興書序曰魯侯伯禽宅曲阜徐夷並興東郊不開作費誓今此詩曰既作泮宫淮夷攸服是作泮征淮後先繼舉其為伯禽之詩無疑也泮宫之作教士而已釋奠養老亦所以教士也訊囚獻功於教士無與而亦於學者清兵刑之原也當其無事固以匪怒伊教者昭訓士之德音及其有事即以匪怒伊教者為屈敵之長道故淮徐並興而惟敬眀其德以格烈祖惟克明其德以服逺人一時任事之臣桓桓于征者克廣德心矯矯獻功者皆崇德讓至於孔淑不逆之後淮夷亦易惡而從善泮水之化逺矣閟宫有侐實實枚枚赫赫姜嫄其德不回上帝是依無災無害彌月不遲是生后稷降之百福黍稷重穋稙稚菽麥奄有下國俾民稼穡有稷有黍有稻有秬奄有下土纘禹之緒賦也閟深也宫廟也閟宫者禖宫也毛𫝊曰孟仲子云是禖宫也姜嫄祈子之所也侐清靜也實實鞏固枚枚礱密也回邪也依眷顧也先種曰稙後種曰稚奄有下國封於邰也奄有下土盡地利也禹平水土稷繼播榖故曰纘禹之緒也后稷之孫實維大王居岐之陽實始翦商至于文武纘大王之緒致天之届于牧之野無二無虞上帝臨女敦商之旅克咸厥功王曰叔父建爾元子俾侯于魯大啓爾宇為周室輔賦也翦伐也大王遷岐民咸歸之實開伐商之基而非已有其志也届極也天命已極也二疑虞慮也大明之詩云上帝臨女無二爾心是也敦治也咸同也言武王克商而治天下皆周公同之也王成王也叔父謂周公也元子魯公伯禽也啓開宇居也乃命魯公俾侯于東錫之山川土田附庸周公之孫莊公之子龍旗承祀六轡耳耳春秋匪解享祀不忒皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多周公皇祖亦其福女賦也附庸小國也不能自達於天子而附於大國者也莊公之子有二閔公短祚此僖公也龍旗承祀總承上文之詞言祀后稷與周公也耳耳柔從也忒差也后帝上帝也后帝后稷並言之者祀天而以稷配也魯有祈榖之郊自僖公始也騂犧牲用騂牡也皇祖稱周公也稷與周公皆世祀不祧故俱稱皇祖也秋而載嘗夏而福衡白牡騂剛犧尊將將毛炮胾羮籩豆大房萬舞洋洋孝孫有慶俾爾熾而昌俾爾夀而臧保彼東方魯邦是常不虧不崩不震不騰三夀作朋如岡如陵賦也嘗秋祭名楅衡施橫木於牛角以止觸也秋用而夏楅衡者夙戒也白牡周公之牲也公羊𫝊曰周公用白牡魯公用騂剛是也犧尊尊作牛形而鑿其背以受酒也毛炮去其毛而炮之也胾切肉也羮肉汁也太羮不和鉶羮和之也大房爼也眀堂位云有虞氏以梡夏后氏以嶡殷以椇周以房爼是也萬舞名震騰驚懼也不虧不崩言其夀也不震不騰言其臧也三夀作朋者人與岡陵三者同夀如作友朋也公車千乘朱英緑縢二矛重弓公徒三萬貝胄朱綅蒸徒增增戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾夀而富黃髮台背夀胥與試俾爾昌而大俾爾耆而艾萬有千嵗眉夀無有􅊣賦也公車千乘大國之所出也朱英所以飾矛緑縢所以約弓也公徒三萬三軍之成數也貝胄以貝飾胄朱綅所以綴也增增衆也膺當也彼來而我禦之也懲創也我伐而彼畏之也春秋莊公十有八年公追戎于濟西所謂戎狄是膺也僖公四年春㑹諸侯伐楚八月公至自伐楚榖梁𫝊曰以伐楚致大伐楚也所謂荆舒是懲也黃髮台背老人之象也夀胥與試言老成之人皆與為公用也書曰詢兹黃髮則罔所愆是也耆老艾養也言老而得所養也眉夀無害久安長治也泰山巖巖魯邦所詹奄有龜蒙遂荒大東至于海邦淮夷來同莫不率從魯侯之功賦也泰山魯之望也詹與瞻同龜蒙二山名春秋書齊人來歸鄆歡龜隂之田論語言顓臾先王以為東蒙主且在邦域之中矣所謂奄有龜蒙也荒治也大東極東之國也海邦近海之邦也春秋僖公元年公敗邾師于偃十月敗莒師于鄫二十二年春公伐邾取須句二十六年春公㑹莒子盟于向邾莒在魯東而近海所謂遂荒大東至于海邦也僖公十六年冬公㑹諸侯于淮地以淮淮亦與也所謂淮夷來同也保有鳧繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從莫敢不諾魯侯是若賦也鳧繹二山名魯之南境也踰鳧繹則至于徐矣宅居也謂徐國也春秋莊公二十六年秋公㑹宋人齊人伐徐僖公十四年春楚人伐徐三月公孫敖帥師及諸侯之大夫救徐則徐服於魯久矣諾應也若順也南方之夷徐為大徐服則淮夷南夷莫不應而順之矣天錫公純嘏眉夀保魯居常與許復周公之宇魯侯燕喜令妻夀母宜大夫庶士邦國是有既多受祉黃髮兒齒賦也常魯邑名管子小匡篇云桓公曰吾欲南伐何主管仲對曰以魯為主反其侵地常潛是也周公營洛成王賜之許田以為朝宿之邑田美而近于鄭故隱公末年鄭伯欲以祊易之而未果也桓公弒立鄭挾而要之故以璧假許田魯人雖從之不願也齊桓之伯也諸侯各反其侵地故僖公復取之焉常與許皆失而復得故曰復周公之宇也令妻聲姜也夀母成風也兒齒齒落而更生細者夀徴也徂徠之松新甫之柏是斷是度是尋是尺松桷有舄路寢孔碩新廟奕奕奚斯所作孔曼且碩萬民是若賦也徂徠新甫二山名八尺曰尋舄大貌路寢正寢也新廟莊公之廟也奚斯公子魚也曼長碩大也新廟子魚所督修其制長大于羣宫也萬民是若者廟雖踰制而民心順之也終之以此者見僖公能郊天禘祖而又大其禰廟也閟宫九章五章章十七句二章章八句二章章十句閟宫頌僖公也首章叙后稷也二章叙周公也三章郊祀后稷也四章禘祀周公也五章言伐荆楚也六章言伐邾莒七章言服徐淮八章言復常許九章言作禰廟也凡僖公可頌之事備言之矣至於熾昌富夀頌禱之詞層見而疊出者蓋緣僖公之前子般卒閔公弒慶父內亂季友出奔魯之宗祀不絶如線幸而僖公賢眀國家乂安故詩人喜而頌之欲其修德任賢眉夀無害以綿后稷周公魯公之祀於不替此亦臣子忠愛無己之心故聖人有取焉魯頌四篇二十四章二百四十三句商頌四之五契為舜司徒封于商至湯而有天下武王滅商封微子于宋至戴公時其大夫正考父得商頌十二篇於周大師後又亡其七焉猗與那與置我鞉鼓奏鼓簡簡衎我烈祖湯孫奏假綏我思成鞉鼓淵淵嘒嘒管聲既和且平依我磬聲於赫湯孫穆穆厥聲庸鼓有斁萬舞有奕我有嘉客亦不夷懌自古在昔先民有作溫恭朝夕執事有恪顧豫蒸嘗湯孫之將賦也猗盛那多置陳也鞉鼓非一故言那也簡簡鼓聲衎樂也烈祖有功之祖謂湯也記曰商人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲是也湯孫主祀之時王也假與格同奏假奏樂以格神也綏安也思成神以思而成也鄭康成曰禮記云齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者祭之日入室僾然必有見乎其位周旋出户肅然必有聞乎其容聲出戶而聽愾然必有聞乎其歎息之聲此之謂思成是也淵淵深逺也鞉鼓淵淵始奏也鼓以起樂鞉以兆鼓也嘒嘒清亮也管堂下之樂與鼓應者也既和且平合衆音而言之也周語曰聲應相保曰和細大不踰曰平是也磬玉磬也依我磬聲者堂上之樂依磬聲以為節也赫盛也穆穆靜也穆穆厥聲所謂奏假無言也庸鏞通所以節鼓也斁間也所謂間歌也奕合也萬舞有奕合樂也嘉客來助祭者也夷平懌和也樂聲和平故聽者亦和平也世曰自古時曰在昔人曰先民言祭祀之禮皆古人之所作也溫恭者溫溫而恭所謂恭而安也執事行禮也恪嚴肅也將進也言奏假之樂執事之禮不過行古之道而望烈祖之顧豫者蓋以豫湯孫也一脈相承以奉祭祀庶幾因此來顧此則思成之誠心也那一章二十二句詩序曰那祀成湯也詳言樂者尚聲也未迎神而奏鼓商制也兆以鞉而繼以管所謂下管鞉鼓也依我磬聲所謂戞擊鳴球搏拊琴瑟以詠也庸鼓有斁所謂笙鏞以間也嘉客夷懌所謂虞賔在位羣后德讓也執事有恪言行禮也禮以將敬樂以導和故奏樂之時雖穆穆而莫不夷懌主於和也行禮之時雖溫溫而歸於有恪主於敬也亦可謂得禮樂之情矣然而猶不可恃也至禮無文大樂無聲必思而成之使祖宗之靈爽實顧豫之蒸嘗此則精神之相通不止進返之文已也夏忠商質於此猶可想見焉陳際泰曰樂者聲也聲召風風召氣氣召神然懼其雜而集焉則有湯孫之思成矣思者氣之精也鬼神非其類不至心有精氣而借聲以召之則格者必烈祖焉顧豫蒸嘗以此也知此詩之道矣嗟嗟烈祖有秩斯祜申錫無疆及爾斯所既載清酤賚我思成亦有和羮既戒既平鬷假無言時靡有爭綏我眉夀黃耉無疆約軧錯衡八鸞鶬鶬以假以享我受命溥將自天降康豐年穰穰來假來饗降福無疆顧豫蒸嘗湯孫之將賦也秩說文云積也申重也爾謂時王也所祭所也言烈祖成湯有厚積之福足以申錫於無疆是以及爾今祭祀之所也酤酒也賚與也思成見上篇和羮鉶羮也戒定也平五味均平也鬷中庸作奏言祭祀之所獻以清酤神既飲之矣薦以和羮神既食之矣主祭之人極其肅靜奏假無言所謂有孚顒若也與祭之人莫不齊一時靡有爭所謂下觀而化也酒清殽馨而人又誠敬是以神豫之以夀福也約軧錯衡見采芑篇鶬鶬聲和也以假以享來助祭也溥廣將大也穰穰多也言不止主人福夀而已四方諸侯盛其車服咸來助祭則福及百辟而我之受天眷命益以廣大矣且上天降康屢獲豐年則福及兆姓粢盛愈備而祖考之享祀降福益以久長矣此皆思成之烈祖顧豫湯孫之蒸嘗祖孫一脈精誠相感以致此也烈祖一章二十二句烈祖祀成湯也那祼獻之樂此則受釐之詞也合萬國之歡心以事其先王得人也降豐年之粢盛以饗其先祖得天也而原所由致起於烈祖之顧孫則是得人得天皆本於得親也慈孝行於一家福祿及於天下君子是以知祭之為義大也天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方方命厥后奄有九有商之先后受命不殆在武丁孫子武丁孫子武王靡不勝龍旗十乘大糦是承邦畿千里維民所止肇域彼四海四海來假來假祈祈景員維河殷受命咸宜百祿是何賦也𤣥鳥鳦也春分時至有娀氏女簡狄以𤣥鳥至之日生契封於商故曰天命𤣥鳥降而生商也芒芒大貌正治也域疆理之也九有九州也勝能勝其任也大糦黍稷也契封於商其六世孫振遷于殷國始大其十二世孫湯始受天命而治理四方也自湯之後子孫世有天下凡受天命而為后者皆能敬慎不怠是以奕世相𫝊以至于今王也稱武丁者在廟故稱名也稱孫子者對祖故稱孫對禰故稱子也武丁之為孫子也克紹前烈凡湯之所為無不能勝其任是以保世滋大盛其儀衛龍旗十乘以進粢盛也邦畿王畿也止居肇開假至也祈祈多也景景山員周圍也何與荷通言王畿之地其方千里四方之民莫不來居故聲教四訖湯之正域四方者今肇開之外薄四海矣四海咸歸諸侯來至者多見王畿之地負景山而周以大河仰其形勝莫不歸心是以殷之受命為后者皆宜居於此以荷天祿也𤣥鳥一章二十二句𤣥鳥武丁祫祭也祫祭自始祖以下故首言契也契封於商言宅殷土者其後遷殷也竹書夏帝范三十三年商侯遷於殷商侯者振也振為有易所戕其子微興師滅有易殷復興土地日廣故曰宅殷土芒芒也魯語曰上甲微能帥契者也故商人報焉是也微之六世孫曰天乙是為成湯伐夏而有天下成湯曰吾甚武故曰古帝命武湯也自湯以後多賢君伊尹訓太甲咎單訓沃丁伊陟相太戊巫賢相祖乙盤庚涉河復修湯政故曰商之先后受命不殆也盤庚之後殷復衰至於武丁得傅說為相殷以復興故曰在武丁孫子也傅說之學同於伊尹觀說命可見而髙宗伐鬼方功甚偉凡湯之舊政皆能行之故曰武王靡不勝也孟子曰由湯至於武丁賢聖之君六七作又曰武丁朝諸侯有天下猶運之掌也與詩言相合矣邦畿千里景員維河告先王以定都也商人屢遷不常厥居自契至湯凡八遷湯始居亳自湯以後仲丁遷於隞河亶甲居相祖乙遷於邢祖乙以後復徙河北至於盤庚乃涉河而南都於殷從上甲微之故居然率籲衆戚未大定也武丁修德行政四海來假乃始定都於此而不遷則列祖在天之靈亦必聞而喜之故於廟中歌之以妥神也濬哲維商長發其祥洪水芒芒禹敷下土方外大國是疆幅隕既長有娀方將帝立子生商賦也濬深哲明長逺也芒芒無涯之貌敷布方四方也外大國四夷也幅邊隕當作員圍也有娀國名契之母家也將大子女也言深明祭祀之道者惟商也知有天下之祥發源甚長故禘其所自出之祖焉當洪水芒芒之時禹敷土於四方外之大國亦皆疆理如禹貢所載萊夷作牧西戎即叙之類是也禹甸之幅隕既長有娀之國於此時而方大是以帝立其女生契而封於商也𤣥王桓撥受小國是達受大國是達率履不越遂視既發相土烈烈海外有截賦也𤣥深逺也王追稱之也桓勇撥開達通率循履禮越過發應也相土契之孫也烈烈光盛貌截齊也言契之德甚深逺勇於開導人而教之是以小國大國皆受教而通於道且不止以言教也凡其所為必循禮而不過是以起視其民莫不應而從之知行並進人已兼成素王之學已開於此矣而其孫相土又有盛大之功化行海外使之截然不侵不叛是以能長發其祥也帝命不違至於湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍賦也齊㑹也范處義曰天之眷命未嘗有違於商而由湯之先未有可以配天者至湯而德與命㑹是也降下也不遲疾也鄭康成曰湯之下士尊賢甚疾是也聖知之眀也以義制事也敬守之固也以禮制心也敬義夾持則德曰進故曰聖敬日躋也昭明也假與格同感通也以其昭眀感通於人眀德以新民也遲遲不迫也徐而教之久道化成也鄭康成曰急於已而緩於人是也祇敬式法也上帝鑒湯之德愛而敬之故命為天子使為法於九州也受小球大球為下國綴旒何天之休不競不絿不剛不柔敷政優優百祿是遒賦也球玉也小球大球小國大國所贄之玉也所謂玉帛之㑹也旒冕斿綴結之也受玉以結諸侯之心是下國為旒而我綴之係屬之也人心歸服則天休至矣競急絿緩也優優寬裕之意遒聚也不失之急不失之緩不過於剛不過於柔事皆得中而寬裕布之則人心愈和而百祿皆聚矣蓋湯自祝網之後天下歸心故修其文德如此也受小共大共為下國駿厖何天之龍敷奏其勇不震不動不戁不竦百祿是總賦也共供給也師行而小大之國皆供給之所謂兵車之㑹也厖駹通馬也駿馬之良者受共以用諸侯之力是下國為馬而我駿之調習之也龍寵也師之勝負皆由於天今荷天寵眷士卒各奏其勇則蔑不勝矣震驚也戁與赧同愧也竦與悚同懼也不震所謂無畏寧爾也不動所謂歸市者不止耕者不變也不戁不辱之也不竦不懾之也如是則天與人歸而百祿皆合矣蓋湯自征葛之後民徯來蘇故布昭聖武如此也武王載斾有䖍秉鉞如火烈烈則莫我敢曷苞有三蘖莫遂莫達九有有截韋顧既伐昆吾夏桀賦也武王湯也䖍敬也曷遏通苞本也蘖旁枝也本則夏桀三蘖則韋顧昆吾也遂生達長也言湯德已至桀惡不悛於是載斾秉鉞恭行天罰仁義之師天下無敵如火烈焰不可止也韋顧昆吾三國黨惡如苞生蘖然九州皆已歸商與彼三蘖截然不通則莫遂莫達矣是以次第滅之并夏桀亦放之也聖敬日躋天德也敷政優優王道也天德日崇王道四達而後恭行天罰則湯之所以有天下者可觀矣昔在中葉有震且業允也天子降于卿士實維阿衡實左右商王賦也葉世震懼業危也卿士阿衡伊尹之官號也降禮下之也中葉震業殷中衰也相土烈烈而湯以七十里起其中衰可知也成湯以聖武之天子而降于卿士其於伊尹學焉而後臣之能下賢可知也伊尹樂堯舜之道而與湯咸有一德因佐商以有天下此一代之元勳故於廟配享之也長發七章一章八句四章章七句一章九句一章六句詩序曰長發大禘也祭其始祖之所自出而以羣廟之主及功臣配享之蓋商制也史稱有娀氏女簡狄為帝嚳妃吞燕卵而生契今此詩言禹平水土之時有娀方大通於中國則立子生商當在帝舜之時魯語展禽曰殷人禘舜而祖契郊冥而宗湯以舜為契所自出與詩言吻合則史記不足信矣自契之後獨言相土者宗有功也竹書帝相十五年商侯相土作乘馬遂遷于商丘乘馬者田賦也漢志曰四井為邑四邑為丘有戎馬一匹牛三頭四丘為甸有戎馬四匹牛十二頭甲士三人步卒七十二人是謂乘馬之法乘馬之法行故海外有截也契有文德相土有武功實基興王之業故商人祖契而祀相土為不遷之宗也盤庚曰今豫大享于先王爾祖其從與享之則商之功臣其配享者多矣而獨言阿衡者意此詩作於沃丁之時也太甲之子曰沃丁沃丁之時伊尹乃卒葬于亳既葬而祔于廟以祭之也上及於始祖之所自出而下及於有功之臣商之制禮可謂忠厚而周密矣故曰濬哲維商也撻彼殷武奮伐荆楚罙入其阻裒荆之旅有截其所湯孫之緒賦也撻疾貌殷武殷王之武也罙深裒聚也湯孫謂髙宗也自盤庚之後殷復衰楚人叛之髙宗既得𫝊說撻然用武奮伐其國深入其險阻使荆人裒聚之衆截然不敢復動此皆髙宗之神武獨斷故曰湯孫之緒也維女荆楚居國南鄉昔有成湯自彼氐羌莫敢不來享莫敢不來王曰商是常賦也氐羌狄國在秦隴之西貢獻曰享世見曰王此荆楚聽命而諭告之也蘇軾曰言爾國雖逺亦居吾國之南耳昔成湯之世雖氐羌之逺猶莫敢不來朝貢曰此商之常禮也况汝荆楚曷敢不至哉郝敬曰三代以前王都多在西北楚據東南地半天下王者南面出治失楚則如面牆故曰維汝荆楚居國南鄉言近而且要也天命多辟設都于禹之績嵗事來辟勿豫禍適稼穡匪解賦也多辟諸侯也來辟來朝也適謫通解懈也此荆楚既平而告諭諸侯也言上天命爾多辟建都邑於大禹所治之地當以嵗時朝覲恪供乃職勿干豫之譴責但勤於民事稼穡匪懈則可以免咎矣孟子曰入其疆土地闢田野治則有慶土地荒蕪則有讓是勿豫禍適以稼穡匪懈為本也天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福賦也監視嚴威也僭賞之差也濫刑之過也遑暇也言天命多辟又日降而監之甚可畏也下民雖卑上天以為視聽其可畏更有甚也諸侯恪恭職守我則賞罰諸侯賞不敢僭罰不敢濫夙夜不敢怠遑惟以敬天勤民之道命于下國則凡設都于禹之績者皆無禍適矣封建厥國不啻封建厥福也書曰其惟不言言乃雍不敢荒寧嘉靖殷邦此之謂也商邑翼翼四方之極赫赫厥聲濯濯厥靈夀考且寧以保我後生賦也商邑王都也翼翼整飭也極表也赫赫顯盛濯濯光明也夀考謂髙宗也書曰肆髙宗之享國五十有九年是也言髙宗之命于下國如此則宅中御宇而四方為則矣奮伐荆楚如彼則安內攘外而聲靈赫濯矣又承天眷命至于夀考且天下安寧以保我後世之人其功德之髙逺如此豈可不立廟以宗祀之哉陟彼景山松柏丸丸是斷是遷方斫是䖍松桷有梴旅楹有間寢成孔安賦也景山在商都春秋𫝊曰湯有景亳之命是也丸丸圓而直也斷截於所生之地也遷徙於所用之處也方繩墨正之也斫斧斤削之也䖍敬其事也桷椽也梴長也椽以長為善也旅衆楹柱也間合度而不過其則也寢廟中之寢也髙宗修德行政天下咸歡皆欲立廟以祀之今廟成則髙宗之神安而天下所以報髙宗之心亦安矣殷武六章三章章六句二章章七句一章五句詩序曰殷武祀髙宗也天子七廟三昭三穆與太祖之廟而七其有功德而當祧者别立廟而稱宗不在七廟之數也殷人祖契而宗湯自湯以後又有三宗太甲為太宗太戊為中宗武丁為髙宗皆不遷者也荆楚為患久矣深山大箐綿亘無極羣夷裒聚於其中留軍屯守猝不可下擊之則遁師還則復出故平之為難也髙宗奮然直搗長驅入其險阻而扼其要害使裒聚之旅截然止於其所不能逃遁而亦不敢相援故不戰而自服也荆楚既平不勤逺略誥諭列辟以敬天勤民保邦致治之道雖謨訓何以加兹蓋其舊學於甘盤而交修於傅說所得有深焉者矣故能武功文德一時並懋廟祀百世名垂千古不亦宜乎商頌五篇十六章一百五十四句御纂詩義折中卷二十
