body:
  text: 桑扈之什二之七交交桑扈有鶯其羽君子樂胥受天之祜比也交交羣飛徃來也鶯文貌桑扈應候而交飛以比諸侯如期而旅見也桑扈之羽鶯然而有文以比諸侯之來秩然而有禮也諸侯以禮來朝而天子饗之與之相樂則君臣各盡其道是以能受天之福也交交桑扈有鶯其領君子樂胥萬邦之屏比也領頸屏蔽也桑扈之領上承首而下統羽以比諸侯之長上輔天子而下統列辟也天子以禮饗之則方伯連帥益勤其職故可以爲萬邦之屏蔽也之屏之翰百辟爲憲不戢不難受福不那賦也翰幹也障土以築墻者戢歛難慎那多也言既爲之屏以藩其外又爲之翰以固其内使所統之諸侯皆奉之以爲法是其徳盛而功亦髙矣然且收歛而不敢自恃然且審慎而不敢少忽則其受福豈有不多者乎蓋於嘉賞之中而寓儆戒之意也兕觥其觩㫖酒思柔彼交匪敖萬福來求賦也兕觥爵也觩上曲貌酒能𤼵人之剛故思柔戒酒失也所謂温克也敖與傲通求與逑通聚也言兕觥之内貯有㫖酒乃對之而思柔不敢飲也敬之至也交際之間徃來酬酢毫無傲慢謙之至也謙敬以受天之祜則萬福自來聚矣易曰徳言盛禮言恭謙也者致恭以存其位者也此之謂也桑扈四章章四句桑扈饗諸侯也諸侯來朝天子饗之錫之弓矢使爲方伯以統列服也傳曰饗以訓共儉宴以示慈恵共儉以行禮慈恵以布政故饗之爲禮也立成而不坐設几而不倚爵盈而不飲共儉之至也觀桑扈之所詠兕觥其觩㫖酒思柔則爵盈不飲可知矣錫之以屏翰戒之以戢難勉之以匪敖樂胥之時不忘儆戒如此此則恭儉之實而非徒以其文也受天之祜萬福來求豈虛哉君子是以知禮之爲義甚大而詩之爲教至詳也鴛鴦于飛畢之羅之君子萬年福禄宜之比也鴛鴦匹鳥止則偶飛則雙不相離也人之篤於伉儷者似之畢小網羅大網也君子謂成婚之人也宜稱也言鴛鴦之飛則畢之羅之以比夫婦之禮當講之行之也君子能篤於夫婦則家道成而子孫盛億萬斯年福禄常與其徳相稱也鴛鴦在梁戢其左翼君子萬年宜其遐福比也張子曰禽鳥並棲一正一倒戢其左翼以相依於内舒其右翼以防患於外蓋左不用而右便故也君子能篤於夫婦同心合力朝夕相依則徳恒而福亦逺宜也非倖也乘馬在廐摧之秣之君子萬年福禄艾之賦也乘馬新婦所乘之馬也艾養也春秋書齊髙固及子叔姬來傳曰反馬也蓋古者婦來留其所乘之馬三月廟見而後反之兹未反故在廐也摧莝草也秣飼粟也摧之秣之善養之也愛其人故養其馬也夫婦愛敬以相養則上天亦以福禄養之矣乘馬在廐秣之摧之君子萬年福禄綏之賦也綏安也用馬則秣之息馬則摧之始秣而繼摧息之也與人相安故馬亦安也夫婦靜好以相安則上天亦以福禄安之矣鴛鴦四章章四句鴛鴦大昏也天子諸侯大昏禮成而羣臣賀之也匡衡曰妃匹之際生民之始萬物之原婚姻之禮正然後品物遂而天命全是也故婦順備而後内和理内和理而後家可長乆子子孫孫無窮之福禄自一日之伉儷開之萬年之祝豈虚語哉君子是以知大昏之重而關雎麟趾之化有由然也有頍者弁實維伊何爾酒既㫖爾殽既嘉豈伊異人兄弟匪他蔦與女蘿施于松栢未見君子憂心奕奕既見君子庶幾説懌賦而比也頍圓貌弁冠之通名蔦寄生也蘿松蘿也君子謂主人也奕奕憂不止也此兄弟甥舅燕飲之詩言此頍然而弁者伊何人乎因爾設燕而來並非異人皆兄弟也兄弟至戚如蔦蘿與松栢相依爲命故未見而憂之既見而樂之欲情誼之常相通也有頍者弁實維何期爾酒既㫖爾殽既時豈伊異人兄弟具來蔦與女蘿施于松上未見君子憂心怲怲既見君子庶幾有臧賦而比也期㑹也怲怲猶耿耿也言此頍然而弁者將㑹於何所乎因爾設燕故相約而俱來也兄弟相依如蔦蘿之施於松上庶幾蔦蘿得所而松亦多䕃是彼此偕臧也有頍者弁實維在首爾酒既㫖爾殽既阜豈伊異人兄弟甥舅如彼雨雪先集維霰死喪無日無幾相見樂酒今夕君子維宴賦而比也言頍弁在首者也兄弟之外又有甥舅亦皆老矣霰集則雨雪必大老至則來日無多相見之期未知有幾故今夕俱來而欲君子宴之也頍弁三章章十二句頍弁勸睦也此與伐木同爲燕兄弟甥舅之詩彼則主人速賓此則賓樂主人也主人速賓故曰有酒湑我賔樂主人故曰爾酒既㫖也方燕樂而言及死喪者關切之至也記曰親戚既没雖欲孝誰爲孝年既耆艾雖欲悌誰爲悌故孝有不及悌有不時其是之謂乎霜雪既零蔦蘿凋謝松栢雖存慘暗無光念及此而所以惇睦其兄弟親戚者亦維日不足矣閒關車之舝兮思孌季女逝兮匪飢匪渇徳音來括雖無好友式燕且喜賦也間關車舝聲舝軸頭鐵也孌好也逝往括㑹也此親迎在道而燕於所止宿之處也言設此間關之舝者爲慕美好之少女欲以車徃迎之也在道而如飢渴者匪飢渴也思季女之徳音更甚於飢渴也雖道途之間别無親友且當設燕以待之所以將敬且志喜也依彼平林有集維鷮辰彼碩女令徳來教式燕且譽好爾無射比也依叢也鷮雉也辰時碩大令善也鷮鳥集於平林以比碩女止於道舍也前言其少故曰季此美其徳故曰碩也前徃迎之故望來括今已至止故言來教也碩女初至未必果有所教但見其儀容之都雅即如示我以周行也故設燕以樂之以明好徳之無已也雖無㫖酒式飲庶幾雖無嘉殽式食庶幾雖無徳與女式歌且舞賦也此正言其燕也女指碩女也既行逺道不無飢渴故望其飲食也又言雖無徳以與女且爲女歌舞以明吾之好徳夫無徳而能好徳是亦一徳也陟彼髙岡析其柞薪析其柞薪其葉湑兮鮮我覯爾我心冩兮比也陟登柞櫟湑盛鮮少也登髙析薪而得湑葉以比逺道迎婚而得令徳也夫令徳難得也我覯爾之來教亦難得之遇也我心喜而思有以冩之是以飲之食之歌之舞之也髙山仰止景行行止四牡騑騑六轡如琴覯爾新昏以慰我心比而賦也景行大道也如琴謂六轡調和也此總承上文也言我之往也望徳音之來括如仰髙山也車舝逝而閒關則行景行也爾之來也四牡騑騑而閑習六轡如琴而調和則是令徳來教也以爾之令徳如是以我之好徳如是乃覯爾而與為新婚則生平好徳之心於是大慰而受教而仰其徳者愈不能自已矣車舝五章章六句車舝燕新婚也婚禮無在道設燕之文然或親迎於逺程非一日則於所止宿之處而飲食之亦情所必至而禮之所當然也車舝之詩往迎而思其徳既至而好其徳新婚初覯無一語及於色者其猶有關雎之遺意乎司馬遷曰髙山仰止景行行止雖不能至然心嚮徃之然則徳音心冩豈真新婚云爾哉取友求賢皆當如是矣營營青蠅止于樊豈弟君子無信讒言比也營營徃來飛聲青蠅汙穢能變白黑以比讒人徃來周旋附耳作聲能亂人之聼也巧言善幻以是爲非能惑人之心也樊藩也止於樊附近窺伺乘隙而入也吕祖謙曰止于樊行且至於几席盤盂之間矣是也豈明切也弟樂易也君子謂王也讒言可畏惟望豈弟之君子能察其情而不信則彼將止於外而不能入矣營營青蠅止于棘讒人㒺極交亂四國比也􅁄惡木也多刺止于􅁄謀作梗也以比讒人能使暴横之人起而爲難也一信其言則其心無已將使天子失禮於諸侯而諸侯起而梗化是搆四國使交亂也營營青蠅止于榛讒人㒺極構我二人比也榛叢生枝葉宻比止于榛謀離間也以比讒人能使親密之人漸生嫌隙也一信其言則其心㒺極將使天子不信其謀臣而謀臣由是獲戾是構我二人使不終也構架造也架空揑造也二人信讒與被讒者也青蠅三章章四句青蠅憂讒也巧言之詩曰亂之初生僭始既涵亂之又生君子信讒夫讒言初起其端甚㣲但不信之則其事止矣所謂君子如怒亂庶遄沮也惟其信之而使其㒺極於是始而生外難繼而造内釁内釁成而外難愈不可息矣所謂君子信盗亂是用暴也欲其不信惟有豈弟剴切而明於事樂易而平其情實而按之徐而察之逐青蠅於樊外則天下永無事矣左傳㑹于向晉將執戎子駒支駒支賦青蠅而退范宣子辭焉使即事於㑹成豈弟也君子是以知讒言之害而豈弟之不可已也賓之初筵左右秩秩籩豆有楚殽核維旅酒既和㫖飲酒孔偕鐘鼓既設舉醻逸逸大侯既抗弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵賦也筵因射而燕也左右賓主揖讓也秩秩有序也楚列貌殽豆實也核加籩也旅陳也和㫖甘美也偕多而齊也賓主及衆賓皆威儀齊一也既飲而設鐘鼓者將射改縣也舉醻舉所奠之醻爵也主人獻賓賓酢之主人醻賓賓受而奠之至旅乃舉是爵而相酬也逸逸閑習而安也大侯君侯也抗張也大侯張而弓矢亦張節也射夫既同比耦也獻爾發功發矢也發彼有的中之也祈求也爵豐上之觶不中者所飲也言射而中者非好勝也蓋祈不勝者使飲酒也此言因射而飲者之威儀也籥舞笙鼓樂既和奏烝衎烈祖以洽百禮百禮既至有壬有林錫爾純嘏子孫其湛其湛曰樂各奏爾能賓載手仇室人入又酌彼康爵以奏爾時賦也籥舞文舞也毛傳曰秉籥而舞與笙鼓相應是也烝進衎樂烈功也洽合也百禮多儀也言用盛樂備大禮以祭有功之祖也壬與任通林衆立之象百禮既備有奔走而任事者有無事而林立者言助祭者衆也純嘏大福也湛久也三獻既畢尸與主人以大福使子孫皆長久也子孫獲長久之福皆喜樂之故各奏其能洗觶以獻尸也仇讀曰㪺挹酒也室人有室中之事者佐食也子孫獻後賓手挹酒加爵以獻尸也康安也康爵坫上之爵也時時物也賓既獻後室人皆入又酌康爵以獻尸進時物以佐飲也此言因祭而飲者之威儀也賓之初筵温温其恭其未醉止威儀反反曰既醉止威儀幡幡舍其坐遷屢舞僊僊其未醉止威儀抑抑曰既醉止威儀怭怭是曰既醉不知其秩賦也又言賓之初筵者以明非射非祭燕飲而已所謂凡此飲酒者也反反内顧也幡幡飛掦也僊僊軒舉之狀抑抑慎密也怭怭媟慢也秩常也朱子曰此言凡飲酒者常始乎治而卒乎亂也賓既醉止載號載呶亂我籩豆屢舞僛僛是曰既醉不知其郵側弁之俄屢舞傞傞既醉而出並受其福醉而不出是謂伐徳飲酒孔嘉維其令儀賦也號呼呶讙也僛僛欹邪也郵與尤同過也側傾也俄傾貌傞傞不止也此極言醉者之狀恥之也又言不幸而醉但當亟出則賓節飲而主盡懽彼此皆無失徳是並受福也若醉而不出僛僛傞傞是自伐其徳何福之有夫古之人因射因祭飲酒而孔嘉者惟其有令儀耳今失儀而害徳若此是酒不累人人反累酒矣痛悔之詞也凡此飲酒或醉或否既立之監或佐之史彼醉不臧不醉反恥式勿從謂無俾大怠匪言勿言匪由勿語由醉之言俾出童羖三爵不識矧敢多又賦也監司正史所以佐監也淳于髠曰賜酒大王之前執法在旁御史在後是也式發語詞勿戒之也從隨謂言也童小羊羖大羊識記也言飲酒之時有醉者有不醉者故立監史紏失儀也醉之醜態醉者不知不醉者恥之式勿從謂監史告不醉者也凡人見醉者多隨其意而謂之是使醉者益放肆而至於大怠故戒其勿如此也由從也何楷曰不當言者勿與之言不當從者勿與之語醉者雖善號呶無人與之酬答亦將廢然而自止是也若從醉人之意而言之小則使出童大則使出羖罸之也總之獻酬之禮三爵而已玉藻曰君子之飲酒也受一爵而色洒如也二爵而言言斯禮已三爵而油油以退是也不能飲者三爵之後即有遺忘况敢又多乎監史若謹守此禮則人無由醉矣蓋深悔其醉因欲嚴監史之令使凡飲酒者皆不至於醉也賓之初筵五章章十四句賓之初筵衛武公飲酒悔過也昔有殷之季荒腆於酒故寧王酒誥明於沬邦康叔之所守也武公聰聽祖考之彛訓故痛自改悔賓筵諄諄猶有酒誥之遺意焉夫飲酒之失内則伐徳外自亂於威儀故酒誥言徳者八言威儀者一此詩言徳者一言威儀者五詳畧互相發也小宛之詩曰人之齊聖飲酒温克彼昏不知一醉日富各敬爾儀天命不又三復詩書之訓未飲者可以知戒既醉者可以知悔矣魚在在藻有頒其首王在在鎬豈樂飲酒興也藻水草頒大首貌言魚何在乎在於藻也得所憑依而又資其養育故其首頒然而大焉王何在乎在於鎬也據其形勝而又和樂以燕諸侯故福禄盛大如魚之頒首也魚在在藻有莘其尾王在在鎬飲酒樂豈興也頒首興福禄之大也莘尾興福禄之長也許謙曰豈樂而飲酒者四方和平諸侯賓服也飲酒而樂豈者禮儀既備人情和洽也魚在在藻依于其蒲王在在鎬有那其居興也那安也藻在水内蒲則出在水外矣魚在藻而又依蒲則叢葉茂密無網釣之害矣鎬在畿内諸侯在畿外也王在鎬而燕諸侯則屏藩鞏固無傾危之患矣鄭康成曰天下平安王無四方之虞故其居處那然安也魚藻三章章四句魚藻天子燕諸侯也東方諸侯朝於西京見河山之險固土田之肥美乃知豐鎬形勝洵爲帝王之都而天子又勤宣徳意以燕飲之君臣和樂天下乂安故頌美之如此也有那其居以爲宅中圖大可也以爲無爲安止亦可也孔子曰爲政以徳譬如北辰居其所而衆星共之其是之謂乎采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乘馬又何予之𤣥袞及黼興也菽豆也君子諸侯也路車金路象路也元袞元衣而畫以巻龍上公之服也黼如斧形刺之於裳子男之服也自元袞以及於黼五等之服皆具也言將采菽豆則先備筐筥以興將朝諸侯則先備錫予也車馬衣服所予之物雖無又何心計之也何楷曰諸侯尚未來而王者已預為之儲具也觱沸檻泉言采其芹君子來朝言觀其旂其旂淠淠鸞聲嘒嘒載驂載駟君子所届興也觱沸湧貌檻者泉正出也芹水草淠淠動而徐也嘒嘒細而節也驂駟馬數也王肅曰夏駕雨謂之麗殷益一騑謂之驂周又益一謂之駟是也言泉水之湧逺望不見言采其芹則見之矣以興君子之來逺望不見言觀其旂則知之矣逺望其旂者迎之於門也書曰王出在應門之内是也始觀其旂之動繼聞其車之聲繼見其馬之數而後其人至焉蓋佇立以久俟之也赤芾在股邪幅在下彼交匪紓天子所予樂只君子天子命之樂只君子福禄申之賦也赤芾冕服之鞸也脛本曰股邪幅偪也所以纒脛故在股下言芾與幅者芾以謹拜跪幅以利趨蹌也交交際之禮也紓緩也匪紓不敢怠緩也天子觀其芾幅見其拜跪趨蹌敬謹不怠故賜之車馬衣服何楷曰向所儲者今始予之是也諸侯受賜其心和樂故言樂只君子也天子命之者不止予以車服又錫以爵命也福禄申之者命於廟也記曰爵有徳而禄有功必賜於太廟示不敢專也禮行於廟故天子既命之神又以福禄申重之也維柞之枝其葉􅅾􅅾樂只君子殿天子之邦樂只君子萬福攸同平平左右亦是率從興也􅅫􅅾盛貌殿與奠通安也平平辯治也左右附近之國也天子猶本也諸侯猶枝也邦國猶葉也言柞之枝盛故其葉亦盛以興諸侯和樂能為天子奠安其邦家如柞葉之􅅾􅅾然盛也邦家乂安則君臣並受其福故曰攸同也平平左右者諸侯既自治其國又能辯治其連屬之國將來再朝之時當率左右之國使相從以偕來也何楷曰左右率從預期之詞是也汎汎楊舟紼纚維之樂只君子天子葵之樂只君子福禄膍之優哉游哉亦是戾矣興也紼大索也纚維皆繫也葵與揆通膍厚戾止也言楊舟汎流以紼維之使不行也以興諸侯將去天子處以端揆之任使不去也書曰使宅百揆是也留相王室則功業愈崇而福禄愈厚故望其優游而止於是也何楷曰諸侯朝事已畢行當辭歸而天子致其挽留之意也采菽五章章八句采菽天子賜諸侯也諸侯來朝天子賜之禮之常也聖王之意則有餘於所賜之外者焉未至而儲備之將至而迎望之既至而喜樂之覺車馬衣服猶未足以將其意也而又錫之以爵命申之以福禄既欲其去而復來又欲其留而不去綢繆繾綣則蔑以加矣孔子曰君使臣以禮臣事君以忠觀采菽之所詠君之於臣可謂有禮矣抑臣之忠君亦有之焉彼交匪紓忠之文也殿天子之邦忠之實也平平左右亦是率從忠之功也所謂上下交而志同者乎世運之㤗雖曰天時豈非人事哉騂騂角弓翩共反矣兄弟昏姻無胥逺矣興也騂騂調和也角弓以角飾弓也翩反貌弓之為物張之則内向弛之則外反也胥相也此言人於兄弟當如昏姻終身和好不可相逺如角弓之翩反也爾之逺矣民胥然矣爾之教矣民胥傚矣賦也言兄弟和睦人皆宜然而在位者尤甚蓋上之所為下之所法也爾逺則民亦胥逺矣爾不逺而以身教則民胥效之矣此令兄弟綽綽有裕不令兄弟交相為瘉賦也令善綽綽寛也裕饒瘉病也言兄弟不逺則善逺則不善善則讓不善則爭兩讓則俱有餘兩爭則俱不足故令者常綽有餘裕而不令者必至於交病也民之無良相怨一方受爵不讓至于已斯亡賦也爵官爵已罷亡去也言爾交瘉則民亦瘉之蓋在上之兄弟皆有爵者也胥逺而各居一方則民之無良者依附而分黨在兄一方者怨弟在弟一方者怨兄蓋構之使爭爵也爭而不讓兩敗俱傷至於兄弟之爵皆已而相怨者亦去矣勢盡而交踈小人之態也老馬反為駒不顧其後如食宜饇如酌孔取比也馬之年以齒為驗老馬齒平反類駒也饇飽孔甚也言小人讒間骨肉誑而不實如指老馬以為駒不顧其後之不驗也又如食者但知宜飽而不顧非禮酌者但知孔取而不顧其量之不能受也無信而貪得小人之常也毋教猱升木如塗塗附君子有徽猷小人與屬比也猱猴也塗泥也徽善猷謀屬聯也言小人本善讒間而君子不令又授之隙則是教猱升木而以塗附塗也然小人不足責也設君子悔其不令而有善謀則小人亦不相怨而且與之聯屬矣故善惡禍福在我而已於人無與也雨雪瀌瀌見晛曰消莫肯下遺式居婁驕比也瀌瀌雪盛貌晛日氣也遺與居積婁屢也言雨雪雖盛太陽一出則消矣以比讒言雖多天性一動則息矣而無如不能也此非性之過有害之者也負氣而莫肯相下吝財而莫肯相遺不遺而且私積之不下而又長傲焉則爭財爭氣而相親之本性亡矣千古兄弟之不令皆由於此也雨雪浮浮見晛曰流如蠻如髦我是用憂比也南夷曰蠻西夷曰髦言無良相怨患自外來固雨雪也式居屢驕私從後起亦雨雪也若相親之天性不失則財氣亦可以無爭而無如其不能也一如蠻而一如髦相逺而不相親則莫肯下遺而交相為瘉矣我用是憂之而亦末如之何也角弓八章章四句角弓刺不睦也兄弟不睦小人分黨相怨互爭必至兩傷古今來以此辱身喪家者豈少哉詩人推其相怨之故以為始於莫肯下遺又推其莫肯之故以為由於如蠻如髦探其本也書曰百姓不親五品不遜謂不遜之故由於不親也設能篤其天性之愛不相逺而相親則小人讒間如雪聿消上之交瘉頓息而民之無良亦改風移俗易邦家永無事矣令者如此不令者如彼有兄弟者宜何從哉有菀者栁不尚息焉上帝甚蹈無自暱焉俾予靖之後予極焉比也菀茂也上帝謂王也蹈動也暱近靖謀極窮也此幽王徴諸侯以伐申而諸侯不至也史稱幽王五年廢申后立褒姒為后伯服為太子故太子宜臼奔於申十年王求宜臼于申申侯不與故王欲伐之也諸侯之意以為菀栁多隂人尚思息况天子乎然而幽王不可近也上帝甚動天歩難測此時使我謀申後將使我窮極太子之事也有菀者栁不尚愒焉上帝甚蹈無自瘵焉俾予靖之後予邁焉比也愒久息也瘵病也邁徃也言雖欲久息不可自取瘵病此時使我謀申後將使我徃害太子之身也有鳥髙飛亦傅于天彼人之心于何其臻曷予靖之居以凶矜比也傅臻皆至也彼人謂褒姒也居猶徒然也凶惡矜憐也言有鳥髙飛上至于天亦可以止矣以比有女入宫至于為后亦可以止矣而彼人之心不止也觀褒姒爲后之後尚欲伐申以殺宜臼舉􅇏以戲諸侯亦不至於亡周不止也然則予何以謀之哉褒姒不可附亦不能去也宜臼不可害亦不能救也徒然視褒姒之逞凶憫宜臼之可矜而已所謂雖有善者亦無如之何也菀栁三章章六句菀栁傷時也史伯謂鄭伯友曰王欲殺太子以成伯服必求之申申人不與必伐之若伐申而繒與西戎㑹以伐周周不守矣是周之將亡人皆知之乃避之而不與其謀者深知其謀之不可與也君安褒姒不可去也太子國本不可摇也逆君則亡身從君則亡國故忠臣義士皆束手而莫敢誰何居以凶矜亦不獨詩人為然也聖人録菀栁使知廢后殺子國家之禍無有慘於此者然則房帷􅇃第之際宜何如戒懼哉桑扈之什十篇四十三章二百八十二句都人士之什二之八彼都人士狐裘黄黄其容不改出言有章行歸于周萬民所望賦也都西都也周忠信也鄭康成曰所行要歸於忠信是也詩人見東遷之後風俗凋敝故思西周之人士也衣狐裘家富也容不改有常也言有章成文也行歸于周徳之實也其服容言行如此故萬民皆望之以為法也彼都人士臺笠緇撮彼君子女綢直如髪我不見兮我心不説賦也臺夫湏草也緇撮緇布冠也草笠布冠言儉素也君子女貴家之女也綢密也直正也言其鬢濃密而髻端正如其髪之多寡不加髢墨也婦人首飾亦能儉素俗美之至也彼都人士充耳琇實彼君子女謂之尹吉我不見兮我心苑結賦也琇美石也實瑱也充耳琇實男子之禮服也尹氏吉氏周舊臣也女之有儀範者人咸謂之尹吉譽其知禮也苑鬱也言西都士女皆有故家遺風謹守禮法而今不能見故我心鬱結而不舒也彼都人士垂帶而厲彼君子女巻髪如蠆我不見兮言從之邁賦也厲嚴整之貌卷髪鬢旁短髪不可斂故上巻也蠆蠍也其尾上曲巻髪似之也狐裘冬服臺笠夏服充耳禮服垂帶卷髪則無冬無夏行禮燕居皆如此也垂而厲正而不搖也卷如蠆健而不亂也邁行也雖不見而思從之行所謂􅂓與子如一也匪伊垂之帶則有餘匪伊卷之髪則有旟我不見兮云何盱矣賦也旟揚也朱子曰士之帶非故垂之也帶自有餘耳女之髪非故卷之也髪自有旟耳言其自然閑美不假修飾是也盱望也下之風俗由上轉移言從之邁自勉於下也云何盱矣有望於上也都人士五章章六句都人士思舊俗也風俗之美惡皆始於奢儉務本則儉務外則奢儉則尚質奢則尚文儉而尚質則常有餘奢而尚文則常不足有餘則忠信生不足則詐偽起故奢儉質文者持世之大端也詩人蓋及見西都人物之盛並能知其化行俗美之由故言之親切而思之誠篤如此也云何盱矣非空言也實有望於爲政者之轉移之其意逺矣終朝采綠不盈一匊予髪曲局薄言歸沐比也自旦及食時為終朝緑王芻也兩手曰匊局巻也言終朝采緑而不盈一匊者志有在而不暇采也因髪曲而歸沐以比人之藏修不倦也離騷曰與汝沐兮咸池晞汝髪兮陽之阿是也終朝采藍不盈一襜五日為期六日不詹比也藍染草也前襟曰襜詹與瞻同言采藍而不盈襜者心有所思而不復采也期以五日而六日不至以比人之相約中變也離騷曰初既與予成言兮後悔遁而有他是也之子于狩言韔其弓之子于釣言綸之繩比也韔弢之也綸紉之也言彼之約而中變者以我為不適於用也不知子之如狩我能為之韔弓嫻於弓矢言能武也之子如釣我能為之綸繩善理絲綸言能文也其釣維何維魴及鱮維魴及鱮薄言觀者比也言我之才能一用即見民不可試請試其文但一釣之魴與鱮皆可得也此所得之魴鱮可即徃而觀之固非託之空言並不需之遲久也采綠四章章四句采綠懐才不用也士之挾持者大近於迂踈而寡效故有初欲用之又疑而不果者矣而不必疑也夫政之得民猶釣之得魚也餌香則魚至政善則民來孟子曰三代之得天下也得其民也得其民者得其心也苟能本之以恕而實行其仁則先得其心之同然而身將焉徃孔子曰苟有用我者期月而已可也三年有成此亦言效可立覩如觀魴鱮而卒無有用之者盖與詩人有同悲矣芃芃黍苗隂雨膏之悠悠南行召伯勞之興也芃芃盛貌膏潤也悠悠逺意勞撫慰之也宣王封申伯於謝命召伯徃營城邑而行役者作此詩也言芃芃之黍苖有隂雨以膏之以興悠悠之行人有召伯以勞之也憐其艱難恤其饑渇能使人忘其困苦而中心和悦如時雨之潤也我任我輦我車我牛我行既集蓋云歸哉賦也任負抱之也輦人輓者也車牛駕者也集成也言任輦車牛來受役者皆互相勸勉以為我役既成而後可言歸盖感召伯之勞而樂為之役也我徒我御我師我旅我行既集蓋云歸處賦也徒歩行者御乗車者五百人為旅五旅為師君行師從卿行旅從召伯天子之卿視諸侯故言師旅也言從行之軍士亦皆趨事赴功必役成而後言歸也肅肅謝功召伯營之烈烈征師召伯成之賦也肅肅嚴正之貌謝邑名王命城之以封申伯也烈烈威武貌征行師衆也成和輯也崧髙之詩曰王命召伯定申伯之宅又曰有俶其城寢廟既成則是城郭宫廟皆新作之故曰肅肅謝功召伯營之也又曰王命傅御遷其私人則是申國舊人新遷於謝皆宜安輯故曰烈烈征師召伯成之也原隰既平泉流既清召伯有成王心則寧賦也土治曰平水治曰清言召伯營謝又相其原隰之宜而通其水泉之利也崧髙之詩曰王命召伯徹申伯土田是也經營其城邑和輯其民人平治其水土凡王之所命者召伯皆有成焉於是乎申伯安而王心亦安也黍苗五章章四句黍苗營謝也此詩與崧髙本為一事彼作於王朝之卿士而意在申伯此作於行役之軍人而專美召伯也謝在鄧宛之間南方之要地宣王封申伯於此蓋將使南邦是式而非徒尊寵元舅召伯知之故徃盡心焉然或大臣能知天子之意而百姓不知朝廷之謀則苦其役而愁怨亦人情也乃召伯又能宣天子之徳意以勞之於是行役之人趨事勸功以安召伯之心并使召伯得因以安天子之心此則召伯之勞之真有如隂雨之膏故至此也易曰説以先民民忘其勞其是之謂乎隰桑有阿其葉有難既見君子其樂如何比也隰下濕之地也阿與娿通條長而垂也難與儺通葉鮮而嫩也隰桑有阿以比賢人在下位也其葉有儺以比君子雖處窮約而徳容羙好也如是之君子而既得見之其樂當何如哉隰桑有阿其葉有沃既見君子云何不樂比也沃光澤貌其葉有沃以比君子之英華𤼵越也鄒泉曰其樂如何欲自言而不能形容也云何不樂欲自止而不能遏抑也隰桑有阿其葉有幽既見君子徳音孔膠比也幽葉老而深黑也膠固也其葉有幽以比君子之静逺邃密也君子静逺邃密是以其言深入人心而有合焉如膠之固而不解也心乎愛矣遐不謂矣中心藏之何日忘之賦也遐與胡通謂猶告也此總承上文言我之既見而樂則心實愛之也君子之徳音孔膠則胡不謂之也如肯謂之我當中心藏之而無日忘之勸君子使盡言也隰桑四章章四句隰桑求賢也誠於求賢且乞言也干旄之詩曰彼姝者子何以告之此旁觀之詞耳若求賢者豈敢謂素絲良馬遂足将意哉猶必竭其誠焉心乎愛矣言心誠求之非徒以其文也中心藏之何日忘之謂永矢弗諼且設誠而致行之也君子盡言人君能不忘其言而行之其於治天下庶幾矣左傳鄭伯享趙孟於垂隴子産賦隰桑趙孟曰武請受其卒章蓋欲子産之盡言以規誨之也可以知此詩之意矣白華菅兮白茅束兮之子之逺俾我獨兮比也白華野菅也漚而成菅茅柔潔之草也采白華而漚菅紉白茅以為束喻志行之修潔也之子謂褒姒也言已之志行修潔如此褒姒乃讒間而逺之使見棄而獨處則何故哉英英白雲露彼菅茅天歩艱難之子不猶比也英英輕明之貌天歩時運也猶謀也言白雲當夜而上騰則能露彼菅茅以比褒姒得寵而為后則宜及時布恵也况時運艱難正宜同心共處為王内助而之子不謀及此則失計矣滮池北流浸彼稲田嘯歌傷懐念彼碩人比也滮流貌碩人謂王也凡篇中言之子者皆謂褒姒言碩人者皆謂幽王也言池水北流尚能浸彼稲田而王之膏澤不及百姓是以傷而念之也謝枋得曰傷懐而言嘯歌者長歌之哀同於痛哭也樵彼桑薪卬烘于煁維彼碩人實勞我心比也樵采也卬我烘燎煁無釡之竈也言桑為美薪宜以烹餁乃燎之於無釡之竈以比賢人宜使輔治乃棄之於無用之地也人君之職以用賢養民為本而王皆不能此則所謂天歩艱難也鼓鐘于宫聲聞于外念子懆懆視我邁邁比也懆懆憂貌邁邁徃而不顧也言鼓鐘者雖在宫中外皆聞之以比褒似之讒雖云秘密人皆知之也乃我念子而憂之子棄我而不顧此則所謂之子不猶也有鶖在梁有鶴在林維彼碩人實勞我心比也鶖秃鶖也梁魚梁也蘇轍曰鶖鶴皆以魚為食然清濁則有問矣今鶖在梁而鶴在林鶖則飽而鶴則饑矣幽王近褒姒而黜申后譬之養鶖而棄鶴也鴛鴦在梁戢其左翼之子無良二三其徳比也此承上在梁而言也鴛鴦在梁戢其左翼有常度也今在梁者鶖也非鴛鴦也之子不善其徳無常而與王相處則恐其有害於王此其所以實勞我心也有扁斯石履之卑兮之子之逺俾我疷兮比也扁卑貌疷病也言石卑則履之者亦卑矣以比妾賤則寵之者亦賤矣褒姒無良而王寵之此實盛徳之累故之子之逺不止俾我獨而且俾我疷盖獨不過一己之失寵疷則病王之為褒姒累也白華八章章四句白華申后思幽王也幽王寵褒姒而廢申后其無恩亦甚矣而申后未嘗有過甚之詞也方且念天歩之艱難勸之子之内助至於鶖在梁而鶴在林矣而且慮左翼之不戢憂扁石之履卑不悲己之失寵而惓惓於天時治道之大以庶幾王心之一悟所謂思而不怨者乎以荘姜之賢而不禮於荘公以申后之賢而見廢於幽王何哉緜蠻黄鳥止于丘阿道之云逺我勞如何飲之食之教之誨之命彼後車謂之載之比也緜蠻鳥聲丘阿丘之幽曲處也言緜蠻之黄鳥宜止於丘阿以比誦讀之士人宜入於太學也但自侯國以至京師道路遼逺憂其勞而無如何也幸而吾君平日飬之庠序既有以飲之食之教之誨之矣今當入貢又命彼後車謂之載之則道雖逺而可以不勞矣緜蠻黄鳥止于丘隅豈敢憚行畏不能趨飲之食之教之誨之命彼後車謂之載之比也隅角也憚畏也趨疾行也丘阿幽曲喻藏修也丘隅髙峻人皆見之矣以比士在太學砥礪亷隅有聞於時也如此則道雖逺而不憚行但畏䟦渉維艱不能疾趨耳今既後車命載則可以疾行而無阻矣緜蠻黄鳥止于丘側豈敢憚行畏不能極飲之食之教之誨之命彼後車謂之載之比也側中峯之旁也黄鳥止于丘側以比士在太學選造論辨任官受爵可以至於天子之側也極至也不能極畏其半途而廢耳今如此則可至于所當止之處矣緜蠻三章章八句緜蠻諸侯貢士也禮記曰諸侯嵗獻貢士於天子天子試之於射宫書傳曰古者諸侯之於天子也三年一貢士漢志云諸侯嵗貢少學之異者學於太學命曰造士蓋古之時人才出而天下治其大端必由於此故諸侯於貢士所以資遣之者甚厚也古制不可詳矣今之學校明經是即所謂嵗貢於天子者也鄉試大比是即所謂三年一貢者也廪生有糧飲之食之也師儒有官教之誨之也來試禮闈或給資斧或乗驛傳後車載之也所以教飬而資遣之者與詩所詠無異矣設教者之所教與學者之所學能不異於古所云安見三代之盛不可比隆哉幡幡􅉚葉采之亨之君子有酒酌言嘗之賦也幡幡葉動貌君子有徳者之稱嘗為客嘗酒也此民間燕飲之詩言幡幡之􅉚葉采而亨之以為菹也君子有酒酌於爵内則主人先嘗之也有斯首炮之燔之君子有酒酌言獻之賦也有斯首以首計也猶魚之以尾計也炮去其毛燔燒其肉以為羞也獻之者主人既嘗乃酌而獻於賓也鄭康成曰飲酒之禮既奏酒於賓乃薦羞有斯首燔之炙之君子有酒酌言酢之賦也近火曰燔逺火曰炙楚茨之詩曰或燔或炙燔言肉炙言肝也亦有肝故炙之也酢報也賓既卒爵乃酌而報主人也有斯首燔之炮之君子有酒酌言醻之賦也醻導飲也賓既酢之主人又酌而先自飲以導之然後復酌而進於賓也嘗獻酢醻以次言之記禮儀也􅉚葉四章章四句􅉚葉示儉也風俗之壊皆由於奢而燕飲為尤甚杯酒之間殽羞山積富者習焉而貧者效之於是乎貧者日窘富者日荒荒而不已亦至於窘非小失也聖人録􅉚葉使知田園所種罝弋所獲隨取一二即可以行禮則主無過費而賓無失儀且可以不時舉行使情通而儀習民足而俗厚天下之福莫大於此也徐常吉曰豐以燕賓者魚麗是也鼎之彖曰大亨以養聖賢薄以燕賓者􅉚葉是也損之彖曰二簋可用享知易之義則知詩之義矣漸漸之石維其髙矣山川悠逺維其勞矣武人東征不遑朝矣賦也漸漸猶層層也悠長遑暇朝旦也言漸漸之石積而累之惟有髙而已山川悠逺䟦而渉之惟有勞而已武人東征夙夜奔馳不暇至於朝而後啟行也漸漸之石惟其率矣山川悠逺曷其沒矣武人東征不遑出矣賦也卒與崒同崔嵬也曷何没盡也朱子曰言所登歴何時而可盡也不遑出謂但知深入不暇謀出也有豕白蹢烝渉波矣月離于畢俾滂沱矣武人東征不遑他矣賦也蹢蹄烝衆也離月所宿也畢星名滂沱大雨貌言豕蹄本黒今有白者是羣渉波中久浸色變言積水之多也月之從星則以風雨畢好雨月麗之故滂沱也積水已多大雨又至其患更甚故武人之東征者求免水患而已不暇更及其他也漸漸之石三章章六句漸漸之石將士苦東征也古者諸侯有事天子命方伯連帥征之王朝卿士鄉遂之師不輕出也今諸侯之兵未有至者而命在朝之武人東征則師出不順失人和矣山川悠逺經歴險阻失地利矣又值盛暑大雨時行失天時矣任其事者救死而恐不贍奚暇謀制勝哉鄭文公使髙克將兵於河上久而不召師潰而歸春秋書鄭棄其師今此武人踰越山河决計深入可謂勇矣詳察物理洞悉天文可謂智矣乃卒使束手而無䇿則是王自棄其師而非武人之過也苕之華芸其黄矣心之憂矣維其傷矣比也苕陵苕也其花紫赤今芸然而黄者衰而將落也世運漸衰如花將落是以我心憂之然無如之何惟有感傷而已苕之華其葉青青知我如此不如無生比也其葉青青者花已落盡惟葉存也世運既衰如花盡落而我惟憂傷無益於世也夫生而無益於世則不如無生矣蓋身世兩傷之也牂羊墳首三星在羀人可以食鮮可以飽賦也牂牝羊墳大也羊瘦則首大也羀笱也羀中無魚則水静而星見也言世運日衰百物凋敝民雖食而不飽將日即於憔悴是以傷之而不欲生也苕之華三章章四句苕之華憫世也世之盛也年豐民富暨鳥獸魚鼈咸若及其衰也不惟年糓不登而水陸之産亦盡此非一日之積也蓋虐政頻行饑饉薦至民生日蹙機智日生於是乎山居者斧斤無時不入而槎蘖不遺牛羊亦無食矣水居者數罟日以繁密而鯤鮞悉取罾羀皆空設矣此在為政者敦本務實黜奢崇儉培天地之元氣養庶物之太和乃可以轉移然豈易得哉民之劬勞遼遼未央不如無生非虛言也此詩與有蓷萇楚景况相同彼為風而此為雅者彼之悲在一身此之憂在一世也何草不黄何日不行何人不將經營四方興也草衰則黄將擬也言嵗之既暮何草不黄乎終嵗在外何日不行乎舉國之人何人不擬將經營四方乎嘆國家之多事而未有已也何草不𤣥何人不矜哀我征夫獨為匪民興也元赤黒色鄭康成曰草芽孽者將生必元是也矜通鰥民猶人也言由冬至春何草不元乎行役改嵗何人不鰥乎朱子曰言從役過時而失其室家也匪兕匪虎率彼曠野哀我征夫朝夕不暇賦也率循也曠空也言兕虎猛獸不可家畜故趨逐於野今我征夫非兕非虎何為使久在曠野而朝夕不暇也有芃者狐率彼幽草有棧之車行彼周道比也芃長尾貌狐邪獸也棧棚也有棚之車士所乗也周禮曰大夫乗墨車士乗棧車庻人乗役車是也周道大路也言長尾之邪獸循彼幽草之中以比得時之小人日為隠昧之事也小人隂謀於内而棧車之士為之奔走道路以承其意而推行之此則所謂何人不將經營四方而征夫之率彼曠野永無暇日矣天下本無事庸人自擾之可嘆也何草不黄四章章四句何草不黄悲行後也苕之華言國家之衰微時物之凋耗傷民貧也何草不黄言國家之多事征行之煩勞苦役重也危亡之事多端莫大於民貧而役重民不聊生則常思亂再加之以重役未有能靖者矣故小雅終於此見王澤之竭而天命人心不可以復挽也西周亡而東周弱豈不以此哉都人士之什十篇四十三章二百句御纂詩義折中卷十五
