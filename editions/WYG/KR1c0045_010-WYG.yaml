body:
  text: 小雅二詩序曰雅者正也言王政之所由廢興也政有大小故有小雅焉有大雅焉鹿鳴之什二之一朱子曰雅頌無諸國别故以十篇為一卷而謂之什猶軍法以十人為什也呦呦鹿鳴食野之苹我有嘉賓鼔瑟吹笙吹笙鼓簧承筐是將人之好我示我周行興也呦呦和聲也苹藾蕭也鹿呼羣而共食故以興燕飲也嘉賓或本國之臣或諸侯之使也瑟笙所用之樂也凡燕饗之樂皆鼓瑟而工歌吹笙以間之也承奉也筐所以盛幣者將行也鄭康成曰飲有酬幣食有侑幣也周行大道也朱子曰君臣之分以嚴為主朝廷之禮以敬為主然一於嚴敬則情或不通而無以盡其忠告之益故先王制為燕饗之禮以通上下之情其樂歌以鹿鳴起興而言其禮意之厚如此庶乎人之好我而示以大道也孔頴逹曰古者於旅也語禮成樂備乃可以言語先王之道也呦呦鹿鳴食野之蒿我有嘉賓德音孔昭視民不恌君子是則是傚我有㫖酒嘉賓式燕以敖賦也蒿菣也德音善言也昭明也視與示同恌浮薄也敖禮容也此承上章而言嘉賓之示我周行其德音甚為詳明又以其盛德之儀容使人觀感而化其浮薄有官君子皆當則而傚之以為民之矜式則不待言語之間而所以示我者更深矣故㫖酒式燕與之從容遊敖蓋欲觀其周旋之中禮而則傚之也范祖禹曰式燕以敖言其禮儀之從容也荘而不至於矜和而不至於流德之純也呦呦鹿鳴食野之芩我有嘉賓鼓瑟鼓琴鼓瑟鼓琴和樂且湛我有㫖酒以燕樂嘉賓之心興也芩草名琴瑟堂上之樂也湛久也燕安也此通承上文周行示以言也則傚示以行也夫嘉賓之言行皆出於其心設心有不樂則行有時隠而言有時倦矣故琴瑟調和㫖酒無算不止養其體娯其外而已皆所以安樂嘉賓之心而欲其教示之無已也范祖禹曰食之以禮樂之以樂將之以實永之以誠此所以得其心也夫賢者豈以飲食幣帛為悦哉鹿鳴三章章六句詩序曰鹿鳴燕羣臣嘉賓也古之聖賢無一事而不深其學問無一時而不修其德行無一人而不敦其性情鹿鳴之詩樂奏幣將人見其和樂而已不知所望於嘉賓者在於示我周行乞善言所以廣學問也㫖酒式燕人見其欵洽而已不知所資於嘉賓者在於視我則傚觀楷模所以進德行也琴瑟和湛人見其殷勤而已不知所厚於嘉賓者在於燕樂其心固心志所以厚性情也此可以知禮樂之本矣朱子曰燕禮云歌鹿鳴四牡皇皇者華即謂此也鄉飲酒用樂亦然而學記又言大學始教宵雅肄三則又為上下通用之樂矣豈本為燕羣臣嘉賓而作後乃推而用之鄉人也與然於朝曰君臣焉於燕曰賓主焉先王以禮使臣之厚於此見矣四牡騑騑周道倭遲豈不懷歸王事靡盬我心傷悲賦也騑騑行不止也周道大路倭遲迂逺也盬壞也靡盬不可壊也言使臣駕此四牡行而不止道路迂逺亦云勞矣豈不思歸而偃息乎特以國家之事不可廢壊是以中心感憤雖勞而不辭也朱公遷曰傷悲於心王事之故是也蓋忠臣於王事實有不容已之至情非徒廹於勢而勉強塞責也四牡騑騑嘽嘽駱馬豈不懐歸王事靡盬不遑啟處賦也嘽嘽喘息之貌白馬黑鬛曰駱遑暇啟跪處坐也項安世曰古者席地跪即起居則坐是也因其心有傷悲故其身不遑處勞之至也翩翩者鵻載飛載下集于苞栩王事靡盬不遑將父興也蘇轍曰鵻祝鳩孝鳥也春秋傳曰祝鳩氏司徒也教孝者也是以孝子不獲養而稱焉鵻之飛也則亦下而集于栩不似使者之久行不返不獲養父母也翩翩者鵻載飛載止集于苞杞王事靡盬不遑將母興也把枸把也先下而後止集之勢也先父而後母言之序也駕彼四駱載驟駸駸豈不懷歸是用作歌將母來諗賦也驟馬行疾也駸駸驟貌諗告也此通承上文言駕此嘽嘽之駱馬驟彼倭遲之周道豈不思歸而將父母乎而不敢言也人君知其不敢言也用是於燕饗之時作為詩歌以道其意如使臣以將母之情來告者臣不自言而君代言之上下之間可謂各盡其道矣君子是以知樂歌之不可已也郊廟之歌所以逹神人之意也燕饗之歌所以宣上下之情也是故禮行而分定樂作而志通四牡五章章五句詩序曰四牡勞使臣之來也春秋傳曰所以章使臣之勤也夫使臣奉命馳驅不敢顧父母者事上之義也所以盡忠也而人君念其勤勞憂其不能將父母者恤下之恩也所以教孝也勞於王事雖不顧養而勇戰敬官不辱其親則盡忠乃所以全孝也將母來諗似非急公而既逹其情遂忘其苦則教孝乃所以作忠也故四牡之義行則君臣之道兩得之矣皇皇者華于彼原隰駪駪征夫每懷靡及興也皇皇猶煌煌也髙平曰原下濕曰隰駪駪疾行之貌征夫行人也此遣使臣之詩也言使臣奉命行於四方見髙原下隰皆有可采之華因思大邦小國皆有可采之事是以汲汲道途常懷不及之慮蓋惟恐諮訪有所未周也程子曰天子遣使四方以觀省風俗采察善惡訪問疾苦宣道化於天下使人惟恐不能宣上意而逹下情是以每懐靡及也我馬維駒六轡如濡載馳載驅周爰咨諏賦也如濡柔宻也周徧爰於咨問也諏采訪也采訪貴於柔宻故以濡興諏也我馬維騏六轡如絲載馳載驅周爰咨謀賦也絲條理也謀籌畫也籌畫貴有條理故以絲興謀也我馬維駱六轡沃若載馳載驅周爰咨度賦也沃若明洽也度裁酌也裁酌貴於明洽故以沃興度也我馬維駰六轡既均載馳載驅周爰咨詢賦也均齊一也詢僉和也書曰弗詢之謀勿庸是也僉和歸於齊一故以均興詢也皇皇者華五章章四句詩序曰皇華君遣使臣也春秋傳穆叔如晉晉侯享之金奏肆夏之三不拜工歌文王之三不拜歌鹿鳴之三三拜韓獻子使行人問之對曰三夏天子所以享元侯也使臣不敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必咨於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜夫咨訪固使臣之大務然必問於善人乃可以徴信否則所訪不實為害滋大故曰訪問於善為咨也周禮小行人之職萬民之利害為一書有咨事之義焉禮俗政事教治刑禁之逆順為一書有咨禮之義焉悖逆暴亂作慝犯令者為一書札喪凶荒厄貧為一書有咨難之義焉康樂和親安平為一書有咨親之義焉然則叔孫之釋此詩其必有所傳矣常棣之華鄂不韡韡凡今之人莫如兄弟興也常棣栘也鄂與蕚同不與柎通蕚足也常棣之華蕚柎攢生相比發榮故韡韡然人與兄弟相親相助家道乃興故遍閱世人未有如兄弟者也死喪之威兄弟孔懷原隰裒矣兄弟求矣賦也威畏也裒與褎同長也言兄弟勝於他人平時或不知也一値變故則知之矣死喪可畏人之所惡惟兄弟懐之或卒於外原隰路長惟兄弟求之夫其懷之而求之者蓋天性之親實有所不容已焉此非他人之所得與也脊令在原兄弟急難毎有良朋况也永歎興也脊令水鳥况與怳同言脊令之性飛則鳴行則摇失水在原鳴搖更甚兄弟之急難者似之盖天性之親一聞有難則必急救號呼奔走無不為也當此之時雖有良朋心相闗切不過怳然長歎而已不能力救也蓋親疎厚薄理之自然良朋亦有兄弟不能薄所厚而厚所薄也兄弟鬩于牆外禦其務每有良朋烝也無戎賦也鬩鬭也務當作侮烝衆戎争也言兄弟即不幸而反目鬭於牆内然茍有外侮則同出禦之每有良朋不過周旋解釋勸其無争而已不能出身為禦也則是不令之兄弟猶勝於相好之他人也喪亂既平既安且寧雖有兄弟不如友生賦也此承上文言喪亂之時雖有良朋不如兄弟幸以急難禦侮之故喪亂平矣不止身安亦且家寧豈可視兄弟反不如友生乎歐陽修曰此責之之辭所謂弔其不咸也儐爾籩豆飲酒之飫兄弟既具和樂且孺賦也儐陳飫饜具俱也孺孩提之狀也此承上章言兄弟不如友生者不過謂飲食燕㑹非朋友無可與娯耳試思籩豆既陳飲食饜飫之時使兄弟與朋友俱在則天倫之愛既極和樂且不事文貌有孺子嬉戲之歡不更勝於朋友乎妻子好合如鼓瑟琴兄弟既翕和樂且湛賦也翕合也湛久也此承上章言間兄弟之愛者外有朋友内則妻子世之親妻子而疎兄弟者多矣試思妻子之相好如瑟琴之調和信可樂也設兄弟䦧牆其樂豈能久乎故必兄弟與妻子翕合而後可久樂也宜爾室家樂爾妻帑是究是圗亶其然乎賦也帑與孥同究察圗思亶信也此承上章言兄弟翕而後樂可久則是宜爾室家者兄弟也樂爾妻帑者兄弟也總而言之急難禦侮是共憂患者莫如兄弟也且孺且湛是共安樂者亦莫如兄弟也試詳察而深思之豈不信然乎哉吕祖謙曰告人以兄弟之當親未有不以為然者也茍非是究是圗實從事於此未有知其誠然者也不誠知其然則所知者特其名而已矣凡學蓋莫不然常棣八章章四句詩序曰常棣燕兄弟也朱子曰此詩首章言至親莫如兄弟次章以意外不測之事言之以明兄弟之情其切如此三章但言急難則淺於死喪矣四章又以其情義之甚薄而猶有所不能已者言之其序若曰不待死喪但有患難便當相助又不幸而至於或有小忿猶必共禦外侮其所以言之者雖若遞輕而所以著夫兄弟之誼者益深且切矣至於五章言安寜之後乃謂兄弟不如友生則是至親反為路人而人道或㡬乎息矣故下兩章乃復極言兄弟之恩異形同氣死生苦樂無適而不相須之意卒章又申告之使反覆窮極而驗其信然可謂委曲漸次說盡人情矣讀者宜深味之伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平興也丁丁衆人伐木之聲嚶嚶兩鳥之和聲也幽深遷升喬髙相視矧况也神之敬之也聽之從之也伐木者斵削以成材交友者切劘以成德故三章皆以伐木起興也又言鳥出深谷升於髙木而嚶嚶其鳴者鳥以同類為朋欲其同聲相應故以已之聲求友之聲也夫鳥也而猶求友之聲豈人也而不求友之言乎果能虚心求友敬其人如神明聽其言而從之則友以直言相規我不忤而順受彼此之心皆歸於和且日聞正言日生嚴憚則意氣不覺自平既和且平則心日卽於謙卑德日進於髙明如鳥之出幽谷而遷喬木也爾雅曰丁丁嚶嚶相切直也得此詩之意矣伐木許許釃酒有藇既有肥羜以速諸父寧適不來微我弗顧於粲灑埽陳饋八簋既有肥牡以速諸舅寜適不來微我有咎興也朱子曰許許衆人共力之聲釃酒泲之而去其糟也藇美貌羜小羊也速召也諸父朋友之同姓而尊者也微無顧念也於歎詞粲鮮明貌八簋盛食也諸舅朋友之異姓而尊者也先諸父而後諸舅親疎之序也言具酒食以樂朋友如此寧使彼適有故而不來無使我恩意之不至也孔子曰所求乎朋友先施之未能也此可謂能先施矣伐木于阪釃酒有衍籩豆有踐兄弟無逺民之失德乾餱以愆有酒湑我無酒酤我坎坎鼓我蹲蹲舞我迨我暇矣飲此湑矣興也衍多也踐陳列也兄弟同異姓之等軰者無逺皆在也先諸舅而後兄弟者尊卑之等也乾餱食之薄者愆過也朱子曰人所以失朋友之義者非必有大故或以乾餱之薄不以分人遂至於有愆是也湑亦釃也酤買也坎坎鼓聲蹲蹲舞貌燕禮一獻既畢皆坐而飲酒其爵無算其樂無算是也迨及也迨我暇而飲湑者當其未暇不敢以宴樂廢事及其既暇不敢以乾餱失徳故迨暇以㑹友因友以求言欲其神聽和平非徒以飲酒為樂也伐木三章章十二句伐木燕朋友也天下之道五倫而已下之人非此無以為學上之人非此無以為治君臣與父子並重故不以私恩緩公義亦不以公義廢私恩此鹿鳴四牡皇華之義也兄弟與朋友相衡故不可忘天合之恩而等兄弟於朋友又欲其盡人合之義而待朋友如兄弟此常棣伐木之義也風首夫婦正其本也小雅之始而君臣父子兄弟朋友之義著焉五倫之道備矣人倫之至可以通神明而光四海所由繼以天保也子思之言道也造端乎夫婦繼之以子臣弟友而遂及於鬼神其詩教也夫天保定爾亦孔之固俾爾單厚何福不除俾爾多益以莫不庶賦也保䕶定安也爾謂君也謂君為爾者稱天以為言也固堅也單盡也除階也言其升也易曰貞吉升階是也庶衆也此人臣頌祝其君也言人之福受之於君君之福受之於天今天之福爾則甚固矣所謂固者内植其基俾爾有單厚之德其福遞升也外多其助俾爾受親賢之益其福日衆也天保定爾俾爾戩榖罄無不宜受天百禄降爾遐福維日不足賦也戩盡榖善也言德性單厚故所行無不盡善有以宜民人而受天祿天遂降以遐福而維日不足此所謂何福不除也天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不増賦也興盛也髙平曰陸大陸曰阜大阜曰陵岡者陵之有石者也言福之積而髙也川之方至言初來也初來雖小續流則大言福之繼而長也此所謂以莫不増也吉蠲為饎是用孝享禴祠烝嘗于公先王君曰卜爾萬壽無疆賦也朱子曰吉言諏日擇士之善蠲言齊戒滌濯之潔饎食也享獻也宗廟之祭春曰祠夏曰禴秋曰嘗冬曰烝公先公后稷以下也先王太王以下也君通指先公先王也卜予也君曰卜爾尸傳神意以嘏主人之詞神之弔矣詒爾多福民之質矣日用飲食羣黎百姓徧為爾德賦也弔至詒遺質實也黎黒也髮黑故曰黎此承上文而推原之言多福之來非無故也天視天聽在神與民爾能吉蠲孝享忠信於鬼神故祖考來格而遺爾多福矣至民則質樸無文日用飲食而已似不能為爾助者然安耕鑿之常見爾愛養之至留風氣之古見爾治化之醇其不為爾德正所以為爾德也至於羣黎百姓徧為爾德則神佑而天降之福矣盖神者天之耳目民者天之心也養民而致敬於神此自求多福之本也如月之恒如日之升如南山之壽不騫不崩如松柏之茂無不爾或承賦也恒弦升出也日月徃來言久照也騫移也山亘古而常在不移不虧也松柏之葉新舊相承言長生也此承上文言神人皆和故自天申之也前言福之多此言福之久多而且久所謂亦孔之固也天保六章章六句詩序曰天保下報上也九如之祝工於頌禱而非諛詞也觀鹿鳴以下五詩君之所以待其臣者誠心藹惻非所謂單厚乎親賢之佐内外交助可不謂多益乎又推本於神人之協應則所以惠於宗公而諴和萬民者其必有道矣頌祝之中而不忘䂓箴此古人之所以愛其君也采薇采薇薇亦作止曰歸曰歸歲亦莫止靡室靡家玁狁之故不遑啟居玁狁之故興也薇菜名作初出土也莫晚靡無玁狁北狄也此因玁狁作難而遣戍也言啟行之時薇始出土計其歸期逺在嵗暮所以舎其室家而不遑啟居者皆因玁狁之故也程子曰毒民不由其上則人懐敵愾之心矣又曰古者戍役兩期而還今年春暮行明年夏代者至復留備秋至十一月而歸每年秋兩番戍者皆在疆圉也采薇采薇薇亦柔止曰歸曰歸心亦憂止憂心烈烈載饑載渴我戍未定靡使歸聘興也柔始生而弱也烈烈憂貌聘問也言戍人在途薇亦柔矣念歸期之逺而憂勞之甚然戍事未定則當一意前徃無使歸問室家蓋不欲以家事累其心也采薇采薇薇亦剛止曰歸曰歸歲亦陽止王事靡盬不遑啟處憂心孔疚我行不來興也剛既成而剛也陽十月也嫌於無陽故曰陽也言戍人至邊薇亦剛矣旣至戍所見疆場之多難是以不遑寧處而憂心成疾自謂此行不復望歸矣蓋在途止憂身至戍則憂國以王事為重故竭力致死無還心也彼爾維何維常之華彼路斯何君子之車戎車旣駕四牡業業豈敢定居一月三㨗興也爾華盛貌路戎車也君子謂將帥也業業壮也㨗勝也此敵來而交戰也以華興路非止美其車也戎事倥偬而熟視常華見軍心之暇也三軍環列而屬目路車見軍容之整也戎車既駕而四牡皆壮見軍力之齊也以此節制之師加之以忠勇奮不顧身而無敢安處則可以一月之間三戰而三㨗矣駕彼四牡四牡騤騤君子所依小人所腓四牡翼翼象弭魚服豈不日戒玁狁孔􅁄賦也騤騤强也依憑也腓避也古之用車也戰則資衝突行則載衣糧止則為營衞是將士之所憑依而兵卒之所倚以避患也翼翼行列整齊之貌象弭以象骨飾弓弰也魚服以魚皮為矢服也戒警棘梗也此言既勝而戒備也言雖一月三㨗不可驟勝而驕止則聨其車馬嚴其營衞行則整其行列精其器械蓋言戒也其所以無日不戒者以玁狁勁敵叢集為梗止而不戒則恐其攻我無備行而不戒則恐其擊我惰歸也昔我徃矣楊柳依依今我來思雨雪霏霏行道遲遲載渴載饑我心傷悲莫知我哀賦也此承上文言既已三㨗又能日戒乃可以全師而歸矣因憶往時楊栁乃薇作薇柔之日來時雨雪正歳暮歲陽之候往時憂心載饑載渴來行舊路饑渴猶前戰守之勞道途之困我心傷悲亦云哀矣而非人之所能知也夫下之人既已哀矣而又莫知其哀則其哀更甚矣乃上之人知其哀矣而又知其悲莫知則知更深矣首章諭以不得已之意末章體以不忍人之心於此見先王之仁也采薇六章章八句詩序曰采薇遣戍役也夫戍役之苦莫甚於啟行有離别之悲在途有饑渴之困至戍有戰守之勞而上之人皆預知之矣戍役之功莫大於未戰有忠奮之心將戰有整暇之度旣戰有警戒之思而上之人皆預言之矣於體恤之中而詳為訓誡此上世之民所以有勇而且知方也我出我車于彼牧矣自天子所謂我來矣召彼僕夫謂之載矣王事多難維其􅁄矣賦也牧郊外也􅁄急也此勞將帥而追敘其功也言車出在牧而將尚未來入受命也自天子所而但謂我來不言所命其謀秘也召僕夫而謂之載即日啟行也又言王事之多而且急者督軍士使速行也謀秘而行速用兵之要道也我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不旆旆憂心悄悄僕夫况瘁賦也郊在牧内蓋前軍在牧而後軍在郊也龜蛇曰旐後軍所建旄注旄於干首也鳥隼曰旟前軍所建所謂前朱雀而後元武也旆旆飛揚貌旟旐皆旆旆者前軍後軍同日啟行也憂心悄悄不敢言也秘之至也僕夫况瘁不敢息也速之甚也王命南仲往城于方出車彭彭旂旐央央天子命我城彼朔方赫赫南仲玁狁于襄賦也南仲天子所命之將也朔方北方荒服之外也彭彭衆貌交龍曰旂左軍所建也央央鮮明貎赫赫威也襄除也言軍士北行不知所為將至朔方而後知王命南仲往城于方也築城而出車建旂者營衞於外乃版築於内也朔方既城矣乃言天子命我止城朔方其宣城朔方之命者正所以秘伐西戎之謀也朔方城而玁狁之患除者據其要害則形格勢禁不敢輕動也昔我往矣黍稷方華今我來思雨雪載塗王事多難不遑啟居豈不懐歸畏此簡書賦也華秀也黍稷方華初秋也載滿塗路也歸塗遇雪初冬也秋出而冬還者謀秘而行速比玁狁聞之而城已完也城畢而歸可以緩矣又速行而不遑啟居者以王事多難不止朔方當日自天子所又有所受之簡書在焉故不敢歸也城畢言歸中途乃言不歸又不明言所以不歸之故秘之至也喓喓草蟲趯趯阜螽未見君子憂心忡忡既見君子我心則降赫赫南仲薄伐西戎賦也蟲鳴螽躍深秋也初秋出車秋末相思不敢望歸而未幾即歸故喜之也南仲未歸而先有歸者何也數千里而襲人不可以多兵故簡精鋭以西行餘衆皆南還也室家相見而始知伐西戎者南還行緩西伐行速比至家而㨗音已來矣速之至也春日遲遲卉木萋萋倉庚喈喈采蘩祁祁執訊獲醜薄言還歸赫赫南仲玁狁于夷賦也卉草萋盛也卉木萋而倉庚鳴初春也采蘩祁祁室家和平也征夫在途而室家和平者㨗音已至故心安也訊當訊問之人為首者也醜類也同謀者也執之獲之西戎服也去秋出車今春還歸數月而城伐之事皆竣者謀秘而行速故也夷平也西戎服而玁狁平者剪其黨與則勢孤力弱永不為難也出車六章章八句詩序曰出車勞還帥也外夷之為中國患者西北二邊而已北狄强而不富西戎富而不强兩者合則為害滋大故欲制玁狁必伐西戎然伐之則恐玁狁之救之也朔方介戎狄之間城朔方則西北之路不通然城之又恐玁狁之爭之也此其謀不可以不秘而行不可以不速故出車之時並不言城朔方突至其地而城之玁狁不及争也既城之後並不言伐西戎出其不意而伐之不惟玁狁不及救西戎亦不及防也朔方城西戎服則玁狁之患自息所謂不戰而屈人也君明而斷將智而勇伐交攻心出竒制勝之道皆具矣迨其後也漢建朔方之郡唐築受降之城猶師昔人之遺智焉詩教豈不大哉有杕之杜有睆其實王事靡盬繼嗣我日日月陽止女心傷止征夫遑止興也睆實圓貌嗣續也陽十月也遑暇也此勞軍士而代述其情也言特生之杜尚然有實而行役之人乃獨無家曾杕杜之不若也夫以王事靡盬之故而日復一日不遑啟處此我之分所當然不敢怨也而婦女之在家者感歲月之遲暮必遠望心傷以為征夫亦當休息矣蓋已念室家因念室家之亦念已也有杕之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止征夫歸止興也杕杜有實去年秋末戍事將畢故望其暇杕杜有葉今年春暮戍人將還故望其歸也王事靡盬我心傷悲征夫憂王事也公義也卉木萋止女心悲止室家憂征夫也私情也兩者固並行而不悖也陟彼北山言采其把王事靡盬憂我父母檀車幝幝四牡痯痯征夫不逺賦也登山采把望父母也望父母則知父母之憂已矣以王事之故而悲我室家固人情所難堪也以王事之故而憂我父母尤天性之至戚也且夫父母之憂子則無所不至矣自此至篇末皆所憂之事也憂其車之幝幝而將敝矣憂其馬之痯痯而已疲矣車馬如此人何以堪則征夫庶幾不遠而將歸乎望之之詞也匪載匪來憂心孔疚期逝不至而多為恤卜筮偕止㑹言近止征夫邇止賦也載裝逝往恤憂偕俱會合也此承上章言車敝馬疲人不能逺則宜如期而來乃不裝載而來固已憂心甚病至於過期而猶不至則百端交集矣安與否與存與亡與龜卜蓍筮相襲俱作言合於繇而皆曰近矣乃信征夫之果邇而不逺矣范處義曰以卜筮終之見憂之切而無所不為也杕杜四章章七句詩序曰杕杜勞還役也范處義曰出車勞還率故美其功杕杜勞還役故極其情是也夫行人思家更思其家之思已逰子憂親更憂其親之憂已此已曲盡人情矣乃上之人知其思家并其思家之思已而亦知之知其憂親并其憂親之憂已而亦知之知其勤勞王事則思有以勸其忠知其念切父母則思有以全其孝下知上之體恤倍至而悦以犯難不敢自愛其死上知下之骨月情深而仁以止殺不欲輕用其力則亦無之非教矣此所以為聖人之經也南陔詩序曰南陔孝子相戒以養也有其義而亡其辭朱子曰此笙詩也鄉飲酒禮鼓瑟而歌鹿鳴四牡皇皇者華然後笙入堂下磬南北面立樂南陔白華華黍燕禮亦然鹿鳴之什十篇一篇無辭凡四十六章二百九十七句白華之什二之二朱子曰毛公以南陔以下三篇無辭故升魚麗以足鹿鳴什數而附笙詩三篇於其後因以南有嘉魚為次什之首今悉依儀禮正之白華詩序曰白華孝子之潔白也朱子曰笙詩也説見上篇華黍詩序曰華黍時和年豐宜黍稷也朱子曰亦笙詩也魚麗于羀鱨鯊君子有酒㫖且多興也羀笱也鱨揚也鯊鮀也笱小而所獲者大見魚之多也酒燕之通名統殽羞而言也㫖美也㫖且多言備物也朱子曰此燕饗通用之樂歌即所薦之羞而極道其㫖且多見主人禮意之勤以優賓也魚麗于羀魴鯉君子有酒多且㫖興也鱧鮦也多且㫖言適口也魚麗于羀鰋鯉君子有酒㫖且有興也鰋鮎也具難得之物曰有春秋書多麋傳曰魯所有也又書有􅈮傳曰魯所無也由是推之所有之物詫其多所無之物詫其有有而多之易無而有之難故有勝於多也物其多矣維其嘉矣賦也物欲其多又恐雜取之而不精故尚其嘉也物其㫖矣維其偕矣賦也物欲其㫖又恐味偏勝而不和故尚其偕也物其有矣維其時矣賦也物欲其有又恐强求之而違性故尚其時也蘓轍曰多而能嘉㫖而能偕有而能時言曲全也魚麗六章三章章四句三章章二句詩序曰魚麗羙萬物盛多能備禮也黄佐曰􅉚葉采烹兎斯燔炙聖人取焉魚麗之燕無乃過於侈乎易曰大烹以養聖賢夫養賢所以養天下也故聖王重之燕饗所以致其交也故賢士安之燕之於寢饗之於廟禮以食之樂以樂之猶殷殷若有不及也故魚麗則備物以優賓􅉚葉則薄物必與賓共彼述主人之謙詞此逹主人之誠意也由庚詩序曰由庚萬物得由其道也燕禮笙奏南陔白華華黍畢乃間歌魚麗笙由庚朱子曰間代也言一歌一吹也南有嘉魚烝然罩罩君子有酒嘉賓式燕以樂興也嘉羙也烝衆也罩篧也所以籠魚者罩罩以罩罩之也此亦燕饗通用之樂歌言南方有嘉魚則羣然罩之矣國中有賢人則多方求之矣賢者知其誠心求之故來燕而樂之也南有嘉魚烝然汕汕君子有酒嘉賓式燕以衎興也汕樔也所以撩魚者范處義曰魚恐其逸故罩之使入也魚恐其伏故汕之使出也陸佃曰君子求賢上籠之如罩下撩之如汕衎飽貌易曰飲食衎衎是也君子誠於用賢故賢人樂之而至於醉飽也南有樛木甘􅉚纍之君子有酒嘉賓式燕綏之興也甘􅉚􅉚之甘者樛木下垂而甘􅉚纍之以興君子誠於下賢而賢人附之也上下之情互相依附故賢人之心安焉不復有去志也翩翩者鵻烝然來思君子有酒嘉賓式燕又思興也鵻孝鳥烝衆也曹粹中曰始言烝然罩罩烝然汕汕終言烝然來思惟其始之求之者衆故其終致來者亦衆也賢人繼來而君子又燕好賢無已也南有嘉魚四章章四句詩序曰南有嘉魚樂與賢也夫賢者豈徒以燕飲為樂哉必以禮羅而致之所謂罩罩也用其道而顯其身所謂汕汕也上下交而志通情誼結而不解所謂木樛而􅉚纍也一賢人安之衆賢人慕之於是乎來之者無已而燕之者亦無已則多士濟濟而庶績咸熙矣故君子之治其國家無他道也誠於求賢樂與之處而已矣崇丘詩序曰崇丘萬物得極其高大也燕禮歌南有嘉魚笙崇丘南山有臺北山有萊樂只君子邦家之基樂只君子萬壽無期興也以山之有草木興君子之有徳壽也臺莎萊藜基本也實心實政以立其本故曰基也能為邦家之基則其壽宜無窮矣此賓祝主人之詞也南山有桑北山有楊樂只君子邦家之光樂只君子萬壽無疆興也徳輝文治蔚為國華故曰光也南山有把北山有李樂只君子民之父母樂只君子徳音不已興也此承上二章言所以為邦家之基者善政養民為民之父母故也所以為邦家之光者善教覺民其徳音不已故也南山有栲北山有杻樂只君子遐不眉壽樂只君子徳音是茂興也栲山樗杻檍也此承徳音不已也言不已之久則日新月盛而徳音益茂所以為邦家之光者彌彰矣南山有枸北山有楰樂只君子遐不黄耉樂只君子保艾爾後興也枸枳枸楰苦楸也黄髮黄也耉老艾養也此承民之父母也言父母斯民之政樂利無窮不止保黎民並保子孫也首二章之祝壽願之也有是徳宜有是壽也末二章之祝壽必之也既有是徳斷無不得是壽也南山有臺五章章六句南山有臺下報上也魚麗嘉魚主人樂賓此則賓樂主人也樂只君子即有酒之君子也樂其燕而祝其壽非諛也民者天所生也君者治民者也父母以養之徳音以教之則民壽矣君壽天之所生則天亦壽其生生者此自然之理也天保之報上也曰萬壽無疆而歸本於羣黎徧徳有臺之報上也亦曰萬壽無疆而歸本於民之父母天人之際可以觀矣由儀詩序曰由儀萬物之生各得其宜也燕禮歌南山有臺笙由儀蓼彼蕭斯零露湑兮既見君子我心寫兮燕笑語兮是以有譽處兮興也蓼長貌蕭蒿也嚴粲曰諸侯以蕭自喻君臣之辭也湑露潤貌鄭康成曰君子天子也寫抒也蘇轍曰諸侯來朝天子推恩以接之無所不及如零露之於蕭然故其既見天子也莫不思盡其心之所有以告之天子又申之以燕禮極其笑語之樂而無間是也譽名也處安也燕語嘉奨則諸侯之聲名益著是以有譽也燕語款洽則諸侯之祿位益安是以有處也蓼彼蕭斯零露瀼瀼既見君子為龍為光其徳不爽壽考不忘興也瀼瀼露蕃貌龍寵也光榮也燕而受天子之寵眷其光榮莫大焉爽差也不爽心服其徳也吕祖謙曰徳施之普使逺近大小親疎各稱其分莫不滿足是也壽考不忘諸侯頌天子之詞欲其億萬斯年常如此不爽也蓼彼蕭斯零露泥泥既見君子孔燕豈弟宜兄宜弟令徳壽豈興也泥泥露濡貌孔盛也豈愷切弟樂易也言燕禮甚盛其語愷切其情樂易也兄弟諸侯之在燕者也天子猶父母也諸侯猶兄弟也天子豈弟之徳洽於諸侯諸侯化之亦互相親睦是諸侯之兄弟相宜皆天子有以宜之也諸侯沐天子之令徳故祝其壽而且豈欲其億萬斯年常如此豈弟也蓼彼蕭斯零露濃濃既見君子鞗革冲冲和鸞雝雝萬福攸同興也濃濃露厚貌鞗革馬轡冲冲調適也和鸞車鈴在軾曰和在鑣曰鸞雝雝和聲也此天子既燕諸侯而賜之以車馬也采菽之詩曰君子來朝何錫予之雖無予之路車乗馬是也韓奕之詩曰王錫韓侯簟茀錯衡鞹鞃淺幭皆車飾也和鸞之屬也又曰鉤膺鏤錫鞗革金厄皆馬飾也鞗革其著也攸所也同聚也既燕樂之又錫予之徳意之厚如零露之濃然則萬國諸侯皆愛戴天子矣萬國之所歸即萬福之所同也蓼蕭四章章六句詩序曰蓼蕭澤及四海也易曰地上有水比先王以建萬國親諸侯夫天子深居九重與海隅蒼生至隔逺也故衆建諸侯以治之天子親諸侯使諸侯各親其國則萬國與一人相比而無間矣蓼蕭之詩燕語龍光天子親諸侯也夀考同福諸侯親天子也宜兄宜弟諸侯自相親也諸侯親天子又自相親同宣天子之徳意以親其民故恩誼聨於堂陛則膏澤洽於四海非虛言也左傳昭公十二年宋華定來聘享之為之賦蓼蕭弗知又不答賦昭子曰燕語之不懐寵光之不宣令徳之不知同福之不受將何以在由昭子之言繹之是有譽處懐燕語也其徳不爽宣寵光也宜兄宜弟昭令徳也萬福攸同祝天子之受之也亦可以知此詩之義矣湛湛露斯匪陽不晞厭厭夜飲不醉無歸興也湛湛露盛貌陽日也晞乾也厭厭安也亦久也足也夜飲私燕也楚茨之詩曰備言燕私是也歐陽修曰湛湛之露潤霑於庶物非至曙則不乾厭厭之飲恩被於諸侯非至醉則不止見天子待諸侯之厚也湛湛露斯在彼豐草厭厭夜飲在宗載考興也豐茂也宗宗室也路寢之屬燕禮膳宰具官饌於寢東是也考成也劉瑾曰在宗室而成燕禮也朱公遷曰露在豐草則膏澤深飲在宗室則恩意隆也湛湛露斯在彼杞棘顯允君子莫不令徳興也顯明允信也謝枋得曰顯者其心明達信者其心忠誠也朱子曰君子諸侯之為賓者也令善也令徳謂其飲多而不亂徳足以將之也蘇轍曰露之在草也如將不勝其在木也則能任之矣將言其無不醉故以豐草言之將言其醉而不亂故以杞􅁄言之也其桐其椅其實離離豈弟君子莫不令儀興也離離垂也令儀言醉而不失儀也蘇轍曰椅桐雖實繁而枝不披君子雖至醉而儀不亂陸佃曰杞􅁄剛木故以况令徳椅桐柔木故以况令儀也輔廣曰明信者固宜有堅定之令徳樂易者則恐其或略於威儀豈弟而有令儀此所以為成徳也既醉則情或佚矣在宗則儀可略矣然而莫不令儀此所以為成禮也黄櫄曰上之所以繩下者愈寛下之所以自繩者愈嚴君有餘恩臣有餘敬也湛露四章章四句詩序曰湛露天子燕諸侯也春秋𫝊甯武子曰諸侯朝正於王王燕樂之於是乎賦湛露則天子當陽諸侯用命也曾鞏曰前言厭厭夜飲後言令徳令儀雖過三爵亦可謂不繼以淫矣白華之什十篇五篇無辭凡二十三章一百四句御纂詩義折中卷十
