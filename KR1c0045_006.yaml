body:
  text: 齊風一之八齊國名在禹貢青州之域武王封太公望於此太公惠工商通魚鹽民多歸之故為大國雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲賦也賢妃御於君所常恐晏起故夢寐之中若有所聞即自驚曰雞既鳴而朝既盈矣又疑非雞之鳴無乃蒼蠅之聲乎其實匪雞匪蠅蓋緣想成聲無聞而若有聞也東方明矣朝既昌矣匪東方則明月出之光賦也昌盛也夢寐之中若有所見曰日將出而東方明矣又疑非東方之明無乃月出之光乎其實匪日匪月蓋以意造形無見而若有見也前疑於耳此疑於目恍惚若夢故下言甘與子同夢也蟲飛薨薨甘與子同夢會且歸矣無庶豫子憎賦也蟲飛薨薨則東方果明矣故敬告於君曰雖樂與子同寢然朝臣之會集者待之久而有歸心矣無或以我之故而憎君視朝之晚也嚴粲曰不言因君之故而憎已反言以已之故而憎君可謂善於諷規矣雞鳴三章章四句雞鳴美賢妃也國之治莫不由於勤政君之荒莫不始於燕昵觀其寢興之早晚而盛衰可知也齊自太公以來五世之君皆無失德此詩所美未詳何妃大約開國之初尚父之貽謀猶在故人君勤政於外夫人警戒於內其夙興夜寐戰兢惕厲之精神可以為後世法矣雄長諸侯有以也子之還兮遭我乎峱之間兮並驅從兩肩兮揖我謂我儇兮賦也還便捷也峱山名從逐也獸三歲曰肩儇輕利也獵者交錯於道路且以便捷輕利互相稱譽蓋其俗尚如此也子之茂兮遭我乎峱之道兮並驅從兩牡兮揖我謂我好兮賦也茂質美也好才長也子之昌兮遭我乎峱之陽兮並驅從兩狼兮揖我謂我臧兮賦也昌盛也山南曰陽狼獸名章潢曰子還子茂子昌已譽人也我儇我好我臧人譽已也並驅從兩人已皆有能也直述其詞而齊俗之矜夸見矣還三章章四句還尚健也國之強弱係於民風好淫靡則國弱尚勇健則國強觀子還之詩其民便捷而雄偉與小戎駟驖伯仲矣視桑中溱洧豈不遠勝哉然羣相角逐則急功利可知矣互相稱譽則喜夸詐可知矣其所長即其所短也君子是以知習俗之宜慎也齊承太公之遺故其民習兵魯秉周公之教故其民習禮習兵則強而坊表不立故桓公之伯業及身而遂衰習禮則弱而典型常在故魯國之宗社至漢而猶存向使以齊之習兵而再進以敦詩説禮之風以魯之秉禮而再加以內政軍令之寄庶幾哉治臻上理矣故立國之體文武並崇為治之宜剛柔互用不可以有偏也商頌曰不競不絿不剛不柔敷政優優百祿是遒俟我於著乎而充耳以素乎而尚之以瓊華乎而賦也俟待也著與寧同門屏之間也以纊懸瑱曰充耳尚加也瓊玉名華光華也吕祖謙曰昏禮壻往婦家親迎奠鴈御輪而先歸俟於門外婦至則揖以入時齊俗不親迎故女至壻門始見其俟已也俟我於庭乎而充耳以青乎而尚之以瓊瑩乎而賦也門內曰庭瑩光潤也吕祖謙曰此昏禮所謂壻導婦及寢門揖入之時也俟我於堂乎而充耳以黃乎而尚之以瓊英乎而賦也階上曰堂英猶華也充耳一物而三采故先見素次見青次見黃也尚之以瓊其光瑩然如華如英亦一物也吕祖謙曰此昏禮所謂升自西階之時也著三章章三句詩序曰著刺不親迎也哀公問於孔子曰冕而親迎不已重乎孔子曰合二姓之好以為社稷宗廟主何謂已重乎故禮惟天子不親迎諸侯以下皆行之親迎於渭世子之禮也韓侯迎止諸侯之禮也有女同車美得禮也俟我於著刺失禮也春秋於夫人之逆至茍有失禮必詳書之重人倫之始也故曰禮始於謹夫婦東方之日兮彼姝者子在我室兮在我室兮履我即兮興而賦也履禮也即就也東方之日朝而陽盛以興姝子之德輝充揚也又言當此日出之時而姝子已在我室夫其在我室者有禮於我而來就見也東方之月兮彼姝者子在我闥兮在我闥兮履我發兮興而賦也闥門內也發啓行也東方之月望而初升以興姝子之德容盛滿也又言當此月出之時而姝子乃在我闥夫其在我闥者成禮於我而後啓行也東方之日二章章五句東方之日美見賢也大夫以禮就見而賢人喜之也世之博好賢之名者亦有矣而患其意之不誠也禮之不備也又患其言之不合而敬之不永也今之見賢者日出而來其心誠矣履我而即其禮備矣朝來而暮去其言終日相得也將發而猶履其敬始終不倦也以此求賢何賢不至得賢圖治何國不興此太公之遺教與雞既鳴矣賢夫人警君於內東方之日賢大夫敬士於外洋洋乎大風也哉表東海者其以此乎國未可量也東方未明顛倒衣裳顛之倒之自公召之賦也言東方未明為時尚早而急遽錯亂至顛倒其衣裳其所以顛之倒之者以有自公所而來召者也未明而來召其寢興無常可知也東方未晞顛倒裳衣倒之顛之自公令之賦也晞將明之氣也言東方未晞為時更早而倉皇失措至顛倒其裳衣其所以倒之顛之者以有自公所而來令者也未晞而來令其號令不時可知也折柳樊圃狂夫瞿瞿不能辰夜不夙則莫比也籓籬曰樊菜園曰圃瞿瞿驚顧之貌夙早莫晚也言折柳以為圃樊狂夫見而瞿瞿以其有界而不可踰也晨夜之界甚明乃不能取凖而不失之早則失之晚斯緩急皆所以害政也東方未明三章章四句詩序曰東方未明刺無節也為政固欲其勤然亦必中乎其節寢興號令早晚有時則侍御僕從以及百官之在公者不致倉皇無煩久待而亦無廢事過於夙則未明顛倒而至於廢寢過於莫則日晏跛倚而至於廢食臣下不勝其勞而事亦多至於誤故遲速有節實為政之要務不可不加意也南山崔崔雄狐綏綏魯道有蕩齊子由歸既曰歸止曷又懷止比也崔崔高大貌狐邪獸也綏綏求匹之貌魯道適魯之道也蕩寬平也齊子謂文薑也由從也婦人謂嫁曰歸懷思也止語詞朱子曰南山雄狐以比齊襄居高位而有邪行也且文薑既歸於魯矣襄公何為而又思之乎葛屨五兩冠緌雙止魯道有蕩齊子庸止既曰庸止曷又從止比也朱子曰兩二屨也緌冠飾也屨必兩緌必雙物各有耦不可亂也庸用也用此道以嫁於魯也從相從也藝麻如之何衡從其畝取妻如之何必告父母既曰告止曷又鞠止興也藝樹也東西曰衡南北曰縱我疆我理南東其畝是也鞠養也言欲藝麻者必治其田畝欲娶妻者必告其父母魯桓之娶文薑也告於惠公之廟而來則是既告父母矣何為不防之以禮而養成其姦哉析薪如之何匪斧不克取妻如之何匪媒不得既曰得止曷又極止興也克能也極窮也吕祖謙曰納之不正容有不敢制者桓公既以禮納文薑矣曷為又縱其姦而至於極也朱子曰此詩前二章刺齊襄後二章刺魯桓也南山四章章六句南山刺內亂也春秋桓公三年公子翬如齊逆女齊侯送薑氏於歡所謂齊子由歸也夫人薑氏至自齊所謂既曰得止也十有七年公會齊侯紀侯盟於黃平齊紀也齊欲滅紀曷為與紀平欲媚魯以會文薑也所謂曷又懷止也十有八年公會齊侯於濼齊侯邀文薑也所謂曷又從止也公與夫人薑氏遂如齊夫人在會也公令夫人在會是養姦也所謂曷又鞠止也會畢而遂如齊公從夫人也夫人從齊侯公從夫人是縱姦也所謂曷又極止也因是而公薨於齊逮其後也齊襄亦被弒矣新臺南山之事聖人所不忍言而經存之者所以示戒也淫亂之禍不弒則亡是故新臺賦而衛滅株林賦而陳亡南山賦而魯桓弒於前齊襄弒於後天有顯道固若是其不爽也可不戒哉無田甫田維莠驕驕無思遠人勞心忉忉比也田耕治之也甫大也莠亂苗之草也驕驕高張之貌忉忉煩亂也朱子曰言無田甫田也田甫田而力不給則草盛矣無思遠人也思遠人而人不至則心勞矣以戒時人厭小而務大忽近而圖遠將徒勞而無功也無田甫田維莠桀桀無思遠人勞心怛怛比也桀桀侵陵嘉榖更甚於驕驕矣怛怛慘切傷神更甚於忉忉矣輔廣曰田甫田妄作者也思遠人妄想者也妄作則事不遂妄想則心徒勞婉兮孌兮總角丱兮未幾見兮突而辨兮比也婉孌少好也丱兩角貌未幾不久也突忽然高出之貌辨冠名朱子曰言總角之童見之未久而忽然戴辨以出者非其躐等而強求之也蓋循其序而𫝑有必至耳此又以明小之可大邇之可遠能循其序而修之則可以忽然而至其極若躐等而欲速則反有所不達矣甫田三章章四句甫田戒貪功也齊之為俗急而夸夸則不安其常急則不循其序詩人戒之故賦甫田也中庸曰君子之道譬如行遠必自邇譬如登高必自卑夫君子崇德原欲其高然非無自而高也君子廣業原欲其遠然非無自而遠也循循於卑邇拾級以上不期其高登之既久不自覺而已高矣跬步以往不期其遠行之既久不自知而已遠矣是故學戒其躐等而治戒其欲速急求有功必致無功明其道不計其功而其功乃大也易曰積小以高大無田甫田之謂也書曰邇可遠在兹無思遠人之謂也又曰厥德修罔覺則突而辨之謂也盧令令其人美且仁賦也盧田犬也令令頷下環聲美壯大也仁稱頌之詞言其素有仁人之稱如令聲之遠聞也齊俗好獵故見人之牽犬者美其犬而并美其人也盧重環其人美且鬈賦也兩環相貫曰重環鬈髮美也長而盤曲有如重環也盧重鋂其人美且偲賦也一環貫二曰重鋂偲鬚美也多而下垂有如重鋂也以人牽犬其事可鄙而互相誇羡如此其國可知矣是故俗之所貴道之所賤庸人之所艷君子之所惜也盧令三章章二句詩序曰盧令刺荒也民荒於獵不務正業也昔先王之居其民也朴者散於田野其器犁鋤簑笠其人敦厚力田秀者聚於庠序其事詩書禮樂其人孝弟忠信習而安焉不見異物而遷焉故士之子恆為士農之子恆為農今也鬈偲且仁之人而日携犬以遊是秀者失教也里巷行道之人皆艷稱其犬是朴者失業也士失教則人才壞農失業則風俗衰猶且互相稱美恬然而不以為非則世道之變不知其所底也故詩人憂之而賦此述其美者怪美之者也所美非所美也敝笱在梁其魚魴鰥齊子歸止其從如雲比也敝壞笱罟也魴鰥大魚齊子謂文薑也歸復歸於魯也曷為復歸魯前孫於齊也魯桓之薨於齊也文薑與焉是弒君也齊襄內亂文薑弒君有王者作比而誅之寧待問哉今齊襄晏然君齊文薑公然歸魯是法敝也故言笱敝不能制魚以比法敝不能討賊所謂網漏吞舟也其從如雲言其盛也是齊人送之而魯人亦迎之可傷已敝笱在梁其魚魴鱮齊子歸止其從如雨比也鱮亦大魚如雨言其多也雲降而為雨也敝笱在梁其魚唯唯齊子歸止其從如水比也唯唯出入之貌以比文薑前出魯而入於齊今出齊而入於魯也如水言其流也雨集而成水決東則東決西則西順流而不可止也敝笱三章章四句敝笱刺法壞也哀薑與弒閔公而孫於邾僖之元年夫人薑氏薨於夷齊人討之也取之於邾而殺之於夷也不書殺無譏也以為當殺也書齊人以歸譏之也與乎弒則義已絶不可以附葬不可以祔廟則不歸可也文薑之罪甚於哀薑而乃縱之歸齊襄固不容誅抑魯人亦有過焉宋襄公之母被出尚且終身不歸况與弒而孫焉者乎孫而又容其歸則無以處之矣異日之會齊侯自此歸始也春秋不書文薑之歸國史失之也刪詩而存敝笱所以補春秋之闕也故曰詩與春秋相表裏者也載驅薄薄簟茀朱鞹魯道有蕩齊子發夕賦也薄薄疾驅之聲簟竹席也茀車蔽也鞹革也以朱漆革亦車蔽也發夕夜行也朱子曰齊人刺文薑乘此車而來會襄公也四驪濟濟垂轡濔濔魯道有蕩齊子豈弟賦也黑馬曰驪濟濟美貌濔濔柔貌豈弟和悅也溫色甘言以悅其下欲以蓋其醜也汶水湯湯行人彭彭魯道有蕩齊子翺翔賦也汶水名在齊南魯北境上湯湯大貌彭彭多貌言汶水之旁大道之上行人甚多而文薑翺翔於其際曾無愧恥之心也汶水滔滔行人儦儦魯道有蕩齊子遊敖賦也滔滔流而不息也儦儦來而不絶也范處義曰發夕則以宵而逝猶有自赧之意豈弟則安然樂易已無自愧之色翺翔則回翔從容而後去遊敖則縱觀愜適而忘返是也屢言魯道有蕩易詞也坦然直往曾無阻厄之者蓋魯人不恥而齊人恥之也載驅四章章四句載驅刺文薑也公然播其惡於衆也齊襄文薑無責耳矣是魯莊之罪也文薑義當絶乃使歸為夫人歸已非矣又使出會齊侯是重辱國也春秋桓公十八年公與夫人薑氏遂如齊公薨於齊莊公元年夫人遜於齊二年夫人薑氏會齊侯於禚四年夫人薑氏享齊侯於祝丘五年夫人薑氏如齊師七年夫人薑氏會齊侯於防又會齊侯於穀比事以書而莊公之罪著矣猗嗟昌兮頎而長兮抑若揚兮美目揚兮巧趨蹌兮射則臧兮賦也猗嗟嘆詞昌盛也頎長貌抑若揚俯仰得宜也美目揚瞻視高遠也巧趨蹌疾徐中節也射則臧言惟射則臧餘無可述也此則其猗嗟之意微露於言外也猗嗟名兮美目清兮儀既成兮終日射侯不出正兮展我甥兮賦也名眉秀也傳云目上曰名是也清目黑白分也儀成言其終事無違也正侯之中也姊妹之子曰甥我甥齊人謂之也夫甥者因其母而名之也親其母獨不念其父乎抑思舅氏之於父何如而猶曲盡甥禮如此也此則其猗嗟之事顯露於言中也猗嗟孌兮清揚婉兮舞則選兮射則貫兮四矢反兮以禦亂兮賦也孌儀容麗也婉眉目好也選異於衆也貫中而貫革也反復中其故處也言莊公射藝之精可以禦亂如以金僕姑射南宫長萬之類是也然能禦其細而不能禦其大此則其猗嗟之心有所不忍言也猗嗟三章章六句詩序曰猗嗟刺魯莊公也夫齊襄者魯莊不共戴天之仇也莊公而明於為子之道也者以射宋萬之僕姑親貫齊襄之胸可也顧乃畏齊之強徇母之欲已不可以為人又與之狩是亦不可以己乎春秋書公及齊人狩於禚夫禚齊地也曷為狩於禚公如齊也公曷為如齊朝襄公也朝則曷為狩誇其善射也曷為與齊人狩齊襄卑公也公不恥也而誇其善射其所以自炫者乃其所以自辱也三言猗嗟深嘆之也齊風十一篇三十四章一百四十三句魏風一之九魏國名本舜禹故都周初以封同姓左傳曰虞虢焦滑霍揚韓魏皆姬姓也其地狹隘而民勤儉有聖賢之遺風焉後為晉獻公所滅糾糾葛屨可以履霜摻摻女手可以縫裳要之襋之好人服之賦也糾糾繚戾之狀摻摻猶纎纎也要裳腰襋衣領好人士大夫之通稱魏俗尚儉故葛屨不宜履霜而謂可以履取其價廉也纎手不必縫裳而謂可以縫取其習事也不止縫之而已又要之襋之而好人即從而服之此其儉不中禮宜若可訾然勤而不怨貧而能安詩人有取焉以為此可美而不可刺也好人提提宛然左辟佩其象揥維是褊心是以為刺賦也提提安舒之意宛然曲遜之貌辟與避通左辟讓也以右為上故讓而避左也揥所以摘髮象骨為之故曰象揥此句之上疑有脫文象揥婦人之飾也魏之風俗大約男事耕耘垢衣敝履而見客則必致敬女操井臼裙布叉荆而行禮則必致飾故葛屨之人皆能宛然左辟縫裳之女有時佩其象揥乃實事也此則儉而有禮更無可刺所可刺者以其心褊也蓋俗過於儉則計較錙銖而有吝嗇迫狹之意惟此是以為刺而餘無譏焉嘉其所已能而勉其所未至也葛屨二章一章六句一章五句葛屨廣儉也魏本舜禹之故都其地狹隘而民貧俗儉有聖賢之遺風焉雖過儉亦致褊心之刺然民勤事而習禮勤事則易富習禮則易教既無鄭衛之淫靡并非齊秦之夸悍天下之俗莫善於此故刺褊心正所以廣儉德也昔季札觀樂為之歌魏曰美哉渢渢乎大而婉儉而易行以德輔此則明主也左辟象揥所謂大而婉乎葛屨縫裳則儉而易行也為上者能用其勤儉而輔之以德使無褊心則明主之所為也彼汾沮洳言采其莫彼其之子美無度美無度殊異乎公路興也汾水名沮洳下濕之地莫菜也無度言不可限量也殊實異勝也公路官名以卿大夫之餘子為之言下濕之地不無可采之菜以興單寒之中不無可用之才也彼其之子雖處卑賤而志意高遠不可限量觀其美之無度較之公路實有過之無不及焉乃專用公路而不采之子豈不惜哉彼汾一方言采其桑彼其之子美如英美如英殊異乎公行興也一方水外之地也英華也才學充美有如英華也公行官名以卿大夫之庶子為之彼汾一曲言采其藚彼其之子美如玉美如玉殊異乎公族興也一曲水灣之處也藚澤蕮如玉德性堅潤也公族官名以卿大夫之適子為之春秋閔公元年晉滅魏至宣公二年五十有四年矣晉始有公族餘子公行則此詩所言皆魏官也汾沮洳三章章六句汾沮洳刺遺賢也古者諸侯世國大夫不世官故草野之秀皆得登庸所謂立賢無方也周室東遷王命不行政逮大夫而卿皆世及並宦其子弟為公官於是乎世祿之家專執國政單寒之子無由上進矣以魏之蕞爾而備有公路公行公族之官使越在草莽者雖美如英玉而不得采用官人以世野有遺賢君子譏之異日者三家六卿之事皆兆於此矣園有桃其實之殽心之憂矣我歌且謠不知我者謂我士也驕彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思興也殽食也合曲曰歌徒歌曰謠其語辭朱子曰詩人憂其國小而無政故作是詩言園有桃則其實之殽矣心有憂則我歌且謠矣然不知我之心者見其歌謠而反以為驕且曰彼之所為己是矣而子之言獨何為哉蓋舉國之人莫覺其非而反以憂之者為驕也於是憂者重嗟嘆之以為此之可憂初不難知彼之非我特未之思耳誠思之則將不暇非我而自憂矣園有棘其實之食心之憂矣聊以行國不知我者謂我士也罔極彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思興也棘棗之小者聊且略之辭歌謠之不足則出遊於國中以寫憂也罔極謂責人無已也園有桃二章章十二句詩序曰園有桃刺時也魏小而逼於晉事有可憂而當國者不知且自以為是也附和者同聲是之有知而憂之者且羣起而非之於是無識之人隨俗浮沉置是非於不問而可憂之事果無有知之者矣其敝皆由於膜視國政而不與分憂不思故至此也庸臣誤國大抵如斯勿思一語辭婉而意深矣陟彼岵兮瞻望父兮父曰嗟豫子行役夙夜無已上慎旃哉猶來無止賦也爾雅云山有草木曰岵上猶尚也旃之猶可也朱子曰孝子行役不忘其親故登山以望其父之所在因想像其父念己之言曰嗟乎我之子行役夙夜勤勞不得止息又祝之曰庶幾慎之哉猶可以來歸無止於彼而不來也張栻曰述已所以念父之意未若思父所以念己之心為深切也陟彼屺兮瞻望母兮母曰嗟豫季行役夙夜無寐上慎旃哉猶來無棄賦也爾雅云山無草木曰屺季少子也無寐不暇眠也吕祖謙曰無棄言無棄母而不歸也陟彼岡兮瞻望兄兮兄曰嗟豫弟行役夙夜必偕上慎旃哉猶來無死賦也山脊曰岡必偕言與其儕同作同止無獨行以犯難也無死言父母俱在無輕生以至於死也陟岵三章章六句詩序曰陟岵孝子行役思念父母也既從王事似不得復顧父母而聖人録陟岵者教天下以中道也夫軍旅之際原不可貪生而失之怯亦不必輕生而傷於勇此其道惟在於慎慎之云者詳審而斷以義也猶來云者原非期以必來也義猶可來乃望其來蓋欲其立功而生還非教以貪生而茍免也采薇之詩曰我行不來義不可來也能致其身乃不辱其親盡忠亦所以全孝也陟岵之詩曰猶來無死義猶可來也終君之事而復不背親之恩盡孝正所以全忠也十畝之間兮桑者間間兮行與子還兮賦也十畝之間所受場圃之地以育草木者也桑者採桑之人也間間逍遙之貌行將還歸也朱子曰賢者不樂仕而思與其友歸於農圃故其辭如此十畝之外兮桑者泄泄兮行與子逝兮賦也泄泄舒緩之貌逝往也還於十畝之間者不得志於朝而思歸隱也逝於十畝之外者不得安於家而思避世也蓋時愈難而志愈遠矣十畝之間二章章三句詩序曰十畝之間刺時也夫君子之仕也原欲受事以宣勞豈好逸哉乃有時而思逸者非果於忘世也或事權不屬欲勞而不得或時勢難為徒勞而無功故不得已而羡人之逸也魏國之政史不詳載觀詩之所詠君子不欲仕於朝而思就桑者之間間小人不欲耕於野而往適樂土之得所此其國事尚可問哉宜其為晉所取也坎坎伐檀兮置之河之干兮河水清且漣猗不稼不穡胡取禾三百廛兮不狩不獵胡瞻爾庭有縣貆兮彼君子兮不素餐兮比也坎坎用力伐木之聲檀木可為車者置與置同干崖也水波曰漣猗語辭種之曰稼斂之曰穡胡何也一夫所居曰廛縣與懸同貆貉類素空也魏君棄君子而用小人詩人傷之故言坎坎伐檀本以為車而行陸今乃置之河干則無所可用但見河水之清漣而已所謂泌之洋洋可以樂飢者與而在位之小人乃不稼穡而取禾不狩獵而縣貆無功而食此胡為乎因言彼伐檀之君子乃真不素餐者而偏不得餐為可惜也黃櫄曰言君子有其功而無其祿小人有其祿而無其功也吕祖謙曰此旁觀者之辭若伐檀之君子方陶陶然不改其樂豈較短量長者哉坎坎伐輻兮置之河之側兮河水清且直猗不稼不穡胡取禾三百億兮不狩不獵胡瞻爾庭有縣特兮彼君子兮不素食兮比也輻車輻伐檀以為輻也直流而不返也十萬曰億禾秉之數也獸三嵗曰特坎坎伐輪兮置之河之漘兮河水清且淪猗不稼不穡胡取禾三百囷兮不狩不獵胡瞻爾庭有縣鶉兮彼君子兮不素飱兮比也輪車輪伐檀以為輪也水旋成文曰淪囷圓倉也鶉䳺屬熟食曰飱伐檀三章章九句詩序曰伐檀刺貪也昔先王之詔祿也以酬功也祿必當功無功者不得冒焉故朝無幸位而國無廢事魏國之政乃至無功而貪者食祿有功而廉者樂飢於是乎亷者益勵其廉而遁於寬間寂寞之濵貪者益肆其貪華衣鮮食魚肉小民而不知止身受者視為固然旁觀者乃激而為不平之鳴也夫立國之道首在求賢而次在課吏彼汾沮洳如英如玉而不采其不能求賢可知也河干伐檀不狩不稼而素餐其不能課吏可知也用人如此其何以為國碩鼠碩鼠無食我黍三歲貫女莫我肯顧逝將去女適彼樂土樂土樂土爰得我所比也碩大也大鼠善於竊食故以比貪人也三歲言其久也貫與慣同久而習也顧念逝往樂土賦輕之處也國不重斂則得以安其生故曰得我所也碩鼠碩鼠無食我麥三歲貫女莫我肯德逝將去女適彼樂國樂國樂國爰得我直比也德恩惠也直伸也其國有道則得以伸其志故曰得我直也碩鼠碩鼠無食我苗三歲貫女莫我肯勞逝將去女適彼樂郊樂郊樂郊誰之永號比也食黍食麥猶待其熟也食苗則穀未熟而已徵斂矣勞苦也莫我肯勞言不肯以我為苦也永號長呼也催科之聲也言適彼樂郊則誰復往而追呼者乎蓋厭聞其聲以為得免於此即樂也苛政猛於虎信哉碩鼠三章章八句詩序曰碩鼠刺重斂也魏之為國地狹而民貧寬以撫之猶懼不競而乃重斂者未必不因國小起見也國小而介於強大則役繁而賦寡財不足以集事則必至於加賦賦加則民愈貧民貧而賦不減則輸納不前於是乎迫之以追呼威之以敲撲非不知民之苦也而莫肯以為苦者謂民愚且弱雖苦之不至於怨叛不知苦之甚而至於不可受則逝將去之矣敵之來也猶有計可以禦之民之去也則無術可以留之至於民去而後知向之重斂乃為敵積也故魏風終於碩鼠魏風七篇十八章一百二十八句御纂詩義折中卷六
