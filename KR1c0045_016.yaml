body:
  text: 文王之什三之一大雅二說見小雅文王在上於昭于天周雖舊邦其命維新有周不顯帝命不時文王陟降在帝左右賦也於歎詞昭明也不顯顯也不時時也陟升也左右言親近也此追述文王之徳而欲成王法之也朱子曰文王之神昭明于天是以周邦雖自后稷始封千有餘年而其受天命則自今始也夫文王在上而昭于天則其徳顯矣周雖舊邦而命維新則其命時矣葢以文王之神一升一降無時不在帝之左右是以子孫䝉其福澤而君有天下也萬尚烈曰聖人之學本諸天文王與天合徳故昭明在上詩首言之使成王知祈天永命求福成孚之道皆本於此也亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世凡周之士不顯亦世賦也說文無亹字徐鉉曰當作娓順也言文王能順以承天也令善也聞徳之著也陳敷錫施哉載侯維也本本宗也支支子也言天不已文王順天故其令聞亦不已用能敷施於民以始新周命也左傳曰陳錫載周能施也惟其能施是以文王之孫子君民相保本宗百世爲天子支子百世爲諸侯且能錫福於臣使凡周之士皆顯其徳而傳世無窮焉周能陳錫君臣百世殷以喪師用遏爾躬天人之際可以觀矣世之不顯厥猶翼翼思皇多士生此王國王國克生維周之楨濟濟多士文王以寧賦也猶謀也翼翼勉敬也皇美大也楨幹也濟濟多貌此承上章言士之所以世顯者由其謀猷能翼翼也文王小心翼翼周士亦然所謂秉文之徳也惟能修徳故昌厥後而美大之士皆生於王國焉嚴粲曰生此王國天生之也王國克生王國能有以生之也張耒曰致禮以來其所已成勤敎以養其所未就是也王國善於作人故濟濟多士皆足以爲王國之楨文王之孫子寧文王在天之靈亦寧矣周育思皇楨幹王室殷棄膚敏祼將于京天人之際此又足以觀矣穆穆文王於緝熙敬止假哉天命有商孫子商之孫子其麗不億上帝旣命侯于周服賦也穆穆深遠之意緝續熙明也假大麗衆也不億不止於億也侯維也言令聞不已徳之著於外者也又有存於中者焉性必有覺故人心皆有本然之明所謂熙也緝之者因其一端而擴充之使無事不明因其已明而繼續之使無時不明也理不可易故人性皆有一定之則所謂止也敬之者靜而存之使無出入之間動而守之使無過不及之差也緝其熙使不息敬其止使不遷所謂文王之徳之純也子思子曰維天之命於穆不已蓋曰天之所以爲天也於乎不顯文王之徳之純蓋曰文王之所以爲文也純亦不已由是言之天命不已文王亦不已則天在文王之心命自集於文王之身矣大哉天命觀於有商孫子可見焉夫商之孫子其衆不止十萬而一旦皆服于周非上帝旣命何以至是是故緝熙敬止者純亦不已之實功文王之所以昭于天周之所以顯命之所以時也侯服于周天命靡常殷士膚敏祼將于京厥作祼將常服黼冔王之藎臣無念爾祖賦也殷士殷之臣也膚大敏速也祼灌鬯將行也京周之京師也冔殷冠也言文王有徳而商服是天命有常也然商有天下而服於周是天命靡常也商之孫子旣服於周故凡殷之士皆助祭於京而且服其冔冠明勝國之遺也朱子曰先代之後修其禮物作賔王家時王不敢變焉而亦所以爲戒是也王指成王也藎忠也爾祖謂文王也言觀殷士之黼冔祼將前監不遠王之藎臣豈得不告王使念爾祖乎劉向曰孔子論詩至於殷士膚敏祼將于京喟然嘆曰大哉天命善不可不傳於子孫是以富貴無常不如是王公其何以戒懼無念爾祖聿修厥徳永言配命自求多福殷之未喪師克配上帝宜鑒于殷駿命不易賦也聿𤼵語詞永長配合也命天理也師衆也駿大也朱子曰言欲念爾祖在於自修其徳而又常自省察使其所行無不合於天理則盛大之福自我致之不外求而得矣又言殷未失天下之時其徳足以配乎上帝今其子孫乃如此宜以爲鑒而自省焉則知天命之難保矣大學傳曰得衆則得國失衆則失國此之謂也命之不易無遏爾躬宣昭義問有虞殷自天上天之載無聲無臭儀刑文王萬邦作孚賦也遏絶宣布昭明義善也問與聞通有與又通虞度載事儀象刑法孚信也言駿命靡常保之不易無使及爾躬而遽絶也當宣布其善政以有聞於天下又度殷之先王其配帝也何以自天命之其喪師也何以自天遏之所謂稽謀自天也能知天心斯能保天命矣顧上天之載至於無聲無臭則豈可以意度哉欲當天心惟有法文王而已法文王之陳錫克生以行王道法文王之緝熙敬止以純天徳則義問宣昭萬邦之民皆興起而信服之矣民之所歸即天之所與也能不已其徳則日新其命自求多福在我而已欲祈天永命者其亦可以興矣文王七章章八句文王周公戒成王也天人感應之機王業興廢之由反覆申明而其尤切要者則在緝熙敬止一語今夫人君之有天下天命之也天命之者諄諄然乎亦視其民而已能養民斯能得天矣天下之民非一人所能養也故必造士賢才衆多斯能助王以養民矣造士養民不可偽爲必設誠而致行之亦非一日之積也必不息其誠以行之故徳之不已者尚焉緝熙敬止所以不已也何楷曰文王心通天理隨處𤼵露皆積累而聯續之以㑹於一乃知事物有異至善無異是我所當止之處不容少有出入亦不容偶有間斷故一念兢兢惟期止於是而已由是言之則敬止者所謂欽厥止也能欽厥止則純乎至善純則自不已矣至於不已則心與天通性與命合無聲無臭之載皆黙契而無間而養民造士又其餘事矣千古道統之傳開於堯舜盛於文王而集其成於孔子孔子曰大學之道在明明徳在親民在止於至善堯之克明峻徳明明徳也平章百姓新民也允執厥中止至善也文王之亹亹令聞明明徳也陳錫哉周新民也緝熙敬止止至善也析而言之格物致知緝熙也誠意正心敬止也緝熙所以知止敬止則得之矣故文王之詩治統道統俱在焉爲人君者不可不三復也明明在下赫赫在上天難忱斯不易維王天位殷適使不挾四方賦也明明徳之明也赫赫命之顯也忱信適嫡挾有也言在下者有明明之徳斯在上者有赫赫之命然天命靡常則不可信也不明其徳將改厥命則爲君難也試觀於紂居天位爲殷嗣而使之不有四方則天難忱而王不易有明徵也摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維徳之行大任有身生此文王賦也摯國名仲中女也任摯姓嬪婦也京京師追稱之也及隨也身孕也言殷廢則周興矣故摯國之中女任氏自殷商而嫁於周曰爲婦於京也旣嬪于京乃隨王季而修徳昭婦順也皇天無親惟徳是輔故命大任有身而生文王焉列女傳曰文王生而明聖大任教之以一而識百君子謂大任爲能胎教維此文王小心翼翼昭事上帝聿懷多福厥徳不回以受方國賦也翼翼敬也昭明懷來回邪也此言文王之徳也小心翼翼修己以敬聖功也克明徳所以事上帝也聿懷多福言其可受天命也無然畔援無然歆羡徳不回也以受方國言其可君萬邦也蓋天生文王原欲其代商文王之徳實足以有天下故太王曰我世當有興者其在昌乎天監在下有命旣集文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子賦也監視集成載年合配也洽渭皆水名嘉婚禮也子女也此承首章言天監在下之明徳赫赫之命旣集於文王矣故於文王初年即爲之生聖女在洽陽渭涘之邦及文王求婚而乃知大邦有此女焉所謂天作之合也大邦有子俔天之妹文定厥祥親迎于渭造舟爲梁不顯其光賦也俔譬也文禮祥吉也造舟爲梁浮橋也言文王之徳與天爲一而大邦之子其徳足以配之譬之則天之妹也婚姻之祥以禮定之謂納幣也親迎于渭太姒在渭涘也造舟爲梁以顯其光重大婚也傳曰天子造舟諸侯維舟大夫方舟士特舟張子曰造舟爲梁文王所制而後遂以爲天子之禮是也蓋文王之徳實足以君天下太姒之徳實足以母萬邦故一時之儀卽爲一代之制以明上天以王后命之也有命自天命此文王于周于京纘女維莘長子維行篤生武王保右命爾爕伐大商賦也纘繼也莘國名長子長女也右助爕和也此承第四章言天監在下有命旣集矣今又有命自天篤生武王也言此嫁于周嬪于京繼太任之後者乃莘國之長女太姒天命之以生武王所以生武王者欲保之助之使應天順人以伐商也文王未伐商而又命武王者仍此命文王之命而已殷商之旅其㑹如林矢于牧野維予侯興上帝臨女無貳爾心賦也㑹與旝通左傳曰旝動而鼔是也若林衆也矢陳也牧野邑名侯諸侯貳疑也女爾謂武王也言天旣命武王使伐商則其事非得已也乃當牧野陳師之時而其心猶有疑焉疑此殷商之旅其㑹如林恐人心尚未厭紂且我周邦興自侯服恐來世以爲口實則其審度義理而不富天下始終如一也但以天與人歸周之臣民咸謂今日之事乃天所命興廢之際上帝式臨不可有貳心也昔湯之伐桀也亦曰予畏上帝不敢不正後先同揆矣牧野洋洋檀車煌煌駟騵彭彭維師尚父時維鷹揚涼彼武王肆伐大商㑹朝清明賦也洋洋廣大貌煌煌鮮明貌駵馬白腹曰騵彭彭强盛貌師尚父者太公望也爲太師而號尚父也鷹揚如鷹之飛言猛迅也涼漢書作亮明也肆遂也㑹朝旣伐商而朝㑹諸侯也言如林之旅不戰而走故見牧野之洋洋也車堅馬壯長驅直入也當是時武王以下皆有疑心惟師尚父深明天命而又有鷹揚之勇斷以不疑故開𨗳武王使遂伐商以應天命也旣伐之後朝㑹諸侯一洗紂之昏濁而歸於清明所謂四海永清也陳櫟曰篇首之明明言天徳之明也篇末之清明言王道之眀也劉瑾曰天下本清而紂濁之今肆伐大商則源清而流皆清矣詩人終之以㑹朝清明見撥亂返治之功皆由於明明徳也大明八章四章章六句四章章八句大明戒成王也首言紂之所以亡見不明其徳卽墜厥命其失天下如此之易也次言周之所以興見累世積徳乃膺天眷其得天下如此之難也知其得之難則不敢替前人之功知其失之易則不敢縱一己之欲也抑文王事紂而武王伐之人或疑焉而不必疑也夫文王之聖宜有天下天所命也文王讓而不有亦紂惡未稔天命尚可待也武王之有非武王之心蓋紂惡已盈天命不可緩也然而武王終有戚戚焉觀此詩之所咏天位殷適其稱紂如此之尊也維予侯興其自稱如此之卑也無貳爾心其審度如此之慎也文王可有天下而不欲武王欲不有天下而不敢此其故惟周公知之故言之親切如此緜緜瓜瓞民之初生自土沮漆古公亶父陶復陶穴未有家室興也綿綿不絶貌瓞小瓜也瓜之近本者常小至末而後大以興大王之時周室尚小至文王而後大蓋以一語興通篇也民周人自從也土與杜通杜沮漆皆水名漢志云扶風杜陽縣有杜水水經云漆水出杜陽俞山是也古公大王號亶父其字也陶窰也復重窰穴土室也言周人初生在杜沮漆三水𤼵源之地至古公亶父之時尚皆陶居而穴處未有城郭宫室也古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇賦也此言大王避狄而遷岐也來朝明早也走馬疾行也今日定計明早疾行智且勇也率循也滸水厓也岐下岐山之下也沿水而求山相地之法也姜女太姜也大紀云古公娶於齊有駘氏曰太姜是也胥相宇宅也言及姜女以相宅者以明周室之興世有賢妃亦以見修身刑妻乃周之家法也周原膴膴堇荼如飴爰始爰謀爰契我龜曰止曰時築室于兹賦也周地名在岐山之南廣平曰原膴膴肥美也堇菜名内則曰堇荁枌榆是也堇荼皆苦今甘如飴土肥之至也始已始之也所謂朕志先定也謀與人謀也所謂詢謀僉同也契所以灼龜也曰止于兹曰以時築室于兹則龜卜之繇詞也所謂鬼神其依龜筮協從也廼慰廼止廼左廼右廼疆廼理廼宣廼畝自西徂東周爰執事賦也慰安止居左右東西也宅中定都又營左右之民居也疆謂定其封域理謂别其道路宣謂𨗳其溝洫畝謂治其田疇旣定民居卽制民産也岐在雍西自西徂東者拓地向内也周徧也凡經始之事所當爲者無不周徧也乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼賦也司空掌營國邑司徒掌役事故召之也言乃召者民事旣定而後興役也俾立室家者豳未有室家故於岐立之以明舍舊圖新亦其本謀不盡關乎避狄也縮束也凡營作者先以繩直之而後束版以載土也首言作廟者君子將營宫室宗廟爲先也翼翼嚴正也宗廟之工理宜敬謹也捄之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝賦也捄盛土於器也陾陾投土聲度納土於版也薨薨衆聲登登杵聲削屢墻成而削治之也馮馮墻堅聲此廟成而築室也鼛鼓以鼓役事今百堵皆興衆人競赴鼓不勝擊也立國之初在得人心興役而民勸必有所以致之者矣廼立臯門臯門有伉廼立應門應門將將廼立冡土戎醜攸行賦也毛傳曰王之郭門曰臯門伉髙貌王之正門曰應門將將嚴正也朱子曰大王之時特作二門後遂以爲天子之門諸侯不得立焉冡土大社也亦大王所立而後遂以爲天子之制是也戎大醜衆也起大事動大衆必有事乎社而後行也觀其規畫山川相度原野經理井疆營立廟社雖日不暇給規模鴻逺矣肆不殄厥愠亦不隕厥問柞棫拔矣行道兌矣混夷駾矣唯其喙矣賦也肆故也承上起下之詞殄絶愠怒隕墜也問聞通柞櫟也棫白桵也皆叢生之木拔起除也兌通駾奔喙喘息也言狄人嘗與大王爲難是所愠也今雖不能殄而滅之而能自立國使狄人不敢復侵則亦不隕其聲聞用能肇基王迹所謂瓞也柞棫以下言王季之事也嚴粲曰大王居豳北有獯鬻之侵遷岐以後西有混夷之患吕大臨曰混夷所以爲患者恃其深林大箐路塞不通耳今柞棫拔去道可通行彼失其所恃是以駾奔而喙息也虞芮質厥成文王蹶厥生予曰有疏附予曰有先後予曰有奔奏予曰有禦侮賦也此言文王之事也周之王業始於太王而大於文王所謂瓜也虞芮二國名質正成平也虞芮之君爭田不决相與朝周入其境耕者讓畔行者讓路入其朝士讓爲大夫大夫讓爲卿二國之君感而相謂曰我等小人不可以履君子之廷乃相讓以所爭田爲閑田天下聞而歸之者四十餘國當時遂有以此爲文王受命之符者故詩人辨之以爲人言虞芮質成之後文王乃蹶然而興者非篤論也文王之興自予言之則曰以其有疏附耳能宣布徳澤使民親附也以其有先後耳能前後相𨗳使無過舉也以其有奔奏耳能出使四方喻徳奏功也以其有禦侮耳能奮揚武衛折衝威敵也蓋濟濟多士乃文王之所以寧不係乎其質成與否也綿九章章六句綿戒成王也人但知大王遷岐而不知立國之模已開周官周禮之先人但言文王受命而不知得人之盛實啓三千十亂之基詩故詳叙而申明之使成王知前人開創之艱難經理之周宻他務未遑惟以農事爲先興作有序惟以廟社爲重不必報怨興師而惟通聲教不必侈言符應而惟務得人則所以保世滋大者亦不外此而得之矣故文王之三皆周公所以戒成王而後遂定爲兩君相見之樂歌以爲天徳王道之本末終始皆具於此也芃芃棫樸薪之槱之濟濟辟王左右趣之比也棫樸皆木名槱積也辟君也趣趨附之也言山之棫樸可采而薪之亦可積而槱之以比國之多士可升而用之亦可養而儲之也濟濟文也君文則明而善教其於多士能用之又能儲之故士皆左右趨附之也濟濟辟王左右奉璋奉璋峩峩髦士攸宜賦也半圭曰璋奉璋助祭也峩峩美大貌髦俊也言濟濟辟王旣爲士所趨附故當祭祀之時左右奉璋者皆峩峩然美大以俊髦之士嫻於禮儀助祭乃其宜也渒彼涇舟烝徒楫之周王于邁六師及之興也渒舟行貌烝衆楫櫂于徃邁行也言涇舟泛流則衆人櫂之以興周王于邁則六師從之也蓋武勇之士志在勤王故不令而自來也國之大事在祀與戎文王之士皆得其人所謂薪之也倬彼雲漢爲章于天周王壽考遐不作人興也倬長大貌雲漢天河也文王九十七齡故言壽考遐與何通作興起也言周之文事武備皆得人者有故也相彼雲漢倬然長大遂能爲章而煥天文之彩况此周王加以壽考豈不能作人而著文治之光乎蓋人性皆善有所觀感而即興有所持循而後立故徳盛則化神道乆乃化成也作而成之所謂槱之也追琢其章金玉共相勉勉我王綱紀四方比也追雕也金曰追玉曰琢相質也凡網張之爲綱理之爲紀此言作人之實也朱子曰追之琢之所以美其文金之玉之所以美其質是也文王之爲君勉勉於此而己勤於作人則逸於得人而四方之事可以綱之紀之矣何楷曰得人以任事而已不與持其大體而己所謂綱四方也四方之事有羣才以分理之無有漏而不周墜而不舉之處所謂紀四方也棫樸五章章四句棫樸文王作人也爲政在於得人顧人才難得也無以儲之則求之而不得卽得之而不繼故爲治以作人爲要也作人之道文與質而已詩書禮樂所以美其文也孝弟忠信所以美其質也質勝則野文勝則史此足以見三代之治乃遞下也用人不易作人尤難將欲薪之槱之則所謂追之琢之金之玉之者不可不亟講也瞻彼旱麓榛楛濟濟豈弟君子干祿豈弟興也旱山名麓山足也山足則平矣濟濟蕃也豈弟和也山平則草木蕃以興人和則福祿盛也故豈弟君子非以干祿而自得祿則謂之干祿豈弟云爾何楷曰人君不以髙危絶物自處而以謙卑育物爲心人人得而親近之亦人人得而取給之其爲豈弟孰加焉和氣致祥千祿百福固其宜也瑟彼玉瓚黄流在中豈弟君子福祿攸降興也瑟縝宻也玉瓚圭瓚也黄流鬱鬯也朱子曰言瑟然之玉瓚則必有黄流在其中以興豈弟之君子則必有福祿下其躬明寶器不薦於䙝味而黄流不注於瓦缶則知盛徳必享於祿壽而福澤不降於滛人矣鳶飛戾天魚躍于淵豈弟君子遐不作人興也戾至也遐何也言仰觀於上鳶自戾於天俯察於下魚自躍於淵蓋太和之氣充滿宇宙故各適其性而不自知也君子之作人亦如是矣和平之徳涵濡感化動其本然之性而順其本然之情於是乎日遷善而不知爲之者矣清酒既載騂牡旣備以享以祀以介景福賦也載在尊也備全具也言豈弟之君子旣有玉瓚之徳以受祿又有作人之化以得天如是而備物以享祀則神自降之福矣此則君子之干祿也瑟彼柞棫民所燎矣豈弟君子神所勞矣比也瑟枝繁密也勞慰撫之也蔣悌生曰柞棫之爲物叢生䝉密取之不盡以比民情多欲而豈弟之澤溥博而不窮是也夫民神之主也君子勤於養民如此則神自慰撫之矣以養民而神勞所謂干祿豈弟也莫莫葛藟施于條枚豈弟君子求福不回比也莫莫葉蒼貌何楷曰葛藟之施于條枚以比臣子託命於君是也回轉也黄震曰回非邪乃所以入於邪也人之初心未嘗不直一轉念則私意起而入於邪是也終言求福不回者以見我周世篤忠貞雖屢膺天眷而終無圖度受命之心此則干祿豈弟之本非文王不能當之矣旱麓六章章四句旱麓文王受釐也屢言豈弟君子者義在於豈弟也天地之道太和而已矣在天則雨潤日暄在物則蕃庶咸若在人則體信逹順在家則庭闈雍睦在國則百姓親遜故和者天地民物之所以生也和則慈祥故豈和則樂易故弟文王之徽柔懿恭成豈弟也以此修已故有玉瓚之徳以此治民故有作人之化以此事神故有景福之介至於有養民之大惠又有事君之小心則皆豈弟之所積而流也周之宇宙太和以此也卜年卜世亦以此也子思言致中和而至於天地位萬物育觀旱麓之詩而益信矣思齊大任文王之母思媚周姜京室之婦大姒嗣徽音則百斯男賦也思存心也齊莊敬也媚順也周姜大王之妃大姜也京周京也嗣續徽美也此歌詠文王之徳而推本於文母也言此存心莊敬之大任乃文王之母是文王敬止之所由來也又言大任之所以思齊者由大姜以莊敬爲悦故思以此媚之所以爲周室之賢婦也大姒又能繼大任之令聞其莊敬亦如之故能不妬忌而子孫衆多也大任能以莊敬順大姜而刑大姒則其所以教文王者可知也惠于宗公神罔時怨神罔時恫刑于寡妻至于兄弟以御于家邦賦也惠順也宗公宗廟之先公也恫痛也刑與型通法也妾多而妻惟一人故云寡也御治之也言大姒以莊敬之徳嗣大姜大任之音文王亦以莊敬之徳纘大王王季之緒是以惠于宗公也先公於子孫家不齊則怨之國不治則恫之今文王能以莊敬之徳爲法于妻以及于兄弟又能推之以治其家邦故神無怨而亦無恫也雝雝在宫肅肅在廟不顯亦臨無射亦保賦也不顯幽隱之處也射與斁同厭也言文王莊敬之徳純亦不已當雝雝在宫之日而其心祗畏無異於肅肅在廟之時雖幽隱不顯而常若帝天之臨雖心無厭倦而常自保守惟恐有惰慢邪僻之失則袵席之上天命常行而所以爲寡妻之法者在此矣肆戎疾不殄烈假不瑕不聞亦式不諌亦入賦也肆故也戎大疾難也朱子曰大難如昆夷之屬是也烈光假大瑕疵也聞前聞也式法也言文王之刑于寡妻如此故在外之大難雖未盡平而内行之光大毫無瑕庛凡其所爲雖事未前聞而皆合於道可以爲法偶有小過雖無人諌諍未嘗不改而入於善此則敬徳之外著而所以爲兄弟之法者在此矣肆成人有徳小子有造古之人無斁譽髦斯士賦也冠以上爲成人小子童子也古之人通指文王以上也譽名髦俊也言文王之刑于寡妻至于兄弟如此以此教其國人是以國中之成人而有妻者皆能有刑于之徳其小子亦勉造於敬徳以爲將來刑于之本也能刑于妻則自至于兄弟矣人人皆能刑妻而至兄弟則所以御家邦者在此矣此皆文王之敬爲之也而不自文王始也由於思齊之大任也亦不自大任始也大任以此媚大姜也大姜大任皆能敬徳則大王王季之刑于寡妻可想也乃知周室先世之古人皆能敬而無斁以刑其家是以國人效之凡周之士皆爲名俊也大學𫝊曰宜其家人而後可以教國人宜兄宜弟而後可以教國人此之謂也思齊五章二章章六句三章章四句詩序曰思齊文王所以聖也言文王之所以聖而首舉刑于寡妻者驗敬止之實也今夫隱微之際人不及知惟妻知之也妻子之事人不及知惟兄弟知之也床笫之間一念不敬其妻心輕之焉閨門之内一事不敬兄弟竊議之焉故必敬修之徳積而能純乃可以刑寡妻刑于之化久而能徵乃可以至兄弟允若兹也則亦臨亦保之神不已可以配命亦式亦入之美至善可以孚邦成人有徳小子有造其餘事矣是故成周之世宇宙太和作人之化比户可封而原其所由則惟是敬以刑妻之家法累世相傳自古以迄今也猗與盛哉可以爲萬世法矣皇矣上帝臨下有赫監觀四方求民之莫維此二國其政不獲維彼四國爰究爰度上帝耆之憎其式廓乃眷西顧此維與宅賦也皇大臨視也赫威眀也莫定也二國夏商也四國四方之國也究察度謀耆致也憎當作増式廓猶規模也言上天視下甚威且明監觀四方惟求民之安定而已夏商之政不獲定民故遍觀四國察其能定民者而謀以爲君卒欲致之於周以大其規模是以眷然西顧以此岐周之地與大王爲居宅蓋將大其國以代夏商也作之屏之其菑其翳修之平之其灌其栵啓之辟之其檉其椐攘之剔之其檿其柘帝遷明徳串夷載路天立厥配受命旣固賦也立枯曰菑自倒曰翳叢生曰灌横列曰栵檉椐柳屬檿柘桑屬菑翳無用故拔而去之灌栵叢雜故治而疏之檉椐有用故啓辟其土廣植之也檿柘美材故攘剔其枝長成之也所謂天作髙山大王荒之也串夷昆夷也配謂君也人君者配天者也言岐周之地多山林而近昆夷自帝遷明徳之大王於此漸次開闢昆夷畏之滿路而去是天欲立之以爲君其受命之基自遷岐而已固也所謂大王肇基王迹也帝省其山柞棫斯拔松栢斯兑帝作邦作對自大伯王季維此王季因心則友則友其兄則篤其慶載錫之光受祿無喪奄有四方賦也省視也拔兑見綿篇作對作君也立君所以對民也大伯大王之長子王季其少也順於兄弟曰友篤厚奄遂也言大王開闢山林以奠民居帝視岐山見其木拔道通民歸者衆故旣作爲大邦又與以賢君使自大伯以及王季蓋兄終弟及商制原如是也乃王季生文王矣大伯知大王欲傳季歴以及昌故讓而不爲夫大伯不爲而王季爲之似乎不犮其兄而不知王季之友乃因大伯之心而順之也王季知大伯讓己以及昌乃所以篤周之慶己順其兄以篤其慶乃予兄以讓徳之光是以受而不辭守而不失至文王而遂有四方則大伯之心得而已友大伯之心亦得矣蓋文王之聖必有天下天所命也故大王𫝊之大伯讓之王季受之皆所以順天休命而毫無私意於其間也維此王季帝度其心貊其徳音其徳克明克明克類克長克君王此大邦克順克比比于文王其徳靡悔旣受帝祉施于孫子賦也度忖度之也貊與莫通靜黙也徳音言也效法無違曰順繼續無間曰比悔當作晦言王季受讓之心人不能知惟天度之以爲因心則友而非利之也乃帝雖度之而王季終黙而不言蓋大伯不欲以讓名故王季亦不言其受讓也然惟貊其徳音而其徳更明矣謂能辨於是非而審於辭受也審於辭受則與大伯事不類而心類矣克類大伯故大伯所能爲王季亦能之焉伯仲皆去而能爲一家之長也大王旣没而能爲一國之君也能君一國則王此大邦矣大邦者大王荒之者也今王此則能法前人以傳於後至傳於文王而其徳靡晦矣蓋大伯不顯其讓而王季不言其心其徳有晦焉至文王則更光大矣人皆知文王之明徳足以造周而不知由於王季之心帝度知之是以能受帝祉而傳於子孫也此所謂王季其勤王家也帝謂文王無然畔援無然歆羡誕先登于岸密人不恭敢距大邦侵阮徂共王赫斯怒爰整其旅以按徂旅以篤周祜以對于天下賦也帝謂設爲天命之詞也畔離而去也援引而來也無畔援者心純於道無離合也歆物可欲也羡心欲之也無歆羡者心超於物無嗜好也岸水涯也有欲則溺道其岸也朱子曰人心有所畔援有所歆羡則溺於人欲之流而不能以自濟文王無是二者故獨能先知先覺以造道之極是也密阮皆國名共阮邑也距拒遏止祜福對答也文王已爲西伯而密人不恭敢距違大邦擅興兵以侵阮而徃至於共故文王赫然震怒整周師以遏徂共之衆抑强安弱乃所以厚周家之福而答天下仰望之心也夫人心離道帷怒爲甚文王當赫怒興師之時而敬天勤民如此所謂喜怒在物不繫於心乃無然畔援之實也依其在京侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池度其鮮原居岐之陽在渭之將萬邦之方下民之王賦也依附而安也京周京也度經過也鮮原地名竹書紂二十五年周始伐殷師次於鮮原是也將側也方向也王歸徃也言密旅既遏阮人依附如在周京則阮疆即我疆也故自密人所侵之疆我皆陟其髙岡而守之密人無敢射矢於我陵者况由陵以至阿乎無敢飲馬於我泉者况由泉以至池乎阮疆既安周師遂歸經過鮮原之地而仍居岐陽在渭之側不帷無所取於密阮併鮮原亦過而不有如是天下皆知文王之安定諸侯而無所欲也萬邦皆向慕之下民皆歸徃之此則無然歆羡之實也帝謂文王予懷明徳不大聲以色不長夏以革不識不知順帝之則帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉賦也予設爲上帝之自稱也懷眷念也明徳文王之明徳也以猶與也長與張通夏大也革變也知自外來曰識識從内出曰知則法也不太聲者不誇燿其音聞也不大色者不粉飾於迹象也不長夏以革者大事化小小事化無不張大也因而𨗳之潛而移之不變革也不識知而順帝則者天理熟則不勞意計也朱子曰上帝眷念文王而言其徳之深微不暴著其形迹又能不作聰明以循天理是也詢謀也仇方讐國也兄弟與國也鉤援梯也臨臨車衝衝車也崇國名墉城也史稱崇侯虎譖西伯紂囚之羑里旣而釋之所謂仇也崇侯之譖助紂虐而毒萬民乃天理所不容故文王雖不欲伐之而若有帝命者焉然伐之之道亦何嘗大其聲色哉兄弟本同則同之鉤援臨衝本有之器則用之雖興兵以伐崇莫非順帝之則也臨衝閑閑崇墉言言執訊連連攸馘安安是類是禡是致是附四方以無侮臨衝茀茀崇墉仡仡是伐是肆是絶是忽四方以無拂賦也閑閑徐而俟也言言髙而完也連連相續也馘殺而割其耳也安安不驚也類將出師而祭上帝也禡至征所而祭馬神也致招之使來也附諭之使降也茀茀强盛貌仡仡堅壯貌肆縱忽滅拂戾也春秋傳曰文王伐崇三旬不降退修教而復伐之因壘而降此言臨衝閑閑是未嘗攻也執訊攸馘而崇人安然不驚則未嘗服也是類是禡所謂退修教而復伐之也是致是附不遽伐也何楷曰兵威既臨廣布仁恩以致其歸附所以孤敵之黨而我亦不至於多殺是也四方無侮者戴周之仁而不生侮慢之心也臨衝茀茀用其壯也崇墉仡仡毁之而後知其堅也崇人因堅負固以致再伐而縱兵則絶其祀而滅其國皆崇自取之而非文王好極其兵威也四方無拂者畏周之威而不敢有拒違之事也順天命而肅天威蓋皆所以順帝之則而不以己之知識叅之也皇矣八章章十二句皇矣述祖徳也人但知大王遷岐由於避狄而不知西顧與宅乃所以求民莫也人但知王季受讓疑於不友而不知施于孫子乃所以篤周慶也人但知文王專征四方無拂而不知道岸先登乃所以順帝則也故觀大王之作屛啓辟而知得民之外别無天眷觀王季之明類順比而知敦倫之外别無帝祉觀文王之歆羡俱無聲色不大而知天徳之外别無王道此千聖之薪傳百王之定範也經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來賦也經始創造也國之有靈臺所以望氛祲察災祥占候天道故名曰靈也此臺文王創爲之而後遂以爲天子之制也經之度之也營之謀之也文王方經營之庶民卽攻作之不數日而遂成之雖文王戒令勿亟而庶民之來如子趨父事蓋民心懽樂故如此也王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯王在靈沼於牣魚躍賦也言民不止作靈臺且爲之作靈囿於臺下且爲之作靈沼於囿中故王在靈囿見麀鹿之肥澤白鳥之鮮明王在靈沼見滿沼之魚躍所謂鳥獸魚鼈咸若也然使人心不樂惡知禽魚之樂哉虡業維樅賁鼓維鏞於論鼓鐘於樂辟廱賦也虡植木以懸鐘磬其横者曰栒業栒上大版刻之􅚃業如鋸齒者也樅業上懸鐘磬處以綵色爲崇牙其狀樅樅然者也賁大鼓也鏞大鐘也論倫也言得其倫理也辟璧通辟廱大學也水旋邱如圓璧故曰辟廱言民不止作靈臺與囿沼又爲之作辟廱而奏樂焉故聞其鐘鼓之聲而樂之也於論鼓鐘於樂辟廱鼉鼓逄逄矇瞍奏公賦也鼉似蜥蜴其皮可以冒鼓逄逄聲和也眸不見曰矇無眸子曰瞍樂工也樂工用瞽者以其善聽而審於音也公公事也言於樂辟廱者非樂鐘鼓也樂辟廱之能教士也大學始教以樂爲主故舜命夔典樂以教胄子而周禮大司樂以樂徳樂語樂舞教國子也以樂爲教必用矇瞍爲師故有殷之學名曰瞽宗而周人亦因之也聽鼉鼓之逄逄知矇瞍之奏公則是教者以時而學者不倦養育人材以爲國楨其所樂又有大焉者矣靈臺四章二章章六句二章章四句靈臺化成也觀其作臺占候益深昭事上帝之心經始勿亟不改視民如傷之念民來王在知上下之相親魚躍鳥飛覘萬物之自得於樂辟廱則是民生旣厚而建學以興賢於論鼓鐘則是禮教旣行而作樂以淳化蓋由天徳之中存者純而不已故王道之外著者久而化成也嗚呼至矣下武維周世有哲王三后在天王配于京賦也下當作夏蓋音訛夏大也大武維周者言自武王乃有天下而國號周也武王之有天下不自武王始也由其先世屢有哲王也大王王季文王三后之徳昭明於天天祐有徳是以武王能爲天子居周京以配三后也王配于京世徳作求永言配命成王之孚賦也求與逑通配也孚合也言武王之配于京者非徒以位也先世有徳武王亦有徳世徳相承以此作配耳武王以徳配三后故成王亦以徳配武王然而成之配武則又有難者焉蓋武王躬有天下故不自恃其位而惟修其徳成王繼武王而有天下故旣思修其徳又思保其位此成王之所以孚武王也成王之孚下土之式永言孝思孝思維則賦也式則皆法也言成王能孚武王則永配天命而其徳足以爲下土之式矣孚一人而式下土者以成之孚武乃孝思也孝者天下之通徳也人各有親皆知思孝上能以孝孚親則下亦以孝孚上矣故惟孝思可以爲則於天下也媚兹一人應侯順徳永言孝思昭哉嗣服賦也媚悅也侯維服事也自此以下戒康王之詞也言成王之徳如此今廟祀成王以媚兹一人則惟有順其徳而已矣成王之徳永言孝思者也今亦永言孝思則成王以孝孚武王今王亦以孝孚成王庶幾哉昭明其徳可以嗣位而行天子之事矣昭兹來許繩其祖武於萬斯年受天之祜賦也來許後世也繩繼武迹也言能永言孝思以昭其明徳則不止可以嗣服並可昭示後世子孫使皆繼其祖宗之迹則億萬斯年皆世徳作求而受天之祜矣受天之祜四方來賀於萬斯年不遐有佐賦也賀朝賀也不遐猶言豈不佐助也言子孫受天祜而爲天子則四方諸侯皆來朝焉諸侯來朝見天子繩祖於是亦各繩其祖旣能各繩其祖豈不皆佐天子以繩祖乎子孫世爲天子諸侯世佐子孫孝思世徳逹於天下而垂於萬年則受天之祜於無疆矣下武六章章四句下武康王祀成王受釐陳戒也言周之所以受天命者由於有世徳也其徳無他惟孝而已矣孝者徳之本也先王有至徳要道以順天下此之謂也韓詩外傳曰上不知順孝則民不知返本君不知敬長則民不知貴親故君子修身及孝則民不倍矣敬孝逹乎下則民知愛矣好惡喻乎百姓則下應其上如影響矣此兼制天下定海内臣萬姓之要法也得此詩之意矣文王有聲遹駿有聲遹求厥寧遹觀厥成文王烝哉賦也聲令聞也駿大也遹𤼵語詞烝盛也言文王修徳原自有聲專征之後乃大有聲然而非自爲也將以求天下之民自此安寧耳將以觀安民之功自此有成耳初無圖啇之念也其徳豈不盛哉文王受命有此武功旣伐于崇作邑于豐文王烝哉賦也伐崇見皇矣篇作邑徙都也豐卽崇地也言文王本不敢用武乃天命文王宜有此武功於是文王受天之命興師伐崇作邑于豐而徙都焉仍不改事商之心也其心豈不盛哉築城伊淢作豐伊匹匪棘其欲遹追來孝王后烝哉賦也淢水流急也匹偶也棘急也自此以下言武王營鎬之事也鎬城臨鎬水之急流故曰築城伊淢也鎬城旣成與豐爲偶故曰作豐伊匹也何楷曰周公營洛與周匹休武王營鎬與豐對峙是也武王雖匹豐而作鎬實非另闢疆宇急欲圖商不過追前人從來之孝思耳蓋文王作豐所以繼王季之志武王作鎬所以述文王之事而非有他也其徳豈不盛哉言王后者未有天下之稱也王公伊濯維豐之垣四方攸同王后維翰王后烝哉賦也公功也濯新也垣籓也翰蔽也言武王營鎬當其城工新作之時固以遹追來孝爲豐邑之籓籬暨乎四方同歸之日仍欲恪守侯度爲商室之屛翰蓋與文王服事之心無有二也其徳豈不盛哉豐水東注維禹之績四方攸同皇王維辟皇王烝哉賦也皇王有天下之稱辟君也豐在豐水之西鎬在其東故居鎬則見豐水之東注也豐水東注於鎬乃山川自然之勢禹因而𨗳之以爲功四方西歸於鎬乃百姓同然之心武王因而順之以爲君則其自王后而爲皇王者乃天命人心勢不容己而非有利天下之私也其徳豈不盛哉鎬京辟廱自西自東自南自北無思不服皇王烝哉賦也言武王既有天下而以鎬爲京師乃復修文王之辟廱以教育人材則是文王有文徳而兼有武功武王有武功而復修文徳是以東西南北之人慕其徳化無思不服無不服者其身服也無思不服者其心服也其作人之化果與文王同矣豈不盛哉考卜維王宅是鎬京維龜正之武王成之武王烝哉賦也考稽也宅居正決也言武王當謀宅鎬之初嘗稽之於龜卜而龜乃決之言當宅也武王遂宅之成龜兆也而其後遂有天下則是爲王居鎬乃昊天之成命而非人之所能爲也豈不盛哉豐水有芑武王豈不仕詒厥孫謀以燕翼子武王烝哉賦也芑苦菜也田肥乃生仕事也詒遺燕安翼輔也孫子互言之也言豐水之旁有芑生焉其田肥美原屬樂土凡文王所作城郭宫室靈臺辟廱之類武王豈不有事於修葺所以遷者爲地廣人衆欲遺子孫萬世之謀是以大城鎬以安定輔翼之耳子孫安則百姓安蓋猶是遹求厥寧之心至是而觀其成也其徳豈不盛哉文王有聲八章章五句文王有聲美鎬京也周自大王遷岐文王徙豐武王居鎬遂有天下人或疑文王事殷武王伐紂其徳有慚焉而不知其盛同也文王作豐原以寧民然而上天有命則亦有伐崇之功武王作鎬原以追孝即至四方攸同仍不改爲翰之念逮其後而皇王維辟亦所以答四方之歸心而仍未嘗棘其欲也至若文王之化終於辟廱武王之治始於辟廱蓋譽髦斯士乃有周累世之家法文王守之武王不敢易焉則其宅鎬京以貽子孫者武之烈猶是文之謨也是故或讓天下而不有或有天下而爲君其迹似乎有異而無利天下之心有安天下之畧其道無乎不同屢歎烝哉以爲文武之徳皆極盛而無以加也文王之什十篇六十六章四百一十四句御纂詩義折中卷十六
