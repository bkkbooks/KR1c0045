  text: 欽定四庫全書御纂詩義折中卷十九
  hash: sha256:4203d71d4c7a28b46f75f7169ede1e0a4d662c19b554c5e3e4eeda43b46caad3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0045_WYG_019-1a, image: WYG0084/WYG0084-0352a.png}
body:
  text: 周頌清廟之什四之一頌四詩序曰頌者美盛德之形容以其成功告於神眀者也於穆清廟肅雍顯相濟濟多士秉文之德對越在天駿奔走在廟不顯不承無射於人斯賦也於歎詞穆靜深清眀潔肅敬雍和顯光大也相助祭之公侯也濟濟美盛多士執事之人也秉執越於駿大承奉也斯語詞言美哉此穆清之廟也在廟中者光大之辟公美盛之多士皆能肅敬雍和執行文王之德以對越其在天之神而大奔走其在廟之主然則文王豈不顯於上乎豈不承於下乎由其德化久而彌深故人心無有厭斁如斯也清廟一章八句詩序曰清廟祀文王也周公營洛成王至於洛諸侯來朝因率之以祀文王也頌者美盛德之形容也盛德之容敬與和而已和者天之元也人之所以為性也敬者守其和也人之所以定命也文王之德雍雍在宫和之至也肅肅在廟敬之至也昔嘗以此譽髦斯士矣今之助祭者肅敬雍和猶蒙至教之澤故曰秉文之德也對越在天文王昭於天也天之為天穆清而已文王肅雍顯於穆清之天多士肅雍承於穆清之廟對天如對文王也故維天之命歎文與天同其穆維清緝熙歎文與天同其清也辭約而意逺矣維天之命於穆不已於乎不顯文王之德之純假以溢我我其收之駿惠我文王曽孫篤之賦也天命即天道也穆靜深也不已不息也不顯猶穆也純一而不雜也天穆然而健行文王穆穆而緝熙其道同也子思子曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已程子曰天道不已文王純於天道亦不已純則無二無雜不已則無間斷先後是也假大也溢滿其量而有餘也收斂其溢而不散也駿大篤實也言文王以純德格天故其餘福波及於我我當修德以收之也曽孫篤之祝之也言天既大惠我文王餘福及我矣惟望自我而後凡為曽孫者皆篤行文王之道以純其德而受天佑也維天之命一章八句維天之命祀文王也祀文王而言天者文王之德與天同也今夫天其變化無常者成形成色之用也其有常不變者無聲無臭之體也用著於有體立於無故法天者凛於見顯之交尤慎於隱微之際宥密基命自強不息則不顯而純與於穆不已者合德矣天之不已文王之純非作而致之也天行無疆由於其德之健聖功不倦由於其性之一健而一者所謂誠也中庸曰故至誠無息是也誠者天之道也誠之者人之道也誠之之道擇善固執固執之功在於篤行由是言之篤者所以固也固者所以誠也誠則純純則不已矣曽孫篤之教以誠也誠者造於純以配天之實非徒祝其得福已也維清緝熙文王之典肇禋迄用有成維周之禎賦也緝續熙眀典禮肇始迄至成終也言天之為天清而常眀者也文王得天之清故有眀德所謂熙也緝熙者其德常眀與天同清也與天同清則天理之節文自著此文王之典所由來也今祀於文王之廟者自始事以至於終皆能秉文之德以行文之典則文王佑之而天亦佑之矣此周之所以受福也維清一章五句維清祀文王也清廟之三皆祀文王清廟初獻之樂也維天之命受嘏也維清送神也昔舜命伯夷曰汝作秩宗夙夜維寅直哉維清蓋以秩宗典祀交於神眀以清為貴也禮之清由於德德之清本於天人秉天德昭眀有融有時而昏者欲蔽之也夙夜維寅不以人欲蔽其天德之清則禮行矣故於穆不已者文王之德之所以純維清緝熙者文王之典之所以眀也迄用有成者自始至終皆清心以行典則文王之熙我亦緝之矣曽孫篤之所以進於純迄用有成所以緝其熙純而緝熙則亦不已此文王之所以昭于天多士之所以對越在天也穆清之廟與天同象肅雍之相與文同德顯承無射之形容如繪矣書大傳曰周公升歌清廟苟在廟中嘗見文王者愀然如復見文王焉此之謂也烈文辟公錫兹祉福惠我無疆子孫保之無封靡于爾邦維王其崇之念兹戎功繼序其皇之無競維人四方其訓之不顯維德百辟其刑之於乎前王不忘賦也烈功辟君也烈文辟公有武功文德之諸侯也祉福所止也辟公助祭而神錫祉福則不啻辟公錫之也國家億萬斯年諸侯嵗時助祭所以惠我者無疆願我之子孫世世保之也封専利以自封殖也靡汰侈也戎功即烈文也皇大也言辟公惠我我亦惠辟公辟公能謹爾侯度無専利無汰侈則王自尊崇之又念汝烈文之功願爾之子孫繼序而益大之也無競莫強也刑與型同言子孫保之繼序皇之非虛願也既祭前王但法前王可矣昔前王之莫強於天下者以其人也為人有道能盡人道則四方皆從之矣修德行道不在於顯隱微幽獨純誠不息則百辟皆法之矣此前王之所以無斁于人者常念之而不忘則德立道凝人存政舉而無疆之祉福可保矣烈文一章十三句烈文獻顯相也儀禮曰賔三獻尸之後主人酌酒獻賔歌烈文是也烈文者功德也成王之初周興未久助祭諸侯身佐前王以定天下故皆有武功與文德也無封靡于爾邦戒之也天下之弊不自外生皆由心出心有欲則厚取心無制則奢費費愈奢則取愈厚而民不堪命矣戒封靡所以塞致亂之原也其身正不令而行無競維人以身教也其心正不言而喻不顯維德以誠通也所以植致治之本也一獻酬之間而相戒勉者如此蓋當時之君皆聞大道之要故其民皆蒙至治之澤也嗚呼盛矣天作髙山大王荒之彼作矣文王康之彼徂矣岐有夷之行子孫保之賦也作起也髙山岐山也荒治康安徂往夷平行路也言天作岐山在於周地大王因而荒之以順天也未荒以前天作之既荒以後則不啻大王作之也大王作於前文王繼之勞來安輯之民乃康居天下於是乎歸岐迄於今文王往矣而以民歸者衆岐之髙山因有平路則前王雖往治績常在為子孫者當繼前人之志世世守之而不失也天作一章七句天作祀岐山也易曰王用享於岐山是也周之王業起於西岐修平啓闢疆理宣畝所謂大王荒之也徽柔懿恭惠鮮懷保所謂文王康之也棫拔道兑夷喙民歸所謂岐有夷行也荒之者順天康之者安民順天安民而後有夷行難之也孟子曰昔者文王之治岐也耕者九一仕者世祿關市譏而不征澤梁無禁罪人不孥發政施仁必先鰥寡孤獨此文王之康功也荒之功在一時康之功在萬世子孫保之法文王之康之足矣蓋順天之本在於安民也其旨逺矣昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之賦也成定也二后文武也基積纍於下以承藉乎上者也宥深密靜靖安也言周自后稷公劉以來積功纍仁上天已有成命至文王武王乃受之而有天下也二后所受已為成命至於成王其命不愈定乎然恃有成命而康好逸豫則天難諶而命靡常矣故成王不敢康也早夜之間敬慎不懈以基天命於深靜之中葆其所性之眀而繼續之因隨事以盡其心則君心清庶事理而天下其治安矣此成王之所以永保天命也昊天有成命一章七句昊天有成命祀成王也叔向曰此道成王之德也成王能眀文昭定武烈是也眀文昭在於緝熙定武烈在於肆靖而其致功則在於基命天命人以位先命人以德沖漠之中有覺不昧萬理森然是所性之眀德故曰熙也萬事之本萬福之原故曰基也氣拘物蔽而其熙微則其基壞矣故貴緝也緝之之功貫通動靜而尤以主靜為立極之要故在於宥密也隱微之際人所不見天必見之已不見人乃能見天天理既著其眀昭焉於此時而察識之存養之使繼續而無間則眀德之體純矣因其德之所發而遂眀之以盡其心之量則充其四端可以保四海所謂眀眀德於天下也文王緝熙於前成王緝熙於後此有周之家法實千聖之薪傳也我將我享維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王既右饗之我其夙夜畏天之威于時保之賦也將奉也享獻也羊實柴之羊也周禮羊人凡積供其羊牲是也先柴而後獻故羊先於牛也右饌右也神位西而向東故在饌右也儀威儀式制度刑與型通法也伊語詞言我今祀天而配以文王有所將而奉之有所享而獻之我將維羊以實柴也我享維牛以供饌也祀禮具舉天庶幾其在於右乎天鑒四方求民之莫我今者威儀制度皆法文王之典用以日靖四方天嘏文王因以嘏我既右享之矣然天降福亦降威日刑文王則嘏之一日而不刑文王則天威將至而所嘏不可保矣我願自今以往夙夜之間戰兢惕厲以畏天威庶幾永保此右享之嘏焉蓋對天以自矢之詞也我將一章十句詩序曰我將祀文王於眀堂也孝經曰郊祀后稷以配天宗祀文王於眀堂以配上帝是也人君之大德曰敬天曰法祖法祖者以實不以文必儀刑之必式刑之必靖四方必日靖之儀者一身之威儀若儀禮所載是也式者朝廷之制度若周禮所載是也儀刑文王則律躬者謹式刑文王則立政者詳又使教化自近及逺四方皆靖且日靖之不敢始勤而終倦則所以法祖者實矣敬天者以誠不以偽必畏之必夙夜畏之必以畏保之天之聰眀不可欺也真知上帝之臨汝實覺日監之在兹則精勤不期而自生嗜欲不戒而自去斯其畏誠矣天不息故畏亦不息夙夜之間無時敢懈所謂終日乾乾夕惕若也然徒畏之而已乎又思所以保之焉天眀威自我民眀威我其夙夜刑文王者純而不已靖四方者久而化成天駿惠我文王則亦永嘏我矣蓋以敬天之誠厲其法祖之實也上天之載無聲無臭儀刑文王萬邦作孚此之謂也時邁其邦昊天其子之實右序有周薄言震之莫不震疊懷柔百神及河喬嶽允王維后眀昭有周式序在位載戢干戈載櫜弓矢我求懿德肆于時夏允王保之賦也時巡狩之期也書曰六年五服一朝又六年王乃時巡是也邁行也言人君以時巡行於諸侯之邦察其政治而撫其民人庶天以為能盡君職而子之乎此敘所以巡狩之意也右尊序次震動疊服懷來柔順允信也言巡行四方乃知昊天果子之矣實尊周之位次於天下之上是以慶讓偶施莫不懾服祀典具舉百神山川莫不懷德而效順蓋人神皆受職焉而後信王之果為天下主也眀者明德昭著之也戢聚櫜韜肆陳夏中國也言天既右序有周王亦式序在位於是布昭眀德於有周之天下孰宜牧伯孰列羣侯孰為附庸以其德之大小次其位之崇卑則其明昭而其序定矣雖周王于邁六師及之而干戈弓矢皆可不用惟廣求懿德布於中夏使五侯九伯皆得其人則講信修睦以康兆民而右序之尊信可常保之矣此則巡狩之實政也時邁一章十五句時邁美巡狩也君者天之子也人子周知一家天子周知天下耳目不及於四方下情不得以上達子職有虧矣故時邁其邦斯昊天子之也且時邁非徒行也以行慶讓以祀百神以序在位所謂撫萬邦巡侯甸六服羣辟罔不承德也夫天下之議者衆矣謂兵革不休以有侯王長駕逺馭必需武略而不知諸侯違命乃有征伐王政不行乃有兼并設天威所臨人神受職黜陟所及百辟承流慎簡親賢以布於庶位則兵革何自起乎故秉禮以止亂偃武而修文為治者耳熟焉然非時邁而親歷之未有以信其實然也君子是以知巡狩之為義大也執競武王無競維烈不顯成康上帝是皇自彼成康奄有四方斤斤其眀鐘鼓喤喤磬管將將降福穰穰降福簡簡威儀反反既醉既飽福祿來反賦也執持競強也言武王能持其自強不息之心也惟能自強天下莫能與爭強是以有大功而君天下也不丕通大也言成康能大顯武王之烈故天命之使繼武王而為君也何以見其丕顯也武王克商頑民未靖自成康而治定功成四方始永為周有矣武王末受命制作未遑自成康而禮眀樂備文治始斤斤其眀矣斤斤者條理精詳眀之至也所謂繼眀照于四方也生為眀帝殁為眀神則今日者鐘鼓和鳴磬管諧集以祀之其降福之多可知也然降福者神受之者人也簡簡慎擇也神之降福必擇其人我之威儀果能收斂敬慎有執競之遺意則神自歆享醉飽而福祿之來反覆而不厭矣蓋戒祀三后者勉效三后之德也執競一章十四句執競祀康王也昊天有成命成王祔祭於文王執競康王祔祭於武王也丹書曰敬勝怠者吉又曰不強則枉武王之執競敬勝以自強也法文王之敬止也成王曰敬之敬之又曰學有緝熙于光眀康王曰敬忌天威又曰用答揚文武之光訓是成康之丕顯其眀法緝熙也而曰敬之敬忌仍法文王之敬止也則猶是武王之執競也威儀反反敬止執競之功也凡人之心出則放反則存凡人之行心放則肆心反則敬故威儀貴反也反反云者反而求諸身又反而求諸心也心反而常存則自強而不息矣由是言之儀反而後敬勝敬勝而後自強自強而後丕顯故曰湯武反之也思文后稷克配彼天立我蒸民莫匪爾極貽我來牟帝命率育無此疆爾界陳常于時夏賦也思有謀慮也文有道德也立成立極至也德之至也來牟麥也率遍育養陳布常倫常也言郊祀上天惟思文之后稷足以配之焉天以生民為心者也蒸民之生久矣所由養之以至於成立者莫非后稷之至德也稷藝五穀民既育矣又貽我以來牟蓋春夏之間新陳不接來牟夏熟可以接濟乃上帝所命使隨時率育也衣食足則禮義生華夏蒸民無此疆彼界之分皆得相生相養以敷陳倫常之道是教之以至於成立者亦莫非后稷之至德也鞠人謀人之思莫深於此經天緯地之文莫大於此故曰思文后稷克配彼天也思文一章八句詩序曰思文后稷配天也人皆知稷教稼穡功在養民而不知率育陳常實一體之事也田賦供而上下定奉養備而孝弟行室家寧而後有夫婦交際通而後有友朋其朴而不文者乃至文之所從出也故郊祀后稷以配天宗祀文王於明堂以配上帝以文王之德能與天合后稷之功實與天同也清廟之什十篇十章九十五句周頌臣工之什四之二嗟嗟臣工敬爾在公王釐爾成來咨來茹嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥眀明昭上帝迄用康年命我衆人庤乃錢鏄奄觀銍艾賦也嗟歎詞臣工羣臣百官也公公所也釐福成終咨問茹度也保介農官莫春周時建寅之月也田二嵗曰新三嵗曰畬明上帝之眀賜也痔修而儲之也錢鏵鎛鋤銍鐮也艾與刈同此耕籍而戒農官也王將耕籍祭於先農臣工畢從從祀從耕皆在公也故嗟而敕其敬之謂王祀而受釐實賴臣工從耕以成之也來咨來茹敕保介之詞也王曰嗟保介來為我咨之為我茹之維莫之春百穀未生又何求乎其咨問之何者新田何者畬畝新田何植畬畝何種也維莫之春百穀未生來牟不已生乎美哉來牟轉盼即熟將受上帝之明賜明昭上帝既賜麥熟又賜禾熟用終至於康年其茹度之麥夏熟禾秋熟其事皆在春也其命我農人庤乃錢鎛與銍錢以耕之鎛以耘之不旋踵而忽觀銍之刈矣此則王之釐爾果成之乃敬爾在公之實政也臣工一章十五句臣工耕籍也王率羣臣躬耕帝籍祭於先農而受釐耕籍事竣乃敕保介使勸農也國語曰農祥晨正日月底於天廟王乃使司徒咸戒公卿百吏庶民司空除壇於籍命農大夫咸戒農用王即齊宫三日及期鬱人薦鬯犧人薦醴王祼鬯饗醴乃行及籍王耕一墢班三之庶人終于千畝此則王釐爾成之大略也又曰陽氣俱蒸土膏其動弗震弗渝脈其滿眚穀乃不殖稷則遍戒百姓紀農協功曰隂陽分布震雷出滯土不備墾辟在司寇乃命其旅曰徇此則來咨來茹之大略也噫嘻成王既昭假爾率時農夫播厥百穀駿發爾私終三十里亦服爾耕十千維耦賦也噫嘻歎詞昭眀也假與格通至也爾謂農官也時是駿大發耕私私田也三十里萬夫之地耦二人並耕也獨舉成王者康王將祈穀卜於成王之廟也卜之而從故言成王昭格也祈穀禮成則農事興故於廟中戒農官也言農官當率農夫使播百穀大發其私田咸服其耕事萬夫為耦通力合作也蘇轍曰民曰雨我公田遂及我私而君曰駿發爾私終三十里其上下之間交相忠愛如此噫嘻一章八句噫嘻卜郊也郊有二有日至之郊有祈穀之郊日至不卜孟春祈穀則卜之禮記曰卜郊受命於祖廟而作龜於禰宫尊祖親考之義也春秋襄公七年夏四月四卜郊不從孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也故啓蟄而郊郊而後耕今既耕而郊宜其不從也此詩言成王昭格者康王作龜於禰宫也郊而遂耕故於廟中戒農官焉勤農重穀之至也終三十里者農官所司萬夫之界也周禮曰凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路計萬夫為耦之地方三十三里三分里之一故曰終三十里也振鷺于飛于彼西雍我客戾止亦有斯容在彼無惡在此無斁庶幾夙夜以永終譽興也振羣飛貌鷺白鳥雍水澤也客殷之後於周為客戾止來助祭也斯指鷺也殷人尚白來助祭者車旗冠服從先代之所尚故其容潔白有如振鷺也彼所封之國也斁厭也客在彼國無有惡之者能綿其世澤以保宗社也今來於此無有厭之者能守其忠貞以翼王室也如是則有譽矣然猶願勉之也譽欲其終又欲其永其夙興夜寐不懈無惡無斁之功庶幾畢生不渝而譽終傳及後世而譽永矣微子之命曰慎乃服命律乃有民永綏厥位毗豫一人俾我有周無斁此之謂也振鷺一章八句振鷺微子助祭也武庚既平成王封微子於宋命之曰修其禮物作賔于王家故微子來助祭而為賔也賔獻尸後主人獻賔歌振鷺也無惡無斁非微子不足以當之以永終譽戒其無蹈武庚之覆轍也武王不絶殷後而封武庚成王不懲武庚之畔又封微子忠厚之至也觀振鷺之所詠下守臣節而助祭上以為客而獻之且欲其永保祿位且欲其慶流子孫周之德其可謂至德矣豐年多黍多稌亦有髙廩萬億及秭為酒為醴蒸畀祖妣以洽百禮降福孔皆賦也稌稻也黍宜髙而喜晴稌宜下而喜雨黍稌皆多是雨㿩時若髙下皆收也藏粟曰倉藏米曰廩雍西之俗多藏粟於窖亦有髙廩則富室也十千曰萬十萬曰億穀之數也千倉萬箱我庾維億是也及繼也陳粟曰秭新穀繼陳穀而藏之所謂餘一餘三陳陳相因也藏穀既多不止為食并為酒醴酒醴之用可以養老可以祀神故用以蒸畀其祖妣不寧惟是凡百禮儀俱需酒食以和合之也皆遍也百禮既洽則神之降福甚遍矣何楷曰隨事賴豐年之利用則隨處徴神惠之普存是宜索祭而報饗之也豐年一章七句豐年祭八蠟也郊特牲云年不順成八蠟不通是蠟祭惟豐年乃有之也天子之大蠟八合聚萬物而索饗之也孟春之郊所以祈穀孟冬之蠟報之也列國各有蠟周禮云國祭蠟則吹豳頌擊土鼓以息老物謂嵗功既成養老勞農而休息之也治民之道曰富曰教富莫要於勤農教莫先於行禮觀此詩所詠年穀順成蓋藏謹裕奉親享祖百禮皆興亦可以得富而教之之大略矣國語觀射父曰日月會于龍􅔀土氣含收天眀昌作百嘉備合羣神頻行國於是乎蒸嘗家於是乎嘗祀百姓夫婦擇其令辰奉其犧牲敬其齍盛潔其糞除慎其采服禋其酒醴帥其子姓從其時享虔其宗祝道其順辭以昭祀其先祖肅肅濟濟如或臨之於是乎合其州鄉朋友婚姻比爾兄弟親戚於是乎弭其百苛妎其讒慝合其嘉好結其親昵億其上下以申固其姓上所以教民虔也下所以昭事上也蒸畀祖妣以洽百禮其是之謂與有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼓鞉磬柷圉既備乃奏簫管備舉喤喤厥聲肅雍和鳴先祖是聽我客戾止永觀厥成賦也瞽樂官也再言有瞽非一人也業虡崇牙見靈臺篇樹羽置五采之羽於崇牙之上周制也應小鼓田大鼓縣懸之也縣鼓亦周制也鞉有柄耳持其柄而搖之則兩耳自擊柷如桶以椎挏之所以起樂圉敔也狀如虎背有鉏鋙掃之以止樂也簫編竹為之管笛屬也喤喤聲大也肅敬雍和也和鳴相應也成樂之一終也言集衆瞽於庭設樂器於庭皆備而後奏之鞉磬既作簫管之屬莫不備舉喤喤衆樂之聲與人聲相和而鳴肅肅然使人敬雍雍然使人和也於是先祖來格而聽之則樂定矣樂定之後嵗時祀享凡我客之來助祭者將永觀新樂之成焉蓋聲容之美實足以格神人而和上下也有瞽一章十三句詩序曰有瞽始作樂而合乎祖也鄭康成曰王者治定制禮功成作樂合者大合諸樂而奏之是也言周庭者開國之初樂工多先代之所遺故言有商之瞽今在周庭也列敘樂器昭新制也業虡崇牙遵靈臺維樅之製樹羽則又加飾矣應鼓田鼓皆新冒之縣鼓則新為之明堂位云夏后氏足鼓殷人楹鼓周人縣鼓是也柷以起樂圉以止之堂下播鞉則堂上擊磬簫管依磬者也那之詩曰鞉鼓淵淵嘒嘒管聲依我磬聲是也肅雍和鳴樂之盛也舜命夔曰命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和其克諧雍也無奪倫肅也樂之肅雍皆由於人其溫而無虐雍也其栗而無傲肅也肅雍之志形於詩歌故聲律之依而和者亦如其肅雍焉此虞廷制作之精意而周公獨得之也先祖是聽神以和也客觀厥成人以和也書曰祖考來格虞賔在位羣后德讓此詩有焉猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福賦也猗與歎美之詞潛藏之深也鮪王鮪也鱣鮪類鰷白鯈也鱨鰷類鰋鯉類鱣鮪之大鰷鱨之細鰋鯉之美莫不有之多之至也享薦也冬薦魚春薦鮪也祀祭也周禮漁人凡祭祀共魚之鮮薧潛一章六句潛季冬薦魚也月令季冬命漁師始漁天子親往乃嘗魚薦寢廟白虎通云天子不親取魚薦廟乃親行是也天子親行必有其地有其時有其制春秋隱公五年公觀魚于棠傳曰書觀非事也書于棠非地也魯語宣公夏濫于泗淵里革斷其罟而棄之曰魚方别孕不教魚長又行網罟貪無藝也言不時也孟子曰數罟不入汙池魚鱉不可勝食也言有制也潛之詩言漆沮眀得地也漆沮之從天子之所取獸於此取魚亦於此也是不傷稼而害物也是君舉有常而納民於軌物也言潛明得時也冬月水寒故魚性定而深潛是水蟲成也是取時物以薦新昭誠孝也言多魚明有制也是數罟不入而水族蕃滋也是物産盛而民得養也順天之時因地之利行王之制蕃庶物養民人而後致敬於神介以景福職是故也豈徒曰神嗜飲食已哉有來雍雍至止肅肅相維辟公天子穆穆於薦廣牡相豫肆祀假哉皇考綏子孝子宣哲維人文武維后燕及皇天克昌厥後綏我眉夀介以繁祉既右烈考亦右文母賦也廣牡大牲也肆陳假大綏安宣布哲眀燕安右享之也言今日者蒙皇考文王之業助祭者諸侯主祭者天子天子穆穆薦其大牲諸侯肅雍助其設饌大哉皇考其綏子孝子可知也昔者皇考宣布眀德於天下惟其能用人也既有文德又有武功惟其能為君也如是則天下之民安而天心亦安其克昌厥後可知也故今日者天果有以綏我矣既綏我以眉夀又介我以繁祀使我永為天子頻薦廣牡以祀烈考并祀文母也雍一章十六句雍武王祀文王徹饌之樂歌也來言雍雍者中心和悅非強之也至言肅肅者敬謹將事不敢怠也穆穆深逺天子之容也雍雍肅肅穆穆皆文王之貌而天子諸侯法之所謂秉文之德也薦廣牡而相肆祀合萬國之歡心以祀其先王也降福者天也天眷者民也治民者人也用人者君也君能允文允武以用人而安民則安及於天矣故天亦安其後人也然而嗣王之心則不以天子為榮而惟以孝子自勉并不以已之得夀為幸而惟願常伸其孝思於父母也文王之為父武王之為子可謂各盡其道矣載見辟王曰求厥章龍旗陽陽和鈴央央鞗革有鶬休有烈光率見昭考以孝以享以介眉夀永言保之思皇多祜烈文辟公綏以多福俾緝熙于純嘏賦也載始也辟王成王也章法度也交龍曰旗陽陽色眀也軾前曰和旗上曰鈴央央聲和也鞗革轡首有鶬金飾休美也昭考武王皇大綏安也成王既免喪諸侯咸來朝見新君以稟王章其車馬服物之盛美哉有烈光於朝廷矣王乃率之見於昭考武王之廟以展孝思以陳享獻以祈福而介夀典至巨也永言以下陳戒之辭也天下諸侯來朝來享是即時王之多祜宜永保之更思光大之也烈文辟公既來朝享王亦宜畀之以多福燕饗錫豫以綏其心使頻來朝覲繼續此烈光之休眀嵗時助祭常受此多福之純嘏也載見一章十四句載見諸侯來朝而見於武廟也成王既除喪乃朝諸侯率以祀武王受釐陳戒也諸侯載見稟一人之法度臣事君之禮也天子率見合萬國之歡心子事父之禮也諸侯載見之時即從孝享篤天子之多祜所以展忠也天子率見之後更思慶惠豫諸侯以多福所以廣愛也天子自謹王章乃可常受諸侯之朝享故欲其保之也諸侯常求厥章乃可永保天子之祿位故欲其緝之也古之君臣無一時不篤其忠愛無一事不深其戒勉有如此夫有客有客亦白其馬有萋有且敦琢其旅有客宿宿有客信信言授之縶以縶其馬薄言追之左右綏之既有淫威降福孔夷賦也客微子也作賔王家故曰客也重言有客鄭重之也殷尚白其後從之不止於冠裳皆白馬亦用白也萋且敦琢所獻之禮也何楷曰萋與緀通説文云緀白文貌蓋言帛也尚白故帛亦白也且説文云薦也所以薦帛也敦與雕通敦琢蓋言玉也旅陳也禮器曰束帛加璧尊德也有萋有且所謂束帛敦琢其旅所謂加璧是也再宿曰信宿宿信信留之久也言縶其馬固留之也追之送之也餞於道也未去而留之既去而送之左右無方以綏安之愛之無已也淫大也威罰也夷平也言紂與武庚天既大降之罰矣今微子能崇德象賢則天降之福而其威平矣故我亦順天意以綏之也有客一章十二句有客微子來朝將歸而賜于廟也祭統曰古者眀君爵有德而祿有功必賜于太廟示不敢専也爵命于廟饗賜亦于廟也微子萋且敦琢修其禮物所謂在彼無惡也天子信宿縶馬以固留之所謂在此無射也王者之心與天同體前者紂與武庚自作不善天降之威我亦威之今者微子崇德象賢天降之福我亦福之其左右綏之者皆所以順天之道而并非邀結其心也大矣哉於皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆定爾功賦也於歎詞皇大也遏止劉殺耆致也言大哉武王其功烈莫強於天下矣原其初實由文德之文王開之嗣王繼文之志是以其勝殷也期於除殘去殺以致定其功而已蓋武烈仍本於文謨也武一章七句詩序曰武奏大武也朱子曰周公象武王武功之舞歌此詩以奏之也何楷曰此大武一成之歌也姚舞牧曰一戎衣而天下定民免於水火之虐故知武王之用殺乃所以止殺其烈與文王等也李樗曰按禮記總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐以象周召之治言大武之舞始則持盾正立以待諸侯既而戰鬭既而又使行列皆坐以見其為止戈之武也大武之舞在於止戈大武之詩在於止殺其義一也臣工之什十篇十章一百六句周頌閔豫小子之什四之三閔子小子遭家不造嬛嬛在疚於乎皇考永世克孝念兹皇祖陟降庭止維豫小子夙夜敬止於乎皇王繼序思不忘賦也閔與愍通傷也豫小子成王自謂也造成也嬛與煢同無所依怙之意皇考武王也永世終身也皇祖文王也庭止在庭也皇王兼指文武也言傷豫小子遭家不造而居憂今雖免喪煢煢常在疚也每念皇考武王終身克盡孝道皇祖升遐常思念之如陟降於在庭豫小子念皇考猶皇考之念皇祖亦如見其陟降故夙夜之間不敢不敬也於乎皇祖文王皇考武王豫小子承兹大統當永思祖考之所行敢須臾忘之哉閔豫小子一章十一句詩序曰閔豫小子嗣王朝于廟也朱子曰此成王除喪朝廟所作後遂以為嗣王朝廟之樂是也除喪入廟其思父祖人之情也然思之而不效其所為猶不思也成王之夙夜敬止真能思矣穆穆文王於緝熙敬止武王之受丹書也曰敬勝怠者吉成王思之而夙夜懋敬則能守敬止敬勝之家法所以為繼序不忘也豈徒曰煢煢憂閔已哉黃櫄曰當成王之時王業已成而詩有栗然危懼之詞蓋治常生於戒慎亂常起於驕盈故天下雖有泰山之安而聖人猶以纍卵為心此其所以保治於無窮也大誥曰豫維小子若涉淵水又曰豫造天役遺大投艱於朕身此之謂也訪豫落止率時昭考於乎悠哉朕未有艾將豫就之繼猶判渙維豫小子未堪家多難紹庭上下陟降厥家休矣皇考以保眀其身賦也訪問落成悠逺艾至判分渙散也言問豫小子將何由有成乎惟有率循昭考之道耳昭考之道逺矣豫未能有至也進而勉以就之偶至之矣繼猶覺其判渙而不合也以豫之涼德遭家多難實不能堪昔者皇祖陟降庭止今皇考紹皇祖之神上下於庭因以陟降於家豫小子在廟在宫皆見之矣惟望皇考降休保豫之身使不罹於危難眀豫之身使不至於昏愚庶幾有所至而有所成也訪落一章十二句訪落成王祀武王也武廟初成致新主而祀之也胡一桂曰自繼猶判渙而上皇皇如有求而弗獲自維豫小子而下則焄蒿悽愴如或見之是也灼知大道之髙逺勉而難至密察一心之出入離而難合真覺祖考之神靈常在左右實求一身之保明期於繼述亦可以想見成王之用心矣敬之敬之天惟顯思命不易哉無曰髙髙在上陟降厥士日監在兹維豫小子不聰敬止日就月將學有緝熙于光明佛時仔肩示我顯德行賦也顯眀士事就近將進佛弼通仔肩任也言豫乃今知敬之不可已也天有顯道不可欺也駿命不易宜思所以保之也無曰天髙凡人之所事天皆陟降而觀之蓋無日不鑒在兹而可不敬乎昔皇祖文王緝熙敬止豫小子不明敬止之道期勉于緝熙而已日者豫率昭考曰將豫就之繼猶判渙今惟有效其所為日有所就無忘所能月有所將提撕吾心之光眀使繼續而不至於昏昧又望爾諸臣弼豫負荷示我以顯然之德使遵而行之庶知行並進而敬之之功乃純矣敬之一章十二句敬之成王自針也周公戒王曰皇自敬德召公戒王曰王其疾敬德今王自警曰敬之敬之是體驗有素而見天之不假易也敬非寂守之謂必有資於學焉今夫天之明命內麗於人心而外著於事物所謂至善止而不移者也學之者必致吾心之知眀於所止而默識之所謂緝熙於光眀也必勵吾身之行得其所止而固守之所謂顯德之行也知止而後敬純於心得止而後敬達於事故致知力行者主敬之實功也大學言敬止而繼以道學自修中庸言慎獨而歸於眀善誠身皆是道也然則成王之於學所得有深焉者矣敬之小毖皆戒勉之詞而列於頌者意成王平日常誦此以自警故後之祀成王者歌於其廟以妥神非通用之樂也豫其懲而毖後患莫豫荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難豫又集于蓼賦而比也懲有所傷而知戒也毖慎荓使也蜂小物而有毒肇始允信也桃蟲鷦鷯也拚飛貌蓼辛苦之物也言子自今其有所懲戒而知防後日之患矣蜂不可使而強使之是自求其辛螫以比使管叔監殷而致叛是自啓亂也桃蟲化為飛鳥向不知信今始信之矣以比武庚勝國之餘卵而翼之遂致為難是自招侮也若前車已覆而後車不鑒是既遭家之多難將又集于荼蓼豫不堪其辛苦是以日懲而思毖之也小毖一章八句小毖成王自戒也成王初信二叔而疑周公忽武庚而不為之防幾危王室今始悟而悔之歸誠於周公也毖而言小者毖之於小也既已辛螫悔之何及當於其荓蜂之時而謹之也拚飛成鳥則不可制當於其桃蟲之時而防之也黃佐曰天下之患常伏於隱微而發於人之所忽是故堅氷之至始於履霜可不慎哉載芟載柞其耕澤澤千耦其耘徂隰徂畛侯主侯伯侯亞侯旅侯強侯以有嗿其饁思媚其婦有依其士有略其耜俶載南畝播厥百穀實函斯活驛驛其達有厭其傑厭厭其苗綿綿其麃載穫濟濟有實其積萬億及秭為酒為醴蒸畀祖妣以洽百禮有飶其香邦家之光有椒其馨胡考之寧匪且有且匪今斯今振古如兹賦也芟除草也柞除木也澤澤土解散也耘鋤也芟柞之後草木根株有未盡者故鋤去之也隰溝也十夫有溝溝上有畛水道田畔皆當修整十夫所同故耦徂也朱子曰主家長也伯長子也亞仲叔也旅衆子弟也強民之有餘力而來助者遂人所謂以強豫任氓者也能左右之曰以太宰所謂間民轉移執事者若今時傭力之人隨主人所左右者也嗿衆食聲也媚順依愛士夫也言餉婦與耕夫相慰勞也略利俶始載事也函含活生也既種之後其實函氣而生也驛驛苗生貌達出土也厭受氣足也傑先長者是也厭厭苗皆滿足也綿綿詳密也麃耘也此苗既長大而去其苗間之草也濟濟衆也實穀實也積聚藏也萬億及秭四句見豐年飶説文云飯香也椒味辛烈范處義曰有飶言其饌也有椒言其酒也楚辭云桂酒椒漿是也胡夀也朱子曰以燕享賔客則邦家之所以光也以供養耆老則胡考之所以寧也且此也振起也言非獨此處有此稼穡之事非獨今時有此豐年之慶蓋自起古以來已如此矣猶言自古有年也載芟一章三十一句載芟臘祀也月令孟冬之月臘先祖五祀勞農以休息之是也春耕夏耘備言田家之苦秋穫冬藏極言田家之樂蓋王者之心與民一體其苦也不啻身受之其樂也不啻身享之故言之親切如此也至於亞旅強以以任萬民思媚有依以穀士女載穫以後以謹蓋藏以蒸祖妣以饗百神以供賔客以養耆老於慰勞休息之中有教養兼施之道焉是以普天皆蒙樂利萬年永享治安振古以來國家之事莫有大於此也畟畟良耜俶載南畝播厥百穀實函斯活或來瞻女載筐及筥其餉伊黍其笠伊糾其鎛斯趙以薅荼蓼荼蓼朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有救其角以似以續續古之人賦也畟畟利也或來贍女餉之也筐筥餉具也黍餉之美者糾笠輕舉貌趙刺土也薅去草也荼陸草蓼水草糾笠以薅餉畢而勤所事也草朽則苗疏而土肥故禾茂也挃挃衆穫聲栗栗顆粒圓也其秉之堆如墉之崇其穗相比如櫛之密積禾於場之象也禾茂故穫多也百室衆室也萬尚烈曰方春在田邑室皆閉收穫事畢則百室皆開以所積者入之是也積多則室盈而婦子之入此室處者身安而心亦安矣寧我婦子神貺莫大焉故用大牲以報之也黃牛黑脣曰犉社稷之牛角尺似效之也言此犉牡報祭之禮我先祖世行之矣今似而效之續而舉之者蓋以續古人之舊典庶幾不替其先而實未足以答神貺於萬一也良耜一章二十三句良耜報社也月令孟冬之月天子乃祈來年于天宗大割祠于公社是也殺是犉牡所謂大割也天子祭社而言農事者為農報也天子以天下為家故天下之婦子皆家人也播穀薅荼婦子之勞苦時切心憂今幸黍稷茂而百室盈則婦子寧而王心亦寧矣犉牡報祀豈容已哉蓋自后稷教稼以來子孫世以農事為重故似之續之如此也可謂知本務矣絲衣其紑載辨俅俅自堂徂基自羊徂牛鼐鼎及鼒兕觥其觩旨酒思柔不吳不敖胡考之休賦也絲衣爵辨士服也紑潔貌載戴也俅俅恭順也門側之堂謂之孰其下則基也鼐大鼎鼒小鼎也思柔者酒能和血所以柔老人之筋骨也吳譁休福也言絲衣載辨之士恭順執事自堂以至於基省其地以定位次也自羊以至於牛省其牲以定品味也自鼐以至於鼒省其器以告潔也然後以兕觥酌酒而養老焉又能致其敬謹無有喧譁怠傲者是以夀考之人得所養而受福也絲衣一章九句絲衣養老也周禮黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位是也孔穎達曰飲酒而正齒位者蓋為民三時務農行闕于禮故於農隙而教之養老尊長行孝弟之道是也蠟而臘臘而養老合觀豐年載芟絲衣三詩而先王之教養斯民者亦可以知其大略矣於鑠王師遵養時晦時純熙矣是用大介我龍受之蹻蹻王之造載用有嗣實維爾公允師賦也鑠盛遵循熙眀介甲龍寵也蹻蹻武貌造為也嗣嗣文王也爾謂武王也允信師衆也言盛哉我周之師原無敵於天下但以時尚未可故養而不用此蓋通伐崇以後而言待其天運已轉時當純熙乃用大兵以伐殷遂邀天之寵而受命所謂一戎衣而有天下也武功之成雖自武王而用此以嗣文王者蓋以武王大公之心能見信於衆人皆諒其伐暴救民而非富天下所謂身不失天下之顯名也酌一章八句酌大武再成之樂歌也國之興廢在於天命命之遲速在於天時當晦而遵養時止則止也當熙而大介時行則行也是故文王之不有天下與武王之有之皆所以奉若天時事異而心則同也綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以間之賦也綏安也桓桓武貌以用間代也言自克商以來萬邦乂安屢獲豐年可見天命之於周久而不倦也其所以如是者由桓桓之武王保文王所有之多士用之於四方能安定其國家其功德上昭于天故命為皇王使永代商而有天下也桓一章九句桓大武六成之樂歌也左傳楚子曰武王克商作武其卒章曰耆定爾功其三曰敷時繹思我徂維求定其六曰綏萬邦屢豐年夫武禁暴戢兵保大定功安民和衆豐財者也其言卒章者武之卒章也言其三其六者大武之三成六成也首言禁暴戢兵所謂勝殷遏劉也則武為一成可知也終言豐財所謂屢豐年也則桓為六成可知也取天下以武安天下以文文者用賢之謂也能保厥士以治四方則民安而天佑之萬邦屢豐有由然也時邁之詩曰我求懿德肆于時夏允王保之此之謂也文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思賦也勤勞也應當敷布時是也繹繼續之也徂往也於歎詞言文王之勤勞天下至矣我承其後受命而為天子應思所以繼其勤且布是繼續之思於天下不徒有其心兼有其政也蓋上天之命前人開之後人定之乃可以永保其受之我自今以往惟求所以定是周之命者則繼續文王之思不可一日而忘也賚一章六句賚大武三成之樂歌也承武酌而為言允文文王克開厥後所謂文王既勤止也我應受之與嗣武受之我龍受之同也既已受之則當定之所以定之者惟有繹思文王而已中庸曰夫孝者善繼人之志善述人之事者也繹之所以述其事思之所以繼其志繼志則承文之德述事則敷文之功再言繹思以為舍此無以為定命之道也此楚子所謂保大定功者也於皇時周陟其髙山嶞山喬嶽允猶翕河敷天之下裒時之對時周之命賦也皇大時是陟升也嶞山之相連者喬山之特起者允實也猶與由同翕合也敷普裒聚對向也言大哉周之有天下也嘗因名山升中于天陟其巔而望之見相連之小山特起之大嶽由於地中之大河合於大河之小水普天之下山峙水流諸侯之國於其間者莫不環共內向以對于天子此有周之受命所以為獨隆也般一章七句般大武四成之樂歌也史稱武王憂天保之未定謂周公曰我南望三塗北望嶽鄙顧瞻有河粵瞻伊雒毋逺天室營周居於洛邑此武王經營天下之志而周公成之故於廟中特及之也酌賚桓般名篇之義未詳樂記曰夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子武之遏劉耆定期望之詞也所謂始而北出也酌之是用大介已然之詞也所謂再成而滅商也賚之徂維求定南還於周以安民也所謂三成而南也般之嶽河裒對所謂南國是疆也五成之歌今無之矣桓則六成也美其德曰於昭于天尊其位曰皇以間之復綴以崇天子之詞也閔豫小子之什十一篇一百三十六句御纂詩義折中卷十九
