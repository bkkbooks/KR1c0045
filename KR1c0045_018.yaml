body:
  text: 蕩之什三之三蕩蕩上帝下民之辟疾威上帝其命多辟天生蒸民其命匪諶靡不有初鮮克有終賦也蕩蕩廣大貌辟君也疾威猶暴虐也多辟之辟法也蒸衆諶信也言蕩蕩上帝下民之君也今乃暴虐下民多罹於刑法有如帝命之者豈天生蒸民其命果難信哉天命之性本無不善故人之生也靡不有初而氣拘物蔽鮮克以善道終者是以天命亦罔克終如疾威而多僻也文王曰咨咨女殷商曽是強禦曾是掊克曾是在位曾是在服天降慆德女興是力比而賦也此設為文王之詞歎紂之不克終也強禦暴虐也掊克聚斂也服事慆慢興起也力用力也言文王當日曾咨嗟而謂紂曰強禦掊克人之所惡汝乃使之居官任事是天所降之慆德而汝用力以興之違天命而拂人性也文王曰咨咨女殷商而秉義類強禦多懟流言以對寇攘式內侯作侯祝靡屆靡究比而賦也而爾也懟怒攘奪也作讀為詛祝讀為咒詛咒怨謗也言汝興強禦有故也天命之性仁柔義剛爾稟義類不能全其天德之剛而流於血氣之勇是以亦強禦而善怒人畏其怒而流轉其言以對汝所謂詭隨也人詭隨以謾汝汝乃用之於內故能盜汝之權而奪民之財所謂寇虐也寇虐肆行則怨謗紛起莫知底止而亦不可究詰矣文王曰咨咨女殷商女炮烋于中國斂怨以為德不明爾德時無背無側爾德不眀以無陪無卿比而賦也炮烋武健貌背反側傾也陪二也王之二則三公也卿六卿也言汝興掊克有故也汝強禦而寇攘式內故汝之臣皆虐民而為汝斂財斂財是斂怨也汝乃以為才而用之是斂怨以為德也夫是非之心人皆有之所謂明德也爾以貪暴之習昏其本性是以小人斂怨雖反側已露而且謂無有君子布德雖堪為陪卿而終於不用也顔師古曰言不别善惡有逆背傾側者有堪為卿二者皆不知之也文王曰咨咨女殷商天不湎爾以酒不義從式既愆爾止靡明靡晦式號式呼俾晝作夜比而賦也湎沉也式用也言爾德不明多由於酒然非天湎爾以酒也因爾於不義之人從其言而用之故沉溺於此容止皆愆號呼無度而晝夜不分其鮮克有終者皆由於人非天為之也文王曰咨咨女殷商如蜩如螳如沸如羮小大近喪人尚乎由行內奰于中國覃及鬼方比而賦也蜩螳蟬屬沸水湧也如蜩如螳言之亂也謀夫孔多發言盈廷也如沸如羮政之亂也號令紛起如水之沸錯互無章如羮之雜也先王之法無小無大近皆喪失而舉國之人惟以率由遵行為尚莫敢違亦莫敢諫也奰本作多其目以視之也國語曰王得衛巫使監謗者道路以目是也鬼方蠻方也史稱厲王暴虐熊渠畏之去其王號是也文王曰咨咨女殷商匪上帝不時殷不用舊雖無老成人尚有典刑曽是莫聽大命以傾比而賦也老成人舊人也典刑舊法也言蜩螳沸羮時不善矣然非上帝為此不善之時也昔殷之盛時人與法俱善今皆不用乃政變非時變也然舊人雖無舊政尚在但人有以典型告者汝皆不聽是以大命將傾耳設一聽而用之未嘗不可轉亂為治也文王曰咨咨女殷商人亦有言顚沛之揭枝葉未有害本實先撥殷鑒不逺在夏后之世比而賦也顛沛仆也揭蹶起之貌撥絶也言大木將仆枝葉未害而本根先撥是以揭然而仆耳四方猶枝葉也民心則本根也夏商之末諸侯未叛桀紂暴虐以失民心自絶於天今周德若二代之季矣故言殷鑒不逺在於夏世則周鑒不逺在於殷世可知也無一語及於時事而能令聞之者惕然知戒亦可謂善於立言矣蕩八章章八句蕩召穆公諫厲王也厲王之行有似于紂故設為文王咨紂之詞非徒指危亡以示警其反覆於天人之際望王之改過易亂者一篇之中三致意焉今夫國何以亡其本仆也本何以仆失其民也民何以失用貪暴以斂怨也何以用貪暴其德不明也德何以不眀由湎於酒也然而天不湎爾以酒也靡不有初爾之明德自具也猶有典型匪上帝不時也但使戒爾沉湎以明爾德則掊克之斂怨強禦之寇攘皆能知之斥逺小人蠲除苛政得民心而培國本反覆手之間耳本實既固聽老成而用典型可次第舉也此召公所以惓惓望王之克終而非徒借成言以譏時政也抑抑威儀維德之隅人亦有言靡哲不愚庶人之愚亦職維疾哲人之愚亦維斯戾賦也抑抑謙下威儀禮文也隅廉角也德麗於威儀則矩矱方正如有廉角也但愚人不能知智者知之又以為不足謹則靡哲不愚矣夫衆人之愚氣質昏昧是其疾也哲人之愚則自暴而反其常矣無競維人四方其訓之有覺德行四國順之訏謨定命逺猶辰告敬慎威儀維民之則賦也競強覺明訏大謨猶皆謀也命號令也辰時則法也言所貴乎威儀者何也朝廷之上莫強於人有人而後四方訓之焉人之所以訓四方者以其德行著於威儀昭明有覺故四國順之也訓四方者以人誥四方者以言以天下之計長久之規為定命而辰告之其言善矣然空言無實民弗從也必敬慎威儀使所言者皆著於躬行斯民皆則而效之矣其在于今興迷亂于政顛覆厥德荒湛于酒女雖湛樂從弗念厥紹罔敷求先王克共明刑賦也興尚也女武公使人命已之詞也後凡言女言爾言小子者放此紹緒刑法也共敬守之也言古人之貴威儀如此至於今日迷於威儀而亂於政隳德之隅而荒湛於酒以此為尚所謂靡哲不愚也汝雖湛於酒而樂從所尚獨不念所承之統緒乎先王之成法甚明豈可不廣求而敬守之哉肆皇天弗尚如彼泉流無淪胥以亡夙興夜寐灑掃廷內維民之章修爾車馬弓矢戎兵用戒戎作用逖蠻方賦也章表率也作事逖逺也言人雖尚酒皇天弗尚汝無蹈其餘波如泉流之淪胥以亡也試思天壤之間內自庭除之近外及蠻方之逺細而寢興灑掃之常大而車馬戎兵之變皆宜敬慎威儀以為民則何處可容汝之荒湛哉質爾人民謹爾侯度用戒不虞慎爾出話敬爾威儀無不柔嘉白圭之玷尚可磨也斯言之玷不可為也賦也質成也侯度諸侯所守之法度也玷缺也言既不敢荒湛則必質爾之民人則必謹爾之侯度所以戒不虞也其質之謹之之道不外出話與威儀必敬慎威儀使無不柔嘉至於出話尤宜慎密白圭之缺尚可磨鑢言語一失則不可救矣論語曰南容三復白圭蓋謂此也無易由言無曰苟矣莫捫朕舌言不可逝矣無言不讐無德不報惠于朋友庶民小子子孫繩繩萬民靡不承賦也易輕捫持逝去讐答承奉也無易由言戒其心之輕視也無曰苟矣戒其口之輕發也雖莫捫其舌而亦不可逝則所以謹言者至矣既能慎爾出話更宜敬爾威儀蓋天下之理無有言而不讐無有德而不報故必無不柔嘉以順於朋友并及於庶民小子則侯度愈謹而子孫繩繩不墜厥紹亦人民愈和皆奉以為則而承之矣視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧于屋漏無曰不顯莫豫云覯神之格思不可度思矧可射思賦也輯和遐何愆過也屋漏室中明處也覯見格至度測矧况射斁通厭也言人之修德顯微一致皆不可愆於威儀當其見人之時固宜和柔爾顔勿令有愆即在暗室之中亦不可愧于屋漏無曰隱微人不見也鬼神之德充滿天地焉知屋漏之中鬼神不至不顯亦臨猶懼有失况可厭斁而不敬乎劉瑾曰不遐有愆者省察之功慎獨之事也不愧屋漏者存飬之功戒懼之事也辟爾為德俾臧俾嘉淑慎爾止不愆于儀不僭不賊鮮不為則投我以桃報之以李彼童而角實虹小子賦而比也辟正也止容止也僭差賊害則法也無角曰童虹與訌同幻惑也言將正爾之德使盡善而盡美則必動靜之間淑慎容止不愆於威儀慎而不僭淑而不賊斯為民之則矣投桃報李無德不報也若謂無威儀而民則之則是以童為角惑小子耳無此理也荏染柔木言緡之絲溫溫恭人維德之基其維哲人告之話言順德之行其維愚人覆謂我僭民各有心興也荏染柔忍貌緡綸也言荏染之柔木乃可以受綸以興溫溫之恭人乃可以成德也溫溫和也恭敬也敬而且和所謂抑抑也德基猶德隅也隅方則基正也然則抑抑威儀實出身加民之要乃哲人聽而行之愚人聞而不信夫其不信必自以為智而不知不受善言乃真愚也故曰民各有心外之也於乎小子未知臧否匪手攜之言示之事匪面命之言提其耳借曰未知亦既抱子民之靡盈誰夙知而莫成賦也自此以下反覆警愚人也朱子曰非徒手攜之也而又示以事非徒面命之也而又提其耳所以喻之者詳且切矣假令汝未有知識既長大而抱子亦宜有知矣人若不自滿盈能受教戒豈有早知而反晚成者乎唐汝諤曰哲人惟不自滿故能進德今告以臧否而不知者非由於知識之未開正以滿假之為纍也昊天孔昭我生靡樂視爾夢夢我心慘慘誨爾諄諄聽我藐藐匪用為教覆用為虐借曰未知亦聿既耄賦也夢夢昏也慘慘憂貌諄諄詳熟也藐藐忽略貌虐害也言不以我為教之使明反以為虐之使苦也九十曰耄國語曰昔衛武公年九十五矣猶針警於國曰自卿以下至於師長士苟在朝者無謂我老耄而舍我必恭恪於朝夕以交戒我此之謂也於乎小子告爾舊止聽用我謀庶無大悔天方艱難曰喪厥國取譬不逺昊天不忒回遹其德俾民大棘賦也舊舊章也止語詞忒差遹僻棘急也此總承上文言我之所告修辭修德宜慎威儀者皆先王之明刑乃舊章非私言也汝能聽而用之用戒不虞庶無大悔否則淪胥以亡耳天運艱難既喪厥國矣蓋謂幽王之事也前鑒不逺天命不僭若愆於威儀而回遹其德以迷亂於政則民困急而國亦危矣豈可聽之藐藐也哉抑十二章三章章八句九章章十句抑衛武公自警也賔之初筵悔自亂於威儀故抑之作於威儀三致意焉且夫威儀者聲音笑貌云乎哉威儀之著莫大於言行行而合乎禮所以為德之隅也言而體諸躬所以為民之則也威儀之美莫大於敬與和克共明刑無易由言敬也屋漏之中亦凛鬼神則敬之至矣輯柔爾顔溫溫恭人和也惠於朋友庶民小子則和之至矣本和敬以美威儀此詩之大旨也淇澳之美武公也瑟兮僴兮者敬也寬兮綽兮者和也大學引之曰赫兮喧兮者威儀也以為此明德之至善也中庸之傳道也戒懼致中敬也發而中節和也而推之至於禮儀三百威儀三千以為此修德凝道之大端也武公其知之矣謂之睿聖不亦宜乎菀彼桑柔其下侯旬捋采其劉瘼此下民不殄心憂倉兄填兮倬彼昊天寧不我矜比也菀茂旬遍也逐葉摘取曰采循條彚取曰捋連條伐取曰劉瘼病殄絶也倉兄與愴恍同填塞也倬明貌矜憐也蘇轍曰桑之為物其葉最盛然及其采之也一朝而盡故詩人取以為比言周之盛也如柔桑之茂其隂無所不遍至於厲王肆行暴虐則王室忽焉凋敝如桑之既采民失其隂而受其病故君子憂之不絶於心悲憤填胸呼天而訴之也四牡騤騤旟旐有翩亂生不夷靡國不泯民靡有黎具禍以燼於乎有哀國步斯頻賦也騤騤不息貌翩飛揚也朱子曰厲王之時征役不息故民見其車馬旌旗而厭苦之是也夷平泯滅也黑髮曰黎火餘曰燼步運頻蹙也天下之亂生於王心厲王好兵故亂生不平列國無不被害丁壯盡行俱有死亡之禍其幸存者亦鋒鏑之餘耳民生既困則國運日蹙是可哀也國步蔑資天不我將靡所止疑云徂何往君子實維秉心無競誰生厲階至今為梗賦也蔑無資賴將佑也疑與嶷同定也君子謂厲王也無競莫強也厲階禍始也梗患也言民力已殫國無所賴而天心不佑欲居則無所定欲行則無所往其危甚矣原厲王之秉心不過欲莫強於天下耳非欲虐民以危國也其専利監謗以為禍始者誰實為之而使至今為患乎則不得不追咎榮夷公衛巫之屬矣憂心殷殷念我土宇我生不辰逢天僤怒自西徂東靡所定處多我覯痻孔棘我圉賦也土宇疆域也辰時僤厚覯見痻病棘急圉邊也念我土宇者王室亂則天下可憂也逢天僤怒者民叛王奔是天怒已甚也鎬京在西中原在東靡所定處者京師及侯國皆亂也孔棘我圉者中國既病四夷交侵也為謀為毖亂况斯削告爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺賦而比也慮難曰謀防患曰毖况象削減也憂恤撫民也序爵用賢也執熱手持熱物也言天子已出四國皆叛時事如此惟望共和之二相能謀能毖而後亂况可減也謀毖之道惟有憂恤百姓惟有序用賢人此救亂之急務如濯水以解熱也不然則何由能善哉有相與陷溺而已如彼遡風亦孔之僾民有肅心荓云不逮好是稼穯力民代食稼穯維寶代食維好賦也遡鄉僾唈肅進荓並也言當此時而仕進如鄉風而行其唈必甚故民雖有欲進之心而並云力不能逮皆稼穯以代祿而已以為惟此可以資生是寶也且可因以免禍故好也君子皆不欲仕則雖欲序爵而無由矣天降喪亂滅我立王降此蟊賊稼穯卒癢哀恫中國具贅卒荒靡有旅力以念穹蒼賦也恫痛贅綴也春秋傳曰君若綴旒然是也旅與膂同穹蒼天也言民叛王奔是天降喪亂既滅我立王矣今又降此蟊賊而病我稼穯是喪亂之後又有飢饉也哀痛中國其君俱危其野盡荒則雖欲憂恤而無從矣憂恤序爵兩無所施則我之謀毖亦窮靡有心力以憂天矣是不得不専望共和之二相也維此惠君民人所瞻秉心宣猶考愼其相維彼不順自獨俾臧自有肺腸俾民卒狂賦也惠順考成也言二相行政上不叛王而下撫其民是乃順理之君民人所瞻望者也凡我朋友皆當秉二公之心宣布其謀猷以愼成其相業乃所以忠於王也而又有不順之人不與二相同心獨出意見自以為臧則是别有肺腸而且能惑民使至於狂也史稱厲王奔彘太子匿召公之家國人圍之召公以其子代之是不順自獨而俾民卒狂者實有其人故下以朋友之義反覆開導之也瞻彼中林甡甡其鹿朋友已譖不胥以穀人亦有言進退維谷興也甡甡並行之貌譖謗也胥相穀善谷窮也言中林之鹿尚然並行朋友相譖不能相善曽鹿之不如也被譖而退者固憂得禍譖人而進者亦豈能得福乎人亦有言進退維谷此之謂也維此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌賦也言禍福倚伏不可預知夫惟聖人所見者逺其言亦逺雖百里之外如目前也若愚人不顧其後遂至敢於為狂且以狂為喜也我既知之且能言之何為畏忌而不盡言哉維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒賦也迪從也復重也言從二相而不叛王者皆良人也叛王而圍太子者皆忍人也爾於良人則弗求而從之於忍心之人乃顧而復之是民已好亂而爾又倡之寧以其身為荼毒斯民之具也果何為哉大風有隧有空大谷維此良人作為式穀維彼不順征以中垢興也隧道式用穀善也征行也中垢中心汙穢也言風行有道多從空谷而來人行亦有道皆從中心而出彼順二相之良人由於中心之純善若不順而自獨且俾民狂者皆由於中心之汙穢欲因亂以取利也故下直以貪人目之大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖興也以風之有隧興人之有類也言貪人好利則必自敗爾與同之亦必同敗是貪人不可與為類明矣乃爾聽我之言亦隨口對答再誦言而使爾行之則如醉而不醒所謂從而不改也爾既不用良言則我之言亦多事矣是爾悖而使我亦悖也嗟爾朋友豫豈不知而作如彼飛蟲時亦弋獲既之隂女反豫來赫賦也隂與蔭同庇覆之也赫恐也言爾雖如此我終以爾為友也嗟爾朋友豫豈不知而妄作如弋飛鳥時亦獲之朱子曰謂我之言或亦有中猶曰千慮而一得是也我既確有所見乃往告汝欲汝轉禍為福是庇蔭汝也汝乃不從而反謂豫來恐動則不諒豫之心矣民之罔極職涼善背為民不利如云不克民之回遹職競用力賦也罔極無定職専也涼薄背反覆也回遹邪僻也言民心罔極爾又専為涼薄而工為反覆是與為罔極也導民以叛是不利也爾乃為之而惟恐不勝民多邪僻爾乃専與之爭而用力以勝之是導民以惡而貽民以禍也民之未戾職盜為寇涼曰不可覆背善詈雖曰匪豫既作爾歌賦也戾定也隂取曰盜明奪曰寇言民生未定爾乃隂取其財而又明奪之是由盜以至於寇也為不利競用力為盜寇皆所謂涼也我曰涼不可也爾亦曰涼不可也不旋踵而背之且從而詈我則所謂職涼善背也爾雖自文曰背而詈者非豫也然我則既指爾而作歌矣是豈可不深愧而速改也哉桑柔十六章八章章八句八章章六句桑柔芮良夫所作也左傳秦穆公云周芮良夫之詩曰大風有隧貪人敗類是也厲王天姿英武本足與有為特以用人不審長父導之以好兵榮公導之以好利至於衛巫監謗而民不堪命矣禍機一發天王蒙塵儲君匿迹諸侯皆叛四夷交侵非周公召公竭其忠貞調和共濟豈復有周室哉然二公虛天位以待王而人不諒也召公舍其子以靖亂而人不知也故當時士大夫或有不附二公而隂與為難者所賴良夫之徒辨明順逆彌其讒慝而消其反側於是乎共和之功成而宣王之中興亦基於此矣國以人亡亦以人存用人可不慎哉倬彼雲漢昭回于天王曰於乎何辜今之人天降喪亂飢饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽賦也雲漢天河也昭光回轉也雲漢昭則天晴不雨可知也雲漢回則夜深望雨可知也何辜今之人非怨天也欲知其罪而修省之也薦荐通重也臻至也靡神不舉所謂索鬼神而祭之也圭璧禮神之玉也卒盡也憂雨已切禱雨已勤則上天亦宜我聽矣望之也旱既大甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗斁下土寧丁我躬賦也藴畜隆盛也蟲蟲熱氣也殄絶也郊祀天地也宫祭宗廟也奠以禮神于上瘞以禮神于下也宗尊克能也丁當也言后稷欲救旱而不能上帝能救旱而不至與其災下土之小民毋寧使災當我身也不愛其身以救民仁之至也旱既大甚則不可推兢兢業業如霆如雷周餘黎民靡有孑遺昊天上帝則不我遺胡不相畏先祖于摧賦也推去也兢兢恐也業業危也如霆如雷畏之甚也孑孤特貌遺留也則不我遺言不止黎民靡遺并我亦不遺矣如是則豈可不相畏乎恐先祖之祀亦將自此而摧滅也旱既大甚則不可沮赫赫炎炎云我無所大命近止靡瞻靡顧羣公先正則不我助父母先祖胡寧忍豫賦也沮止也赫赫旱氣也炎炎熱氣也無所無地以自容也大命衆命也近止鄰于死亡也靡瞻靡顧無所仰望也羣公先正雩祀所及也言羣公先正於我尚疏或不我助父母先祖則至親也何忍使我至於此極乎旱既大甚滌滌山川旱魃為虐如惔如焚我心憚暑憂心如熏羣公先正則不我聞昊天上帝寧俾我遁賦也滌滌濯貌山無木川無水如滌濯也魃旱鬼也惔焦熏灼遁逃也言羣公先正神有來去或不我聞上帝則日鑒在兹也而降災如是豈我有失德將使避位而去乎無所歸咎而自怨也旱既大甚黽勉畏去胡寧癲我以旱憯不知其故祈年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒賦也去遁也蘇轍曰始以旱故欲遁去繼又以棄位非人主之義故黽勉以求濟斯難不敢去也癲病憯曾莫暮虞度也言農之始耕已祈榖于上帝稼之方納預祈年于天宗亦孔夙矣春祭方社秋又報之實不莫也敬恭神明如此宜無有悔怒之者乃上帝不度我心而病我以旱曽不知其故也嚴粲曰水旱之災必有以致之但痛我不知其故耳若知其故則當速改之矣旱既大甚散無友紀鞫哉庶正疚哉冡宰趣馬師氏膳夫左右靡人不周無不能止瞻卬昊天云如何里賦也友當作有紀數也鞫窮疚病也庶正衆官之長冡宰衆長之長也趣馬師氏膳夫見十月之交左右侍御僕從之人也周救能耐也止語詞卬與仰同里與理同辦理之也言散倉廪以賑濟其數亦無有紀極矣不止公帑凡有祿者皆勸施焉庶正冡宰以賙恤之故而至於窮病趣馬師氏膳夫以及左右無人不周濟亦無不耐心為之不敢有厭倦也君臣同心竭力賑恤瞻仰昊天不知更當如何辦理也瞻卬昊天有嘒其星大夫君子昭假無贏大命近止無棄爾成何求為我以戾庶正瞻卬昊天曷惠其寧賦也嘒明貌假至贏餘也成勞正政也有嘒其星則未有雨徵也羣臣竭其精誠助王以昭假于天者已無餘矣然尚願勉之也前既靡人不周今當大命將近之期不可棄爾成勞也非求為我之一身國家庶政皆賴以定不可不益求所以昭假之也故仰天而訴之曰何時而惠我以安寧乎望雨之至也雲漢八章章十句雲漢宣王憂旱也厲王之末頻年大旱宣王繼立遇災而懼側身修行欲消去之故作是詩也詳繹詩言有事天之敬有事神之誠有恤民之仁有恐懼修省之實心有發粟勸施之實政蓋消彌補救之道皆具不止縷述其憂憫已也嵩髙維嶽駿極于天維嶽降神生甫及申維申及甫維周之翰四國于蕃四方于宣賦也嵩竦也嶽周禮所謂嶽山雍州之鎮也駿峻也甫仲山甫也何楷曰謂申伯與仲山甫德位相同所以重申伯是也蕃與藩同蔽也宣布也言竦然而高者嶽山也應國家將興之運而降其神靈生甫及申使為王室之羽翼以藩屏四國而布其德澤于天下蓋天生聖君必生賢佐理固然也亹亹申伯王纘之事于邑于謝南國是式王命召伯定申伯之宅登是南邦世執其功賦也亹亹猶娓娓恭順也纘繼也于往式法登進也申本侯爵而言伯者命為方伯也范處義曰申侯佐王有功故王繼授之事改大其邑俾邑于謝以為南國之式則方伯連帥之任也又命召虎往定申伯之宅大其城郭宮室以進于南方諸侯之上使子孫世世常守其藩宣之功也王命申伯式是南邦因是謝人以作爾庸王命召伯徹申伯土田王命傅御遷其私人賦也作起也庸功也徹徹法也傅御申伯之家臣也私人謂從行者也言謝宅既定王乃命申伯使式是南邦前言南國是式者明王之意也此言式是南邦者明申伯之職也所以邑于謝者使因謝人以起其功蓋據大城撫大衆而後可以鎮服諸侯也又命召伯使徹其土田正經界定賦稅也又命傅御使遷其私人給資糧授田宅也土田徹而國制定私人遷而家道成王之所以待申伯者至厚矣申伯之功召伯是營有俶其城寢廟既成既成藐藐王錫申伯四牡蹻蹻鈎膺濯濯賦也俶完善也藐藐深貌蹻蹻壯健濯濯光明也此總承上文言申伯之功宜以建國召伯營之得其時制也謝城築而完善寢廟成而髙深召公既竣事而告王也王錫申伯將遣之也賜以四牡之壯馬又賜以馬首之金鈎馬膺之樊纓也王遣申伯路車乘馬我圖爾居莫如南土錫爾介圭以作爾寶往近王舅南土是保賦也遣使之國也圖謀也謀爾居而莫如南土者擇重地以展全才也介與玠通爾雅云圭大尺二寸謂之玠圭何楷曰介圭天子之鎮圭王命申伯鎮撫南國故使執介圭以往如天子之自行是也呼王舅而告之曰汝往近矣其所以命汝往者則以南土與荆徐為鄰欲汝安內攘外永保無虞不止南國是式已矣申伯信邁王餞于郿申伯還南謝于誠歸王命召伯徹申伯土疆以峙其粻式遄其行賦也信果邁行也申伯戀王不欲遽往至是始果行也郿地名餞送行也言還南者申伯之國在南也謝于誠歸者今始誠歸于謝也峙積粻糧遄速也言王命召伯徹土田之時己取什一之稅而預峙其粻倉庾有儲蓄廬市有委積用以速申伯之行也申伯番番既入于謝徒御嘽嘽周邦咸喜戎有良翰不顯申伯王之元舅文武是憲賦也番番老而壯也嘽嘽衆盛貌鄭康成曰周遍也戎猶汝也翰幹也申伯入謝遍邦內咸喜曰汝乎有善君矣是也又言申伯之聲名豈不顯乎是王之元舅而允文允武可以為百僚之法則者也其為良翰必矣元舅者后父也頌其文武而兼言元舅者固以見申伯地處親賢威望素著抑以見宣王之封申伯實以其才堪勝任非徒加恩於外戚也申伯之德柔惠且直揉此萬邦聞于四國吉甫作誦其詩孔碩其風肆好以贈申伯賦也以手搏物曰揉誦詩成而工師誦之也碩大風聲肆長贈送也言申伯所以有文武之才者本于其德也柔溫也寬也溫以撫之寬以教之也惠順也上順天理下順人心也柔惠者恐其無斷申伯則又能直焉是非明而賞罰公也如是則強者治以剛弱者綏以柔萬邦雖廣協而馴之如手揉之矣懷其惠者頌其仁畏其直者頌其義聲名洋溢乎中國施及蠻貊矣蓋欲申伯懷逺以德而不徒威之以兵義之所關甚大而詞甚美所謂君子贈人以言也嵩髙八章章八句嵩髙尹吉甫贈申伯也宣王中興北伐玁狁西伐西戎南伐淮荆王又自將而伐徐知南方之難靖也故相其形勢而益封申伯以謝邑所以扼荆徐之吭也北城朔方南城謝可謂識深慮逺矣吉甫前伐玁狁知北方之患已除所可慮者南邦耳馭之以術則虞詐愈生威之以兵則叛服不常此非覃敷文德威惠並著無以服其心也故詩于此三致意焉疊言王命王錫王遣王餞欲其上報天子恩也又言周邦咸喜欲其下慰萬民之望也南國是式南土是保告以安攘之大計所謂其詩孔碩也文武是憲柔惠且直告以懷逺之良圖所謂其風肆好也天生蒸民有物有則民之秉彝好是懿德天監有周昭假于下保兹天子生仲山甫賦也蒸衆則法秉執彞常懿美監視昭明假至保祐也仲山甫樊侯之字也言天生衆民有形下之器必有形上之理民之生也即秉此理以為性故性無不善而見人之有善德者必好之矣孔子曰為此詩者其知道乎故有物必有則民之秉彝也故好是懿德凡民皆然而况天監有周因天子之明聖特生仲山甫以保之則其懿德更超於蒸民而天子之好之亦必異於常人矣仲山甫之德柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦賦也古訓先王之典也若順命令賦布也此言仲山甫之懿德也山甫人臣也臣道主柔是其則也然恐其柔之過而弱也故必嘉嘉者禮也柔而能立於禮斯合於則矣令儀令色柔於外也小心翼翼柔於內也古訓是式法古之禮也威儀是力行今之禮也柔嘉如是是謂懿德故天子好之使之布令於四方也天以其理錫之蒸民則為明命性之所以善也君以其言布之天下亦為明命道之所以行也王命仲山甫式是百辟纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發賦也式法也式是百辟者位冢宰正百官也纘繼戎汝也祖考謂周公與獻公也權德輿曰魯獻公仲子曰山甫入輔於周食采於樊是也保即首章所謂保兹天子也出承而布之也納行而復之也喉舌所以言也發起而應之也式百辟以保王躬司喉舌以賦政事皆王命之詞所以任之者甚重則好是懿德可知矣肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪解以事一人賦也肅肅嚴也將奉行也若順也否不順也言王之所命邦國或順或否皆能明之順者奬勸之否者戒飭之也明謂明於理哲謂察於事朱子曰保身者順理以守身非趨利避害偷以全軀是也肅肅王命奉而行之所謂賦政於外也邦國順否皆能明之是以四方爰發也天下未有不保已而能保人者明哲保身乃所以保王躬也天下未有不事上而能使下者夙夜匪解乃所以式百辟也仲山甫之懿德如此亦可以常為王之所好矣人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜寡不畏強禦賦也此下二章言仲山甫之不宜徂齊也民之秉彞原無不善而氣質不齊故有剛柔又有善惡其剛惡者所謂強禦也故世俗有言人之待人有如食物柔則茹之剛則吐之維仲山甫不然夫仲山甫所謂柔嘉者也惟柔故柔亦不茹柔而能嘉故剛亦不吐不茹柔則不侮矜寡矣不吐剛則不畏強禦矣此柔嘉之所以合於則也人亦有言德輶如毛民鮮克舉之我儀圖之維仲山甫舉之愛莫助之衮職有闕惟仲山甫補之賦也輶細也儀度圖思也衮職王之職也言秉彞之德其端甚微而其幾甚細非明健兼至不能擇而執也故人亦有言德之微細有如毫髮民鮮能舉之我思度之維仲山甫察之明而守之固故獨舉之我雖愛之莫能助也察之明故衮職有闕人不能知而仲山甫知之守之固故人以為不必補而仲山甫必補之也補衮如是則宜朝夕納誨而不可出於外也明矣仲山甫出祖四牡業業征夫捷捷每懷靡及四牡彭彭八鸞鏘鏘王命仲山甫城彼東方賦也祖行祭也業業健貌捷捷疾貌東方齊也言今日者仲山甫忽出祖矣業業捷捷每懷靡及仲山甫之忠也不敢不盡心也然而王命仲山甫則城彼東方也城朔方為玁狁城南方為荆徐城東方者何為乎是無大故而出重臣於外也四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸吉甫作誦穆如清風仲山甫永懷以慰其心賦也式用遄速也式遄其歸不欲其久於外也穆淡逺也言仲山甫之所以當遄歸者其故不能盡言不過微發其端如清風之穆然而已耳蓋以仲山甫者天生之以保天子王命之以保王躬一旦去君逺行自不能無永長之思而我作詩以慰之者以秉彞懿好原有同然但使不懈其柔嘉之則曲盡其補衮之才則懿德彌邵而王自好之不必以徂齊介意也蒸民八章章八句蒸民尹吉甫諷宣王也宣王初年吉甫伐玁狁南仲城朔方方叔伐荆蠻召虎伐淮徐兼城謝赫然勵精矣後怠於政而勤逺略城彼東方非事也觀其欲立魯戲也仲山甫諫之而王不聽也及其料民太原也仲山甫又諫之而又不聽也一旦輟其補衮之職而使之徂齊吉甫能不惓惓哉衮職有闕式遄其歸情見乎詞矣至其物則秉彝指性命之實古訓威儀兼知行之要剛柔不偏得克治之道德輶克舉盡擇執之功其於學問醇乎其醇山甫固深逺矣吉甫之善言德行抑豈可及哉奕奕梁山維禹甸之有倬其道韓侯受命王親命之纘戎祖考無廢朕命夙夜匪解虔共爾位朕命不易幹不庭方以佐戎辟賦也奕奕大也梁山在涿郡水經注云濕水徑良鄉北界歷梁山是也甸治也毛傳云禹治梁山除水災是也有又也倬明也言禹之功大矣今又將修明其道故命韓侯為方伯也王親命之重其事也纘繼也戎汝也韓侯之祖考有曽為方伯者故命纘之也解懈虔敬共恭也朕命不易言朕之寵命亦不易得戒之也幹正之也不庭方者不來庭之國也韓城近燕北方之國不來庭者甚多故欲其幹而正之以佐汝君此命為侯伯之詞也四牡奕奕孔修且張韓侯入覲以其介圭入覲于王王錫韓侯淑旗綏章簟茀錯衡玄袞赤舄鉤膺鏤鍚鞹鞃淺幭鞗革金厄賦也修長張大也介圭天子之鎮圭命為方伯者錫之嵩髙之詩曰錫爾介圭是也諸侯秋見於王曰覲淑通作倏青色也何楷曰大旗以封同姓其色青故曰倏旗也綏章注鳥羽或旄尾於竿首也簟茀錯衡見采芑鏤刻金也錫當盧也鞹革也鞃式中也兩較之間橫木可憑者以鞹持之也淺虎皮也幭覆式也以虎皮覆於式上也鞗革轡首金厄以金為環也此詳序其入覲錫豫之禮也韓侯出祖出宿于屠顯父餞之清酒百壺其殽維何炮鱉鮮魚其蔌維何維筍及蒲其贈維何乘馬路車籩豆有且侯氏燕胥賦也祖祭行神也仲山甫出祖始行也韓侯出祖返國也鄭康成曰尊其所往去如始行是也屠地名顯父王之卿士也謝枋得曰申伯之行王親餞之韓侯之行王使顯父餞之禮有等差是也路車乘馬王所贈也采菽之詩曰雖無豫之路車乘馬是也且多也胥相也言韓侯與顯父相樂榮君寵也此詳序其餞贈燕飲之禮也韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門賦也汾王厲王也厲王流於彘在汾水之上故名汾王也蹶父周之卿士也韓侯迎止行親迎之禮也蹶之里蹶父之采邑也諸侯娶夫人迎送皆以百兩鵲巢之詩曰百兩迎之是也諸娣從之者諸侯一娶九女二國媵之皆有娣姪也祁祁徐而靚也如雲麗且多也此詳序韓侯親迎之禮也蹶父孔武靡國不到為韓姞相攸莫如韓樂孔樂韓土川澤訏訏魴鱮甫甫麀鹿噳噳有熊有羆有貓有虎慶既令居韓姞燕譽賦也韓姞者蹶父姞姓其女歸韓故曰韓姞也左傳曰姬姞偶其子孫必蕃是也相攸擇可嫁之所也訏訏甫甫大也川澤魴鱮言水産也麀鹿熊羆貓虎言陸産也慶喜令善燕安譽樂也韓侯顧之爛其盈門樂娶於姞也慶既令居韓姞燕譽樂歸於韓也夫婦相樂內和而家理立國之本也溥彼韓城燕師所完以先祖受命因時百蠻王錫韓侯其追其貊奄受北國因以其伯實墉實壑實畝實籍獻其貔皮赤豹黃羆賦也溥大也韓城在涿郡王肅曰聖水出方城縣北東南徑韓城即詩所云溥彼韓城燕師所完者是也以先祖受命者韓侯之先祖曽受命為伯以撫百蠻也追貊北狄之國也王錫韓侯以追貊使統受北方之國因以繼其先祖而為伯所謂纘戎祖考幹不庭方也墉城也壑所以畜水也實墉實壑修城垣通水道也籍與藉通孟子曰助者藉也實畝實籍正井疆定田制也貔白狐也赤豹黃羆皮之色也言韓侯能修城垣通水利定田賦而貢其所有於王所謂夙夜匪懈虔共爾位也韓奕六章章十二句韓奕韓侯受命為伯也王者錫命侯伯非徒寵榮之蓋實有其職焉觀其錫命之詞訓之以纘祖考共爾位幹不庭而韓侯果能受北國勤民事修職貢則聖主賢臣經營天下之規模可想見矣至於敘錫豫及於鈎鍚幭厄所以昭恩且明禮也言餞燕及於魚鱉筍蒲所以數典且示儉也言樂土詳其魚鹿熊虎固以章物産抑以見佃漁之利可佐民之衣食也敘職貢指其羆豹貔皮固以明忠敬抑以見貢獻方物各呈其土之所有也至於首言梁山禹甸而中及於韓侯之娶妻有以也自古勤民事者莫如禹而善齊家者莫如文王則壤成賦固歷代所不易而刑于寡妻則有周世守之家法也韓侯之墉壑畝籍盡水土之功固以纘禹之服而親迎燕譽有關雎之風實以秉文之德也雖直敘其事而其道有大焉者矣孔子贊易曰其旨逺其辭文韓奕有焉江漢浮浮武夫滔滔匪安匪遊淮夷來求既出我車既設我旟匪安匪舒淮夷來鋪賦也江漢二水名並舉之者漢至夏口合於江也征淮夷而言江漢者是時蠻荆已服江漢道通故徵南國之師使順流而下繞出淮夷之後以絶其去路也浮浮汜也滔滔遊也兵沿江行如水之逰也匪安不遑處也匪遊不遑息也求責也聲其罪而責之也舒緩也鋪陳也出車設旟而不敢緩者既至其地將鋪設以陳兵也方叔之伐荆蠻也亦曰陳師鞠旅蓋王者之師有征無戰楊天威以臨之懼而服焉斯已矣江漢湯湯武夫洸洸經營四方告成于王四方既平王國庶定時靡有爭王心載寧賦也湯湯流而安也洸洸勝而威也見淮夷之已服也四方淮夷之四旁也淮夷既平又經營其四旁之國使皆向化而後可告成功也所以然者江漢之間其國甚多淮夷倡亂必皆觀望故四方既平斯王國庶定天下皆無爭鬭而後王心始寧也蓋兵者不得已而用之必不用而乃寧故王者以天下之心為心大臣又以王者之心為心也江漢之滸王命召虎式辟四方徹我疆土匪疚匪棘王國來極于疆于理至于南海賦也滸水崖也虎召穆公名也辟與闢同疚病棘急極中也書曰淮海惟揚州自淮至於南海中界大江凡徐揚之域皆江漢之滸也人繁而地廣故王命召虎乘此兵威以次開闢所闢疆土皆行徹法無重斂以病民無苛急以滋擾平其政令來取中於王國所以除四國之暴而柔新服之民也于往也往而疆之正其經界往而理之通其溝塗經之營之至於南海則普天之下皆遵王制矣朱善曰封建井田政之大綱故江漢既平闢四方之侵地所以復封建也徹四方之疆土所以復井田也王命召虎來旬來宣文武受命召公維翰無曰豫小子召公是似肇敏戎公用錫爾祉賦也旬與徇同撫徇之也宣布也召公康公奭也豫小子王自稱也肇開戎汝公功也至於南海則可以止矣故王命召虎來也來而撫旬吾之人民來而宣布吾之德意也昔文王武王受命之時維召公奭是為良翰日闢國百里亦在江漢之滸也無曰豫小子敢比德於文武而汝之功則召公是似矣汝能開敏爾功我將錫爾祉福如下章所云也釐爾圭瓚秬鬯一卣告于文人錫山土田于周受命自召祖命虎拜稽首天子萬年賦也釐賜也秬鬯以秬黍為鬱鬯也卣尊也文人謂文王也書曰追孝於前文人是也錫山土田者諸侯有功則益封以地魯頌曰錫之山川土田附庸是也周岐周也召祖穆公之祖康公也言錫爾玉瓉秬鬯一尊爾往岐周告於文王之廟言我錫爾以山川土田用賞爾功爾從岐周受命於祖廟亦如爾祖康公受命於文王也自此以上皆命詞虎拜稽首拜命也天子萬年拜而祝之也謝枋得曰錫山土田必受命於岐周者明賞非宣王之賞如稟命於乃祖文武也功非召虎之功如受教於乃祖康公也召虎思文武之德又思康公之德則必竭乃心力以報先王之德矣三代令主不徒責臣子以事功而惟勉之以忠孝本於人心天理以感動之也虎拜稽首對揚王休作召公考天子萬壽明明天子令聞不已矢其文德洽此四國賦也對答揚稱休美考成矢陳也既拜而又拜者有所敷奏也言敢對天子以詞以宣揚天子之美命王命虎以召公是似虎敢不竭力盡心以成召公之功而祝天子之壽抑又願天子之似文武也明眀天子既有令聞矣所願日新又新進而不已覃敷文德使教化洽於四國無徒用武以威之也嚴粲曰王方以武功褒虎而虎乃以文德勉王不矜已功而引君於道意度逺矣江漢六章章八句江漢美平淮也淮夷之為患久矣成王初立同三監以叛其後又同奄以叛伯禽就封又同徐戎以叛宣王中興初命吉甫伐玁狁繼命方叔伐蠻荆南北既定矣乃命召虎伐淮南又命皇父伐淮北蓋用力於淮夷為多也觀虎之式闢四方至於南海其功亦偉矣哉然詩未嘗侈言之也當經營之初已期庶定靡爭銷兵革於不用暨式闢之後惟事疆理旬宣奠民生於永安至其錫命對揚之詞君惟訓臣以忠孝臣惟告君以道德三代而上君臣之際所以互相勸勉者此足以觀矣赫赫明明王命卿士南仲大祖大師皇父整我六師以修我戎既敬既戒惠此南國賦也赫赫威嚴也明明光顯也萬時華曰夷厲以來威靈不振宣王奮然親總六師如雷霆乍驚日月重朗是也王命親命之也皇父南仲之後以卿士而兼太師也整治也六師皆發王親行也戎軍事也敬慎其謀也所謂臨事而懼也戒申其令也所謂師出以律也南國徐方也行師而言惠者伐暴乃所以安民也既敬既戒法也惠此南國道也孫子曰善用兵者修道而保法此之謂也王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒賦也尹氏吉甫也程國伯爵休父名也皇父大將故王親命休父副之故令尹氏命之也左右陳行副中軍也王命皇父將中軍而使休父將前軍先行循淮濱以覘徐土也萬尚烈曰淮在徐南其勢相倚此徐夷逃遁藏匿之藪王師自西北來若惟直搗順攻不為東南壅截之計彼將歷淮浮海而天戈亦有所難指矣故命將之初即已定䇿循淮浦以省之使徐夷不得越淮南奔即後所謂截彼淮浦者是也三事三卿之事也天子自將三卿居守三卿從行司馬掌戰伐司徒比卒旅司空平道塗繕營壘也牧誓曰嗟我友邦冡君御事司徒司馬司空是也不留不處戒詞也前軍先發貴於神速行不可遲留止不可久處早至其地以經營之比天子之來而三事所掌莫不就緒所謂先人有奪人之心也赫赫業業有嚴天子王舒保作匪紹匪遊徐方繹騷震驚徐方如雷如霆徐方震驚賦也業業敬也嚴威也天子自將其威可畏也舒紓也作奮也紹紏緊也遊散緩也南國之民困於征役而時被侵侮王欲舒其力而保其土故奮然振作以來也將欲舒之故不紹恐滋擾也將欲保之故不遊欲及事也所以然者以徐方絡繹騷動宜有以震驚之故天子奮作親總六師天威所指有如雷霆使徐方聞而震驚將不戰而服也王奮厥武如震如怒進厥虎臣闞如虓虎鋪敦淮濆仍執醜虜截彼淮浦王師之所賦也闞勇貌虓怒也鋪陳敦厚濆濵截堵也言天子至淮而徐猶不服故震怒奮武移師前進爪牙之臣勇如怒虎厚集其陳於淮濵而時出奇兵以執其醜虜天子又以王師居於淮浦而截其去路彼欲拒不能欲奔不可所以服也於此知宣王之廟算矣由江漢以伐淮者截淮夷之後也率淮浦以伐徐者截徐戎之後也王旅嘽嘽如飛如翰如江如漢如山之苞如川之流綿綿翼翼不測不克濯征徐國賦也嘽嘽衆盛貌翰羽苞固濯洗也凡戰陳之法分合動靜縱橫竒正而已王師衆盛當其分也有如羽翰兩翼張也及其合也有如江漢二水會也時而靜也如山之苞不可搖也時而動也如川之流不可禦也縱而計之綿綿相續不可絶也橫而觀之翼翼比附不可亂也當其用竒變化無端不可測也當其用正紀律嚴明不可克也以此衆戰誰能禦之用以洗徐方之汙染而維新之所謂正其不正也王猶允塞徐方既來徐方既同天子之功四方既平徐方來庭徐方不回王曰還歸賦也猶謨允信塞滿也庭朝回邪也言戰而勝矣其所以服徐者則不係乎戰也由平日王政之行誠信於內而充塞於外天下感其德而不能外其化故徐方來服而自同於諸侯此天子之功非武臣之力也玁狁西戎荆蠻淮夷四方既平徐亦來朝徐人既無回邪之心則天下永無爭戰之事王自此可以旋歸而銷兵革於不用矣凡師出貴於貞言王猶允塞歸於道也武成患其黷言王曰旋歸止以義也此則所謂因以為戒也常武六章章八句常武美宣王平徐因以為戒也徐為伯益之後而淪於東夷一叛於三監流言之時再叛於伯禽就封之日穆王失馭遂爾僭號蓋負固之方惟徐為強也宣王中興玁狁西戎既略平矣乃伐蠻荆以通江漢由江漢以伐淮夷然後循淮浦以伐徐其經營非一日矣北伐南征王未親行平徐之役天子親履行間敦鋪執虜而後定是徐人敢戰也雖王師幸勝而王靈亦稍褻矣故六月采芑江漢皆不敘戰功此獨詳言其師武臣力之狀而歸之於王猷允塞終之以王曰旋歸詩人之意蓋望其敷文德以柔逺而不欲以智力角勝也其後宣王以黷武之故至敗績於薑戎而料民於太原然則常武之詩人其先見之矣瞻卬昊天則不我惠孔填不寧降此大厲邦靡有定士民其瘵蟊賊蟊疾靡有夷屆罪罟不收靡有夷瘳賦也填久厲亂瘵病也蟊害苗之蟲也自外來曰賊自內生曰疾夷平屆止罟網瘳愈也朱子曰言昊天不惠而降亂無所歸咎之詞也蘇轍曰國政有定則民受福無定則受其病也何楷曰蟊賊外至以比皇父虢石父之類也蟊疾內生比褒姒也內外之蟊相煽為害無有平夷止極之期如張網羅以陷人於罪而日夜不收則民之病無有平愈之日矣人有土田女反有之人有民人女覆奪之此宜無罪女反收之彼宜有罪女覆説之賦也收拘説縱也輔廣曰前四句承上蟊賊而言其侵牟奪取於人者反覆無已也後四句承上罪罟而言其拘繫縱釋於人者反覆不當也哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階亂匪降自天生自婦人匪教匪誨時維婦寺賦也哲智也城猶國也傾覆懿美也梟鴟惡鳥長舌能言也階梯也寺奄人也朱子曰男正位乎外為國家之主故有智則能立國婦人以無非無儀為善無所事哲哲則適以覆國而已故以此懿美之哲婦而反為梟鴟以其能言足為禍亂之階梯也若是則亂豈真自天降哉特由此婦人而已是也匪教匪誨是維婦寺言自古人君之側其相依為姦而不可教誨者惟婦人與宦官彼既不識禮義廉恥之防而又不可與言興亡禍福之幾雖有善者亦末如之何矣是不可不痛懲而預防之也鞫人忮忒譖始竟背豈曰不極伊胡為慝如賈三倍君子是識婦無公事休其蠶織賦也鞫窮忮害忒變也譖不信也竟終背反極至慝惡也三倍獲利之多也君子有位者也公事朝政也休息也言婦寺能以其智辨窮人其心忮害而變詐既以譖妄倡始於前至後而其言不驗則又背其前説以自解而誣人此其為害豈曰不極乎而王猶以為不過侍巾櫛供灑掃之人耳胡能為大惡乎是以婦寺愈熾而小人緣以為姦商賈三倍之利今之君子皆能識之婦人本無公事今則休其蠶織而干預朝政也天何以刺何神不富舍爾介狄維豫胥忌不弔不祥威儀不類人之云亡邦國殄瘁賦也刺責也富猶福也介大狄害胥相弔憫殄盡瘁憔悴也言天何用責王神何以不福王哉由爾舍女戎之介狄反忌豫之正言故也天降不祥而王不憂憫不敬天也一切威儀皆與先王不類不法祖也不敬天不法祖則善人無所施其力而皆去矣善人國之紀也人亡則國瘁人皆亡則國殄瘁矣傷之也天之降罔維其優矣人之云亡心之憂矣天之降罔維其幾矣人之云亡心之悲矣賦也罔禍優多幾近也言婦寺之害終不可除則是天之降禍其類多而其期亦近矣人之云亡則無復維持補救之望矣我心憂之而末如之何惟有悲而已矣後宫色盛則君子隱伏讒人髙張則賢士無名依古以來國家之季大率如此可為太息流涕者也觱沸檻泉維其深矣心之憂矣寧自今矣不自我先不自我後藐藐昊天無不克鞏無忝皇祖式救爾後興也觱沸湧貌檻泉水上出也藐藐逺貌鞏固也以泉之從出者深興憂之從來者逺也不自我先不自我後適當此時不可為也雖然天下事天與人共之者也天甚髙逺而神功不測雖壞亂之極無不能鞏固之者王苟能改過自新而不忝其祖則天意可回猶可以救爾後焉蓋仍以敬天法祖望之也瞻卬七章三章章十句四章章八句瞻卬刺幽王也幽王之亂生自婦寺人所知也而聖人有取於瞻卭者以其知救亂之道也世之治亂人為之實天主之天心一回靡亂不治回天之道在於法祖法祖之道無他改其忝祖者而已矣文武之政布在方策去讒逺色賤貨而貴德所以勸賢也今皆反之所謂忝也但能改過取其忝爾祖者而無之去虢石父之讒逺褒姒之色賤皇父之好貨而貴周召二公之德則往不可諫來猶可追式救爾後無難也書曰惟狂克念作聖非虛言也但改其所以狂者而作聖之功已在是矣深望王之自勉也旻天疾威天篤降喪癲我飢饉民卒流亡我居圉卒荒賦也篤厚癲病卒盡也居國中也圉邊陲也言上天甚怒厚降喪亂病我以飢饉使人民盡皆流移中國邊郵莫不荒蕪不知何以致此也天降罪罟蟊賊內訌昏椓靡共潰潰回遹實靖夷我邦賦也訌誑椓喪也共與供同潰潰昏亂也回遹邪僻也言上天所以降罪者由於小人蟊賊夤緣婦寺誑惑於內昏庸椓喪不供其職此皆潰亂邪僻之人而王實用之使之治平我邦是以飢饉流亡也臯臯訿訿曾不知其玷兢兢業業孔填不寧我位孔貶賦也臯臯頑慢貌訿訿讒謗聲玷缺也填久也言小人頑慢且善讒謗其於政事必有所缺而王曽不知君子敬慎久著勞績而不安其位且至於貶黜也何楷曰兢兢業業者即末章召公之流所謂不尚有舊者也如彼嵗旱草不潰茂如彼棲苴我相此邦無不潰止賦也潰遂也棲苴水中浮草棲於岸上者潰壞也言君子小人用舍顛倒如此是以民生日困如彼嵗旱之草不能暢茂又如棲岸之苴立見枯稿我視此邦之人無有不潰壞者所謂淪胥以鋪也維昔之富不如時維今之疚不如兹彼疏斯稗胡不自替職兄斯引賦也富祿時今疚病疏粗稗精替廢也兄與貺同嘉與之也言昔之時亦有受祿而富者不如今時之謬也昔富君子今富小人也今之時亦有失位而疚者不如兹人之甚也庸人之貶猶輕君子之貶更重也譬之於米小人如疏君子如稗亦易辨爾王如辨之則彼小人當自替之胡不自替而專嘉與之使得援引其黨類乎怪之也池之竭矣不云自頻泉之竭矣不云自中溥斯害矣職兄斯𢎞不災我躬賦也頻涯也池自外灌故竭必自頻以比王澤之竭由外有小人也泉自內出故竭必自中以比王澤之竭由內有褒姒也羣小艷妻內外為姦其為害也溥矣而王猶不悟專嘉與之使其害益大則危亡將至豈不災及我躬乎憂之也昔先王受命有如召公日辟國百里今也日蹙國百里於乎哀哉維今之人不尚有舊賦也先王謂宣王也受命謂中興也召公謂召虎也王命召虎式闢四方于疆于理至于南海所謂日闢國百里也至於幽王四夷交侵諸侯內叛所謂日蹙國百里也父何其盛子何其衰然今去宣王之時未逺也維今之人不尚有與召公共事者乎但一用之則中興之業計日可待而終於不用豈不哀哉召旻七章四章章五句三章章七句召旻刺幽王也任用小人以致喪亂也然其時非無君子也但一用之則轉禍為福易易耳是故瞻卬之詩望其改過而無忝皇祖召旻之詩望其改圖而擢用舊人猶匪風下泉之意也風雅之終其旨同歸聖人欲撥亂世而返之正其心豈有已時哉蕩之什十一篇九十二章七百六十九句御纂詩義折中卷十八
